function rTaskItem(t){
  var it=typeof t.items==='string'?JSON.parse(t.items||'[]'):(t.items||[]);
  var tot=it.length;var dn=it.filter(function(i){return i.done;}).length;
  var pct=tot?Math.round(dn/tot*100):0;
  var v=t.fecha_limite&&new Date(t.fecha_limite+'T23:59:59')<new Date()&&t.estado!=='COMPLETADA';
  var priC=t.prioridad==='URGENTE'?'#dc2626':t.prioridad==='ALTA'?'#d97706':'';
  var estC=v?'#dc2626':t.estado==='COMPLETADA'?'#16a34a':t.estado==='EN PROGRESO'?'#0A4FBF':'#d97706';
  var estL=v?'VENCIDA':t.estado;
  var h='<div class="ZTitem" id="zt-'+t.id+'">';
  h+='<div class="ZThead" onclick="togTask(\''+t.id+'\')">';
  h+='<span class="ZTchev">▶</span>';
  h+='<div class="ZTtitle">'+(priC?'<span style="color:'+priC+'">● </span>':'')+E(t.titulo)+'</div>';
  h+='<span style="font-size:8px;font-weight:700;color:'+estC+'">'+estL+'</span>';
  h+='</div>';
  h+='<div class="ZTbody">';
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:9px;color:#64748b"><div class="ZKkav" style="background:'+C(t.asignado_a)+';width:18px;height:18px;font-size:7px">'+I(t.asignado_a)+'</div>'+E(t.asignado_a);
  if(t.fecha_limite)h+=' · Vence: '+t.fecha_limite;
  h+='</div>';
  if(tot){
    it.forEach(function(item,idx){
      h+='<label class="ZTci'+(item.done?' dn':'')+'"><input type="checkbox" '+(item.done?'checked':'')+' onchange="tI(\''+t.id+'\','+idx+',this.checked)">'+E(item.text)+'</label>';
    });
    h+='<div class="ZTprog"><div class="ZTpbar"><div class="ZTpfill" style="width:'+pct+'%"></div></div><span class="ZTppct">'+pct+'%</span></div>';
  }
  h+='<div style="display:flex;gap:4px;margin-top:8px">';
  if(t.estado==='PENDIENTE')h+='<button class="ZB Zp" style="font-size:9px;padding:4px 10px" onclick="cSt(\''+t.id+'\',\'EN PROGRESO\')">Iniciar</button>';
  if(t.estado==='EN PROGRESO')h+='<button class="ZB Zg" style="font-size:9px;padding:4px 10px" onclick="cSt(\''+t.id+'\',\'COMPLETADA\')">Completar</button>';
  h+='<button class="ZB Zs" style="font-size:9px;padding:4px 10px" onclick="dTbyId(\''+t.id+'\')">Eliminar</button>';
  h+='</div></div></div>';
  return h;
}

function rKanban(){
  var el=document.getElementById('zKanban');
  if(!el)return;
  var r=D.ta||{pendientes:[],en_progreso:[],completadas:[]};
  
  function seccion(titulo,icon,color,bgColor,items){
    var cnt=items.length;
    var h='<div style="margin-bottom:6px">';
    h+='<div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.tArr\').textContent=this.nextElementSibling.style.display===\'none\'?\'▶\':\'▼\'" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:'+bgColor+';border-radius:10px;cursor:pointer;border-left:3px solid '+color+'">';
    h+='<span class="tArr" style="font-size:8px;color:'+color+'">▼</span>';
    h+='<span style="font-size:12px">'+icon+'</span>';
    h+='<span style="font-size:11px;font-weight:800;color:#0f172a;flex:1">'+titulo+'</span>';
    h+='<span style="font-size:9px;font-weight:800;color:#fff;background:'+color+';border-radius:20px;padding:2px 8px;min-width:18px;text-align:center">'+cnt+'</span></div>';
    h+='<div style="padding:4px 0">';
    if(!cnt) h+='<div style="padding:16px;text-align:center;font-size:10px;color:#94a3b8">Sin tareas</div>';
    items.forEach(function(t){
      var pr=t.prioridad==='URGENTE'?'🔴':t.prioridad==='ALTA'?'🟠':t.prioridad==='MEDIA'?'🟡':'⚪';
      var venc=t.vencida?' <span style="font-size:8px;color:#dc2626;font-weight:700">VENCIDA</span>':'';
      var items_done=0,items_total=0;
      if(t.items&&t.items.length){items_total=t.items.length;t.items.forEach(function(it){if(it.done)items_done++;});}
      var progPct=items_total?Math.round(items_done/items_total*100):0;
      var progBar=items_total?'<div style="display:flex;align-items:center;gap:4px"><div style="flex:1;height:3px;background:#EEF0F8;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+color+';width:'+progPct+'%"></div></div><span style="font-size:8px;color:#94a3b8">'+progPct+'%</span></div>':'';
      h+='<div onclick="verTarea(\''+E(t.id)+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f0f4fc;cursor:pointer;transition:background .1s" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'transparent\'">';
      h+='<div style="width:28px;height:28px;border-radius:50%;background:'+C(t.asignado_a||'')+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">'+I(t.asignado_a||'?')+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:11px;font-weight:700;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+E(t.titulo)+'</span>'+pr+venc+'</div>';
      h+='<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="font-size:9px;color:#64748b">'+E(t.asignado_a||'Sin asignar')+'</span>';
      if(t.fecha_limite)h+='<span style="font-size:8px;color:#94a3b8">📅 '+E(t.fecha_limite.substring(0,10))+'</span>';
      h+='</div>'+progBar+'</div></div>';
    });
    h+='</div></div>';
    return h;
  }
  
  el.style.display='block';
  el.style.flexDirection='column';
  el.innerHTML=seccion('Pendientes','⬜','#EA580C','rgba(234,88,12,.04)',r.pendientes||[])+
    seccion('En progreso','🔵','#0A4FBF','rgba(10,79,191,.04)',r.en_progreso||[])+
    seccion('Completadas','✅','#16A34A','rgba(22,163,74,.04)',(r.completadas||[]).slice(0,10));
}
