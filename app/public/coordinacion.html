  var g=ig?D.gr.find(function(x){return'CH-'+x.id===c.id||x.nombre===c.nombre;}):null;
  if(g)bg=g.color||bg;
  var parts=c.participantes;if(typeof parts==='string')try{parts=JSON.parse(parts);}catch(e){parts=[];}
  var nP=Array.isArray(parts)?parts.length:0;
  return'<div class="ZC'+(a?' act':'')+'" onclick="sCh(\''+E(c.id)+'\')" data-n="'+E(c.nombre.toLowerCase())+'">'
    +'<div class="ZCa'+(ig?' grp':'')+'" style="background:'+bg+'">'+I(c.nombre)+(ig?'':'<div class="ZCon" style="background:#00C9A7"></div>')+'</div>'
    +'<div class="ZCi"><div class="ZCn">'+E(c.nombre)+'</div>'
    +(role?'<div class="ZCr" style="color:'+bg+'">'+role+'</div>':'')
    +(ig?'<div class="ZCr" style="color:'+bg+'">'+nP+' miembros</div>':'')
    +'<div class="ZCm">'+E(c.ultimo_mensaje||'Iniciar conversación...')+'</div></div>'
    +'<div class="ZCmeta"><div class="ZCt">'+A(c.ultimo_mensaje_at)+'</div></div></div>';
}
function fCL(v){var s=v.toLowerCase();document.querySelectorAll('.ZC').forEach(function(c){c.style.display=(c.getAttribute('data-n')||'').indexOf(s)>=0?'':'none';});}
function sCh(id){D.ac=id;rCL();lMs(id);}
function lMs(id){q('aos_mensajes','select=*&canal=eq.'+encodeURIComponent(id)+'&order=created_at.asc&limit=300',function(m){D.ms=m||[];rChat();});}

// ═══ CHAT ═══
function rChat(){
  var cv=document.getElementById('zChat');var ch=D.ch.find(function(c){return c.id===D.ac;});
  if(!ch){cv.innerHTML='<div class="ZEmpty" id="zEmpty"><div class="ZEico"><svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.9 9.9 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="#0A4FBF" stroke-width="1.5" stroke-linecap="round"/></svg></div><div style="font-size:15px;font-weight:700;color:#475569">Selecciona un chat</div></div>';return;}
  var ig=ch.tipo!=='DIRECTO';var bg=C(ch.nombre);
  var parts=ch.participantes;if(typeof parts==='string')try{parts=JSON.parse(parts);}catch(e){parts=[];}
  var html='<div class="ZMh"><div class="ZCa'+(ig?' grp':'')+'" style="background:'+bg+';width:40px;height:40px;font-size:14px">'+I(ch.nombre)+'</div><div class="ZMi"><div class="ZMn">'+E(ch.nombre)+'</div><div class="ZMs">'+(ig?(Array.isArray(parts)?parts.length:0)+' miembros':'En línea')+'</div></div><div class="ZMa"><button class="Zd" onclick="cChat(\''+E(ch.id)+'\')">Cerrar</button></div></div>';
  html+='<div class="ZMb" id="zMsgs">';
  if(!D.ms.length)html+='<div class="ZMd">Inicia la conversación</div>';
  var ld='';
  D.ms.forEach(function(m){var d=new Date(m.created_at);var ds=d.toLocaleDateString('es-PE',{day:'numeric',month:'short'});if(ds!==ld){html+='<div class="ZMd">'+ds+'</div>';ld=ds;}
    var me=m.de==='ADMIN'||m.de==='CESAR';var tm=d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="Zm '+(me?'me':'th')+'">';
    if(!me)html+='<div class="Zma" style="background:'+C(m.de)+'">'+I(m.de)+'</div>';
    html+='<div class="Zmb">';if(!me&&ig)html+='<div class="Zms" style="color:'+C(m.de)+'">'+E(m.de)+'</div>';
    html+='<div class="Zmc">'+E(m.mensaje)+'</div><div class="Zmt">'+tm+'</div></div></div>';
  });
  html+='</div><div class="ZMf"><input id="zInp" placeholder="Escribe un mensaje..." onkeydown="if(event.key===\'Enter\')sMsg()"><button class="ZSend" onclick="sMsg()">&#10148;</button></div>';
  cv.innerHTML=html;var md=document.getElementById('zMsgs');if(md)md.scrollTop=md.scrollHeight;
}
function sMsg(){var inp=document.getElementById('zInp');if(!inp||!inp.value.trim()||!D.ac)return;var msg=inp.value.trim();inp.value='';inp.focus();rpc('aos_enviar_mensaje',{p_canal:D.ac,p_de:'ADMIN',p_mensaje:msg},function(r){if(r&&r.ok){lMs(D.ac);lCh();}});}
function cChat(id){if(!confirm('¿Cerrar chat?'))return;rest('aos_canales?id=eq.'+encodeURIComponent(id),{method:'PATCH',body:JSON.stringify({cerrado:true,updated_at:new Date().toISOString()})}).then(function(){D.ac=null;lCh();rChat();});}
function newBcast(){var m=prompt('Mensaje para todo el equipo:');if(!m)return;rpc('aos_enviar_mensaje',{p_canal:'CH-GENERAL',p_de:'ADMIN',p_mensaje:m},function(){D.ac='CH-GENERAL';lCh();lMs('CH-GENERAL');});}

// ═══ TAREAS ═══
function lTa(){q('aos_tareas','select=*&order=created_at.desc&limit=200',function(t){D.ta=t||[];rTa();});}
function rTa(){var el=document.getElementById('zTareas');var p=D.ta.filter(function(t){return t.estado==='PENDIENTE';}),r=D.ta.filter(function(t){return t.estado==='EN PROGRESO';}),d=D.ta.filter(function(t){return t.estado==='COMPLETADA';});
  el.innerHTML='<div class="ZK">'+rKC('PENDIENTE',p,'kp','#d97706')+rKC('EN PROGRESO',r,'ke','#0A4FBF')+rKC('COMPLETADA',d,'kd','#16a34a')+'</div>';}
function rKC(l,items,cls,cl){var h='<div class="ZKc '+cls+'"><div class="ZKh">'+l+' <span class="ZKn" style="background:'+cl+'">'+items.length+'</span></div>';items.forEach(function(t){h+=rKK(t,cls==='kd');});return h+'</div>';}
function rKK(t,dn){var it=typeof t.items==='string'?JSON.parse(t.items||'[]'):(t.items||[]);var tot=it.length;var done=it.filter(function(i){return i.done;}).length;var v=t.fecha_limite&&new Date(t.fecha_limite+'T23:59:59')<new Date()&&t.estado!=='COMPLETADA';var pc=t.prioridad==='URGENTE'?'#dc2626':t.prioridad==='ALTA'?'#d97706':'';
  var h='<div class="ZKk'+(dn?' dn':'')+'" onclick="dTa(\''+t.id+'\')">';if(pc)h+='<div class="ZKkpr" style="color:'+pc+'">'+E(t.prioridad)+'</div>';
  h+='<div class="ZKkt">'+E(t.titulo)+'</div><div class="ZKka"><div class="ZKkav" style="background:'+C(t.asignado_a)+'">'+I(t.asignado_a)+'</div><span class="ZKkan">'+E(t.asignado_a)+'</span></div>';
  if(t.fecha_limite){var fl=new Date(t.fecha_limite+'T12:00:00');h+='<div class="ZKkd '+(v?'wn':'ok')+'">'+(v?'⚠ Vencida':'Vence')+': '+fl.getDate()+'/'+(fl.getMonth()+1)+'</div>';}
  if(tot>0){h+='<div class="ZKkb">';for(var i=0;i<tot;i++)h+='<div class="ZKks" style="background:'+(it[i].done?'#00C9A7':'#e2e8f0')+'"></div>';h+='</div><div class="ZKkp">'+done+'/'+tot+'</div>';}return h+'</div>';}
function dTa(id){var t=D.ta.find(function(x){return x.id===id;});if(!t)return;D.sT=t;document.getElementById('td-t').textContent=t.titulo;
  var it=typeof t.items==='string'?JSON.parse(t.items||'[]'):(t.items||[]);var tot=it.length;var dn=it.filter(function(i){return i.done;}).length;
  var h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="ZCa" style="background:'+C(t.asignado_a)+';width:40px;height:40px;font-size:14px">'+I(t.asignado_a)+'</div><div><div style="font-weight:700;font-size:14px;color:#0f172a">'+E(t.asignado_a)+'</div><div style="font-size:10px;color:#64748b">'+E(t.estado)+'</div></div></div>';
  if(t.descripcion)h+='<div style="font-size:11px;color:#475569;padding:12px;background:#f8fafc;border-radius:12px;margin-bottom:12px;line-height:1.6">'+E(t.descripcion)+'</div>';
  h+='<div style="display:flex;gap:12px;font-size:10px;color:#94a3b8;margin-bottom:14px;flex-wrap:wrap">';if(t.fecha_limite)h+='<span>Limite: <b style="color:#0f172a">'+t.fecha_limite+'</b></span>';if(t.tiempo_estimado_min)h+='<span>Tiempo: <b style="color:#0f172a">'+t.tiempo_estimado_min+'min</b></span>';if(t.prioridad!=='NORMAL')h+='<span style="color:'+(t.prioridad==='URGENTE'?'#dc2626':'#d97706')+'"><b>'+E(t.prioridad)+'</b></span>';h+='</div>';
  if(tot){h+='<div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:8px">Checklist <span style="color:#94a3b8;font-weight:500">('+dn+'/'+tot+')</span></div>';
    it.forEach(function(item,idx){h+='<label style="display:flex;align-items:center;gap:10px;padding:8px 0;font-size:12px;cursor:pointer;color:#0f172a;border-bottom:1px solid #f1f5f9'+(item.done?';text-decoration:line-through;opacity:.4':'')+'"><input type="checkbox" '+(item.done?'checked':'')+' onchange="tI(\''+id+'\','+idx+',this.checked)" style="width:18px;height:18px;accent-color:#0A4FBF">'+E(item.text)+'</label>';});}
  document.getElementById('td-b').innerHTML=h;
  var fh='';if(t.estado!=='COMPLETADA')fh+='<button class="ZB Zg" onclick="cSt(\''+id+'\',\'COMPLETADA\')">Completar</button>';if(t.estado==='PENDIENTE')fh+='<button class="ZB Zp" onclick="cSt(\''+id+'\',\'EN PROGRESO\')">Iniciar</button>';if(t.estado==='EN PROGRESO')fh+='<button class="ZB Zs" onclick="cSt(\''+id+'\',\'PENDIENTE\')">Pausar</button>';
  document.getElementById('td-f').innerHTML=fh;document.getElementById('m-td').classList.add('open');}
function tI(id,i,c){rpc('aos_toggle_tarea_item',{p_tarea_id:id,p_item_idx:i,p_completado:c},function(){lTa();dTa(id);});}
function cSt(id,e){rest('aos_tareas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({estado:e,completado_at:e==='COMPLETADA'?new Date().toISOString():null,iniciado_at:e==='EN PROGRESO'?new Date().toISOString():null,updated_at:new Date().toISOString()})}).then(function(){document.getElementById('m-td').classList.remove('open');lTa();});}
function dT(){if(!D.sT||!confirm('¿Eliminar?'))return;rest('aos_tareas?id=eq.'+D.sT.id,{method:'DELETE'}).then(function(){document.getElementById('m-td').classList.remove('open');lTa();});}
function newTarea(){document.getElementById('nt-t').value='';document.getElementById('nt-desc').value='';document.getElementById('nt-fl').value='';document.getElementById('nt-tm').value='';document.getElementById('nt-g').value='';document.getElementById('nt-items').innerHTML='<div class="ZIr"><input type="text" placeholder="Item 1..."><button class="ZIx" onclick="this.parentNode.remove()">&#10005;</button></div>';document.getElementById('m-nt').classList.add('open');}
function aI(){var c=document.getElementById('nt-items');var n=c.children.length+1;var r=document.createElement('div');r.className='ZIr';r.innerHTML='<input type="text" placeholder="Item '+n+'..."><button class="ZIx" onclick="this.parentNode.remove()">&#10005;</button>';c.appendChild(r);}
function sT(){var t=document.getElementById('nt-t').value.trim();if(!t)return;var items=[];document.querySelectorAll('#nt-items .ZIr input[type=text]').forEach(function(i){if(i.value.trim())items.push({text:i.value.trim(),done:false});});
  var gid=document.getElementById('nt-g').value;
  if(gid){rpc('aos_crear_tarea_grupo',{p_titulo:t,p_grupo_id:gid,p_items:JSON.stringify(items),p_fecha_limite:document.getElementById('nt-fl').value||null,p_descripcion:document.getElementById('nt-desc').value||null,p_prioridad:document.getElementById('nt-pr').value,p_tiempo_min:parseInt(document.getElementById('nt-tm').value)||null},function(r){if(r&&r.ok){document.getElementById('m-nt').classList.remove('open');lTa();if(window.AOS_showToast)AOS_showToast('Tarea grupal',r.tareas_creadas+' creadas','success');}});}
  else{rpc('aos_crear_tarea',{p_titulo:t,p_asignado:document.getElementById('nt-a').value,p_items:JSON.stringify(items),p_fecha_limite:document.getElementById('nt-fl').value||null,p_descripcion:document.getElementById('nt-desc').value||null,p_prioridad:document.getElementById('nt-pr').value,p_tiempo_min:parseInt(document.getElementById('nt-tm').value)||null},function(r){if(r&&r.ok){document.getElementById('m-nt').classList.remove('open');lTa();if(window.AOS_showToast)AOS_showToast('Tarea creada',t,'success');}});}
}
// ═══ NOTIFS ═══
function lNo(){q('aos_notificaciones','select=*&order=created_at.desc&limit=50',function(n){D.no=n||[];if(D.rpTab==='n')rNo();});}
function rNo(){var el=document.getElementById('zNL');if(!D.no.length){el.innerHTML='<div style="padding:40px;text-align:center;font-size:12px;color:#94a3b8">Sin notificaciones</div>';return;}
  el.innerHTML=D.no.map(function(n){var ic=n.tipo==='URGENTE'?'Zna':n.tipo==='ALERTA'?'Znw':'Zni';var sy=n.tipo==='URGENTE'?'⚠':n.tipo==='ALERTA'?'⚡':'ℹ';
    return'<div class="ZNc"><div class="ZNi '+ic+'">'+sy+'</div><div style="flex:1"><div style="font-weight:700;font-size:12px;color:#0f172a">'+E(n.titulo)+'</div>'+(n.contenido?'<div style="font-size:10px;color:#64748b;margin-top:3px;line-height:1.5">'+E(n.contenido)+'</div>':'')+'<div style="font-size:9px;color:#94a3b8;margin-top:4px">'+(n.para?E(n.para):'Equipo')+' · '+A(n.created_at)+'</div></div></div>';}).join('');}
function newNotif(){document.getElementById('nn-t').value='';document.getElementById('nn-c').value='';document.getElementById('m-nn').classList.add('open');}
function sN(){var t=document.getElementById('nn-t').value.trim();if(!t)return;rpc('aos_enviar_notificacion',{p_titulo:t,p_contenido:document.getElementById('nn-c').value||null,p_para:document.getElementById('nn-to').value||null,p_tipo:document.getElementById('nn-tp').value},function(){document.getElementById('m-nn').classList.remove('open');lNo();if(window.AOS_showToast)AOS_showToast('Enviada','','success');});}
// TABS
function zRT(t){D.rpTab=t;document.getElementById('zt-t').classList.toggle('act',t==='t');document.getElementById('zt-n').classList.toggle('act',t==='n');document.getElementById('zTareas').style.display=t==='t'?'flex':'none';document.getElementById('zNotifs').style.display=t==='n'?'flex':'none';document.getElementById('zRC').style.display=t==='t'?'flex':'none';if(t==='n')rNo();}
setInterval(function(){lCh();if(D.ac)lMs(D.ac);},15000);
init();
</script>
