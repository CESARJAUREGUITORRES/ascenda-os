<!-- admin-catalogo.html v2 — Catálogo por Categorías | AscendaOS -->
<style>
.ac{padding:10px;min-height:100vh;font-family:'DM Sans',sans-serif;color:#1E293B;background:#F0F4FC}
.ac-h{background:#071D4A;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ac-t{font-family:"Exo 2",sans-serif;font-weight:800;font-size:16px;color:#fff}
.ac-pills{display:flex;gap:3px}.ac-pill{padding:6px 14px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:none;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);transition:all .2s}.ac-pill:hover{background:rgba(255,255,255,.15);color:#fff}.ac-pill.act{background:#fff;color:#0A4FBF}
.ac-sp{display:grid;grid-template-columns:220px 1fr;gap:8px;height:calc(100vh - 120px)}
.ac-cats{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow-y:auto;padding:6px}
.ac-ci{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .1s;font-size:10px;font-weight:600;color:#475569}.ac-ci:hover{background:#F0F4FC}.ac-ci.sel{background:#EEF2FF;color:#0A4FBF;border-left:3px solid #0A4FBF;font-weight:800}
.ac-ci-icon{font-size:14px;flex-shrink:0}.ac-ci-cnt{font-size:8px;color:#9AAAC8;margin-left:auto}
.ac-ci-rol{font-size:6px;font-weight:800;padding:1px 4px;border-radius:3px;margin-left:2px}
.ac-main{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow-y:auto;padding:14px}
.ac-tabs{display:flex;gap:2px;margin-bottom:10px;border-bottom:2px solid #E2E8F0;padding-bottom:6px}
.ac-tab{padding:5px 14px;border-radius:6px 6px 0 0;font-size:10px;font-weight:700;cursor:pointer;color:#6B7BA8;background:transparent;border:none;transition:all .15s}.ac-tab:hover{color:#0A4FBF}.ac-tab.act{color:#0A4FBF;background:#EEF2FF;border-bottom:2px solid #0A4FBF;margin-bottom:-8px}
.ac-sec{font-family:"Exo 2",sans-serif;font-weight:800;font-size:10px;color:#071D4A;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #E2E8F0}
.ac-fg{margin-bottom:6px}.ac-fl{font-size:8px;font-weight:700;color:#6B7BA8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.ac-fi{width:100%;padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;font-family:"DM Sans",sans-serif;outline:none;box-sizing:border-box}.ac-fi:focus{border-color:#0A4FBF}
.ac-ta{width:100%;padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;font-family:"DM Sans",sans-serif;outline:none;resize:vertical;min-height:60px;box-sizing:border-box}.ac-ta:focus{border-color:#0A4FBF}
.ac-sel{padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;outline:none;font-family:"DM Sans",sans-serif;box-sizing:border-box}
.ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ac-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ac-btn{padding:6px 14px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.ac-btn-p{background:#0A4FBF;color:#fff}.ac-btn-p:hover{background:#083DA0}
.ac-btn-s{background:#F0F4FC;color:#6B7BA8;border:1px solid #E2E8F0}.ac-btn-s:hover{background:#E2E8F0}
.ac-btn-d{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}.ac-btn-d:hover{background:#DC2626;color:#fff}
.ac-item-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:4px;font-size:10px;transition:all .1s}.ac-item-row:hover{border-color:#0A4FBF;background:#FAFBFF}
.ac-item-name{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-faq{padding:6px;background:#FAFBFF;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:4px}
.ac-top-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #FDE68A;border-radius:6px;margin-bottom:4px;background:#FFFBEB;font-size:10px}
</style>
<div class="ac" id="ac-root">
  <div class="ac-h">
    <div><div class="ac-t">Catálogo & Repositorio</div><div style="font-size:8px;color:rgba(255,255,255,.4)">Gestión por categorías · Servicios · Productos · Toppings</div></div>
    <div class="ac-pills">
      <button class="ac-pill act" onclick="acMode('SERVICIO',this)">Servicios</button>
      <button class="ac-pill" onclick="acMode('PRODUCTO',this)">Productos</button>
      <button class="ac-pill" onclick="acAnalytics(this)">📊 Analytics</button>
    </div>
  </div>
  <div class="ac-sp">
    <div class="ac-cats" id="ac-cats"></div>
    <div class="ac-main" id="ac-main"><div style="text-align:center;padding:40px;color:#9AAAC8;font-size:11px">Selecciona una categoría</div></div>
  </div>
</div>
<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function sbF(u,o){return fetch(SB+u,Object.assign({headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'}},o||{})).then(function(r){return r.json()})}
function rpc(f,p,cb){sbF('/rest/v1/rpc/'+f,{method:'POST',body:JSON.stringify(p||{})}).then(cb).catch(function(e){console.error(f,e)})}
function sbPatch(tbl,filter,body,cb){fetch(SB+'/rest/v1/'+tbl+'?'+filter,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)}).then(function(r){if(cb)cb(r.ok)}).catch(function(){if(cb)cb(false)})}
function sbPost(tbl,body,cb){fetch(SB+'/rest/v1/'+tbl,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){if(cb)cb(d)}).catch(function(){if(cb)cb(null)})}
function sbDel(tbl,filter,cb){fetch(SB+'/rest/v1/'+tbl+'?'+filter,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(){if(cb)cb()}).catch(function(){if(cb)cb()})}
function H(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function $(s){return document.getElementById(s)}
var AC={cats:[],items:[],toppings:[],tipo:'SERVICIO',selCat:null,tab:'items'};
function acMode(tipo,el){document.querySelectorAll('.ac-pill').forEach(function(p){p.classList.remove('act')});el.classList.add('act');AC.tipo=tipo;AC.selCat=null;document.querySelector('.ac-sp').style.gridTemplateColumns='220px 1fr';$('ac-cats').style.display='';$('ac-main').innerHTML='<div style="text-align:center;padding:40px;color:#9AAAC8;font-size:11px">Selecciona una categoría</div>';acLoadCats()}
function acLoadCats(){sbF('/rest/v1/aos_catalogo_categorias?order=nombre&tipo=eq.'+AC.tipo).then(function(cats){AC.cats=cats||[];sbF('/rest/v1/aos_catalogo_servicios?tipo=eq.'+AC.tipo+'&estado=eq.ACTIVO&select=categoria').then(function(items){var cnt={};(items||[]).forEach(function(i){cnt[i.categoria]=(cnt[i.categoria]||0)+1});var h='<div style="font-size:8px;font-weight:800;color:#6B7BA8;padding:4px 10px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center">Categorías <button class="ac-btn ac-btn-s" style="padding:2px 6px;font-size:7px" onclick="acNewCat()">+ Nueva</button></div>';AC.cats.forEach(function(c){var rc=c.rol_profesional==='DOCTORA'?'background:#EBF2FF;color:#0A4FBF':c.rol_profesional==='ENFERMERIA'?'background:#F0FDF4;color:#059669':'background:#F5F3FF;color:#7C3AED';h+='<div class="ac-ci'+(AC.selCat&&AC.selCat.nombre===c.nombre?' sel':'')+'" onclick="acSelCat(\''+H(c.nombre)+'\')"><span class="ac-ci-icon">'+getCatIcon(c.nombre)+'</span><span>'+H(c.nombre)+'</span><span class="ac-ci-rol" style="'+rc+'">'+c.rol_profesional.substring(0,3)+'</span><span class="ac-ci-cnt">'+(cnt[c.nombre]||0)+'</span></div>'});$('ac-cats').innerHTML=h})})}
function acSelCat(nombre){AC.selCat=AC.cats.find(function(c){return c.nombre===nombre});if(!AC.selCat)return;AC.tab='items';acLoadCats();acLoadItems()}
function acLoadItems(){var cat=AC.selCat;if(!cat)return;sbF('/rest/v1/aos_catalogo_servicios?categoria=eq.'+encodeURIComponent(cat.nombre)+'&tipo=eq.'+AC.tipo+'&order=nombre').then(function(items){AC.items=items||[];sbF('/rest/v1/aos_catalogo_toppings?categoria_vinculada=eq.'+encodeURIComponent(cat.nombre)+'&estado=eq.ACTIVO&order=nombre').then(function(tops){AC.toppings=tops||[];acRenderMain()})})}
function acRenderMain(){var cat=AC.selCat;if(!cat)return;var o='';o+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:28px">'+getCatIcon(cat.nombre)+'</span><div><div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:16px;color:#071D4A">'+H(cat.nombre)+'</div>';var rl=cat.rol_profesional==='DOCTORA'?'👩‍⚕️ Solo Doctora':cat.rol_profesional==='ENFERMERIA'?'🩺 Enfermería':'🔄 Ambos';o+='<div style="font-size:9px;color:#6B7BA8">'+AC.items.length+' items | '+rl+(cat.requiere_control?' | ⏰ Control '+cat.dias_control+'d':'')+'</div></div></div>';o+='<div class="ac-tabs">';['items','repositorio','config','toppings'].forEach(function(t){var lb={items:'📋 Items ('+AC.items.length+')',repositorio:'📚 Repositorio',config:'⚙️ Config',toppings:'🎁 Toppings ('+AC.toppings.length+')'};o+='<button class="ac-tab'+(AC.tab===t?' act':'')+'" onclick="AC.tab=\''+t+'\';acRenderMain()">'+lb[t]+'</button>'});o+='</div>';if(AC.tab==='items')o+=acRenderItems();else if(AC.tab==='repositorio')o+=acRenderRepo();else if(AC.tab==='config')o+=acRenderConfig();else if(AC.tab==='toppings')o+=acRenderToppings();$('ac-main').innerHTML=o;$('ac-main').scrollTop=0}
function acRenderItems(){var o='<div class="ac-sec">Servicios / Productos</div>';if(!AC.items.length)return o+'<div style="text-align:center;padding:20px;color:#9AAAC8;font-size:10px">Sin items</div>';o+='<div style="display:flex;gap:6px;padding:4px 8px;font-size:7px;font-weight:800;color:#6B7BA8;text-transform:uppercase;border-bottom:1px solid #E2E8F0;margin-bottom:4px"><span style="flex:1">Nombre</span><span style="width:70px;text-align:right">P. Oferta</span><span style="width:70px;text-align:right">P. Base</span><span style="width:30px;text-align:center">Ses</span><span style="width:40px;text-align:center">Dur</span><span style="width:40px;text-align:center">Estado</span><span style="width:24px"></span></div>';AC.items.forEach(function(it,i){var a=it.estado==='ACTIVO';o+='<div class="ac-item-row" style="'+(a?'':'opacity:.5')+'"><span class="ac-item-name" title="'+H(it.nombre)+'">'+H(it.nombre)+'</span><input style="width:70px;text-align:right;padding:3px 6px;border:1px solid #E2E8F0;border-radius:4px;font-size:10px;font-weight:700;color:#0A4FBF" value="'+(it.precio_oferta||0)+'" onchange="acUpdItem(\''+it.id+'\',\'precio_oferta\',this.value)" title="Precio oferta"><input style="width:70px;text-align:right;padding:3px 6px;border:1px solid #F1F5F9;border-radius:4px;font-size:9px;color:#6B7BA8" value="'+(it.precio_base||'')+'" onchange="acUpdItem(\''+it.id+'\',\'precio_base\',this.value)" placeholder="—" title="Precio base"><span style="font-size:8px;color:#6B7BA8;width:30px;text-align:center">'+(it.num_sesiones||1)+'</span><span style="font-size:8px;color:#6B7BA8;width:40px;text-align:center">'+(it.duracion_sesion||'—')+'</span><span style="font-size:7px;width:40px;text-align:center;color:'+(a?'#059669':'#DC2626')+';font-weight:700">'+(a?'ON':'OFF')+'</span><button class="ac-btn ac-btn-s" style="padding:2px 6px;font-size:8px" onclick="acEditItem('+i+')">✏️</button></div>'});return o}
function acUpdItem(id,field,val){var body={};body[field]=parseFloat(val)||0;body.updated_at=new Date().toISOString();sbPatch('aos_catalogo_servicios','id=eq.'+id,body,function(ok){if(ok&&window.AOS_showToast)AOS_showToast('Precio actualizado','','')})}
function acEditItem(idx){var it=AC.items[idx];if(!it)return;var o='<div class="ac-sec">Editar: '+H(it.nombre)+'</div><div class="ac-grid">';o+=fg('Precio oferta','ei-precio',it.precio_oferta||'','number');o+=fg('Precio base','ei-pbase',it.precio_base||'','number');o+=fg('N sesiones','ei-nses',it.num_sesiones||'');o+=fg('Duración sesión','ei-dur',it.duracion_sesion||'');o+=fg('Formulario','ei-form',it.tipo_formulario||'');o+='<div class="ac-fg"><div class="ac-fl">Estado</div><select class="ac-sel" id="ei-estado" style="width:100%"><option'+(it.estado==='ACTIVO'?' selected':'')+'>ACTIVO</option><option'+(it.estado==='INACTIVO'?' selected':'')+'>INACTIVO</option></select></div>';o+=fg('Imagen URL','ei-img',it.imagen_url||'');o+='</div>';if(AC.tipo==='PRODUCTO'){o+='<div class="ac-sec">Info producto</div><div class="ac-grid">';o+=fg('Unidades/envase','ei-unid',it.unidades_envase||'','number');o+=fg('Dosis diaria','ei-dosis',it.dosis_diaria||'','number');o+=fg('Duración (días)','ei-ddias',it.duracion_estimada_dias||'','number');o+=fg('Contenido (ml)','ei-ml',it.contenido_ml||'','number');o+=fg('Modo de uso','ei-modo',it.modo_uso_corto||'');o+='</div>'}o+='<div style="display:flex;gap:6px;margin-top:10px"><button class="ac-btn ac-btn-p" onclick="acSaveItem('+idx+')">Guardar</button><button class="ac-btn ac-btn-s" onclick="acRenderMain()">Cancelar</button></div>';$('ac-main').innerHTML=o}
function acSaveItem(idx){var it=AC.items[idx];if(!it)return;var body={precio_oferta:parseFloat(($('ei-precio')||{}).value)||null,precio_base:parseFloat(($('ei-pbase')||{}).value)||null,num_sesiones:($('ei-nses')||{}).value||null,duracion_sesion:($('ei-dur')||{}).value||null,tipo_formulario:($('ei-form')||{}).value||null,estado:($('ei-estado')||{}).value||'ACTIVO',imagen_url:($('ei-img')||{}).value||null,updated_at:new Date().toISOString()};if(AC.tipo==='PRODUCTO'){body.unidades_envase=parseInt(($('ei-unid')||{}).value)||null;body.dosis_diaria=parseFloat(($('ei-dosis')||{}).value)||null;body.duracion_estimada_dias=parseInt(($('ei-ddias')||{}).value)||null;body.contenido_ml=parseFloat(($('ei-ml')||{}).value)||null;body.modo_uso_corto=($('ei-modo')||{}).value||null}sbPatch('aos_catalogo_servicios','id=eq.'+it.id,body,function(ok){if(ok){Object.keys(body).forEach(function(k){it[k]=body[k]});if(window.AOS_showToast)AOS_showToast('Guardado','','');acRenderMain()}})}
function acRenderRepo(){var c=AC.selCat;
  if(AC.tipo==='PRODUCTO'){
    /* PRODUCTO: repositorio es por ITEM, no por categoría */
    var o='<div class="ac-sec">Repositorio de productos — '+H(c.nombre)+'</div>';
    o+='<div style="font-size:8px;color:#6B7BA8;margin-bottom:8px">Click en un producto para editar su repositorio individual</div>';
    AC.items.forEach(function(it,i){
      var hasRepo=it.descripcion_clinica||it.descripcion_comercial||it.composicion;
      o+='<div class="ac-item-row" style="cursor:pointer" onclick="acEditProdRepo('+i+')"><span class="ac-item-name">'+H(it.nombre)+'</span>';
      o+='<span style="font-size:7px;color:'+(hasRepo?'#059669':'#D97706')+';font-weight:700">'+(hasRepo?'✅ Con info':'⚠️ Sin info')+'</span></div>';
    });
    return o;
  }
  /* SERVICIO: repositorio por categoría */
  var o='<div class="ac-sec">Repositorio — '+H(c.nombre)+'</div><div style="font-size:8px;color:#6B7BA8;margin-bottom:8px">Aplica a TODOS los items de la categoría</div>';o+=fgta('Descripción clínica','rp-desclin',c.descripcion_clinica||'');o+=fgta('Descripción comercial (qué decir)','rp-descom',c.descripcion_comercial||'');o+=fgta('Composición','rp-comp',c.composicion||'');o+=fgta('Beneficios','rp-benef',c.beneficios||'');o+=fgta('Contraindicaciones','rp-contra',c.contraindicaciones||'');o+=fgta('Perfil paciente ideal','rp-perfil',c.perfil_paciente||'');o+=fgta('Indicaciones post-tratamiento','rp-indic',c.indicaciones||'');o+='<div class="ac-sec">Preguntas frecuentes</div><div id="rp-faqs"></div>';o+='<button class="ac-btn ac-btn-s" style="font-size:9px;padding:4px 10px;margin-top:4px" onclick="acAddFaq()">+ FAQ</button>';o+='<div style="margin-top:12px"><button class="ac-btn ac-btn-p" onclick="acSaveRepo()">Guardar repositorio</button></div>';setTimeout(acRenderFaqs,50);return o}
var _acFaqs=[];function acRenderFaqs(){var c=AC.selCat;if(!c)return;try{_acFaqs=c.faqs?JSON.parse(JSON.stringify(typeof c.faqs==='string'?JSON.parse(c.faqs):c.faqs)):[]}catch(e){_acFaqs=[]}var el=$('rp-faqs');if(!el)return;el.innerHTML=_acFaqs.map(function(f,i){return '<div class="ac-faq"><div style="display:flex;gap:4px;margin-bottom:3px"><input class="ac-fi" value="'+H(f.q)+'" onchange="_acFaqs['+i+'].q=this.value" style="font-weight:700;flex:1" placeholder="Pregunta"><button class="ac-btn ac-btn-d" style="padding:2px 6px;font-size:8px" onclick="_acFaqs.splice('+i+',1);acRenderFaqs()">x</button></div><textarea class="ac-ta" rows="2" onchange="_acFaqs['+i+'].a=this.value" placeholder="Respuesta">'+H(f.a)+'</textarea></div>'}).join('')||'<div style="font-size:9px;color:#9AAAC8;padding:8px">Sin FAQs</div>'}
function acAddFaq(){_acFaqs.push({q:'',a:''});acRenderFaqs()}
function acSaveRepo(){var c=AC.selCat;if(!c)return;var body={descripcion_clinica:($('rp-desclin')||{}).value||null,descripcion_comercial:($('rp-descom')||{}).value||null,composicion:($('rp-comp')||{}).value||null,beneficios:($('rp-benef')||{}).value||null,contraindicaciones:($('rp-contra')||{}).value||null,perfil_paciente:($('rp-perfil')||{}).value||null,indicaciones:($('rp-indic')||{}).value||null,faqs:_acFaqs.length?JSON.stringify(_acFaqs):null,updated_at:new Date().toISOString()};sbPatch('aos_catalogo_categorias','id=eq.'+c.id,body,function(ok){if(ok){Object.keys(body).forEach(function(k){c[k]=body[k]});if(body.faqs)c.faqs=_acFaqs;if(window.AOS_showToast)AOS_showToast('Repositorio guardado y propagado','','');var pb={};['descripcion_clinica','descripcion_comercial','composicion','beneficios','contraindicaciones','perfil_paciente','indicaciones','faqs'].forEach(function(k){if(body[k])pb[k]=body[k]});if(Object.keys(pb).length)sbPatch('aos_catalogo_servicios','categoria=eq.'+encodeURIComponent(c.nombre)+'&tipo=eq.'+AC.tipo,pb,function(){})}})}
function acRenderConfig(){var c=AC.selCat;var o='<div class="ac-sec">Config — '+H(c.nombre)+'</div><div style="font-size:8px;color:#6B7BA8;margin-bottom:8px">Aplica a TODOS los items</div><div class="ac-grid">';o+='<div class="ac-fg"><div class="ac-fl">Rol profesional</div><select class="ac-sel" id="cfg-rol" style="width:100%"><option value="DOCTORA"'+(c.rol_profesional==='DOCTORA'?' selected':'')+'>👩‍⚕️ Solo Doctora</option><option value="ENFERMERIA"'+(c.rol_profesional==='ENFERMERIA'?' selected':'')+'>🩺 Solo Enfermería</option><option value="AMBOS"'+(c.rol_profesional==='AMBOS'?' selected':'')+'>🔄 Ambos</option></select></div>';o+='<div class="ac-fg"><div class="ac-fl">Estado</div><select class="ac-sel" id="cfg-estado" style="width:100%"><option'+(c.estado==='ACTIVO'?' selected':'')+'>ACTIVO</option><option'+(c.estado==='INACTIVO'?' selected':'')+'>INACTIVO</option></select></div></div>';o+='<div class="ac-sec">Control post-tratamiento</div><div class="ac-grid3"><label style="display:flex;align-items:center;gap:4px;font-size:9px;cursor:pointer"><input type="checkbox" id="cfg-ctrl"'+(c.requiere_control?' checked':'')+'> Requiere control</label>';o+=fg('Días control','cfg-dctrl',c.dias_control||'','number');o+='</div><div style="margin-top:8px"><label style="display:flex;align-items:center;gap:4px;font-size:10px;cursor:pointer;font-weight:700;color:#D97706"><input type="checkbox" id="cfg-star"'+(c.es_estrella?' checked':'')+'> ⭐ Tratamiento estrella</label></div><div style="margin-top:12px"><button class="ac-btn ac-btn-p" onclick="acSaveConfig()">Guardar config</button></div>';return o}
function acSaveConfig(){var c=AC.selCat;if(!c)return;var rol=($('cfg-rol')||{}).value||'AMBOS';var ctrl=($('cfg-ctrl')||{}).checked||false;var dctrl=parseInt(($('cfg-dctrl')||{}).value)||0;var est=($('cfg-estado')||{}).value||'ACTIVO';var star=($('cfg-star')||{}).checked||false;sbPatch('aos_catalogo_categorias','id=eq.'+c.id,{rol_profesional:rol,requiere_control:ctrl,dias_control:dctrl,estado:est,es_estrella:star,updated_at:new Date().toISOString()},function(ok){if(!ok)return;var ib={requiere_doctora:rol==='DOCTORA'||rol==='AMBOS',requiere_enfermeria:rol==='ENFERMERIA'||rol==='AMBOS',requiere_control:ctrl,dias_control:dctrl};sbPatch('aos_catalogo_servicios','categoria=eq.'+encodeURIComponent(c.nombre)+'&tipo=eq.'+AC.tipo,ib,function(){c.rol_profesional=rol;c.requiere_control=ctrl;c.dias_control=dctrl;c.estado=est;c.es_estrella=star;if(window.AOS_showToast)AOS_showToast('Config propagada a '+AC.items.length+' items','','');acLoadCats()})})}
function acRenderToppings(){var c=AC.selCat;var o='<div class="ac-sec">Toppings / Upselling — '+H(c.nombre)+'</div><div style="font-size:8px;color:#6B7BA8;margin-bottom:8px">Ofertas que se ofrecen SOLO junto con un servicio de esta categoría</div>';if(!AC.toppings.length)o+='<div style="text-align:center;padding:16px;color:#9AAAC8;font-size:10px;background:#FFFBEB;border-radius:8px;margin-bottom:8px">Sin toppings</div>';AC.toppings.forEach(function(t,i){o+='<div class="ac-top-row"><span style="font-size:14px">🎁</span><span style="font-weight:700;flex:1">'+H(t.nombre)+'</span><span style="font-size:8px;color:#6B7BA8">'+(t.sesiones||'—')+'</span><input style="width:60px;text-align:right;padding:3px 6px;border:1px solid #FDE68A;border-radius:4px;font-size:10px;font-weight:700;color:#D97706;background:#FFFBEB" value="'+(t.precio||0)+'" onchange="acUpdTop(\''+t.id+'\',this.value)"><button class="ac-btn ac-btn-d" style="padding:2px 6px;font-size:8px" onclick="acDelTop(\''+t.id+'\','+i+')">x</button></div>'});o+='<div class="ac-sec" style="margin-top:12px">Agregar topping</div><div class="ac-grid3">';o+=fg('Nombre','tp-nombre','');o+=fg('Precio','tp-precio','','number');o+=fg('Detalle','tp-ses','');o+='</div><button class="ac-btn ac-btn-p" style="margin-top:6px" onclick="acAddTop()">+ Agregar</button>';return o}
function acUpdTop(id,val){sbPatch('aos_catalogo_toppings','id=eq.'+id,{precio:parseFloat(val)||0},function(ok){if(ok&&window.AOS_showToast)AOS_showToast('Actualizado','','')})}
function acDelTop(id,i){if(!confirm('Eliminar?'))return;sbDel('aos_catalogo_toppings','id=eq.'+id,function(){AC.toppings.splice(i,1);acRenderMain()})}
function acAddTop(){var n=($('tp-nombre')||{}).value||'';if(!n){alert('Nombre requerido');return}sbPost('aos_catalogo_toppings',{nombre:n,categoria_vinculada:AC.selCat.nombre,precio:parseFloat(($('tp-precio')||{}).value)||0,sesiones:($('tp-ses')||{}).value||'',estado:'ACTIVO'},function(d){if(d&&d[0]){AC.toppings.push(d[0]);acRenderMain();if(window.AOS_showToast)AOS_showToast('Agregado','','')}})}
function acAnalytics(el){document.querySelectorAll('.ac-pill').forEach(function(p){p.classList.remove('act')});el.classList.add('act');document.querySelector('.ac-sp').style.gridTemplateColumns='1fr';$('ac-cats').style.display='none';$('ac-main').innerHTML='<div style="text-align:center;padding:20px;color:#9AAAC8">Cargando...</div>';rpc('aos_catalogo_analytics',{},function(d){if(!d){$('ac-main').innerHTML='Error';return}var o='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:14px;color:#071D4A;margin-bottom:12px">Estado del catálogo</div>';o+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">';[{l:'Servicios',v:d.servicios_activos,c:'#0A4FBF'},{l:'Productos',v:d.productos_activos,c:'#059669'},{l:'Sin repositorio',v:d.sin_descripcion,c:'#D97706'},{l:'Sin precio base',v:d.sin_precio_base,c:'#D97706'},{l:'Sin roles',v:d.sin_roles,c:d.sin_roles>0?'#DC2626':'#059669'},{l:'Con control',v:d.con_control,c:'#7C3AED'},{l:'Con FAQs',v:d.con_faqs,c:'#0A4FBF'}].forEach(function(k){o+='<div style="text-align:center;padding:8px;background:#F8FAFF;border-radius:8px;border:1px solid #E2E8F0"><div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:18px;color:'+k.c+'">'+k.v+'</div><div style="font-size:7px;font-weight:700;color:#6B7BA8;text-transform:uppercase">'+k.l+'</div></div>'});o+='</div>';var top=d.top_servicios||[];if(top.length){o+='<div class="ac-sec">Top 10 servicios vendidos (mes)</div><table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px"><thead><tr style="background:#F8FAFF"><th style="text-align:left;padding:4px 8px;font-size:8px;color:#6B7BA8">#</th><th style="text-align:left;padding:4px 8px;font-size:8px;color:#6B7BA8">Servicio</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#6B7BA8">Ventas</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#6B7BA8">Facturado</th></tr></thead><tbody>';top.forEach(function(t,i){o+='<tr style="border-bottom:1px solid #F1F5F9"><td style="padding:4px 8px;font-weight:700;color:#0A4FBF">'+(i+1)+'</td><td style="padding:4px 8px;font-weight:600">'+H(t.nombre)+'</td><td style="padding:4px 8px;text-align:right;font-weight:700">'+t.ventas+'</td><td style="padding:4px 8px;text-align:right;font-weight:700;color:#059669">S/'+parseFloat(t.facturado||0).toLocaleString()+'</td></tr>'});o+='</tbody></table>'}
var topP=d.top_productos||[];if(topP.length){o+='<div class="ac-sec">Top 10 productos vendidos (mes)</div><table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px"><thead><tr style="background:#F0FDF4"><th style="text-align:left;padding:4px 8px;font-size:8px;color:#059669">#</th><th style="text-align:left;padding:4px 8px;font-size:8px;color:#059669">Producto</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#059669">Ventas</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#059669">Facturado</th></tr></thead><tbody>';topP.forEach(function(t,i){o+='<tr style="border-bottom:1px solid #F1F5F9"><td style="padding:4px 8px;font-weight:700;color:#059669">'+(i+1)+'</td><td style="padding:4px 8px;font-weight:600">'+H(t.nombre)+'</td><td style="padding:4px 8px;text-align:right;font-weight:700">'+t.ventas+'</td><td style="padding:4px 8px;text-align:right;font-weight:700;color:#059669">S/'+parseFloat(t.facturado||0).toLocaleString()+'</td></tr>'});o+='</tbody></table>'}var sinV=d.sin_ventas_por_cat||[];if(sinV.length){o+='<div class="ac-sec" style="color:#DC2626">Sin ventas (por categoría)</div>';sinV.forEach(function(c){o+='<details style="margin-bottom:4px;border:1px solid #FECACA;border-radius:6px;padding:4px 8px"><summary style="font-size:10px;font-weight:700;cursor:pointer;color:#DC2626">'+H(c.categoria||'SIN CAT')+' — '+c.total+' items</summary><div style="font-size:9px;color:#6B7BA8;padding:4px 0">'+(c.items||[]).map(function(n){return H(n)}).join(', ')+'</div></details>'})}
o+='<div id="conv-section"></div>';
$('ac-main').innerHTML=o;

rpc('aos_conversion_tratamientos',{p_dias:30},function(conv){if(!conv||!conv.length)return;var cs=$('conv-section');if(!cs)return;
  var ch='<div class="ac-sec" style="margin-top:14px">📊 Conversión por categoría (30 días)</div>';

function acSaveProdRepo(idx){var it=AC.items[idx];if(!it)return;var body={descripcion_clinica:($('pr-desclin')||{}).value||null,descripcion_comercial:($('pr-descom')||{}).value||null,composicion:($('pr-comp')||{}).value||null,beneficios:($('pr-benef')||{}).value||null,contraindicaciones:($('pr-contra')||{}).value||null,perfil_paciente:($('pr-perfil')||{}).value||null,indicaciones:($('pr-indic')||{}).value||null,updated_at:new Date().toISOString()};sbPatch('aos_catalogo_servicios','id=eq.'+it.id,body,function(ok){if(ok){Object.keys(body).forEach(function(k){it[k]=body[k]});if(window.AOS_showToast)AOS_showToast('Repositorio guardado','','');acRenderMain()}})}
function acNewCat(){var n=prompt('Nombre de la nueva categoría:');if(!n)return;n=n.toUpperCase().trim();sbPost('aos_catalogo_categorias',{nombre:n,tipo:AC.tipo,rol_profesional:'AMBOS',estado:'ACTIVO'},function(d){if(d&&d[0]){AC.cats.push(d[0]);acLoadCats();if(window.AOS_showToast)AOS_showToast('Categoría creada','','')}else{alert('Error — ya existe o nombre inválido')}})}
