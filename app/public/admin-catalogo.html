<!-- admin-catalogo.html v1 — Panel Admin Catálogo | AscendaOS -->
<style>
.ac{padding:10px;min-height:100vh;font-family:'DM Sans',sans-serif;color:#1E293B;background:#F0F4FC}
.ac-h{background:#071D4A;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ac-t{font-family:"Exo 2",sans-serif;font-weight:800;font-size:16px;color:#fff}
.ac-pills{display:flex;gap:3px}.ac-pill{padding:6px 14px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:none;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);transition:all .2s}.ac-pill:hover{background:rgba(255,255,255,.15);color:#fff}.ac-pill.act{background:#fff;color:#0A4FBF}
.ac-bar{display:flex;gap:6px;align-items:center;padding:8px;background:#fff;border-radius:8px;border:1px solid #E2E8F0;margin-bottom:6px;flex-wrap:wrap}
.ac-q{flex:1;min-width:160px;padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:11px;outline:none;font-family:"DM Sans",sans-serif}.ac-q:focus{border-color:#0A4FBF}
.ac-f{padding:4px 10px;border-radius:5px;font-size:9px;font-weight:700;border:1px solid #E2E8F0;background:#fff;color:#6B7BA8;cursor:pointer}.ac-f:hover,.ac-f.act{background:#0A4FBF;color:#fff;border-color:#0A4FBF}
.ac-sp{display:grid;grid-template-columns:1fr 420px;gap:8px;height:calc(100vh - 155px)}
.ac-list{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow-y:auto}
.ac-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .1s}.ac-row:hover{background:#F0F4FF}.ac-row.sel{background:#EEF2FF;border-left:3px solid #0A4FBF}
.ac-row-img{width:36px;height:36px;border-radius:6px;background:#F0F4FC;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.ac-row-img img{width:100%;height:100%;object-fit:cover}
.ac-row-info{flex:1;min-width:0}
.ac-row-name{font-weight:700;font-size:11px;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-row-cat{font-size:8px;color:#6B7BA8}
.ac-row-price{font-family:"Exo 2",sans-serif;font-weight:800;font-size:12px;color:#0A4FBF}
.ac-row-tags{display:flex;gap:2px;flex-shrink:0}
.ac-tag{font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px}
.ac-det{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow-y:auto;padding:14px}
.ac-sec{font-family:"Exo 2",sans-serif;font-weight:800;font-size:10px;color:#071D4A;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #E2E8F0}
.ac-fg{margin-bottom:6px}.ac-fl{font-size:8px;font-weight:700;color:#6B7BA8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.ac-fi{width:100%;padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;font-family:"DM Sans",sans-serif;outline:none;box-sizing:border-box}.ac-fi:focus{border-color:#0A4FBF}
.ac-ta{width:100%;padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;font-family:"DM Sans",sans-serif;outline:none;resize:vertical;min-height:50px;box-sizing:border-box}.ac-ta:focus{border-color:#0A4FBF}
.ac-sel{width:100%;padding:5px 8px;border:1px solid #E2E8F0;border-radius:5px;font-size:10px;outline:none;font-family:"DM Sans",sans-serif;box-sizing:border-box}
.ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ac-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ac-btn{padding:8px 16px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.ac-btn-p{background:#0A4FBF;color:#fff}.ac-btn-p:hover{background:#083DA0}
.ac-btn-s{background:#F0F4FC;color:#6B7BA8;border:1px solid #E2E8F0}.ac-btn-s:hover{background:#E2E8F0}
.ac-btn-d{background:#DC2626;color:#fff}.ac-btn-d:hover{background:#B91C1C}
.ac-chk{display:flex;align-items:center;gap:4px;font-size:9px;cursor:pointer}
.ac-faq{padding:6px;background:#FAFBFF;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:4px}
.ac-cnt{font-size:8px;color:#6B7BA8;padding:4px 0}
</style>
<div class="ac" id="ac-root">
  <div class="ac-h">
    <div><div class="ac-t">Catálogo & Repositorio</div><div style="font-size:8px;color:rgba(255,255,255,.4)">Administración de servicios, productos y precios</div></div>
    <div class="ac-pills">
      <button class="ac-pill act" onclick="acTab(0,this)">Servicios</button>
      <button class="ac-pill" onclick="acTab(1,this)">Productos</button>
      <button class="ac-pill" onclick="acTabAnalytics(this)">📊 Analytics</button>
    </div>
  </div>
  <div class="ac-bar" id="ac-bar">
    <input class="ac-q" id="ac-search" placeholder="Buscar servicio o producto..." oninput="acFilter()">
    <select class="ac-sel" id="ac-cat-filter" style="width:140px" onchange="acFilter()"><option value="">Todas las categorías</option></select>
    <span class="ac-cnt" id="ac-count"></span>
  </div>
  <div class="ac-sp">
    <div class="ac-list" id="ac-list"></div>
    <div class="ac-det" id="ac-det"><div style="text-align:center;padding:40px;color:#9AAAC8;font-size:11px">Selecciona un item del catálogo</div></div>
  </div>
</div>
<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function rpc(f,p,cb){fetch(SB+'/rest/v1/rpc/'+f,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json()}).then(cb).catch(function(e){console.error(f,e)})}
function sbPatch(tbl,filter,body,cb){fetch(SB+'/rest/v1/'+tbl+'?'+filter,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)}).then(function(r){if(cb)cb(r.ok)}).catch(function(){if(cb)cb(false)})}
function H(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function $(s){return document.getElementById(s)}

var AC={items:[],tipo:'SERVICIO',sel:null,selIdx:-1};

function acTab(n,el){document.querySelectorAll('.ac-pill').forEach(function(p){p.classList.remove('act')});el.classList.add('act');
  $('ac-bar').style.display='flex';
  AC.tipo=n===0?'SERVICIO':'PRODUCTO';acLoad()
}

function acLoad(){
  fetch(SB+'/rest/v1/aos_catalogo_servicios?tipo=eq.'+AC.tipo+'&order=categoria,nombre',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json()}).then(function(items){
    AC.items=items||[];
    // Populate category filter
    var cats={};AC.items.forEach(function(i){if(i.categoria)cats[i.categoria]=1});
    var cf=$('ac-cat-filter');cf.innerHTML='<option value="">Todas ('+AC.items.length+')</option>'+Object.keys(cats).sort().map(function(c){return '<option>'+H(c)+'</option>'}).join('');
    acFilter();
  });
}

function acFilter(){
  var q=($('ac-search').value||'').toLowerCase();
  var cat=($('ac-cat-filter').value||'');
  var filtered=AC.items.filter(function(i){
    if(cat&&i.categoria!==cat)return false;
    if(q&&(i.nombre||'').toLowerCase().indexOf(q)<0&&(i.categoria||'').toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  $('ac-count').textContent=filtered.length+' items';
  var html='';
  filtered.forEach(function(it,idx){
    var isActive=it.estado==='ACTIVO';
    var hasDra=it.requiere_doctora;var hasEnf=it.requiere_enfermeria;
    var tags='';
    if(hasDra)tags+='<span class="ac-tag" style="background:#EBF2FF;color:#0A4FBF">DRA</span>';
    if(hasEnf)tags+='<span class="ac-tag" style="background:#F0FDF4;color:#059669">ENF</span>';
    if(it.requiere_control)tags+='<span class="ac-tag" style="background:#FEF3C7;color:#92400E">CTRL</span>';
    if(!isActive)tags+='<span class="ac-tag" style="background:#FEF2F2;color:#DC2626">OFF</span>';
    var imgHtml=it.imagen_url?'<img src="'+H(it.imagen_url)+'">':'<span style="font-size:14px">'+getCatIcon(it.categoria)+'</span>';
    html+='<div class="ac-row'+(AC.selIdx===idx?' sel':'')+'" onclick="acSel('+idx+',this)" data-id="'+it.id+'">';
    html+='<div class="ac-row-img">'+imgHtml+'</div>';
    html+='<div class="ac-row-info"><div class="ac-row-name">'+H(it.nombre)+'</div><div class="ac-row-cat">'+H(it.categoria||'')+'</div></div>';
    html+='<div class="ac-row-price">S/'+(it.precio_oferta||0)+'</div>';
    html+='<div class="ac-row-tags">'+tags+'</div></div>';
  });
  $('ac-list').innerHTML=html||'<div style="text-align:center;padding:20px;color:#9AAAC8;font-size:10px">Sin resultados</div>';
  AC._filtered=filtered;
}

function acSel(idx){
  AC.selIdx=idx;AC.sel=AC._filtered[idx];
  acFilter();// re-render to highlight
  acRenderDet();
}

function acRenderDet(){
  var it=AC.sel;if(!it){$('ac-det').innerHTML='';return;}
  var o='';
  // Header
  o+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  o+='<div style="width:48px;height:48px;border-radius:8px;background:#F0F4FC;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">'+(it.imagen_url?'<img src="'+H(it.imagen_url)+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px">':getCatIcon(it.categoria))+'</div>';
  o+='<div><div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:14px;color:#071D4A">'+H(it.nombre)+'</div>';
  o+='<div style="font-size:8px;color:#6B7BA8">'+H(it.categoria)+' | '+H(it.tipo)+' | ID: '+H(it.id).substring(0,8)+'</div></div></div>';

  // Precios
  o+='<div class="ac-sec">Precios</div><div class="ac-grid">';
  o+=fg('Precio oferta','det-precio',it.precio_oferta||'','number');
  o+=fg('Precio base','det-pbase',it.precio_base||'','number');
  o+='</div>';

  // Roles
  o+='<div class="ac-sec">Roles profesionales</div><div class="ac-grid">';
  o+='<label class="ac-chk"><input type="checkbox" id="det-dra"'+(it.requiere_doctora?' checked':'')+'> Requiere Doctora</label>';
  o+='<label class="ac-chk"><input type="checkbox" id="det-enf"'+(it.requiere_enfermeria?' checked':'')+'> Enfermería puede hacer</label>';
  o+='</div>';

  // Control
  o+='<div class="ac-sec">Control post-tratamiento</div><div class="ac-grid3">';
  o+='<label class="ac-chk"><input type="checkbox" id="det-ctrl"'+(it.requiere_control?' checked':'')+'> Requiere control</label>';
  o+=fg('Días control','det-dctrl',it.dias_control||'','number');
  o+=fg('Tipo','det-tctrl',it.tipo_control||'');
  o+='</div>';

  // Sesiones
  o+='<div class="ac-sec">Sesiones y duración</div><div class="ac-grid">';
  o+=fg('N° sesiones','det-nses',it.num_sesiones||'');
  o+=fg('Duración sesión','det-durses',it.duracion_sesion||'');
  o+=fg('Frecuencia','det-freq',it.frecuencia||'');
  o+=fg('Formulario','det-form',it.tipo_formulario||'');
  o+='</div>';

  // Producto (solo si tipo=PRODUCTO)
  if(it.tipo==='PRODUCTO'){
    o+='<div class="ac-sec">Info de producto</div><div class="ac-grid">';
    o+=fg('Unidades/envase','det-unid',it.unidades_envase||'','number');
    o+=fg('Dosis diaria','det-dosis',it.dosis_diaria||'','number');
    o+=fg('Duración (días)','det-dur',it.duracion_estimada_dias||'','number');
    o+=fg('Contenido (ml)','det-ml',it.contenido_ml||'','number');
    o+=fg('Modo de uso','det-modo',it.modo_uso_corto||'');
    o+='</div>';
  }

  // Estado
  o+='<div class="ac-sec">Estado</div><div class="ac-grid">';
  o+='<select class="ac-sel" id="det-estado"><option'+(it.estado==='ACTIVO'?' selected':'')+'>ACTIVO</option><option'+(it.estado==='INACTIVO'?' selected':'')+'>INACTIVO</option></select>';
  o+=fg('Imagen URL','det-img',it.imagen_url||'');
  o+='</div>';

  // Repositorio
  o+='<div class="ac-sec">Repositorio clínico</div>';
  o+=fgta('Descripción clínica','det-desclin',it.descripcion_clinica||'');
  o+=fgta('Descripción comercial','det-descom',it.descripcion_comercial||'');
  o+=fgta('Composición','det-comp',it.composicion||'');
  o+=fgta('Beneficios','det-benef',it.beneficios||'');
  o+=fgta('Contraindicaciones','det-contra',it.contraindicaciones||'');
  o+=fgta('Perfil paciente','det-perfil',it.perfil_paciente||'');
  o+=fgta('Indicaciones','det-indic',it.indicaciones||'');

  // FAQs
  o+='<div class="ac-sec">Preguntas frecuentes</div>';
  o+='<div id="det-faqs"></div>';
  o+='<button class="ac-btn ac-btn-s" style="font-size:9px;padding:4px 10px;margin-top:4px" onclick="acAddFaq()">+ Agregar FAQ</button>';

  // Botones
  o+='<div style="display:flex;gap:6px;margin-top:14px;padding-top:10px;border-top:1px solid #E2E8F0">';
  o+='<button class="ac-btn ac-btn-p" onclick="acSave()" style="flex:1">Guardar cambios</button>';
  o+='<button class="ac-btn ac-btn-s" onclick="acRenderDet()">Cancelar</button>';
  o+='</div>';

  $('ac-det').innerHTML=o;
  $('ac-det').scrollTop=0;
  acRenderFaqs();
}

function fg(l,id,v,type){return '<div class="ac-fg"><div class="ac-fl">'+l+'</div><input class="ac-fi" id="'+id+'" value="'+H(v)+'"'+(type==='number'?' type="number" step="0.01"':'')+' placeholder="—"></div>'}
function fgta(l,id,v){return '<div class="ac-fg"><div class="ac-fl">'+l+'</div><textarea class="ac-ta" id="'+id+'" rows="3">'+H(v)+'</textarea></div>'}

var _acFaqs=[];
function acRenderFaqs(){
  var it=AC.sel;if(!it)return;
  try{_acFaqs=it.faqs?JSON.parse(JSON.stringify(typeof it.faqs==='string'?JSON.parse(it.faqs):it.faqs)):[]}catch(e){_acFaqs=[]}
  var el=$('det-faqs');if(!el)return;
  el.innerHTML=_acFaqs.map(function(f,i){
    return '<div class="ac-faq"><div style="display:flex;align-items:center;gap:4px;margin-bottom:3px"><input class="ac-fi" value="'+H(f.q)+'" onchange="_acFaqs['+i+'].q=this.value" style="font-weight:700;flex:1" placeholder="Pregunta"><button class="ac-btn ac-btn-d" style="padding:2px 6px;font-size:8px" onclick="_acFaqs.splice('+i+',1);acRenderFaqs()">X</button></div><textarea class="ac-ta" rows="2" onchange="_acFaqs['+i+'].a=this.value" placeholder="Respuesta">'+H(f.a)+'</textarea></div>';
  }).join('')||'<div style="font-size:9px;color:#9AAAC8;padding:8px">Sin FAQs configuradas</div>';
}
function acAddFaq(){_acFaqs.push({q:'',a:''});acRenderFaqs()}

function acSave(){
  var it=AC.sel;if(!it)return;
  var body={
    precio_oferta:parseFloat(($('det-precio')||{}).value)||null,
    precio_base:parseFloat(($('det-pbase')||{}).value)||null,
    requiere_doctora:($('det-dra')||{}).checked||false,
    requiere_enfermeria:($('det-enf')||{}).checked||false,
    requiere_control:($('det-ctrl')||{}).checked||false,
    dias_control:parseInt(($('det-dctrl')||{}).value)||0,
    tipo_control:($('det-tctrl')||{}).value||'',
    num_sesiones:($('det-nses')||{}).value||null,
    duracion_sesion:($('det-durses')||{}).value||null,
    frecuencia:($('det-freq')||{}).value||null,
    tipo_formulario:($('det-form')||{}).value||null,
    estado:($('det-estado')||{}).value||'ACTIVO',
    imagen_url:($('det-img')||{}).value||null,
    descripcion_clinica:($('det-desclin')||{}).value||null,
    descripcion_comercial:($('det-descom')||{}).value||null,
    composicion:($('det-comp')||{}).value||null,
    beneficios:($('det-benef')||{}).value||null,
    contraindicaciones:($('det-contra')||{}).value||null,
    perfil_paciente:($('det-perfil')||{}).value||null,
    indicaciones:($('det-indic')||{}).value||null,
    faqs:_acFaqs.length?JSON.stringify(_acFaqs):null,
    updated_at:new Date().toISOString()
  };
  // Producto fields
  if(it.tipo==='PRODUCTO'){
    body.unidades_envase=parseInt(($('det-unid')||{}).value)||null;
    body.dosis_diaria=parseFloat(($('det-dosis')||{}).value)||null;
    body.duracion_estimada_dias=parseInt(($('det-dur')||{}).value)||null;
    body.contenido_ml=parseFloat(($('det-ml')||{}).value)||null;
    body.modo_uso_corto=($('det-modo')||{}).value||null;
  }
  sbPatch('aos_catalogo_servicios','id=eq.'+it.id,body,function(ok){
    if(ok){
      if(window.AOS_showToast)AOS_showToast('Guardado','','');
      // Update local
      Object.keys(body).forEach(function(k){it[k]=body[k]});
      if(body.faqs)it.faqs=_acFaqs;
      acFilter();
    }else{
      if(window.AOS_showToast)AOS_showToast('Error al guardar','','toast-alerta');
    }
  });
}

var CM={
  'ACIDO HIALURONICO':{i:'💧',c:'#0EA5E9'},'APARATOLOGÍA':{i:'🔌',c:'#6366F1'},'BIOESTIMULADOR':{i:'⚡',c:'#8B5CF6'},
  'BIOREVITALIZACIÓN':{i:'🧬',c:'#10B981'},'CAPILAR':{i:'💇',c:'#F59E0B'},'CONSULTA':{i:'👩‍⚕',c:'#6B7280'},
  'CORPORAL':{i:'🏋',c:'#EC4899'},'CRIOLIPÓLISIS':{i:'❄',c:'#06B6D4'},'DETOX':{i:'🫧',c:'#14B8A6'},
  'ENZIMAS':{i:'🧪',c:'#F97316'},'EXOSOMAS':{i:'🔬',c:'#8B5CF6'},'FACIALES':{i:'🧑',c:'#F472B6'},
  'GLÚTEOS':{i:'🍑',c:'#FB923C'},'HIFU':{i:'📡',c:'#A855F7'},'MESOTERAPIA':{i:'💉',c:'#3B82F6'},
  'PEELINGS':{i:'✨',c:'#FBBF24'},'PEPTONAS':{i:'💊',c:'#34D399'},'RF FRACCIONADA':{i:'⚡',c:'#EF4444'},
  'TOXINA':{i:'💎',c:'#7C3AED'},'VITAMINAS':{i:'💊',c:'#22C55E'},
  'CREMAS':{i:'🧴',c:'#F472B6'},'SUPLEMENTOS':{i:'💊',c:'#10B981'},'CUIDADO PERSONAL':{i:'🧴',c:'#EC4899'}
};
function getCatIcon(c){return(CM[c]||{i:'📋'}).i}

// Init
acLoad();

function acTabAnalytics(el){
  document.querySelectorAll('.ac-pill').forEach(function(p){p.classList.remove('act')});el.classList.add('act');
  $('ac-list').innerHTML='<div style="padding:20px;text-align:center;color:#9AAAC8">Cargando analytics...</div>';
  $('ac-det').innerHTML='';
  $('ac-bar').style.display='none';
  rpc('aos_catalogo_analytics',{},function(d){
    if(!d){$('ac-list').innerHTML='Error';return;}
    var o='<div style="padding:14px">';
    o+='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:14px;color:#071D4A;margin-bottom:12px">Estado del catálogo</div>';
    o+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">';
    var kpis=[
      {l:'Servicios',v:d.servicios_activos,c:'#0A4FBF'},
      {l:'Productos',v:d.productos_activos,c:'#059669'},
      {l:'Sin descripción',v:d.sin_descripcion,c:d.sin_descripcion>50?'#DC2626':'#D97706'},
      {l:'Sin precio base',v:d.sin_precio_base,c:d.sin_precio_base>20?'#DC2626':'#D97706'},
      {l:'Sin roles',v:d.sin_roles,c:d.sin_roles>0?'#DC2626':'#059669'},
      {l:'Con control',v:d.con_control,c:'#7C3AED'},
      {l:'Con FAQs',v:d.con_faqs,c:'#0A4FBF'},
    ];
    kpis.forEach(function(k){
      o+='<div style="text-align:center;padding:8px;background:#F8FAFF;border-radius:8px;border:1px solid #E2E8F0">';
      o+='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:18px;color:'+k.c+'">'+k.v+'</div>';
      o+='<div style="font-size:7px;font-weight:700;color:#6B7BA8;text-transform:uppercase">'+k.l+'</div></div>';
    });
    o+='</div>';
    // Top vendidos
    o+='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:11px;color:#071D4A;margin-bottom:6px">Top 10 vendidos (último mes)</div>';
    var top=d.top_vendidos_mes||[];
    if(top.length){
      o+='<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px">';
      o+='<thead><tr style="background:#F8FAFF"><th style="text-align:left;padding:4px 8px;font-size:8px;color:#6B7BA8">#</th><th style="text-align:left;padding:4px 8px;font-size:8px;color:#6B7BA8">Tratamiento</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#6B7BA8">Ventas</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#6B7BA8">Facturado</th></tr></thead><tbody>';
      top.forEach(function(t,i){
        o+='<tr style="border-bottom:1px solid #F1F5F9"><td style="padding:4px 8px;font-weight:700;color:#0A4FBF">'+(i+1)+'</td><td style="padding:4px 8px;font-weight:600">'+H(t.nombre)+'</td><td style="padding:4px 8px;text-align:right;font-weight:700">'+t.ventas+'</td><td style="padding:4px 8px;text-align:right;font-weight:700;color:#059669">S/'+parseFloat(t.facturado||0).toLocaleString()+'</td></tr>';
      });
      o+='</tbody></table>';
    }else{o+='<div style="font-size:9px;color:#9AAAC8;margin-bottom:14px">Sin datos de ventas</div>';}
    // Sin ventas agrupado por categoría
    var sinV=d.sin_ventas_por_cat||[];
    if(sinV.length){
      o+='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:11px;color:#DC2626;margin-bottom:6px">Sin ventas este mes (por categoría)</div>';
      o+='<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px">';
      o+='<thead><tr style="background:#FEF2F2"><th style="text-align:left;padding:4px 8px;font-size:8px;color:#DC2626">Categoría</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#DC2626">Items</th></tr></thead><tbody>';
      sinV.forEach(function(c){
        var items=c.items||[];
        o+='<tr style="border-bottom:1px solid #F1F5F9;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'table-row\':\'none\'">';
        o+='<td style="padding:4px 8px;font-weight:700">'+H(c.categoria||'SIN CAT')+' ▸</td>';
        o+='<td style="padding:4px 8px;text-align:right;font-weight:700;color:#DC2626">'+c.total+'</td></tr>';
        o+='<tr style="display:none"><td colspan="2" style="padding:4px 8px 8px;font-size:9px;color:#6B7BA8">'+items.map(function(n){return H(n)}).join(', ')+'</td></tr>';
      });
      o+='</tbody></table>';
    }
    // Roles por categoría
    var roles=d.roles_por_cat||[];
    if(roles.length){
      o+='<div style="font-family:Exo 2,sans-serif;font-weight:800;font-size:11px;color:#071D4A;margin-bottom:6px">Roles por categoría</div>';
      o+='<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px">';
      o+='<thead><tr style="background:#F8FAFF"><th style="text-align:left;padding:4px 8px;font-size:8px;color:#6B7BA8">Categoría</th><th style="text-align:center;padding:4px 8px;font-size:8px;color:#0A4FBF">Solo DRA</th><th style="text-align:center;padding:4px 8px;font-size:8px;color:#059669">Solo ENF</th><th style="text-align:center;padding:4px 8px;font-size:8px;color:#7C3AED">Ambos</th><th style="text-align:right;padding:4px 8px;font-size:8px;color:#6B7BA8">Total</th></tr></thead><tbody>';
      roles.forEach(function(r){
        o+='<tr style="border-bottom:1px solid #F1F5F9"><td style="padding:4px 8px;font-weight:700">'+H(r.categoria||'')+'</td>';
        o+='<td style="text-align:center;padding:4px 8px;color:#0A4FBF;font-weight:700">'+(r.solo_dra||0)+'</td>';
        o+='<td style="text-align:center;padding:4px 8px;color:#059669;font-weight:700">'+(r.solo_enf||0)+'</td>';
        o+='<td style="text-align:center;padding:4px 8px;color:#7C3AED;font-weight:700">'+(r.ambos||0)+'</td>';
        o+='<td style="text-align:right;padding:4px 8px;font-weight:700">'+r.total+'</td></tr>';
      });
      o+='</tbody></table>';
      o+='<div style="font-size:8px;color:#6B7BA8;margin-bottom:6px">Click en categoría para cambiar rol masivamente:</div>';
      o+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">';
      roles.forEach(function(r){
        var cat=r.categoria||'';
        var badge=r.solo_dra>r.solo_enf?'DRA':(r.solo_enf>r.solo_dra?'ENF':'MIX');
        var bg=badge==='DRA'?'#EBF2FF':badge==='ENF'?'#F0FDF4':'#F5F3FF';
        var cl=badge==='DRA'?'#0A4FBF':badge==='ENF'?'#059669':'#7C3AED';
        o+='<div style="padding:4px 8px;background:'+bg+';border:1px solid '+cl+'33;border-radius:6px;font-size:8px;font-weight:700;color:'+cl+';cursor:pointer" onclick="acCambiarRolCat(\''+H(cat)+'\')">'+H(cat)+' ('+badge+')</div>';
      });
      o+='</div>';
    }
    o+='</div>';
    $('ac-list').innerHTML=o;
  });
}

function acCambiarRolCat(cat){
  var opt=prompt('Cambiar TODA la categoría '+cat+' a:\n\n1 = Solo DOCTORA\n2 = Solo ENFERMERÍA\n3 = AMBOS\n\nEscribe 1, 2 o 3:');
  if(!opt||!['1','2','3'].includes(opt))return;
  var body={};
  if(opt==='1'){body={requiere_doctora:true,requiere_enfermeria:false}}
  else if(opt==='2'){body={requiere_doctora:false,requiere_enfermeria:true}}
  else{body={requiere_doctora:true,requiere_enfermeria:true}}
  sbPatch('aos_catalogo_servicios','categoria=eq.'+encodeURIComponent(cat)+'&tipo=eq.SERVICIO&estado=eq.ACTIVO',body,function(ok){
    if(ok){if(window.AOS_showToast)AOS_showToast(cat+' actualizado','','');document.querySelector('.ac-pill:last-child').click();}
    else{if(window.AOS_showToast)AOS_showToast('Error','','toast-alerta');}
  });
}
</script>
