  var r='<table class="T"><thead><tr><th style="width:30px"></th><th>Producto</th><th>Lote</th><th>Cant.</th><th>Unid.</th><th>F. Venc.</th><th>Estado</th></tr></thead><tbody>';
  its.forEach(function(it){var sc=it.estado==='VENCIDO'?'sv':it.estado==='POR_VENCER'?'spv':it.estado==='AGOTADO'?'sa':'sok';var st=it.estado==='VENCIDO'?'VENCIDO':it.estado==='POR_VENCER'?'POR VENCER ('+it.dias_venc+'d)':it.estado==='AGOTADO'?'AGOTADO':'OK';
    r+='<tr><td style="text-align:center"><button class="abtn" onclick="dAdd(\''+it.id+'\',\''+H(it.nombre_producto).replace(/'/g,"\\'")+'\','+it.cantidad+',\''+H(it.unidad)+'\')">+</button></td><td style="font-weight:600;color:#1E293B;font-size:9px">'+H(it.nombre_producto)+'</td><td style="font-size:8px;color:var(--zg)">'+H(it.lote)+'</td><td style="font-weight:700">'+it.cantidad+'</td><td style="font-size:8px">'+H(it.unidad)+'</td><td style="font-size:8px">'+(it.fecha_vencimiento||'—')+'</td><td><span class="'+sc+'">'+st+'</span></td></tr>'});
  r+='</tbody></table>';$('tscr').innerHTML=r})}

/* ═══ DESCUENTO ═══ */
function dAdd(id,nom,qty,und){if(IV.desc.some(function(x){return x.id===id})){tst('Ya agregado');return}IV.desc.push({id:id,nombre:nom,cantidad:1,max:qty,unidad:und});dR();tst('➕ '+nom)}
function dRm(i){IV.desc.splice(i,1);dR()}
function dR(){$('dc').textContent=IV.desc.length;if(!IV.desc.length){$('ditems').innerHTML='<div class="de">Click ➕ para descontar</div>';return}
  $('ditems').innerHTML=IV.desc.map(function(it,i){return'<div class="di"><div><div class="di-n">'+H(it.nombre)+'</div><div class="di-u">Max: '+it.max+' '+H(it.unidad)+'</div></div><input class="di-q" value="'+it.cantidad+'" type="number" min="1" max="'+it.max+'" onchange="IV.desc['+i+'].cantidad=parseInt(this.value)||1"><span style="font-size:8px;color:var(--zg)">'+H(it.unidad)+'</span><button class="di-rm" onclick="dRm('+i+')">×</button></div>'}).join('')}
// Paciente
var dpt=null;
function dpS(){clearTimeout(dpt);dpt=setTimeout(function(){var q=$('dp').value;if(q.length<2){$('dpd').classList.remove('sh');return}
  rpc('aos_buscar_paciente',{p_query:q},function(d){var b=$('dpd');if(!d||!d.length){b.innerHTML='<div class="pac-opt" style="color:var(--zg)">Sin resultados</div>';b.classList.add('sh');return}
    b.innerHTML=d.map(function(p){return'<div class="pac-opt" onclick="dpSel(\''+H(p.numero)+'\',\''+H(p.nombres)+' '+H(p.apellidos)+'\')">'+H(p.nombres)+' '+H(p.apellidos)+' <span style="color:var(--zg)">'+H(p.numero)+'</span></div>'}).join('');b.classList.add('sh')})},300)}
function dpSel(num,nom){IV.dpac={numero:num,nombre:nom};$('dpd').classList.remove('sh');$('dp').style.display='none';$('dps').innerHTML='<div class="pac-sel"><span>👤 '+H(nom)+'</span><button onclick="dpClr()" style="border:none;background:transparent;color:var(--red);cursor:pointer;font-weight:700">✕</button></div>';
  // Cargar cotizaciones del paciente
  rpc('aos_cotizaciones_paciente_simple',{p_numero:num},function(cots){if(!cots||!cots.length){$('dcd').innerHTML='<div style="padding:4px;font-size:8px;color:var(--zg)">Sin cotizaciones</div>';$('dcd').classList.add('sh');return}
    $('dcd').innerHTML=cots.map(function(c){var items=(c.items||[]).map(function(x){return x.desc}).join(', ');return'<div class="cot-opt" onclick="dcSel(\''+H(c.id)+'\',\'#'+c.numero_cotizacion+'\',\''+H(items).replace(/'/g,"\\'")+'\')"><b>#'+c.numero_cotizacion+'</b> S/'+c.subtotal+' · '+H(c.estado)+' <div style="font-size:7px;color:var(--zg)">'+H(items.substring(0,60))+'</div></div>'}).join('');$('dcd').classList.add('sh')})}
function dpClr(){IV.dpac=null;IV.dcot=null;$('dps').innerHTML='';$('dcs').innerHTML='';$('dcd').classList.remove('sh');$('dp').style.display='';$('dp').value=''}
function dcSel(id,num,items){IV.dcot={id:id,num:num};$('dcd').classList.remove('sh');$('dcs').innerHTML='<div class="cot-sel"><span>🧾 '+H(num)+' — '+H(items.substring(0,40))+'</span><button onclick="IV.dcot=null;$(\'dcs\').innerHTML=\'\'" style="border:none;background:transparent;color:var(--red);cursor:pointer;font-weight:700">✕</button></div>'}
function dClr(){IV.desc=[];IV.dpac=null;IV.dcot=null;$('dps').innerHTML='';$('dcs').innerHTML='';$('dcd').classList.remove('sh');$('dp').style.display='';$('dp').value='';dR()}
function dExec(){if(!IV.desc.length){tst('Selecciona items');return}
  var data={sede:IV.sede,usuario:window._USER_NAME||'',cotizacion_id:IV.dcot?IV.dcot.id:'',items:IV.desc.map(function(x){return{inventario_id:x.id,nombre:x.nombre,cantidad:x.cantidad}})};
  rpc('aos_inventario_descontar',{p_data:data},function(r){if(r&&r.descontados){tst('✅ '+r.descontados+' descontados');dClr();iL();ldAl()}else{tst('Error')}})}

/* ═══ INGRESO ═══ */
function iiSearch(){var q=$('iiq').value.trim();if(q.length<2){$('iid').classList.remove('sh');return}
  rpc('aos_inventario_sede',{p_sede:IV.sede,p_query:q},function(d){var its=d.items||[];var b=$('iid');
    b.innerHTML=its.slice(0,8).map(function(it){return'<div class="pac-opt" onclick="iiAdd(\''+it.id+'\',\''+H(it.nombre_producto).replace(/'/g,"\\'")+'\','+it.cantidad+',\''+H(it.unidad)+'\')">'+H(it.nombre_producto)+' <span style="color:var(--zg)">('+it.cantidad+' '+H(it.unidad)+')</span></div>'}).join('');b.classList.add('sh')})}
function iiAdd(id,nom,qty,und){if(IV.ing.some(function(x){return x.id===id})){tst('Ya agregado');return}IV.ing.push({id:id,nombre:nom,cantidad:1,actual:qty,unidad:und});iiR();$('iid').classList.remove('sh');$('iiq').value='';tst('➕ '+nom)}
function iiRm(i){IV.ing.splice(i,1);iiR()}
function iiR(){if(!IV.ing.length){$('iitems').innerHTML='<div class="de">Busca producto y agrega stock</div>';return}
  $('iitems').innerHTML=IV.ing.map(function(it,i){return'<div class="di"><div><div class="di-n">'+H(it.nombre)+'</div><div class="di-u">Actual: '+it.actual+' '+H(it.unidad)+'</div></div><input class="di-q" value="'+it.cantidad+'" type="number" min="1" onchange="IV.ing['+i+'].cantidad=parseInt(this.value)||1"><span style="font-size:8px;color:var(--zg)">'+H(it.unidad)+'</span><button class="di-rm" onclick="iiRm('+i+')">×</button></div>'}).join('')}
function iiClr(){IV.ing=[];iiR()}
function iiExec(){if(!IV.ing.length){tst('Agrega productos');return}
  rpc('aos_inventario_ingreso',{p_data:{sede:IV.sede,usuario:window._USER_NAME||'',items:IV.ing.map(function(x){return{inventario_id:x.id,nombre:x.nombre,cantidad:x.cantidad}})}},function(r){if(r&&r.ingresados){tst('✅ '+r.ingresados+' ingresados');iiClr();iL()}else{tst('Error')}})}

/* ═══ ALERTAS ═══ */
function ldAl(){rpc('aos_inventario_alertas',{p_sede:IV.sede},function(d){if(!d)return;var h='';
  if(d.vencidos&&d.vencidos.length){h+='<button class="atgl" onclick="this.classList.toggle(\'op\')" style="color:var(--red)">🔴 Vencidos ('+d.vencidos.length+')<span class="ar">▼</span></button><div class="acnt">'+d.vencidos.map(function(a){return'<div class="al al-v"><span>'+H(a.nombre_producto)+'</span><span>'+H(a.lote)+' · '+a.dias+'d</span></div>'}).join('')+'</div>'}
  if(d.por_vencer&&d.por_vencer.length){h+='<button class="atgl" onclick="this.classList.toggle(\'op\')" style="color:var(--orn)">🟠 Ofrecer ('+d.por_vencer.length+')<span class="ar">▼</span></button><div class="acnt">'+d.por_vencer.map(function(a){return'<div class="al al-pv"><span>'+H(a.nombre_producto)+'</span><span>'+a.dias+'d</span></div>'}).join('')+'</div>'}
  if(d.agotados&&d.agotados.length){h+='<button class="atgl" onclick="this.classList.toggle(\'op\')" style="color:#92600A">🟡 Agotados ('+d.agotados.length+')<span class="ar">▼</span></button><div class="acnt">'+d.agotados.map(function(a){return'<div class="al al-ag"><span>'+H(a.nombre_producto)+'</span></div>'}).join('')+'</div>'}
  if(!h)h='<div style="text-align:center;padding:8px;color:var(--grn);font-size:9px">✅ Sin alertas</div>';$('ialerts').innerHTML=h})}

/* ═══ MODAL NUEVO ═══ */
function mOpen(){$('modal').classList.add('sh');$('m-sede').value=IV.sede}
function mClose(){$('modal').classList.remove('sh')}
function mSave(){var nom=$('m-nom').value.trim();if(!nom){tst('Nombre requerido');return}
  rpc('aos_inventario_agregar',{p_data:{sede:$('m-sede').value,nombre:nom,lote:$('m-lot').value,cantidad:parseFloat($('m-qty').value)||0,unidad:$('m-und').value,fecha_vencimiento:$('m-fv').value||null,categoria:$('m-cat').value,observaciones:$('m-obs').value,usuario:window._USER_NAME||''}},function(r){if(r&&r.ok){tst('✅ '+nom+' agregado');mClose();iL();$('m-nom').value='';$('m-lot').value='';$('m-qty').value='';$('m-fv').value='';$('m-obs').value=''}else{tst('Error')}})}

/* ═══ CONTEO ═══ */
var cntData=[],cntRep=null;
function ldCnt(){
  // Cargar reportes anteriores + plantilla para nuevo conteo
  rpc('aos_conteo_reportes',{p_sede:IV.sede},function(reps){
    var h='<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap"><button class="btn btn-g" onclick="cntNew()" style="flex:none;padding:6px 14px">📋 Nuevo conteo</button></div>';
    h+='<div style="font-size:11px;font-weight:700;margin-bottom:6px">Reportes anteriores</div>';
    if(!reps||!reps.length){h+='<div class="ld">Sin reportes previos</div>'}else{
      h+='<table class="MT"><thead><tr><th>Código</th><th>Sede</th><th>Fecha</th><th>Encargado</th><th>Items</th><th>Incidencias</th><th>Estado</th></tr></thead><tbody>';
      reps.forEach(function(r){h+='<tr style="cursor:pointer" onclick="cntView(\''+r.id+'\')"><td style="font-weight:700;color:var(--zbl)">'+H(r.codigo)+'</td><td>'+H(r.sede)+'</td><td>'+H(r.fecha)+'</td><td>'+H(r.encargado)+'</td><td>'+r.total_items_contados+'</td><td style="color:'+(r.incidencias_sin_resolver>0?'var(--red)':'var(--grn)')+'">'+r.total_incidencias+' ('+r.incidencias_sin_resolver+' sin resolver)</td><td>'+H(r.estado)+'</td></tr>'});
      h+='</tbody></table>'}
    $('cnt-wrap').innerHTML=h})}

function cntNew(){
  rpc('aos_inventario_plantilla_conteo',{p_sede:IV.sede},function(items){
    cntData=items||[];
    var h='<div style="display:flex;gap:6px;margin-bottom:8px;align-items:center"><button class="btn btn-c" onclick="ldCnt()" style="flex:none;padding:6px 14px">← Volver</button><span style="font-size:12px;font-weight:700">Nuevo conteo — '+H(IV.sede)+' ('+cntData.length+' productos)</span><button class="btn btn-g" onclick="cntSave()" style="flex:none;padding:6px 14px">💾 Grabar conteo</button></div>';
    h+='<div style="background:var(--zw);border-radius:var(--rad);border:1px solid var(--zl);overflow:hidden;max-height:calc(100vh - 240px);overflow-y:auto"><table class="CT"><thead><tr><th>Producto</th><th>Lote</th><th>Unid.</th><th>Sistema</th><th>Físico</th><th>Estado</th></tr></thead><tbody>';
    cntData.forEach(function(it,i){
      h+='<tr id="cr-'+i+'"><td style="font-weight:600;font-size:9px">'+H(it.nombre_producto)+'</td><td style="font-size:8px;color:var(--zg)">'+H(it.lote)+'</td><td style="font-size:8px">'+H(it.unidad)+'</td><td style="font-weight:700">'+it.cantidad_sistema+'</td><td><input class="cin" id="cf-'+i+'" type="number" min="0" placeholder="?" onchange="cntCheck('+i+')"></td><td id="cs-'+i+'">—</td></tr>'});
    h+='</tbody></table></div>';$('cnt-wrap').innerHTML=h})}

function cntCheck(i){
  var fisico=parseFloat($('cf-'+i).value);var sistema=cntData[i].cantidad_sistema;
  var row=$('cr-'+i);var st=$('cs-'+i);
  if(isNaN(fisico)){st.textContent='—';row.className='';return}
  if(fisico===sistema){st.innerHTML='<span class="sok">✅ OK</span>';row.className='ok'}
  else{var diff=sistema-fisico;st.innerHTML='<span class="sv">⚠️ Diff: '+(diff>0?'-':'+')+''+Math.abs(diff)+'</span>';row.className='bad'}}

function cntSave(){
  var items=[];cntData.forEach(function(it,i){var v=$('cf-'+i).value;if(v!==''){items.push({inventario_id:it.id,cantidad_fisica:parseFloat(v)||0})}});
  if(!items.length){tst('Ingresa al menos un conteo');return}
  rpc('aos_inventario_conteo_v2',{p_sede:IV.sede,p_usuario:window._USER_NAME||'ASESOR',p_items:items},function(r){
    if(r&&r.codigo){tst('✅ Reporte '+r.codigo+' — '+r.cuadran+' OK, '+r.incidencias+' incidencias');ldCnt()}else{tst('Error')}})}

function cntView(repId){
  cntRep=repId;
  rpc('aos_conteo_incidencias',{p_reporte_id:repId},function(incs){
    var h='<div style="display:flex;gap:6px;margin-bottom:8px"><button class="btn btn-c" onclick="ldCnt()" style="flex:none;padding:6px 14px">← Volver</button><span style="font-size:12px;font-weight:700">Incidencias del reporte</span></div>';
    if(!incs||!incs.length){h+='<div class="ld">Sin incidencias — todo cuadró ✅</div>';$('cnt-wrap').innerHTML=h;return}
    incs.forEach(function(inc){
      var col=inc.estado==='SIN_RESOLVER'?'var(--red)':'var(--grn)';
      h+='<div class="inc" style="border-left:3px solid '+col+'"><div class="inc-h"><span>'+H(inc.nombre_producto)+'</span><span style="color:'+col+';font-size:8px">'+H(inc.estado)+'</span></div><div class="inc-d">'+H(inc.problema)+'</div><div class="inc-vals"><span style="color:var(--zbl)">Sistema: '+inc.cantidad_sistema+'</span><span style="color:var(--red)">Físico: '+inc.cantidad_fisica+'</span><span style="font-weight:800">Diff: '+inc.diferencia+'</span></div>';
      if(inc.busqueda)h+='<div style="margin-top:4px;font-size:8px"><b>Búsqueda:</b> '+H(inc.busqueda)+'</div>';
      if(inc.conclusion)h+='<div style="font-size:8px"><b>Conclusión:</b> '+H(inc.conclusion)+'</div>';
      if(inc.estado==='SIN_RESOLVER')h+='<button class="inc-btn" onclick="imOpen(\''+inc.id+'\',\''+H(inc.nombre_producto).replace(/'/g,"\\'")+'\','+inc.cantidad_sistema+','+inc.cantidad_fisica+',\''+inc.inventario_id+'\',\''+H(inc.lote||'')+'\')">📝 Resolver</button>';
      h+='</div>'});
    $('cnt-wrap').innerHTML=h})}

/* Modal incidencia */
var imData={};
function imOpen(id,nom,sis,fis,invId,lote){imData={id:id,nombre:nom,sistema:sis,fisico:fis,invId:invId};$('im-info').innerHTML='<div style="background:var(--zbg);border-radius:5px;padding:8px;margin-bottom:8px;font-size:10px"><b>'+H(nom)+'</b> (Lote: '+H(lote)+')<br>Sistema: <b>'+sis+'</b> vs Físico: <b>'+fis+'</b> — Diferencia: <b>'+(sis-fis)+'</b></div>';$('im-busq').value='';$('im-conc').value='';$('im-qty').value='';$('imod').classList.add('sh')}
function imClose(){$('imod').classList.remove('sh')}
function imSave(){
  var data={incidencia_id:imData.id,reporte_id:cntRep,inventario_id:imData.invId,sede:IV.sede,nombre:imData.nombre,busqueda:$('im-busq').value,conclusion:$('im-conc').value,estado:'SUBSANADA',responsable:window._USER_NAME||''};
  if($('im-qty').value)data.cantidad_corregida=$('im-qty').value;
  rpc('aos_conteo_resolver_incidencia',{p_data:data},function(r){if(r&&r.ok){tst('✅ Incidencia resuelta');imClose();cntView(cntRep)}else{tst('Error')}})}

/* ═══ MOVIMIENTOS ═══ */
function ldMov(){rpc('aos_inventario_movimientos',{p_sede:IV.sede},function(d){if(!d||!d.length){$('mov-wrap').innerHTML='<div class="ld">Sin movimientos</div>';return}
  var r='<table class="MT"><thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Motivo</th><th>Usuario</th></tr></thead><tbody>';
  d.forEach(function(m){var tc=m.tipo_movimiento==='INGRESO'?'t-i':m.tipo_movimiento==='EGRESO'?'t-e':'t-a';
    r+='<tr><td style="font-size:9px;color:var(--zg)">'+H((m.created_at||'').substring(0,16))+'</td><td style="font-weight:600">'+H(m.nombre_producto)+'</td><td><span class="'+tc+'">'+H(m.tipo_movimiento)+'</span></td><td style="font-weight:700">'+m.cantidad+'</td><td style="font-size:9px">'+H(m.motivo||'')+'</td><td style="font-size:9px;color:var(--zg)">'+H(m.usuario||'')+'</td></tr>'});
  r+='</tbody></table>';$('mov-wrap').innerHTML=r})}

/* ═══ MÉTRICAS ═══ */
function ldMet(){rpc('aos_inventario_metricas',{p_sede:IV.sede},function(d){if(!d){$('met-wrap').innerHTML='<div class="ld">Error</div>';return}
  var h='<div class="mg"><div class="mc"><div class="mt">📊 Resumen '+H(IV.sede)+'</div>';
  [['Total items',d.total_items],['Total unidades',Math.round(d.total_unidades)],['Disponibles',d.disponibles,'var(--grn)'],['Vencidos',d.vencidos,'var(--red)'],['Por vencer',d.por_vencer,'var(--orn)'],['Agotados',d.agotados,'var(--yel)'],['Último conteo',d.ultimo_conteo||'—'],['Incidencias abiertas',d.incidencias_abiertas,'var(--red)'],['Movimientos hoy',d.movimientos_hoy],['Egresos semana',d.egresos_semana]].forEach(function(r){h+='<div class="mr"><span>'+r[0]+'</span><span'+(r[2]?' style="color:'+r[2]+'"':'')+'>'+r[1]+'</span></div>'});h+='</div>';
  if(d.por_categoria){h+='<div class="mc"><div class="mt">📦 Por categoría</div>';d.por_categoria.forEach(function(c){h+='<div class="mr"><span>'+H(c.categoria)+'</span><span>'+c.items+' ('+Math.round(c.unidades)+' und)</span></div>'});h+='</div>'}
  h+='</div>';$('met-wrap').innerHTML=h})}
</script>
