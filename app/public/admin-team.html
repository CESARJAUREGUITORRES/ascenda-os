<!-- admin-team.html v1 — Panel de Equipo | AscendaOS v1 | 100% Supabase -->
<style>
.tm{padding:14px;display:flex;flex-direction:column;gap:10px;font-family:'DM Sans',sans-serif;color:#0D1B3E;}
.tm-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;}
.crd{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(7,29,74,.06);border:1px solid #EEF0F8;}
.ct{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.vt{width:100%;border-collapse:separate;border-spacing:0;font-size:10px;}
.vt th{background:#F8FAFF;font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.4px;color:#9AAAC8;padding:8px 10px;text-align:left;border-bottom:1px solid #EEF0F8;}
.vt td{padding:8px 10px;border-bottom:1px solid #F5F6FA;}
.vt tr:hover{background:#FAFBFE;}
.tag{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:8px;font-weight:700;}
.tag-g{background:#F0FDF4;color:#059669;}.tag-b{background:#EBF2FF;color:#0A4FBF;}.tag-y{background:#FFFBEB;color:#D97706;}.tag-r{background:#FEF2F2;color:#DC2626;}.tag-p{background:#F5F3FF;color:#7C3AED;}
.mi{padding:7px 10px;border:1px solid #DDE4F5;border-radius:8px;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;box-sizing:border-box;}
.mbtn{padding:8px 16px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.mbtn-p{background:#0A4FBF;color:#fff;}.mbtn-c{background:#F0F4FC;color:#6B7BA8;}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.tc{border-radius:14px;padding:16px;border:1px solid #EEF0F8;background:#fff;position:relative;transition:all .2s;}
.tc:hover{box-shadow:0 4px 16px rgba(7,29,74,.08);}
.toast{position:fixed;bottom:20px;right:20px;z-index:700;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;width:min(360px,88vw);}
.toast-item{pointer-events:all;display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:16px;background:#fff;box-shadow:0 12px 40px rgba(7,29,74,.22);animation:toastIn .4s;font-size:12px;border-bottom:3px solid #00C9A7;}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.mov{position:fixed;inset:0;background:rgba(7,29,74,.35);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}.mov.open{display:flex;}
.modal{background:#fff;border-radius:20px;width:min(500px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(7,29,74,.2);}
.mhd{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #EEF0F8;}.mtit{font-family:'Exo 2';font-weight:800;font-size:15px;}.mx{background:none;border:none;font-size:18px;color:#9AAAC8;cursor:pointer;margin-left:auto;}
.mbody{padding:20px;}
@media(max-width:768px){.g3{grid-template-columns:1fr;}}
</style>
<div class="tm">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="tm-t">👥 Equipo</div>
    <div style="margin-left:auto;"><button class="mbtn mbtn-p" onclick="openAddUser()">+ Agregar Usuario</button></div>
  </div>
  <div class="g3" id="tm-list"></div>
</div>
<div class="mov" id="m-user" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal"><div class="mhd"><div class="mtit" id="mu-title">Usuario</div><button class="mx" onclick="el('m-user').classList.remove('open')">✕</button></div>
<div class="mbody" id="mu-body"></div></div></div>
<div class="toast" id="tm-toast"></div>
<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function el(id){return document.getElementById(id);}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(t,m){var tw=el('tm-toast');var d=document.createElement('div');d.className='toast-item';d.innerHTML='<div style="font-size:20px;">✅</div><div><div style="font-weight:800;">'+t+'</div><div style="font-size:10px;color:#6B7BA8;">'+m+'</div></div>';tw.appendChild(d);setTimeout(function(){d.remove();},4000);}

function loadTeam(){
  fetch(SB+'/rest/v1/aos_rrhh?select=*&estado=eq.ACTIVO&order=nombre',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(function(users){
    if(!users||!users.length){el('tm-list').innerHTML='<div style="color:#9AAAC8;padding:20px;">Sin usuarios</div>';return;}
    var puestoIco={'ADMINISTRADOR':'👑','DOCTORA':'🩺','ENFERMERIA':'💉','ASESOR':'📞'};
    var puestoCol={'ADMINISTRADOR':'#7C3AED','DOCTORA':'#0A4FBF','ENFERMERIA':'#059669','ASESOR':'#D97706'};
    var puestoBg={'ADMINISTRADOR':'linear-gradient(135deg,rgba(124,58,237,.05),#fff)','DOCTORA':'linear-gradient(135deg,rgba(10,79,191,.05),#fff)','ENFERMERIA':'linear-gradient(135deg,rgba(5,150,105,.05),#fff)','ASESOR':'linear-gradient(135deg,rgba(217,119,6,.05),#fff)'};
    el('tm-list').innerHTML=users.map(function(u){
      var initials=(u.nombre||'')[0]||'?';
      var email='';
      // Buscar email en aos_usuarios
      var col=puestoCol[u.puesto]||'#0A4FBF';
      return '<div class="tc" style="background:'+(puestoBg[u.puesto]||'#fff')+';border-top:3px solid '+col+';" onclick="editUser(\''+u.id+'\')"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><div style="width:40px;height:40px;border-radius:12px;background:'+col+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;">'+initials+'</div><div><div style="font-weight:800;font-size:13px;">'+h(u.nombre)+'</div><div style="font-size:9px;color:#6B7BA8;">'+h(u.puesto)+'</div></div><div style="margin-left:auto;font-size:18px;">'+(puestoIco[u.puesto]||'👤')+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:9px;"><div style="color:#6B7BA8;">Sede: <b style="color:#0D1B3E;">'+h(u.sede||'—')+'</b></div><div style="color:#6B7BA8;">Código: <b style="color:#0D1B3E;">'+h(u.codigo_asesor||'—')+'</b></div></div></div>';
    }).join('');
  });
}

function editUser(id){
  fetch(SB+'/rest/v1/aos_rrhh?id=eq.'+id,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows[0])return;var u=rows[0];
    el('mu-title').textContent='Editar: '+u.nombre;
    el('mu-body').innerHTML='<div style="display:flex;flex-direction:column;gap:10px;"><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Nombre</label><input class="mi" id="eu-nombre" value="'+h(u.nombre)+'"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Puesto</label><select class="mi" id="eu-puesto"><option>ADMINISTRADOR</option><option>DOCTORA</option><option>ENFERMERIA</option><option>ASESOR</option><option>RECEPCION</option></select></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Sede</label><input class="mi" id="eu-sede" value="'+h(u.sede||'')+'"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Código Asesor</label><input class="mi" id="eu-codigo" value="'+h(u.codigo_asesor||'')+'"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Teléfono</label><input class="mi" id="eu-tel" value="'+h(u.telefono||'')+'"></div><div style="display:flex;gap:8px;margin-top:6px;"><button class="mbtn mbtn-p" onclick="saveUser(\''+u.id+'\')">💾 Guardar</button><button class="mbtn mbtn-c" onclick="el(\'m-user\').classList.remove(\'open\')">Cancelar</button></div></div>';
    el('eu-puesto').value=u.puesto||'ASESOR';
    el('m-user').classList.add('open');
  });
}

function saveUser(id){
  var data={nombre:el('eu-nombre').value,puesto:el('eu-puesto').value,sede:el('eu-sede').value,codigo_asesor:el('eu-codigo').value,telefono:el('eu-tel').value};
  fetch(SB+'/rest/v1/aos_rrhh?id=eq.'+id,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)}).then(function(){
    showToast('Usuario Actualizado',data.nombre);el('m-user').classList.remove('open');loadTeam();
  });
}

function openAddUser(){
  el('mu-title').textContent='Nuevo Usuario';
  el('mu-body').innerHTML='<div style="display:flex;flex-direction:column;gap:10px;"><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Nombre</label><input class="mi" id="eu-nombre" placeholder="NOMBRE COMPLETO"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Usuario (login)</label><input class="mi" id="eu-usuario" placeholder="nombre.apellido"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Contraseña inicial</label><input class="mi" id="eu-pass" placeholder="Mínimo 6 caracteres"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Puesto</label><select class="mi" id="eu-puesto"><option>ASESOR</option><option>ENFERMERIA</option><option>DOCTORA</option><option>RECEPCION</option><option>ADMINISTRADOR</option></select></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Sede</label><input class="mi" id="eu-sede" placeholder="SAN ISIDRO"></div><div><label style="font-size:9px;font-weight:700;color:#6B7BA8;">Email</label><input class="mi" id="eu-email" type="email" placeholder="correo@gmail.com"></div><div style="display:flex;gap:8px;margin-top:6px;"><button class="mbtn mbtn-p" onclick="createUser()">✓ Crear Usuario</button><button class="mbtn mbtn-c" onclick="el(\'m-user\').classList.remove(\'open\')">Cancelar</button></div></div>';
  el('m-user').classList.add('open');
}

function createUser(){
  var nombre=el('eu-nombre').value.toUpperCase();var usuario=el('eu-usuario').value.toLowerCase();
  var pass=el('eu-pass').value;var puesto=el('eu-puesto').value;var sede=el('eu-sede').value;var email=el('eu-email').value;
  if(!nombre||!usuario||!pass||pass.length<6){showToast('Error','Completa todos los campos');return;}
  // Crear en aos_rrhh
  fetch(SB+'/rest/v1/aos_rrhh',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:nombre,usuario:usuario,password_hash:pass,puesto:puesto,sede:sede,estado:'ACTIVO',codigo_asesor:'ZIV-'+(100+Math.floor(Math.random()*900))})}).then(function(){
    // Crear en aos_usuarios si tiene email
    if(email){fetch(SB+'/rest/v1/aos_usuarios',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:nombre,email:email,rol:puesto.toLowerCase(),sede:sede})});}
    showToast('Usuario Creado',nombre+' — puede ingresar con '+usuario);
    el('m-user').classList.remove('open');loadTeam();
  });
}
loadTeam();
</script>
