<style>
.tm{padding:14px;display:flex;flex-direction:column;gap:10px;font-family:'DM Sans',sans-serif;color:#0D1B3E;}
.tm-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;}
.mi{padding:6px 10px;border:1px solid #DDE4F5;border-radius:8px;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;box-sizing:border-box;}
.mi:focus{outline:none;border-color:#0A4FBF;box-shadow:0 0 0 3px rgba(10,79,191,.08);}
.mbtn{padding:7px 14px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.mbtn-p{background:#0A4FBF;color:#fff;}.mbtn-g{background:#059669;color:#fff;}.mbtn-c{background:#F0F4FC;color:#6B7BA8;}.mbtn-r{background:#FEF2F2;color:#DC2626;}
.fg{display:grid;grid-template-columns:80px 1fr;gap:2px;align-items:center;margin-bottom:4px;}
.fg-l{font-size:8px;font-weight:600;color:#6B7BA8;}
.tag{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:7px;font-weight:700;}
.sec-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;color:#071D4A;margin:10px 0 4px;padding-bottom:3px;border-bottom:1px solid #EEF0F8;}
/* Cards */
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.pc{border-radius:14px;border:1px solid #EEF0F8;background:#fff;overflow:hidden;cursor:pointer;transition:all .2s;}
.pc:hover{box-shadow:0 8px 24px rgba(7,29,74,.1);transform:translateY(-2px);}
.pc-img{width:100%;aspect-ratio:3/4;background:#071D4A;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-body{padding:10px;}
/* Modal */
.mov{position:fixed;inset:0;background:rgba(7,29,74,.4);z-index:500;display:none;align-items:flex-start;justify-content:center;backdrop-filter:blur(4px);overflow-y:auto;padding:20px 0;}
.mov.open{display:flex;}
.modal{background:#fff;border-radius:20px;width:min(900px,96vw);box-shadow:0 24px 60px rgba(7,29,74,.2);margin:auto;}
.mhd{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #EEF0F8;position:sticky;top:0;background:#fff;z-index:1;border-radius:20px 20px 0 0;}
.mtit{font-family:'Exo 2';font-weight:800;font-size:14px;}.mx{background:none;border:none;font-size:18px;color:#9AAAC8;cursor:pointer;margin-left:auto;}
.mbody{padding:16px 20px;}
/* Chips tabs */
.chips{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #DDE4F5;margin-bottom:10px;}
.chip{padding:7px 14px;font-size:9px;font-weight:700;cursor:pointer;color:#6B7BA8;background:#F8FAFF;border:none;transition:all .12s;}
.chip.act{background:#071D4A;color:#fff;}
/* Permisos */
.pm{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.pi{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:6px;border:1px solid #EEF0F8;font-size:8px;cursor:pointer;transition:all .1s;}
.pi:hover{border-color:#0A4FBF;}.pi.on{background:#EBF2FF;border-color:#0A4FBF;}
.pi.on .pc-k{background:#0A4FBF;color:#fff;border-color:#0A4FBF;}
.pc-k{width:12px;height:12px;border-radius:3px;border:1.5px solid #DDE4F5;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;flex-shrink:0;}
.toast{position:fixed;bottom:20px;right:20px;z-index:700;pointer-events:none;}
.toast-item{pointer-events:all;padding:10px 14px;border-radius:12px;background:#fff;box-shadow:0 8px 30px rgba(7,29,74,.2);animation:ti .3s;font-size:11px;border-left:3px solid #0A4FBF;margin-top:6px;}
@keyframes ti{from{transform:translateX(100%)}to{transform:translateX(0)}}
@media(max-width:768px){.g4{grid-template-columns:1fr 1fr;}}
</style>

  rpc('aos_productividad_equipo',{},function(r){if(!r||!r.ok)return;var p=(r.equipo||[]).filter(function(e){return e.nombre===u.nombre;})[0];if(!p){el('eu-met').innerHTML='<div style="grid-column:1/-1;text-align:center;font-size:9px;color:#9AAAC8;">Sin datos de productividad</div>';return;}var pp=p.dias_trabajados>0?Math.round((p.dias_trabajados-(p.tardanzas||0))/p.dias_trabajados*100):0;el('eu-met').innerHTML=[{l:'Llamadas',v:Number(p.llamadas||0).toLocaleString(),c:'#0A4FBF'},{l:'Citas',v:p.citas,c:'#00C9A7'},{l:'Conv%',v:p.conv_pct+'%',c:p.conv_pct>=5?'#059669':'#D97706'},{l:'Facturado',v:'S/'+Number(p.facturado||0).toLocaleString(),c:'#059669'},{l:'Puntualidad',v:pp+'%',c:pp>=80?'#059669':'#DC2626'},{l:'Tardanzas',v:p.tardanzas,c:p.tardanzas>2?'#DC2626':'#0A4FBF'}].map(function(s){return '<div style="text-align:center;"><div style="font-family:Exo 2;font-weight:800;font-size:15px;color:'+s.c+';">'+s.v+'</div><div style="font-size:6px;font-weight:700;color:#9AAAC8;text-transform:uppercase;">'+s.l+'</div></div>';}).join('');});
  q('aos_horarios_personal','select=fecha,hora_inicio,hora_fin,sede&personal=eq.'+encodeURIComponent(u.nombre)+'&fecha=gte.'+new Date().toISOString().slice(0,10)+'&order=fecha&limit=7',function(r){var ds=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];el('eu-hor').innerHTML=(r&&r.length)?r.map(function(h){var d=new Date(h.fecha+'T12:00:00');return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #EEF0F8;font-size:9px;"><b>'+ds[d.getDay()]+' '+h.fecha.slice(5)+'</b><span style="color:#0A4FBF;">'+h.hora_inicio+' - '+h.hora_fin+'</span><span style="font-size:7px;color:#6B7BA8;">'+h.sede+'</span></div>';}).join(''):'<div style="font-size:9px;color:#9AAAC8;">Sin turnos programados</div>';});
  rpc('aos_detalle_asesor',{p_nombre:u.nombre},function(r){if(!r||!r.ok)return;var d=(r.diario||[]).slice(0,7);el('eu-asis').innerHTML=d.length?d.map(function(x){return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #EEF0F8;font-size:9px;"><span style="font-weight:700;">'+x.fecha.slice(5)+'</span><span style="color:#0A4FBF;">'+x.llamadas+' llam</span><span style="color:#00C9A7;">'+x.citas+' cit</span>'+(x.llego_tarde?'<span style="color:#DC2626;font-weight:700;">✕</span>':'<span style="color:#059669;">✓</span>')+'</div>';}).join(''):'<div style="font-size:9px;color:#9AAAC8;">Sin datos</div>';});
}
function showTab(t){['datos','roles','horarios'].forEach(function(x){var e=el('tab-'+x);if(e)e.style.display=x===t?'block':'none';});document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('act');});event.target.classList.add('act');}
function tp(e){e.classList.toggle('on');var k=e.querySelector('.pc-k');k.textContent=e.classList.contains('on')?'✓':'';}
function saveU(id){
  var ps=[];document.querySelectorAll('.pi.on').forEach(function(p){ps.push(p.getAttribute('data-p'));});
  var d={nombre:(el('eu-nombre').value||'').toUpperCase(),apellidos:(el('eu-apellidos').value||'').toUpperCase(),email:el('eu-email').value,dni:el('eu-dni').value,telefono_personal:el('eu-tel').value,contacto_emergencia:el('eu-emg').value,fecha_nacimiento:el('eu-nac').value||null,lugar_nacimiento:el('eu-lnac').value,rh:el('eu-rh').value,departamento:el('eu-dep').value,provincia:el('eu-prov').value,distrito:el('eu-dist').value,direccion:el('eu-dir').value,cargo:el('eu-cargo').value,area:el('eu-area').value,sede:el('eu-sede').value,fecha_ingreso:el('eu-fing').value||null,tipo_contrato:el('eu-ctr').value,nivel_jerarquia:Number(el('eu-niv').value)||4,sueldo:Number(el('eu-sue').value)||0,bono_metas:Number(el('eu-bon').value)||0,avatar_url:el('eu-avatar').value,paneles_acceso:ps,updated_at:new Date().toISOString()};
  fetch(SB+'/rest/v1/aos_usuarios?id=eq.'+id,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)}).then(function(){showToast(d.nombre+' guardado — '+ps.length+' paneles');el('m-user').classList.remove('open');loadTeam();});
}
function loadEst(uid){q('aos_estudios','select=*&usuario_id=eq.'+uid+'&order=created_at.desc',function(r){var c=el('eu-est');if(!c)return;c.innerHTML=(r&&r.length)?r.map(function(e){return '<div style="padding:3px 0;border-bottom:1px solid #EEF0F8;"><b>'+h(e.titulo)+'</b> <span style="color:#6B7BA8;">'+h(e.grado)+' · '+h(e.institucion)+'</span></div>';}).join(''):'Sin estudios';});}
function addEst(uid){var t=prompt('Título/certificado:');if(!t)return;var g=prompt('Grado:','Certificado');var i=prompt('Institución:');fetch(SB+'/rest/v1/aos_estudios',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({usuario_id:uid,titulo:t,grado:g||'',institucion:i||''})}).then(function(){loadEst(uid);showToast('Estudio agregado');});}
function upAv(inp,uid){var f=inp.files[0];if(!f)return;if(f.size>5*1024*1024){el('eu-as').textContent='❌ Máx 5MB';return;}el('eu-as').textContent='⏳ Subiendo...';el('eu-as').style.color='#D97706';var ext=f.name.split('.').pop();var reader=new FileReader();reader.onload=function(e){el('eu-pb').innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;">';};reader.readAsDataURL(f);fetch(SB+'/storage/v1/object/avatars/'+uid+'.'+ext,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':f.type,'x-upsert':'true'},body:f}).then(function(r){return r.json();}).then(function(r){if(r&&(r.Key||r.Id)){var url=SB+'/storage/v1/object/public/avatars/'+uid+'.'+ext;el('eu-avatar').value=url;el('eu-as').textContent='✅ Foto subida';el('eu-as').style.color='#059669';showToast('Foto actualizada');}else{el('eu-as').textContent='❌ Error';el('eu-as').style.color='#DC2626';}}).catch(function(){el('eu-as').textContent='❌ Error conexión';});}
function sendInv(id,email,nombre){fetch('https://ascenda-os-production.up.railway.app/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:email,subject:'🔑 Activa tu cuenta AscendaOS',html:'<div style="font-family:Arial;max-width:500px;margin:0 auto;text-align:center;"><div style="background:linear-gradient(135deg,#071D4A,#0A4FBF);padding:24px;border-radius:12px 12px 0 0;color:#fff;font-size:20px;font-weight:800;">Bienvenido al equipo</div><div style="padding:24px;border:1px solid #eee;border-radius:0 0 12px 12px;"><p>Hola <b>'+nombre+'</b>, tu cuenta está lista.</p><a href="https://ascenda-os-production.up.railway.app" style="display:inline-block;background:#0A4FBF;color:#fff;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;">Activar cuenta →</a></div></div>'})}).then(function(){showToast('Invitación enviada a '+email);});}
function openNewUser(){el('mu-title').textContent='+ Nuevo Usuario';var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;">';html+='<div class="fg"><div class="fg-l">Nombres</div><input class="mi" id="eu-nombre"></div>';html+='<div class="fg"><div class="fg-l">Apellidos</div><input class="mi" id="eu-apellidos"></div>';html+='<div class="fg"><div class="fg-l">Email</div><input class="mi" id="eu-email" type="email"></div>';html+='<div class="fg"><div class="fg-l">Usuario</div><input class="mi" id="eu-user" placeholder="nombre.apellido"></div>';html+='<div class="fg"><div class="fg-l">Contraseña</div><input class="mi" id="eu-pass" placeholder="min 6 chars"></div>';html+='<div class="fg"><div class="fg-l">Cargo</div><select class="mi" id="eu-cargo"><option>ENFERMERIA</option><option>ASESOR</option><option>DOCTORA</option><option>RECEPCION</option><option>MARKETING</option><option>ADMINISTRADOR</option></select></div>';html+='<div class="fg"><div class="fg-l">Sede</div><input class="mi" id="eu-sede"></div>';html+='</div>';html+='<div class="sec-t">🔐 Paneles</div><div class="pm">';P.forEach(function(p){html+='<div class="pi" data-p="'+p.id+'" onclick="tp(this)"><div class="pc-k"></div>'+p.icono+' '+h(p.nombre)+'</div>';});html+='</div>';html+='<div style="display:flex;gap:6px;margin-top:10px;"><button class="mbtn mbtn-g" onclick="createU()">✓ Crear</button><button class="mbtn mbtn-c" onclick="el(\'m-user\').classList.remove(\'open\')">Cancelar</button></div>';el('mu-body').innerHTML=html;el('m-user').classList.add('open');}
function createU(){var n=(el('eu-nombre').value||'').toUpperCase(),a=(el('eu-apellidos')?el('eu-apellidos').value:'').toUpperCase(),em=el('eu-email').value,us=el('eu-user')?el('eu-user').value.toLowerCase():'',pw=el('eu-pass')?el('eu-pass').value:'',cg=el('eu-cargo').value,sd=el('eu-sede')?el('eu-sede').value:'';if(!n||!us||!pw||pw.length<6){showToast('Completa campos');return;}var ps=[];document.querySelectorAll('.pi.on').forEach(function(p){ps.push(p.getAttribute('data-p'));});var nc='ZIV-'+String(100+U.length+1).padStart(3,'0');fetch(SB+'/rest/v1/aos_rrhh',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:n,usuario:us,password_hash:pw,puesto:cg,sede:sd,estado:'ACTIVO',codigo_asesor:nc})}).then(function(){return fetch(SB+'/rest/v1/aos_usuarios',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:n,apellidos:a,email:em,cargo:cg,sede:sd,nivel_jerarquia:4,paneles_acceso:ps,codigo_asesor:nc,cuenta_activada:false})});}).then(function(){showToast(n+' creado');el('m-user').classList.remove('open');loadTeam();});}
loadTeam();
</script>
