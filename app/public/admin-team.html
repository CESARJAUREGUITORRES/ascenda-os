<style>
.tm{padding:14px;display:flex;flex-direction:column;gap:10px;font-family:'DM Sans',sans-serif;color:#0D1B3E;}
.tm-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;}
.mi{padding:6px 10px;border:1px solid #DDE4F5;border-radius:8px;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;box-sizing:border-box;}
.mi:focus{outline:none;border-color:#0A4FBF;box-shadow:0 0 0 3px rgba(10,79,191,.08);}
.mbtn{padding:7px 14px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.mbtn-p{background:#0A4FBF;color:#fff;}.mbtn-g{background:#059669;color:#fff;}.mbtn-c{background:#F0F4FC;color:#6B7BA8;}.mbtn-r{background:#FEF2F2;color:#DC2626;}
.fg{display:grid;grid-template-columns:80px 1fr;gap:2px;align-items:center;margin-bottom:4px;}
.fg-l{font-size:8px;font-weight:600;color:#6B7BA8;}
.tag{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:7px;font-weight:700;}
.sec-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;color:#071D4A;margin:10px 0 4px;padding-bottom:3px;border-bottom:1px solid #EEF0F8;}
/* Cards */
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.pc{border-radius:14px;border:1px solid #EEF0F8;background:#fff;overflow:hidden;cursor:pointer;transition:all .2s;}
.pc:hover{box-shadow:0 8px 24px rgba(7,29,74,.1);transform:translateY(-2px);}
.pc-img{width:100%;aspect-ratio:3/4;background:#071D4A;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-body{padding:10px;}
/* Modal */
.mov{position:fixed;inset:0;background:rgba(7,29,74,.4);z-index:500;display:none;align-items:flex-start;justify-content:center;backdrop-filter:blur(4px);overflow-y:auto;padding:20px 0;}
.mov.open{display:flex;}
.modal{background:#fff;border-radius:20px;width:min(900px,96vw);box-shadow:0 24px 60px rgba(7,29,74,.2);margin:auto;}
.mhd{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #EEF0F8;position:sticky;top:0;background:#fff;z-index:1;border-radius:20px 20px 0 0;}
.mtit{font-family:'Exo 2';font-weight:800;font-size:14px;}.mx{background:none;border:none;font-size:18px;color:#9AAAC8;cursor:pointer;margin-left:auto;}
.mbody{padding:16px 20px;}
/* Chips tabs */
.chips{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #DDE4F5;margin-bottom:10px;}
.chip{padding:7px 14px;font-size:9px;font-weight:700;cursor:pointer;color:#6B7BA8;background:#F8FAFF;border:none;transition:all .12s;}
.chip.act{background:#071D4A;color:#fff;}
/* Permisos */
.pm{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.pi{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:6px;border:1px solid #EEF0F8;font-size:8px;cursor:pointer;transition:all .1s;}
.pi:hover{border-color:#0A4FBF;}.pi.on{background:#EBF2FF;border-color:#0A4FBF;}
.pi.on .pc-k{background:#0A4FBF;color:#fff;border-color:#0A4FBF;}
.pc-k{width:12px;height:12px;border-radius:3px;border:1.5px solid #DDE4F5;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;flex-shrink:0;}
.toast{position:fixed;bottom:20px;right:20px;z-index:700;pointer-events:none;display:none;}
.toast-item{pointer-events:all;padding:10px 14px;border-radius:12px;background:#fff;box-shadow:0 8px 30px rgba(7,29,74,.2);animation:ti .3s;font-size:11px;border-left:3px solid #0A4FBF;margin-top:6px;}
@keyframes ti{from{transform:translateX(100%)}to{transform:translateX(0)}}
@media(max-width:768px){.g4{grid-template-columns:1fr 1fr;}}
</style>

function updateCargos2(){var area=el('eu-area2').value;var sel=el('eu-cargo2');var cargos=CARGOS_POR_AREA[area]||['ASESOR'];sel.innerHTML=cargos.map(function(c){return '<option>'+c+'</option>';}).join('');}
function createU(){
  var n=(el('eu-nombre').value||'').toUpperCase(),a=(el('eu-apellidos')?el('eu-apellidos').value:'').toUpperCase();
  var em=el('eu-email').value,tel=el('eu-tel')?el('eu-tel').value:'';
  var cg=el('eu-cargo2')?el('eu-cargo2').value:'ASESOR',area=el('eu-area2')?el('eu-area2').value:'enfermería';
  var rol=el('eu-rol2')?Number(el('eu-rol2').value):3,acc=el('eu-acc2')?el('eu-acc2').value:'limitado';
  if(!n||!a){showToast('Completa nombre y apellidos');return;}
  // Auto-generar usuario y contraseña
  var us=n.toLowerCase().replace(/\s+/g,'.')+'.'+a.toLowerCase().split(' ')[0];
  var pw=n.toLowerCase().slice(0,4)+String(Math.floor(Math.random()*9000)+1000);
  var nc='ZIV-'+String(100+U.length+1).padStart(3,'0');
  var sedes=acc==='libre'?'TODAS':'SAN ISIDRO, PUEBLO LIBRE';
  fetch(SB+'/rest/v1/aos_rrhh',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:n,usuario:us,password_hash:pw,puesto:cg,sede:sedes,estado:'ACTIVO',codigo_asesor:nc})}).then(function(){
    return fetch(SB+'/rest/v1/aos_usuarios',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:n,apellidos:a,email:em,telefono_personal:tel,cargo:cg,area:area,sede:sedes,nivel_jerarquia:rol,acceso_geo:acc,sedes_permitidas:acc==='limitado'?['SAN_ISIDRO','PUEBLO_LIBRE']:[],codigo_asesor:nc,cuenta_activada:false,paneles_acceso:[]})});
  }).then(function(){
    showToast(n+' creado — Configura su perfil');el('m-user').classList.remove('open');
    // Recargar equipo y abrir perfil del nuevo usuario
    setTimeout(function(){loadTeam();setTimeout(function(){
      var idx=-1;U.forEach(function(x,i){if(x.nombre===n)idx=i;});
      if(idx>=0)editUser(idx);
    },1000);},500);
  });
}
// ═══ SERVICIOS — Cargar y guardar tratamientos por profesional ═══
var _svcCats={};
function loadSvcGrid(userServicios){
  q('aos_cat_tratamientos','select=tratamiento,categoria&estado=eq.ACTIVO&order=categoria,tratamiento',function(rows){
    if(!rows||!rows.length){el('eu-servicios-grid').innerHTML='<div style="font-size:9px;color:#9AAAC8;">Sin tratamientos en catálogo</div>';return;}
    var cats={};rows.forEach(function(r){var c=r.categoria||'GENERAL';if(!cats[c])cats[c]=[];cats[c].push(r.tratamiento);});
    _svcCats=cats;
    var uSvc=(userServicios||[]).map(function(s){return s.toUpperCase();});
    var html='';var orden=['FACIAL','INYECTABLES','APARATOLOGÍA','CORPORAL','CAPILAR','CONSULTA','COMBO','OTROS','GENERAL'];
    orden.forEach(function(cat){
      if(!cats[cat])return;
      var icon={'FACIAL':'🧖','INYECTABLES':'💉','APARATOLOGÍA':'⚡','CORPORAL':'🏋️','CAPILAR':'💇','CONSULTA':'🩺','COMBO':'📦','OTROS':'📋','GENERAL':'📋'}[cat]||'📋';
      html+='<div style="margin-bottom:10px;"><div style="font-size:9px;font-weight:800;color:#0A4FBF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">'+icon+' '+cat+'</div>';
      html+='<div style="display:flex;flex-wrap:wrap;gap:4px;">';
      cats[cat].forEach(function(t){
        var checked=uSvc.indexOf(t.toUpperCase())>=0;
        html+='<label style="display:flex;align-items:center;gap:3px;padding:4px 8px;border-radius:6px;border:1.5px solid '+(checked?'#00C9A7':'#DDE4F5')+';background:'+(checked?'rgba(0,201,167,.08)':'#fff')+';cursor:pointer;font-size:9px;font-weight:600;color:'+(checked?'#059669':'#6B7BA8')+';transition:all .15s;">';
        html+='<input type="checkbox" class="eu-svc" value="'+h(t)+'" '+(checked?'checked':'')+' onchange="toggleSvcStyle(this)" style="accent-color:#00C9A7;">';
        html+=h(t)+'</label>';
      });
      html+='</div></div>';
    });
    el('eu-servicios-grid').innerHTML=html;
  });
}
function toggleSvcStyle(cb){var lbl=cb.closest('label');if(cb.checked){lbl.style.borderColor='#00C9A7';lbl.style.background='rgba(0,201,167,.08)';lbl.style.color='#059669';}else{lbl.style.borderColor='#DDE4F5';lbl.style.background='#fff';lbl.style.color='#6B7BA8';}}
function selAllSvc(val){document.querySelectorAll('.eu-svc').forEach(function(cb){cb.checked=val;toggleSvcStyle(cb);});}
function saveServicios(uid){
  var svc=[];document.querySelectorAll('.eu-svc:checked').forEach(function(cb){svc.push(cb.value);});
  var cmpEl=el('eu-cmp');var cmp=cmpEl?cmpEl.value.trim():'';
  var body={servicios:svc};if(cmpEl)body.cmp=cmp;
  fetch(SB+'/rest/v1/aos_usuarios?id=eq.'+uid,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)}).then(function(r){
    if(r.ok){
      showToast('Servicios guardados — '+svc.length+' tratamientos');
      // Sync con perfiles_profesional
      var u=U.find(function(x){return x.id===uid;});
      if(u){var nm=(u.nombre||'').split(' ');var search=nm.length>1?nm[1]:nm[0];
        fetch(SB+'/rest/v1/aos_perfiles_profesional?nombre_publico=ilike.*'+encodeURIComponent(search)+'*',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(function(profs){
          if(profs&&profs[0]){fetch(SB+'/rest/v1/aos_perfiles_profesional?id=eq.'+profs[0].id,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({servicios:svc})}).then(function(){console.log('[TEAM] Servicios synced to perfiles_profesional');});}
        });
      }
    }else{showToast('Error al guardar');}
  });
}
// ═══ FORZAR CIERRE DE SESIÓN (invalida sesión del usuario, NO del admin) ═══
function abrirComo(usuario, nombre){
  // Open app in new tab with impersonate token
  var url = window.location.origin + '/app?impersonate=' + encodeURIComponent(usuario);
  window.open(url, '_blank');
  if(window.AOS_showToast) AOS_showToast('👁 Abriendo como', nombre);
}
function forzarCierre(codigo,nombre){
  if(!confirm('¿Forzar cierre de sesión de '+nombre+'?\nLa próxima vez que recargue, tendrá que loguearse de nuevo.'))return;
  fetch(SB+'/rest/v1/aos_security_log',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({usuario:nombre,accion:'force_logout',detalles:'Forzado por admin',created_at:new Date().toISOString()})}).catch(function(){});
  showToast(nombre+' será deslogueado al recargar');
}
function cambiarPass(uid,nombre){
  var np=prompt('Nueva contraseña para '+nombre+' (mínimo 6 caracteres):');
  if(!np||np.length<6){if(np)alert('Mínimo 6 caracteres');return;}
  fetch(SB+'/rest/v1/rpc/aos_cambiar_password',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify({p_usuario_id:uid,p_nueva_password:np})}).then(function(r){return r.json();}).then(function(res){
    if(res&&res.ok){showToast('Contraseña cambiada — '+nombre);}else{showToast('Error: '+(res&&res.error||'No se pudo cambiar'));}
  }).catch(function(){showToast('Error de conexión');});
}
loadTeam();
</script>
