  cats.forEach(function(c){var m=CM[c]||{i:'📋',c:'#6B7BA8'};r+='<tr><td colspan="5" class="lt-ch" style="border-left:3px solid '+m.c+'">'+m.i+' '+h(c)+' ('+g[c].length+')</td></tr>';
    g[c].forEach(function(it){var cls=pCls(it.precio_base,it.precio_oferta);var inCart=D.cart.some(function(x){return x.nombre===it.nombre});
      r+='<tr class="'+(inCart?'sel':'')+'"><td><button class="lt-add" onclick="cartAdd(\''+h(it.nombre).replace(/'/g,"\\'")+'\','+it.precio_oferta+',\''+h(it.tipo)+'\')">+</button></td><td class="lt-n">'+h(it.nombre)+'</td><td><span class="lt-p '+cls+'">'+fmt(it.precio_oferta)+'</span></td><td class="lt-old">'+(it.precio_base?fmt(it.precio_base):'')+'</td><td>'+(it.indicaciones?'<span class="lt-gift">🎁 '+h(it.indicaciones)+'</span>':'')+'</td></tr>'})});
  r+='</tbody></table>';document.getElementById('lp-wrap').innerHTML=r}

/* CARRITO */
function cartAdd(nombre,precio,tipo){
  if(D.cart.some(function(x){return x.nombre===nombre})){toast('Ya está en la cotización');return}
  D.cart.push({nombre:nombre,precio:precio||0,tipo:tipo,cantidad:1,subtotal:precio||0});
  cartRender();lpF();toast('➕ '+nombre)
}
function cartRm(idx){D.cart.splice(idx,1);cartRender();lpF()}
function cartRender(){
  document.getElementById('cot-count').textContent=D.cart.length;
  if(!D.cart.length){document.getElementById('cot-items').innerHTML='<div class="cot-empty">Haz click en ➕ en la tabla para agregar items</div>';document.getElementById('cot-total').textContent='S/0';return}
  var total=0;document.getElementById('cot-items').innerHTML=D.cart.map(function(it,i){total+=it.subtotal;return'<div class="cot-item"><button class="cot-item-rm" onclick="cartRm('+i+')">×</button><span class="cot-item-name">'+h(it.nombre)+'</span><span class="cot-item-price">'+fmt(it.precio)+'</span></div>'}).join('');
  document.getElementById('cot-total').textContent=fmt(total)
}

/* PACIENTE */
var pacTimer=null;
function pacSearch(){clearTimeout(pacTimer);pacTimer=setTimeout(function(){var q=document.getElementById('pac-q').value;if(q.length<2){document.getElementById('pac-res').classList.remove('show');return}
  rpc('aos_buscar_paciente',{p_query:q},function(d){var box=document.getElementById('pac-res');if(!d||!d.length){box.innerHTML='<div style="padding:8px;font-size:9px;color:var(--zg)">Sin resultados</div>';box.classList.add('show');return}
    box.innerHTML=d.map(function(p){return'<div class="cot-pac-item" onclick="pacSel(\''+h(p.numero)+'\',\''+h(p.nombres)+' '+h(p.apellidos)+'\',\''+h(p.dni||'')+'\',\''+h(p.vip||'')+'\')"><span>'+h(p.nombres)+' '+h(p.apellidos)+'</span><span style="color:var(--zg)">'+h(p.numero)+'</span></div>'}).join('');box.classList.add('show')})},300)}
function pacSel(num,nombre,dni,vip){
  D.paciente={numero:num,nombre:nombre,dni:dni,vip:vip};document.getElementById('pac-res').classList.remove('show');document.getElementById('pac-q').style.display='none';
  var vipBadge='';if(vip==='VIP')vipBadge='<span class="vip" style="background:#FEF3C7;color:#92600A">VIP</span>';else if(vip==='DIAMANTE')vipBadge='<span class="vip" style="background:#EDE9FE;color:#7C3AED">DIAMANTE</span>';else if(vip==='PREMIUM')vipBadge='<span class="vip" style="background:#DBEAFE;color:var(--zbl)">PREMIUM</span>';
  document.getElementById('pac-sel').innerHTML='<div class="cot-pac-sel"><span>👤 '+h(nombre)+'</span><div>'+vipBadge+' <button style="border:none;background:transparent;color:#DC2626;cursor:pointer;font-size:10px" onclick="pacClear()">✕</button></div></div>'
}
function pacClear(){D.paciente=null;document.getElementById('pac-sel').innerHTML='';document.getElementById('pac-q').style.display='';document.getElementById('pac-q').value=''}

function cotClear(){D.cart=[];D.paciente=null;document.getElementById('pac-sel').innerHTML='';document.getElementById('pac-q').style.display='';document.getElementById('pac-q').value='';document.getElementById('cot-nota').value='';cartRender();lpF()}

function cotSave(){
  if(!D.cart.length){toast('Agrega items primero');return}
  if(!D.paciente){toast('Selecciona un paciente');return}
  var total=0;D.cart.forEach(function(x){total+=x.subtotal});
  var data={numero:D.paciente.numero,nombre:D.paciente.nombre,dni:D.paciente.dni||'',total:total,sede:window._SEDE||'SAN ISIDRO',asesor:window._USER_NAME||'ASESOR',id_asesor:window._USER_ID||'',nota:document.getElementById('cot-nota').value,items:D.cart};
  rpc('aos_crear_cotizacion',{p_data:data},function(r){
    if(r&&r.id){toast('✅ Cotización '+r.id+' guardada');cotClear()}else{toast('Error al guardar')}
  })
}

/* ═══ REPOSITORIO ═══ */
var repoTipoAct='SERVICIO';
function repoTipo(t,el){repoTipoAct=t;document.getElementById('repo-tab-s').classList.toggle('act',t==='SERVICIO');document.getElementById('repo-tab-p').classList.toggle('act',t==='PRODUCTO');D.repoData=[];prodItems=[];loadRepo()}
function loadRepo(){if(repoTipoAct==='PRODUCTO'){rpc('aos_catalogo_productos',{},function(d){prodItems=d.items||[];repoR();document.getElementById('repo-main').innerHTML='<div class="repo-empty"><span>🛍</span>Selecciona un producto</div>'})}else{rpc('aos_catalogo_repo_v2',{p_tipo:'SERVICIO'},function(d){D.repoData=d.categorias||[];repoR();document.getElementById('repo-main').innerHTML='<div class="repo-empty"><span>📖</span>Selecciona un tratamiento</div>'})}}
function repoF(){repoR()}
function repoR(){
  var q=(document.getElementById('repo-q').value||'').toLowerCase();
  if(repoTipoAct==='PRODUCTO'){var items=prodItems.filter(function(p){return!q||p.nombre.toLowerCase().indexOf(q)>=0||p.categoria.toLowerCase().indexOf(q)>=0});var lc='';
    document.getElementById('repo-list').innerHTML=items.map(function(p,i){var m=CM[p.categoria]||{i:'🧴',c:'#6B7BA8'};var sep='';if(p.categoria!==lc){lc=p.categoria;sep='<div style="padding:3px 6px;font-size:7px;font-weight:800;color:var(--zbl);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--zl);margin:3px 0 1px">'+m.i+' '+h(p.categoria)+'</div>'}var hi=p.descripcion_clinica&&p.descripcion_clinica.length>20;return sep+'<div class="repo-si" onclick="repoProd('+i+')" data-c="'+i+'"><div class="repo-si-i" style="background:'+m.c+'12;color:'+m.c+'">'+m.i+'</div><div><div class="repo-si-n">'+h(p.nombre)+'</div><div class="repo-si-m">'+fmt(p.precio_oferta)+(hi?' · ℹ️':'')+'</div></div></div>'}).join('')}
  else{var l=D.repoData.filter(function(c){return!q||c.nombre.toLowerCase().indexOf(q)>=0});document.getElementById('repo-list').innerHTML=l.map(function(c){var m=CM[c.nombre]||{i:'📋',c:'#6B7BA8'};return'<div class="repo-si" onclick="repoSel(\''+h(c.nombre)+'\')" data-c="'+h(c.nombre)+'"><div class="repo-si-i" style="background:'+m.c+'12;color:'+m.c+'">'+m.i+'</div><div><div class="repo-si-n">'+h(c.nombre)+'</div><div class="repo-si-m">'+c.total_items+' · '+fmt(c.precio_desde)+'</div></div></div>'}).join('')}
}
function repoProd(idx){var filtered=prodItems.filter(function(p){var q=(document.getElementById('repo-q').value||'').toLowerCase();return!q||p.nombre.toLowerCase().indexOf(q)>=0||p.categoria.toLowerCase().indexOf(q)>=0});var p=filtered[idx];if(!p)return;document.querySelectorAll('.repo-si').forEach(function(x){x.classList.toggle('act',x.getAttribute('data-c')===''+idx)});var m=CM[p.categoria]||{i:'🧴',c:'#6B7BA8'};var htm='<div class="rd-hdr" style="background:linear-gradient(135deg,var(--zb),'+m.c+')"><div class="rd-i">'+m.i+'</div><div class="rd-cat">PRODUCTO · '+h(p.categoria)+'</div><div class="rd-t">'+h(p.nombre)+'</div><div class="rd-s">'+fmt(p.precio_oferta)+(p.precio_base?' <span style="text-decoration:line-through;opacity:.5">'+fmt(p.precio_base)+'</span>':'')+'</div></div><div class="rd-body">';if(p.descripcion_clinica)htm+='<div class="rd-desc">'+h(p.descripcion_clinica)+'</div>';var cards='';function ac(l,ic,v){if(v&&v.length>5)cards+='<div class="rd-c"><div class="rd-c-l">'+ic+' '+l+'</div><div class="rd-c-t">'+h(v)+'</div></div>'}ac('Ingredientes','⚗️',p.composicion);ac('Beneficios','✅',p.beneficios);ac('Recomendado para','👤',p.perfil_paciente);ac('Modo de uso','📋',p.indicaciones);if(cards)htm+='<div class="rd-grid">'+cards+'</div>';if(!p.descripcion_clinica&&!cards)htm+='<div class="rd-no">Información próximamente</div>';htm+='<div class="rd-split"><div class="rd-split-col"><div class="rd-sec-t">💰 Precio</div><div style="background:var(--zbg);border-radius:6px;padding:10px;text-align:center"><div style="font-family:Source Serif 4,serif;font-weight:700;font-size:24px;color:var(--zbl)">'+fmt(p.precio_oferta)+'</div>'+(p.precio_base?'<div class="lt-old">'+fmt(p.precio_base)+'</div>':'')+'<div style="margin-top:6px;font-size:9px;color:var(--zg)">Disponible en sedes y zivital.pe/tienda</div></div></div>';var faqs=p.faqs||[];htm+='<div class="rd-split-col"><div class="rd-sec-t">❓ Preguntas frecuentes'+(faqs.length?' ('+faqs.length+')':'')+'</div>';if(faqs.length){htm+='<div class="faq-list">'+faqs.map(function(f){return'<div class="faq-item" onclick="this.classList.toggle(\'open\')"><div class="faq-q">'+h(f.q)+'</div><div class="faq-a">'+h(f.a)+'</div></div>'}).join('')+'</div>'}else{htm+='<div class="faq-none">Próximamente</div>'}htm+='</div></div></div>';document.getElementById('repo-main').innerHTML=htm;document.getElementById('repo-main').scrollTop=0}

function repoSel(cn){document.querySelectorAll('.repo-si').forEach(function(x){x.classList.toggle('act',x.getAttribute('data-c')===cn)});var cat=null;D.repoData.forEach(function(c){if(c.nombre===cn)cat=c});if(!cat)return;var m=CM[cn]||{i:'📋',c:'#6B7BA8'};var src={};var allFaqs=[];(cat.items||[]).forEach(function(x){if(x.descripcion_clinica&&!src.descripcion_clinica)src=x;if(x.faqs&&x.faqs.length)allFaqs=x.faqs});var htm='<div class="rd-hdr" style="background:linear-gradient(135deg,var(--zb),'+m.c+')"><div class="rd-i">'+m.i+'</div><div class="rd-cat">TRATAMIENTO</div><div class="rd-t">'+h(cn)+'</div><div class="rd-s">'+cat.total_items+' opciones · Desde '+fmt(cat.precio_desde)+'</div></div><div class="rd-body">';if(src.descripcion_clinica)htm+='<div class="rd-desc">'+h(src.descripcion_clinica)+'</div>';var cards='';function ac(l,ic,v){if(v&&v.length>5)cards+='<div class="rd-c"><div class="rd-c-l">'+ic+' '+l+'</div><div class="rd-c-t">'+h(v)+'</div></div>'}ac('Composición','⚗️',src.composicion);ac('Beneficios','✅',src.beneficios);ac('Contraindicaciones','⚠️',src.contraindicaciones);ac('Perfil de paciente','👤',src.perfil_paciente);ac('Mecanismo de acción','🔬',src.mecanismo_accion);ac('Rol en el proceso','🎯',src.rol_proceso);if(cards)htm+='<div class="rd-grid">'+cards+'</div>';if(!src.descripcion_clinica&&!cards)htm+='<div class="rd-no">ℹ️ Información próximamente</div>';htm+='<div class="rd-split"><div class="rd-split-col"><div class="rd-sec-t">💰 Opciones y precios</div><table class="rd-tbl"><thead><tr><th>Opción</th><th>Promo</th><th>Regular</th><th>Incluye</th></tr></thead><tbody>';(cat.items||[]).forEach(function(it){var cls=pCls(it.precio_base,it.precio_oferta);htm+='<tr><td style="font-weight:600;color:#1E293B">'+h(it.nombre)+'</td><td><span class="lt-p '+cls+'">'+fmt(it.precio_oferta)+'</span></td><td class="lt-old">'+(it.precio_base?fmt(it.precio_base):'')+'</td><td>'+(it.indicaciones?'<span class="lt-gift">🎁 '+h(it.indicaciones)+'</span>':'')+'</td></tr>'});htm+='</tbody></table></div>';htm+='<div class="rd-split-col"><div class="rd-sec-t">❓ FAQs'+(allFaqs.length?' ('+allFaqs.length+')':'')+'</div>';if(allFaqs.length){htm+='<input style="width:100%;padding:4px 6px;border-radius:5px;border:1px solid var(--zl);font-size:9px;font-family:Outfit;margin-bottom:4px;outline:none" placeholder="🔍 Buscar..." oninput="faqF(this)" data-cat="'+h(cn)+'"><div class="faq-list" id="faq-list-'+cn.replace(/\s/g,'')+'">'+allFaqs.map(function(f){return'<div class="faq-item" onclick="this.classList.toggle(\'open\')"><div class="faq-q">'+h(f.q)+'</div><div class="faq-a">'+h(f.a)+'</div></div>'}).join('')+'</div>'}else{htm+='<div class="faq-none">Próximamente</div>'}htm+='</div></div></div>';document.getElementById('repo-main').innerHTML=htm;document.getElementById('repo-main').scrollTop=0}
function faqF(inp){var q=inp.value.toLowerCase();var cn=inp.getAttribute('data-cat').replace(/\s/g,'');var list=document.getElementById('faq-list-'+cn);if(!list)return;list.querySelectorAll('.faq-item').forEach(function(it){it.style.display=(it.textContent||'').toLowerCase().indexOf(q)>=0?'':'none'})}

/* ═══ PROMOS ═══ */
function loadPromos(){var all=D.serv.concat(D.prod);var p=all.filter(function(i){return i.precio_base&&i.precio_oferta&&i.precio_base>i.precio_oferta&&(i.precio_base-i.precio_oferta)/i.precio_base>.25}).sort(function(a,b){return((b.precio_base-b.precio_oferta)/b.precio_base)-((a.precio_base-a.precio_oferta)/a.precio_base)});if(!p.length){document.getElementById('promo-wrap').innerHTML='<div class="ld">Sin promos</div>';return}var r='<table class="promo-tbl"><thead><tr><th>#</th><th>Nombre</th><th>Categoría</th><th>Promo</th><th>Regular</th><th>Ahorro</th><th>Incluye</th></tr></thead><tbody>';p.slice(0,40).forEach(function(it,i){var pct=Math.round((1-it.precio_oferta/it.precio_base)*100);var m=CM[it.categoria]||{i:'📋',c:'#6B7BA8'};r+='<tr><td>'+(i+1)+'</td><td style="font-weight:600;color:#1E293B">'+h(it.nombre)+'</td><td><span class="lt-cat" style="background:'+m.c+'15;color:'+m.c+'">'+m.i+' '+h(it.categoria)+'</span></td><td style="font-family:Source Serif 4,serif;font-weight:700;color:var(--zbl)">'+fmt(it.precio_oferta)+'</td><td class="lt-old">'+fmt(it.precio_base)+'</td><td><span class="promo-pct">-'+pct+'%</span></td><td>'+(it.indicaciones?'<span class="lt-gift">🎁 '+h(it.indicaciones)+'</span>':'')+'</td></tr>'});r+='</tbody></table>';document.getElementById('promo-wrap').innerHTML=r}
</script>
