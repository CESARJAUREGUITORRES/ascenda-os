    g[c].forEach(function(it){var cl=pc(it.precio_base,it.precio_oferta);var inC=D.cart.some(function(x){return x.n===it.nombre});

  }).join('');cCalc()}

function rProd(idx){var flt=pi.filter(function(p){var q=($('rq').value||'').toLowerCase();return!q||p.nombre.toLowerCase().indexOf(q)>=0||p.categoria.toLowerCase().indexOf(q)>=0});var p=flt[idx];if(!p)return;document.querySelectorAll('.rsi').forEach(function(x){x.classList.toggle('act',x.getAttribute('data-c')===''+idx)});var m=CM[p.categoria]||{i:'🧴',c:'#6B7BA8'};var h='<div class="rd-h" style="background:linear-gradient(135deg,var(--zb),'+m.c+')"><div class="rd-i">'+m.i+'</div><div class="rd-ct">PRODUCTO · '+H(p.categoria)+'</div><div class="rd-t">'+H(p.nombre)+'</div><div class="rd-su">'+fmt(p.precio_oferta)+(p.precio_base?' <span style="text-decoration:line-through;opacity:.4">'+fmt(p.precio_base)+'</span>':'')+'</div></div><div class="rd-b">';if(p.descripcion_clinica)h+='<div class="rd-desc">'+H(p.descripcion_clinica)+'</div>';var ca='';function ac(l,ic,v){if(v&&v.length>5)ca+='<div class="rd-c"><div class="rd-cl">'+ic+' '+l+'</div><div class="rd-cv">'+H(v)+'</div></div>'}ac('Ingredientes','⚗️',p.composicion);ac('Beneficios','✅',p.beneficios);ac('Recomendado','👤',p.perfil_paciente);ac('Modo de uso','📋',p.indicaciones);if(ca)h+='<div class="rd-g">'+ca+'</div>';if(!p.descripcion_clinica&&!ca)h+='<div class="rd-no">Info próximamente</div>';h+='<div class="rd-sp"><div class="rd-sc"><div class="rd-st">💰 Precio</div><div style="background:var(--zbg);border-radius:5px;padding:8px;text-align:center"><div style="font-family:Source Serif 4,serif;font-weight:700;font-size:22px;color:var(--zbl)">'+fmt(p.precio_oferta)+'</div>'+(p.precio_base?'<div class="T-old">'+fmt(p.precio_base)+'</div>':'')+'</div></div>';var fq=p.faqs||[];h+='<div class="rd-sc"><div class="rd-st">❓ FAQs'+(fq.length?' ('+fq.length+')':'')+'</div>';if(fq.length){h+='<div class="faq-l">'+fq.map(function(f){return'<div class="fq" onclick="this.classList.toggle(\'open\')"><div class="fq-q">'+H(f.q)+'</div><div class="fq-a">'+H(f.a)+'</div></div>'}).join('')+'</div>'}else{h+='<div class="fq-no">Próximamente</div>'}h+='</div></div></div>';$('rm').innerHTML=h;$('rm').scrollTop=0}

.length){h+='<input style="width:100%;padding:3px 5px;border-radius:4px;border:1px solid var(--zl);font-size:8px;font-family:Outfit;margin-bottom:3px;outline:none" placeholder="🔍 Buscar..." oninput="fqF(this)" data-c="'+H(cn)+'"><div class="faq-l" id="fl-'+cn.replace(/\s/g,'')+'">'+af.map(function(f){return'<div class="fq" onclick="this.classList.toggle(\'open\')"><div class="fq-q">'+H(f.q)+'</div><div class="fq-a">'+H(f.a)+'</div></div>'}).join('')+'</div>'}else{h+='<div class="fq-no">Próximamente</div>'}h+='</div></div></div>';$('rm').innerHTML=h;$('rm').scrollTop=0}
