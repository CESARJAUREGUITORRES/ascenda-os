<!-- CATГҒLOGO ZI VITAL v3 вҖ” Lista de precios + Repositorio + Promos | AscendaOS -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Source+Serif+4:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--zb:#071D4A;--zbl:#0A4FBF;--zcy:#00C9A7;--zmint:#00E5A0;--zbg:#F4F6FB;--zg:#7A869A;--zl:#E2E8F0;--zw:#fff;--rad:10px}
body,html{font-family:'Outfit',sans-serif;color:#1E293B;background:var(--zbg)}
.cat{padding:12px;min-height:100vh}

/* в”Җв”Җ HEADER в”Җв”Җ */
.cat-hdr{background:var(--zb);border-radius:14px;padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.cat-hdr::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(0,201,167,.08)}
.cat-hdr-left{position:relative;z-index:1}
.cat-h1{font-family:'Source Serif 4',serif;font-weight:700;font-size:20px;color:#fff}
.cat-h2{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;font-weight:400}
.cat-pills{display:flex;gap:4px;position:relative;z-index:1}
.cat-pill{padding:7px 18px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);transition:all .2s;font-family:'Outfit'}
.cat-pill:hover{background:rgba(255,255,255,.15);color:#fff}
.cat-pill.act{background:#fff;color:var(--zbl)}

/* в”Җв”Җ PANEL CONTENEDOR в”Җв”Җ */
.cat-panel{display:none}.cat-panel.act{display:block}

/* в•җв•җв•җв•җв•җв•җ PESTAГ‘A 1: LISTA DE PRECIOS в•җв•җв•җв•җв•җв•җ */
.lp{background:var(--zw);border-radius:var(--rad);border:1px solid var(--zl);overflow:hidden}
.lp-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--zl);background:#FAFBFE}
.lp-search{flex:1;display:flex;align-items:center;gap:6px;background:var(--zbg);border:1px solid var(--zl);border-radius:7px;padding:6px 10px}
.lp-search input{border:none;outline:none;background:transparent;font-size:12px;font-family:'Outfit';width:100%;color:#1E293B}.lp-search input::placeholder{color:#94A3B8}
.lp-filter{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--zl);background:var(--zw);color:var(--zg);cursor:pointer;font-family:'Outfit';transition:all .15s}
.lp-filter:hover,.lp-filter.act{background:var(--zbl);color:#fff;border-color:var(--zbl)}
.lp-count{font-size:10px;color:var(--zg);white-space:nowrap}
.lp-tbl{width:100%;border-collapse:collapse;font-size:11px}
.lp-tbl thead{background:#F8FAFC;position:sticky;top:0;z-index:2}
.lp-tbl th{padding:8px 10px;text-align:left;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--zbl);border-bottom:2px solid var(--zl);cursor:pointer;white-space:nowrap;user-select:none}
.lp-tbl th:hover{color:var(--zb)}
.lp-tbl td{padding:7px 10px;border-bottom:1px solid #F1F5F9;color:#475569;vertical-align:middle}
.lp-tbl tr:hover td{background:#F8FAFF}
.lp-tbl .lp-cat{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block}
.lp-tbl .lp-name{font-weight:600;color:#1E293B}
.lp-tbl .lp-promo{font-family:'Source Serif 4',serif;font-weight:700;font-size:13px;color:var(--zbl)}
.lp-tbl .lp-reg{font-size:10px;color:#94A3B8;text-decoration:line-through}
.lp-tbl .lp-gift{font-size:9px;color:var(--zcy);font-weight:600}
.lp-tbl .lp-ses{font-size:10px;color:var(--zg);font-weight:500}
.lp-tbl .lp-info-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--zl);background:var(--zw);color:var(--zbl);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lp-tbl .lp-info-btn:hover{background:var(--zbl);color:#fff;border-color:var(--zbl)}
.lp-wrap{max-height:calc(100vh - 200px);overflow-y:auto}
.lp-wrap::-webkit-scrollbar{width:4px}.lp-wrap::-webkit-scrollbar-thumb{background:var(--zl);border-radius:3px}
.lp-cat-header{background:#EEF2FF;padding:6px 10px;font-weight:800;font-size:10px;color:var(--zbl);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #D4DDFF;position:sticky;top:0;z-index:1}

/* в•җв•җв•җв•җв•җв•җ PESTAГ‘A 2: REPOSITORIO в•җв•җв•җв•җв•җв•җ */
.repo{display:grid;grid-template-columns:280px 1fr;gap:12px;height:calc(100vh - 170px)}
.repo-sidebar{background:var(--zw);border-radius:var(--rad);border:1px solid var(--zl);overflow:hidden;display:flex;flex-direction:column}
.repo-sb-search{padding:10px;border-bottom:1px solid var(--zl)}
.repo-sb-search input{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--zl);background:var(--zbg);font-size:11px;font-family:'Outfit';outline:none}.repo-sb-search input:focus{border-color:var(--zbl)}
.repo-sb-list{flex:1;overflow-y:auto;padding:4px}
.repo-sb-list::-webkit-scrollbar{width:3px}.repo-sb-list::-webkit-scrollbar-thumb{background:var(--zl);border-radius:3px}
.repo-sb-item{padding:8px 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;margin-bottom:2px}
.repo-sb-item:hover{background:var(--zbg)}
.repo-sb-item.act{background:#EEF2FF;border:1px solid #C7D2FE}
.repo-sb-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.repo-sb-name{font-size:11px;font-weight:600;color:#1E293B;line-height:1.2}
.repo-sb-meta{font-size:9px;color:var(--zg);margin-top:1px}

.repo-main{background:var(--zw);border-radius:var(--rad);border:1px solid var(--zl);overflow-y:auto;padding:0}
.repo-main::-webkit-scrollbar{width:4px}.repo-main::-webkit-scrollbar-thumb{background:var(--zl);border-radius:3px}
.repo-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--zg);font-size:13px;flex-direction:column;gap:8px}
.repo-empty span{font-size:32px}

/* Repo detail */
.rd-hdr{padding:20px 24px;position:relative;overflow:hidden}
.rd-hdr::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:.08}
.rd-icon{font-size:28px;margin-bottom:6px}
.rd-cat{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff;opacity:.7;margin-bottom:2px}
.rd-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:22px;color:#fff}
.rd-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}
.rd-body{padding:20px 24px}
.rd-desc{font-size:12px;color:#475569;line-height:1.7;margin-bottom:16px;padding:12px;background:var(--zbg);border-radius:8px;border-left:3px solid var(--zbl)}
.rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.rd-card{background:var(--zbg);border-radius:8px;padding:12px}
.rd-card-lbl{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--zbl);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.rd-card-txt{font-size:11px;color:#475569;line-height:1.6}
.rd-sec-title{font-weight:700;font-size:13px;color:#1E293B;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--zl);display:flex;align-items:center;gap:6px}
.rd-tbl{width:100%;border-collapse:collapse;font-size:11px;border:1px solid var(--zl);border-radius:8px;overflow:hidden}
.rd-tbl thead{background:var(--zbg)}
.rd-tbl th{padding:7px 10px;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--zbl);text-align:left}
.rd-tbl td{padding:7px 10px;border-top:1px solid #F1F5F9;color:#475569}
.rd-tbl tr:hover td{background:#FAFBFF}
.rd-no-info{text-align:center;padding:30px;color:var(--zg);font-size:12px;font-style:italic}

/* в•җв•җв•җв•җв•җв•җ PESTAГ‘A 3: PROMOS в•җв•җв•җв•җв•җв•җ */
.promos{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.promo-card{background:var(--zw);border-radius:var(--rad);border:1px solid var(--zl);overflow:hidden;transition:all .2s}
.promo-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.promo-top{padding:14px 16px;border-bottom:1px solid var(--zl)}
.promo-badge{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
.promo-name{font-family:'Source Serif 4',serif;font-weight:700;font-size:15px;color:#1E293B}
.promo-desc{font-size:10px;color:var(--zg);margin-top:3px;line-height:1.4}
.promo-bottom{padding:10px 16px;background:#FAFBFE;display:flex;align-items:center;justify-content:space-between}
.promo-prices{display:flex;align-items:baseline;gap:6px}
.promo-now{font-family:'Source Serif 4',serif;font-weight:700;font-size:18px;color:var(--zbl)}
.promo-was{font-size:11px;color:#94A3B8;text-decoration:line-through}
.promo-save{font-size:9px;font-weight:700;color:#16A34A;background:#DCFCE7;padding:2px 6px;border-radius:4px}

.ld{text-align:center;padding:40px;color:var(--zg);font-size:12px}
.sp{width:16px;height:16px;border:2px solid var(--zl);border-top-color:var(--zbl);border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.repo{grid-template-columns:1fr;height:auto}.repo-sidebar{max-height:250px}.rd-grid{grid-template-columns:1fr}}
</style>

<div class="cat">
  <!-- HEADER -->
  <div class="cat-hdr">
    <div class="cat-hdr-left">
      <div class="cat-h1">CatГЎlogo Zi Vital</div>
      <div class="cat-h2">Precios, tratamientos, informaciГіn clГӯnica y promociones</div>
    </div>
    <div class="cat-pills">
      <button class="cat-pill act" onclick="catTab(0,this)">рҹ“Ӣ Lista de precios</button>
      <button class="cat-pill" onclick="catTab(1,this)">рҹ“– Repositorio</button>
      <button class="cat-pill" onclick="catTab(2,this)">рҹ”Ҙ Promos</button>
    </div>
  </div>

  <!-- TAB 0: LISTA DE PRECIOS -->
  <div class="cat-panel act" id="tab0">
    <div class="lp">
      <div class="lp-bar">
        <div class="lp-search"><span style="color:#94A3B8">рҹ”Қ</span><input id="lp-q" placeholder="Buscar servicio, tratamiento, producto..." oninput="lpFilter()"></div>
        <div id="lp-filters"></div>
        <div class="lp-count" id="lp-count"></div>
      </div>
      <div class="lp-wrap" id="lp-wrap"><div class="ld"><span class="sp"></span>Cargando lista...</div></div>
    </div>
  </div>

  <!-- TAB 1: REPOSITORIO -->
  <div class="cat-panel" id="tab1">
    <div class="repo">
      <div class="repo-sidebar">
        <div class="repo-sb-search"><input id="repo-q" placeholder="Buscar categorГӯa..." oninput="repoFilter()"></div>
        <div class="repo-sb-list" id="repo-list"></div>
      </div>
      <div class="repo-main" id="repo-main"><div class="repo-empty"><span>рҹ“–</span>Selecciona un tratamiento para ver toda su informaciГіn</div></div>
    </div>
  </div>

  <!-- TAB 2: PROMOS -->
  <div class="cat-panel" id="tab2">
    <div class="promos" id="promos-grid"></div>
  </div>
</div>

<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function rpc(fn,p,ok){fetch(SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json()}).then(ok).catch(function(e){console.error(fn,e)})}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return n?'S/'+Number(n).toLocaleString('es-PE'):'вҖ”'}

var D={serv:[],prod:[],cats:[],tipo:'SERVICIO',activeCat:'',repoData:[]};
var CM={'DETOX':{i:'рҹ§Ә',c:'#16A34A'},'VITAMINAS':{i:'рҹ’ү',c:'#D97706'},'FACIALES':{i:'вңЁ',c:'#0A4FBF'},'PEELINGS':{i:'рҹ«§',c:'#7C3AED'},'MESOTERAPIA':{i:'рҹ’Һ',c:'#DC2626'},'BIOREVITALIZACIГ“N':{i:'рҹҢё',c:'#0D9488'},'EXOSOMAS':{i:'рҹ§¬',c:'#7C3AED'},'BIOESTIMULADOR':{i:'вҡЎ',c:'#B91C1C'},'ACIDO HIALURONICO':{i:'рҹ’§',c:'#0A4FBF'},'TOXINA':{i:'рҹҺҜ',c:'#DC2626'},'ENZIMAS':{i:'рҹ”Ҙ',c:'#D97706'},'HIFU':{i:'рҹ“Ў',c:'#0891B2'},'RF FRACCIONADA':{i:'вҡЎ',c:'#9333EA'},'CAPILAR':{i:'рҹ’Ү',c:'#0D9488'},'CORPORAL':{i:'рҹҸӢпёҸ',c:'#16A34A'},'APARATOLOGГҚA':{i:'рҹ”§',c:'#6B7BA8'},'CRIOLIPГ“LISIS':{i:'вқ„пёҸ',c:'#0891B2'},'PEPTONAS':{i:'рҹ’Ә',c:'#D97706'},'GLГҡTEOS':{i:'рҹҚ‘',c:'#EC4899'},'CONSULTA':{i:'рҹ©ә',c:'#6B7BA8'},'FACIAL ZV':{i:'рҹ§ҙ',c:'#0A4FBF'},'CAPILAR ZV':{i:'рҹ§ҙ',c:'#0D9488'},'CORPORAL ZV':{i:'рҹ§ҙ',c:'#16A34A'},'NUTRICIONAL':{i:'рҹ’Ҡ',c:'#D97706'},'ISDIN':{i:'вҳҖпёҸ',c:'#6366F1'},'FAJAS':{i:'рҹ‘—',c:'#9AAAC8'}};

function catTab(n,el){
  document.querySelectorAll('.cat-pill').forEach(function(p){p.classList.remove('act')});el.classList.add('act');
  document.querySelectorAll('.cat-panel').forEach(function(p,i){p.classList.toggle('act',i===n)});
  if(n===0&&!D.serv.length)loadLP();
  if(n===1&&!D.repoData.length)loadRepo();
  if(n===2)loadPromos();
}

/* в•җв•җв•җ TAB 0: LISTA DE PRECIOS в•җв•җв•җ */
(function(){loadLP()})();
function loadLP(){
  rpc('aos_catalogo_repo',{p_tipo:'SERVICIO'},function(d){
    D.serv=d.items||[];D.cats=d.categorias||[];
    rpc('aos_catalogo_repo',{p_tipo:'PRODUCTO'},function(d2){
      D.prod=d2.items||[];
      renderLPFilters();lpFilter();
    });
  });
}

function renderLPFilters(){
  var box=document.getElementById('lp-filters');
  var chips='<button class="lp-filter act" onclick="lpCatClick(this,\'\')">Todos</button>';
  chips+='<button class="lp-filter" onclick="lpCatClick(this,\'__SERV__\')">Servicios</button>';
  chips+='<button class="lp-filter" onclick="lpCatClick(this,\'__PROD__\')">Productos</button>';
  box.innerHTML=chips;
}

function lpCatClick(el,cat){
  document.querySelectorAll('.lp-filter').forEach(function(f){f.classList.remove('act')});el.classList.add('act');
  D.activeCat=cat;lpFilter();
}

function lpFilter(){
  var q=(document.getElementById('lp-q').value||'').toLowerCase();
  var all=D.serv.concat(D.prod);
  if(D.activeCat==='__SERV__')all=D.serv;
  else if(D.activeCat==='__PROD__')all=D.prod;
  else if(D.activeCat)all=all.filter(function(i){return i.categoria===D.activeCat});
  if(q)all=all.filter(function(i){return(i.nombre||'').toLowerCase().indexOf(q)>=0||(i.categoria||'').toLowerCase().indexOf(q)>=0||(i.indicaciones||'').toLowerCase().indexOf(q)>=0});

  // Group by categoria
  var groups={};all.forEach(function(i){var c=i.categoria||'OTROS';if(!groups[c])groups[c]=[];groups[c].push(i)});
  var cats=Object.keys(groups).sort();

  document.getElementById('lp-count').textContent=all.length+' resultados';
  var html='<table class="lp-tbl"><thead><tr><th>Servicio / Producto</th><th>CategorГӯa</th><th>Sesiones</th><th>Precio Promo</th><th>Precio Regular</th><th>Incluye / Nota</th><th></th></tr></thead><tbody>';
  cats.forEach(function(cat){
    var m=CM[cat]||{i:'рҹ“Ӣ',c:'#6B7BA8'};
    html+='<tr><td colspan="7" class="lp-cat-header" style="border-left:3px solid '+m.c+'">'+m.i+' '+h(cat)+' ('+groups[cat].length+')</td></tr>';
    groups[cat].forEach(function(it){
      html+='<tr>'+
        '<td class="lp-name">'+h(it.nombre)+'</td>'+
        '<td><span class="lp-cat" style="background:'+m.c+'15;color:'+m.c+'">'+h(cat)+'</span></td>'+
        '<td class="lp-ses">'+(it.num_sesiones&&it.num_sesiones!=='1'&&it.num_sesiones!==''?it.num_sesiones+' ses':'1')+'</td>'+
        '<td class="lp-promo">'+fmt(it.precio_oferta)+'</td>'+
        '<td class="lp-reg">'+(it.precio_base?fmt(it.precio_base):'')+'</td>'+
        '<td>'+(it.indicaciones?'<span class="lp-gift">рҹҺҒ '+h(it.indicaciones)+'</span>':'')+'</td>'+
        '<td>'+(it.descripcion_clinica?'<button class="lp-info-btn" onclick="event.stopPropagation();showInfoFromLP(\''+it.categoria+'\')">в„№</button>':'')+'</td>'+
        '</tr>';
    });
  });
  html+='</tbody></table>';
  document.getElementById('lp-wrap').innerHTML=html;
}

function showInfoFromLP(cat){catTab(1,document.querySelectorAll('.cat-pill')[1]);setTimeout(function(){repoSelect(cat)},300)}

/* в•җв•җв•җ TAB 1: REPOSITORIO в•җв•җв•җ */
function loadRepo(){
  rpc('aos_catalogo_repo_v2',{p_tipo:'SERVICIO'},function(d){
    D.repoData=d.categorias||[];renderRepoList();
  });
}

function repoFilter(){
  renderRepoList();
}

function renderRepoList(){
  var q=(document.getElementById('repo-q').value||'').toLowerCase();
  var list=D.repoData.filter(function(c){return !q||c.nombre.toLowerCase().indexOf(q)>=0});
  var box=document.getElementById('repo-list');
  box.innerHTML=list.map(function(c){
    var m=CM[c.nombre]||{i:'рҹ“Ӣ',c:'#6B7BA8'};
    return '<div class="repo-sb-item" onclick="repoSelect(\''+h(c.nombre)+'\')" data-cat="'+h(c.nombre)+'">'+
      '<div class="repo-sb-icon" style="background:'+m.c+'12;color:'+m.c+'">'+m.i+'</div>'+
      '<div><div class="repo-sb-name">'+h(c.nombre)+'</div><div class="repo-sb-meta">'+c.total_items+' opciones В· '+fmt(c.precio_desde)+'</div></div></div>';
  }).join('');
}

function repoSelect(catName){
  document.querySelectorAll('.repo-sb-item').forEach(function(x){x.classList.toggle('act',x.getAttribute('data-cat')===catName)});
  var cat=null;D.repoData.forEach(function(c){if(c.nombre===catName)cat=c});
  if(!cat)return;
  var m=CM[catName]||{i:'рҹ“Ӣ',c:'#6B7BA8'};
  var src={};(cat.items||[]).forEach(function(x){if(x.descripcion_clinica)src=x});

  var html='<div class="rd-hdr" style="background:linear-gradient(135deg,var(--zb),'+m.c+')"><div class="rd-icon">'+m.i+'</div><div class="rd-cat">TRATAMIENTO</div><div class="rd-title">'+h(catName)+'</div><div class="rd-sub">'+cat.total_items+' opciones В· Desde '+fmt(cat.precio_desde)+(cat.precio_hasta&&cat.precio_hasta!=cat.precio_desde?' hasta '+fmt(cat.precio_hasta):'')+'</div></div>';
  html+='<div class="rd-body">';

  // Description
  var desc=src.descripcion_clinica;
  if(desc)html+='<div class="rd-desc">'+h(desc)+'</div>';

  // Info cards
  var cards='';
  function ac(lbl,ico,val){if(val)cards+='<div class="rd-card"><div class="rd-card-lbl">'+ico+' '+lbl+'</div><div class="rd-card-txt">'+h(val)+'</div></div>'}
  ac('ComposiciГіn','вҡ—пёҸ',src.composicion);
  ac('Beneficios','вң…',src.beneficios);
  ac('Contraindicaciones','вҡ пёҸ',src.contraindicaciones);
  ac('Perfil de paciente','рҹ‘Ө',src.perfil_paciente);
  ac('Mecanismo de acciГіn','рҹ”¬',src.mecanismo_accion);
  ac('Rol en el proceso','рҹҺҜ',src.rol_proceso);
  if(cards)html+='<div class="rd-grid">'+cards+'</div>';
  if(!desc&&!cards)html+='<div class="rd-no-info">InformaciГіn clГӯnica prГіximamente вҖ” este tratamiento serГЎ documentado siguiendo el ГҚndice Maestro Zi Vital</div>';

  // Price table
  html+='<div class="rd-sec-title">рҹ’° Opciones y precios</div>';
  html+='<table class="rd-tbl"><thead><tr><th>OpciГіn</th><th>Sesiones</th><th>Precio promo</th><th>Precio regular</th><th>Incluye</th></tr></thead><tbody>';
  (cat.items||[]).forEach(function(it){
    html+='<tr><td style="font-weight:600;color:#1E293B">'+h(it.nombre)+'</td>'+
      '<td>'+(it.num_sesiones&&it.num_sesiones!=='1'&&it.num_sesiones!==''?it.num_sesiones:'1')+'</td>'+
      '<td style="font-family:Source Serif 4,serif;font-weight:700;font-size:13px;color:var(--zbl)">'+fmt(it.precio_oferta)+'</td>'+
      '<td style="font-size:10px;color:#94A3B8;text-decoration:line-through">'+(it.precio_base?fmt(it.precio_base):'')+'</td>'+
      '<td>'+(it.indicaciones?'<span style="font-size:9px;color:var(--zcy);font-weight:600">рҹҺҒ '+h(it.indicaciones)+'</span>':'')+'</td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('repo-main').innerHTML=html;
}

/* в•җв•җв•җ TAB 2: PROMOS в•җв•җв•җ */
function loadPromos(){
  var all=D.serv.concat(D.prod);
  var promos=all.filter(function(i){return i.precio_base&&i.precio_oferta&&i.precio_base>i.precio_oferta&&(i.precio_base-i.precio_oferta)/i.precio_base>.3});
  promos.sort(function(a,b){return((b.precio_base-b.precio_oferta)/b.precio_base)-((a.precio_base-a.precio_oferta)/a.precio_base)});
  var grid=document.getElementById('promos-grid');
  if(!promos.length){grid.innerHTML='<div class="ld">No hay promociones activas con mГЎs del 30% de descuento</div>';return}
  grid.innerHTML=promos.slice(0,30).map(function(p){
    var m=CM[p.categoria]||{i:'рҹ“Ӣ',c:'#6B7BA8'};
    var pct=Math.round((1-p.precio_oferta/p.precio_base)*100);
    return '<div class="promo-card"><div class="promo-top"><span class="promo-badge" style="background:'+m.c+'15;color:'+m.c+'">'+m.i+' '+h(p.categoria)+'</span><div class="promo-name">'+h(p.nombre)+'</div>'+(p.indicaciones?'<div class="promo-desc">рҹҺҒ '+h(p.indicaciones)+'</div>':'')+(p.num_sesiones&&p.num_sesiones!=='1'?'<div class="promo-desc">рҹ“Ӣ '+p.num_sesiones+' sesiones</div>':'')+'</div><div class="promo-bottom"><div class="promo-prices"><span class="promo-now">'+fmt(p.precio_oferta)+'</span><span class="promo-was">'+fmt(p.precio_base)+'</span></div><span class="promo-save">-'+pct+'%</span></div></div>';
  }).join('');
}
</script>
