<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=10">
<title>AscendaOS · Brain · KKRONIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#0A4FBF;--blue2:#071D4A;--blue3:#378ADD;--cyan:#00C9A7;--mint:#00E5A0;--bg:#F8FAFE;--white:#FFFFFF;--muted:rgba(10,79,191,0.10);--text2:rgba(7,29,74,0.40);--card:rgba(255,255,255,0.90);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;display:block}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none}

/* Brand */
#brand{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--muted);border-radius:10px;padding:6px 10px;backdrop-filter:blur(12px);pointer-events:all}
.bc-dot{width:7px;height:7px;border-radius:50%;background:#E53935;box-shadow:0 0 5px #E53935;transition:all .5s;flex-shrink:0}
.bc-dot.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:cpulse 2.5s infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.35}}
.bc-name{font-size:10px;font-weight:700;color:var(--blue2);letter-spacing:.04em;white-space:nowrap}
.bc-sub{font-size:7.5px;color:var(--text2);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}

/* Métricas */
#metrics{position:absolute;top:10px;right:10px;display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.mcard{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 9px;backdrop-filter:blur(10px);display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.mval{font-size:14px;font-weight:800;color:var(--blue)}
.mlbl{font-size:7px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}

/* KKRONIA panel — waveform + estado */
#kkronia{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
  width:min(340px,88vw);background:var(--card);border:1px solid rgba(0,201,167,0.18);
  border-radius:14px;padding:10px 14px;backdrop-filter:blur(14px);
  display:flex;flex-direction:column;gap:7px;pointer-events:all;
  transition:all .3s;opacity:0;transform:translateX(-50%) translateY(6px)}
#kkronia.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.kk-header{display:flex;align-items:center;gap:8px}
.kk-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00C9A7,#0A4FBF);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kk-avatar svg{width:14px;height:14px;fill:white}
.kk-name{font-size:11px;font-weight:700;color:var(--blue2);letter-spacing:.04em}
.kk-status{font-size:8px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
#kk-canvas{width:100%;height:32px;border-radius:6px;background:rgba(0,201,167,0.04)}
#kk-text{font-size:10px;color:var(--blue2);line-height:1.5;min-height:16px;
  font-style:italic;opacity:.8}
.kk-mic{display:flex;align-items:center;gap:6px}
#kk-mic-btn{background:rgba(0,201,167,0.1);border:1px solid rgba(0,201,167,0.25);
  border-radius:8px;padding:4px 10px;font-size:9px;color:#007060;font-weight:600;
  cursor:pointer;pointer-events:all;transition:all .2s;letter-spacing:.04em}
#kk-mic-btn.listening{background:rgba(0,201,167,0.18);border-color:var(--cyan);
  animation:micpulse 1s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,201,167,.3)}50%{box-shadow:0 0 0 5px rgba(0,201,167,0)}}
#kk-hint{font-size:8px;color:var(--text2);flex:1;letter-spacing:.04em}

/* Notificaciones */
#notif-left{position:absolute;top:66px;left:10px;width:min(210px,38vw);display:flex;flex-direction:column;gap:4px;pointer-events:all}
#notif-right{position:absolute;top:66px;right:10px;width:min(195px,36vw);display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:all}
#notif-bottom{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);width:min(340px,86vw);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:all}
.notif{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:5px 8px;backdrop-filter:blur(10px);animation:nIn .22s ease;max-width:100%;transition:opacity .35s,transform .35s}
@keyframes nIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.notif.rIn{animation:rIn .22s ease}
@keyframes rIn{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.notif.out{opacity:0;transform:translateY(-3px) scale(.97)}
.ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.ntime{font-size:7.5px;font-weight:600;min-width:32px;white-space:nowrap}
.nmsg{font-size:8.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.ndism{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;padding:0 2px;margin-left:2px;flex-shrink:0}
.notif-alert{border-color:rgba(220,50,50,0.18);background:rgba(255,248,248,0.93)}
.notif-ins{flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;border-color:rgba(0,201,167,0.18);background:rgba(248,254,252,0.92)}
.notif-ins .nh{display:flex;align-items:center;gap:5px;width:100%}
.notif-ins .nd{font-size:8px;color:#006655;display:none;margin-top:3px;padding-top:4px;border-top:1px solid rgba(0,201,167,0.12);line-height:1.5;max-width:320px;white-space:normal}
.notif-ins.exp .nd{display:block}

/* Controls bottom */
#controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;pointer-events:all}
.ctrl-btn{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 10px;font-size:8.5px;color:var(--blue2);cursor:pointer;backdrop-filter:blur(8px);font-weight:600;letter-spacing:.03em;transition:all .2s;white-space:nowrap}
.ctrl-btn:hover{background:rgba(10,79,191,0.06)}
.ctrl-btn.active{border-color:var(--cyan);color:#007060}
#zoom-pill{font-size:8px;color:var(--text2);background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:3px 9px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}

/* Tooltip */
#tt{position:fixed;background:var(--white);border:1px solid rgba(10,79,191,0.14);border-radius:12px;padding:10px 14px;min-width:170px;max-width:220px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:30;box-shadow:0 4px 18px rgba(10,79,191,0.09)}
#tt-name{font-size:11px;font-weight:700;color:var(--blue2);margin-bottom:6px;display:block}
.tt-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.tt-k{font-size:9px;color:var(--text2)}.tt-v{font-size:9px;font-weight:700;color:var(--blue2)}

@media(max-width:480px){#notif-left{width:min(160px,34vw)}#notif-right{width:min(150px,32vw)}.nmsg{max-width:95px;font-size:8px}.mval{font-size:12px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="brand">
    <div class="bc-dot" id="sb-dot"></div>
    <div><div class="bc-name">AscendaOS · Brain</div><div class="bc-sub" id="sb-lbl">Conectando…</div></div>
  </div>
  <div id="metrics">
    <div class="mcard"><span class="mval" id="m-ev">0</span><span class="mlbl">eventos</span></div>
    <div class="mcard"><span class="mval" id="m-tb" style="color:var(--cyan)">8</span><span class="mlbl">tablas</span></div>
  </div>
  <div id="notif-left"></div>
  <div id="notif-right"></div>
  <div id="notif-bottom"></div>

  <!-- KKRONIA Panel -->
  <div id="kkronia">
    <div class="kk-header">
      <div class="kk-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
      </div>
      <div><div class="kk-name">KKRONIA</div><div class="kk-status" id="kk-status">Di "Cronia" para activarme</div></div>
    </div>
    <canvas id="kk-canvas"></canvas>
    <div id="kk-text">…</div>
    <div class="kk-mic">
      <button id="kk-mic-btn" onclick="toggleMic()">Activar mic</button>
      <span id="kk-hint">Di "Cronia" + tu consulta</span>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-fs" onclick="toggleFS()">Pantalla completa</button>
    <div id="zoom-pill">zoom 1.0×</div>
    <button class="ctrl-btn" id="btn-kk" onclick="toggleKKRONIA()">KKRONIA</button>
  </div>
</div>
<div id="tt"><span id="tt-name"></span><div id="tt-body"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// ASCENDAOS BRAIN + KKRONIA v2.0
// Voz nativa · Consultas directas Supabase · Sin IA externa
// ═══════════════════════════════════════════════════════════════════
const SB='https://ituyqwstonmhnfshnaqz.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
const H={'apikey':SK,'Authorization':'Bearer '+SK};

// ── Canvas ──────────────────────────────────────────────────────
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H2;
function resize(){W=cv.width=innerWidth;H2=cv.height=innerHeight;}
resize();window.addEventListener('resize',()=>{resize();initG();});

// ── Paleta marca ────────────────────────────────────────────────
const TS={
  aos_llamadas:{idle:[180,210,250],live:[55,138,221],label:'Llamadas',n:12229},
  aos_pacientes:{idle:[155,235,218],live:[0,201,167],label:'Pacientes',n:7010},
  aos_base_etiquetas:{idle:[195,215,240],live:[10,79,191],label:'Etiquetas',n:6547},
  aos_leads:{idle:[190,215,255],live:[10,79,191],label:'Leads',n:2704},
  aos_ventas:{idle:[172,235,192],live:[34,200,112],label:'Ventas',n:608},
  aos_agenda_citas:{idle:[162,240,212],live:[0,229,160],label:'Citas',n:480},
  aos_seguimientos:{idle:[250,218,168],live:[240,160,32],label:'Seguim.',n:231},
  aos_inversion_campanas:{idle:[212,208,252],live:[127,119,221],label:'Inversión',n:19},
  aos_rrhh:{idle:[208,222,248],live:[7,29,74],label:'RRHH',n:6},
  otros:{idle:[212,222,238],live:[100,130,180],label:'Sistema',n:1},
};
const CONN=[['aos_leads','aos_llamadas'],['aos_leads','aos_pacientes'],['aos_leads','aos_agenda_citas'],['aos_llamadas','aos_agenda_citas'],['aos_llamadas','aos_ventas'],['aos_llamadas','aos_seguimientos'],['aos_llamadas','aos_pacientes'],['aos_pacientes','aos_agenda_citas'],['aos_pacientes','aos_ventas'],['aos_agenda_citas','aos_ventas'],['aos_ventas','aos_seguimientos'],['aos_inversion_campanas','aos_leads'],['aos_base_etiquetas','aos_pacientes'],['aos_rrhh','aos_llamadas']];
let nodes=[],edges=[],gmap={};
const eSet=new Set();
function nR(n){return Math.max(1.2,Math.log10(n+1)*2.4);}
function lR(a,b,t){return[~~(a[0]+(b[0]-a[0])*t),~~(a[1]+(b[1]-a[1])*t),~~(a[2]+(b[2]-a[2])*t)];}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function addE(a,b,cr){if(a===b)return;const k=a.id<b.id?a.id+'|'+b.id:b.id+'|'+a.id;if(!eSet.has(k)){eSet.add(k);edges.push({a,b,cross:cr});}}
function initG(){
  nodes=[];edges=[];gmap={};eSet.clear();
  const keys=Object.keys(TS),N=keys.length,R=Math.min(W,H2)*.32;
  keys.forEach((k,i)=>{
    const st=TS[k],ang=(i/N)*Math.PI*2-Math.PI/2;
    const gcx=W/2+R*.65*Math.cos(ang),gcy=H2/2+R*.65*Math.sin(ang);
    const cnt=Math.max(3,Math.floor(Math.log10(st.n+1)*5.5));
    gmap[k]=[];
    for(let j=0;j<cnt;j++){
      const a=Math.random()*Math.PI*2,r=Math.random()*R*.18*(0.4+Math.random()*.6);
      const hub=j===0,nr=hub?nR(st.n)*1.8:nR(st.n)*(.45+Math.random()*.65);
      const node={id:nodes.length,x:gcx+Math.cos(a)*r,y:gcy+Math.sin(a)*r,ox:gcx,oy:gcy,vx:0,vy:0,r:nr,group:k,idle:st.idle,live:st.live,pulse:0,phase:Math.random()*Math.PI*2,pspd:.003+Math.random()*.003,label:hub?st.label:null};
      nodes.push(node);gmap[k].push(node);
    }
  });
  Object.values(gmap).forEach(gn=>{gn.forEach(n=>{[...gn].filter(m=>m!==n).sort((a,b)=>d2(n,a)-d2(n,b)).slice(0,2+~~(Math.random()*2)).forEach(m=>addE(n,m,false));});});
  CONN.forEach(([ga,gb])=>{const na=gmap[ga]||[],nb=gmap[gb]||[];if(!na.length||!nb.length)return;for(let i=0;i<Math.min(2,na.length);i++)for(let j=0;j<Math.min(2,nb.length);j++)addE(na[i],nb[j],true);const x=~~(Math.min(na.length,nb.length)*.12)+1;for(let k=0;k<x;k++)addE(na[~~(Math.random()*na.length)],nb[~~(Math.random()*nb.length)],true);});
  for(let i=0;i<200;i++)phys(i<50?.85:.93);
}
function phys(d=.92){
  const k=Math.min(W,H2)*.021;
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,mD=(a.r+b.r)*3;if(dd<k*2.8){const f=k*k/dd*.38;a.vx-=dx/dd*f;a.vy-=dy/dd*f;b.vx+=dx/dd*f;b.vy+=dy/dd*f;}if(dd<mD){const p=(mD-dd)*.2;a.vx-=dx/dd*p;a.vy-=dy/dd*p;b.vx+=dx/dd*p;b.vy+=dy/dd*p;}}
  edges.forEach(e=>{const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,ideal=e.cross?k*2.5:k*1.1,f=(dd-ideal)/dd*.08;e.a.vx+=dx*f;e.a.vy+=dy*f;e.b.vx-=dx*f;e.b.vy-=dy*f;});
  nodes.forEach(n=>{n.vx+=(n.ox-n.x)*.014;n.vy+=(n.oy-n.y)*.014;n.vx+=(W/2-n.x)*.002;n.vy+=(H2/2-n.y)*.002;n.vx*=d;n.vy*=d;n.x+=n.vx;n.y+=n.vy;});
}

// ── Cámara ──────────────────────────────────────────────────────
let cam={x:0,y:0,z:1,tz:1};
let drag={on:false,lx:0,ly:0};
let pinch={on:false,d0:0,z0:1};
let hovered=null;
cv.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(drag.on){cam.x+=e.clientX-drag.lx;cam.y+=e.clientY-drag.ly;drag.lx=e.clientX;drag.ly=e.clientY;return;}if(cam.z>1.8)chkHov(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{drag.on=false;cv.style.cursor='default';});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.tz=Math.max(.12,Math.min(16,cam.tz*(e.deltaY<0?1.12:.9)));},{passive:false});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;}if(e.touches.length===2){pinch.on=true;drag.on=false;pinch.d0=ptd(e);pinch.z0=cam.z;}},{passive:true});
cv.addEventListener('touchmove',e=>{if(drag.on&&e.touches.length===1){cam.x+=e.touches[0].clientX-drag.lx;cam.y+=e.touches[0].clientY-drag.ly;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;if(cam.z>1.8)chkHov(e.touches[0].clientX,e.touches[0].clientY);}if(pinch.on&&e.touches.length===2)cam.tz=Math.max(.12,Math.min(16,pinch.z0*(ptd(e)/pinch.d0)));},{passive:true});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinch.on=false;if(!e.touches.length)drag.on=false;},{passive:true});
function ptd(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function chkHov(sx,sy){const wx=(sx-W/2-cam.x)/cam.z+W/2,wy=(sy-H2/2-cam.y)/cam.z+H2/2;let best=null,bd=Infinity;nodes.forEach(n=>{const dd=(n.x-wx)**2+(n.y-wy)**2;if(dd<(n.r*3)**2&&dd<bd){bd=dd;best=n;}});hovered=best;const tt=document.getElementById('tt');if(best){const st=TS[best.group]||TS.otros;document.getElementById('tt-name').textContent=st.label;document.getElementById('tt-body').innerHTML='<div class="tt-row"><span class="tt-k">Tabla</span><span class="tt-v">'+best.group+'</span></div><div class="tt-row"><span class="tt-k">Registros</span><span class="tt-v">'+st.n.toLocaleString()+'</span></div>';const sx2=best.x*cam.z+W/2+cam.x-W/2*cam.z+W*(1-cam.z)/2,sy2=best.y*cam.z+H2/2+cam.y-H2/2*cam.z+H2*(1-cam.z)/2;tt.style.left=Math.min(W-230,sx2+14)+'px';tt.style.top=Math.max(10,sy2-55)+'px';tt.style.opacity='1';}else tt.style.opacity='0';}

// ── Viajeros ────────────────────────────────────────────────────
const travelers=[];
function spawnT(a,b,color){travelers.push({a,b,t:0,speed:.014+Math.random()*.012,color});}
let evCnt=0;
function activateTable(tbl,action){
  const gn=gmap[tbl]||gmap.otros;if(!gn||!gn.length)return;
  gn.forEach((n,i)=>setTimeout(()=>{n.pulse=1;},i*5));
  edges.filter(e=>e.cross&&(e.a.group===tbl||e.b.group===tbl)).sort(()=>Math.random()-.5).slice(0,8).forEach((e,i)=>setTimeout(()=>spawnT(e.a,e.b,(TS[tbl]||TS.otros).live),i*55));
  evCnt++;document.getElementById('m-ev').textContent=evCnt;
  pushN(tbl,action||'INSERT');
}

// ── Notificaciones ──────────────────────────────────────────────
function tStr(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}
function rgbS(c){return'rgb('+c[0]+','+c[1]+','+c[2]+')';}
function pushN(tbl,action){
  const st=TS[tbl]||TS.otros,c=rgbS(st.live),label=(st.label||tbl.replace('aos_',''))+' → '+action;
  const ul=document.getElementById('notif-left');
  const li=document.createElement('li');li.className='notif';
  li.innerHTML='<span class="ndot" style="background:'+c+'"></span><span class="ntime" style="color:'+c+'">'+tStr()+'</span><span class="nmsg" style="color:'+c+'">'+label+'</span>';
  ul.insertBefore(li,ul.firstChild);
  while(ul.children.length>5)ul.removeChild(ul.lastChild);
  setTimeout(()=>{li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);},5000);
}
function pushAlert(msg){
  const ul=document.getElementById('notif-right');
  const li=document.createElement('li');li.className='notif notif-alert rIn';
  li.innerHTML='<span class="ndot" style="background:#E53935"></span><span class="ntime" style="color:#B01010">'+tStr()+'</span><span class="nmsg" style="color:#B01010;max-width:110px">'+msg+'</span><button class="ndism" onclick="this.closest(\'li\').remove()">×</button>';
  ul.insertBefore(li,ul.firstChild);while(ul.children.length>4)ul.removeChild(ul.lastChild);
}
function pushInsight(title,detail){
  const ul=document.getElementById('notif-bottom');
  const li=document.createElement('li');li.className='notif notif-ins';
  li.innerHTML='<div class="nh"><span class="ndot" style="background:#00C9A7"></span><span class="ntime" style="color:#007060">'+tStr()+'</span><span class="nmsg" style="color:#007060;max-width:230px">'+title+'</span><button class="ndism" style="margin-left:auto" onclick="event.stopPropagation();this.closest(\'li\').remove()">×</button></div><div class="nd">'+detail+'</div>';
  li.addEventListener('click',()=>li.classList.toggle('exp'));
  ul.insertBefore(li,ul.firstChild);while(ul.children.length>3)ul.removeChild(ul.lastChild);
  setTimeout(()=>{if(!li.classList.contains('exp')){li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);}},30000);
}

// ══ KKRONIA — SISTEMA DE VOZ ══════════════════════════════════════
let synth=window.speechSynthesis;
let kkVoice=null;
let kkPanel=false;
let micOn=false;
let recognition=null;
let audioCtx=null,analyser=null,dataArray=null,micStream=null;
const kkCv=document.getElementById('kk-canvas');
const kkCtx=kkCv.getContext('2d');

// Seleccionar voz femenina en español
function loadVoices(){
  const voices=synth.getVoices();
  // Prioridad: Google español femenina → cualquier español → fallback
  kkVoice=voices.find(v=>v.lang.startsWith('es')&&/female|mujer|mónica|paulina|marisol|elena|lucía/i.test(v.name))
    ||voices.find(v=>v.lang==='es-US'||v.lang==='es-MX'||v.lang==='es-419')
    ||voices.find(v=>v.lang.startsWith('es'))
    ||null;
}
loadVoices();
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadVoices;

function kkSpeak(text){
  if(!synth) return;
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  if(kkVoice) utt.voice=kkVoice;
  utt.lang='es-PE';
  utt.rate=0.92;
  utt.pitch=1.05;
  utt.volume=1;
  document.getElementById('kk-text').textContent=text;
  document.getElementById('kk-status').textContent='Hablando…';
  utt.onend=()=>{document.getElementById('kk-status').textContent=micOn?'Escuchando…':'Di "Cronia" para activarme';};
  synth.speak(utt);
  // Mostrar panel
  showKKRONIA();
}

function toggleKKRONIA(){
  kkPanel=!kkPanel;
  document.getElementById('kkronia').classList.toggle('visible',kkPanel);
  document.getElementById('btn-kk').classList.toggle('active',kkPanel);
  if(kkPanel&&!micOn) kkSpeak('Hola, soy KKRONIA. Di Cronia seguido de tu consulta.');
}
function showKKRONIA(){
  if(!kkPanel){kkPanel=true;document.getElementById('kkronia').classList.add('visible');document.getElementById('btn-kk').classList.add('active');}
}

// ── Micrófono y SpeechRecognition ────────────────────────────────
function toggleMic(){
  if(micOn) stopMic(); else startMic();
}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){pushAlert('Micrófono no soportado en este navegador');return;}
  recognition=new SR();
  recognition.lang='es-PE';
  recognition.continuous=true;
  recognition.interimResults=false;
  recognition.onresult=e=>{
    const transcript=e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    document.getElementById('kk-text').textContent='Escuché: '+transcript;
    if(transcript.includes('cronia')||transcript.includes('kronia')||transcript.includes('kkronia')){
      const query=transcript.replace(/k?k?r?o?n?i?a/,'').trim();
      processQuery(query||'resumen');
    }
  };
  recognition.onerror=e=>{
    if(e.error!=='no-speech')pushAlert('Error de micrófono: '+e.error);
  };
  recognition.onend=()=>{ if(micOn) recognition.start(); };
  recognition.start();
  micOn=true;
  document.getElementById('kk-mic-btn').textContent='Mic activo';
  document.getElementById('kk-mic-btn').classList.add('listening');
  document.getElementById('kk-status').textContent='Escuchando…';
  // Waveform
  startWaveform();
  showKKRONIA();
}
function stopMic(){
  if(recognition) recognition.stop();
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  micOn=false;
  document.getElementById('kk-mic-btn').textContent='Activar mic';
  document.getElementById('kk-mic-btn').classList.remove('listening');
  document.getElementById('kk-status').textContent='Di "Cronia" para activarme';
  stopWaveform();
}

// ── Waveform animado ─────────────────────────────────────────────
let waveAnim=null;
function startWaveform(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    micStream=stream;
    audioCtx=new AudioContext();
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=64;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    src.connect(analyser);
    drawWave();
  }).catch(()=>{
    // Sin permisos de micro — waveform sintético
    drawWaveSynth();
  });
}
function stopWaveform(){
  if(waveAnim) cancelAnimationFrame(waveAnim);
  if(audioCtx) audioCtx.close();
  kkCtx.clearRect(0,0,kkCv.width,kkCv.height);
}
function drawWave(){
  kkCv.width=kkCv.offsetWidth;kkCv.height=kkCv.offsetHeight;
  const cw=kkCv.width,ch=kkCv.height;
  analyser.getByteFrequencyData(dataArray);
  kkCtx.clearRect(0,0,cw,ch);
  const bars=dataArray.length,bw=cw/bars;
  for(let i=0;i<bars;i++){
    const h=(dataArray[i]/255)*ch*.85;
    const alpha=0.4+dataArray[i]/255*.5;
    kkCtx.fillStyle='rgba(0,201,167,'+alpha.toFixed(2)+')';
    kkCtx.beginPath();
    kkCtx.roundRect(i*bw+1,ch/2-h/2,bw-2,h,2);
    kkCtx.fill();
  }
  waveAnim=requestAnimationFrame(drawWave);
}
function drawWaveSynth(){
  kkCv.width=kkCv.offsetWidth;kkCv.height=kkCv.offsetHeight;
  const cw=kkCv.width,ch=kkCv.height;
  let t=0;
  function frame(){
    t+=0.08;
    kkCtx.clearRect(0,0,cw,ch);
    const bars=24;
    for(let i=0;i<bars;i++){
      const h=(Math.sin(t+i*.4)*0.3+0.4)*ch*.7;
      kkCtx.fillStyle='rgba(0,201,167,0.55)';
      kkCtx.beginPath();
      if(kkCtx.roundRect) kkCtx.roundRect(i*(cw/bars)+1,ch/2-h/2,cw/bars-2,h,2);
      else kkCtx.rect(i*(cw/bars)+1,ch/2-h/2,cw/bars-2,h);
      kkCtx.fill();
    }
    waveAnim=requestAnimationFrame(frame);
  }
  frame();
}

// ══ KKRONIA — PROCESADOR DE CONSULTAS DIRECTAS A SUPABASE ════════
async function processQuery(q){
  document.getElementById('kk-status').textContent='Consultando…';
  q=q.toLowerCase().trim();
  let respuesta='';
  try{
    // VENTAS
    if(q.includes('venta')){
      let filtro='';
      const hoy=new Date().toISOString().split('T')[0];
      if(q.includes('hoy')||q.includes('día')||q.includes('dia')){
        filtro='fecha=eq.'+hoy;
      } else if(q.includes('semana')){
        const d7=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
        filtro='fecha=gte.'+d7;
      } else if(q.includes('mes')){
        filtro='fecha=gte.'+hoy.slice(0,7)+'-01';
      } else {
        filtro='fecha=gte.'+hoy.slice(0,7)+'-01';
      }
      let url=SB+'/rest/v1/aos_ventas?select=monto,estado_pago,tratamiento,nombres,sede,fecha&'+filtro+'&estado_pago=eq.PAGO COMPLETO';
      if(q.includes('pueblo')||q.includes('libre')) url+='&sede=eq.PUEBLO LIBRE';
      if(q.includes('isidro')) url+='&sede=eq.SAN ISIDRO';
      const r=await fetch(url,{headers:H});
      const d=await r.json();
      if(d&&d.length){
        const total=d.reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
        const periodo=q.includes('hoy')?'hoy':q.includes('semana')?'esta semana':'este mes';
        respuesta='Registré '+d.length+' ventas '+periodo+' por un total de S/ '+total.toFixed(0)+'. El tratamiento más vendido fue '+top(d,'tratamiento')+'.';
        activateTable('aos_ventas','CONSULTA');
      } else respuesta='No encontré ventas para ese período.';
    }
    // LEADS
    else if(q.includes('lead')){
      const hoy=new Date().toISOString().split('T')[0];
      const filtro=q.includes('hoy')?'fecha=eq.'+hoy:'fecha=gte.'+hoy.slice(0,7)+'-01';
      const r=await fetch(SB+'/rest/v1/aos_leads?select=tratamiento,fecha&'+filtro,{headers:H});
      const d=await r.json();
      respuesta=d&&d.length?'Hay '+d.length+' leads '+(q.includes('hoy')?'de hoy':'este mes')+'. La campaña con más leads es '+top(d,'tratamiento')+'.':'No encontré leads para ese período.';
      activateTable('aos_leads','CONSULTA');
    }
    // CITAS
    else if(q.includes('cita')){
      const manana=new Date(Date.now()+86400000).toISOString().split('T')[0];
      const hoy=new Date().toISOString().split('T')[0];
      const fecha=q.includes('mañana')||q.includes('manana')?manana:hoy;
      const r=await fetch(SB+'/rest/v1/aos_agenda_citas?select=nombre,apellido,tratamiento,hora_cita,sede,asesor&fecha_cita=eq.'+fecha,{headers:H});
      const d=await r.json();
      respuesta=d&&d.length?'Hay '+d.length+' citas para '+(fecha===manana?'mañana':'hoy')+'. La primera es '+((d[0].nombre||'')+(d[0].apellido?' '+d[0].apellido:''))+' a las '+(d[0].hora_cita||'hora no registrada')+'.':'No hay citas registradas para '+(fecha===manana?'mañana':'hoy')+'.';
      activateTable('aos_agenda_citas','CONSULTA');
    }
    // CLIENTE POR NÚMERO
    else if(q.includes('cliente')||q.match(/\d{7,}/)){
      const num=(q.match(/\d{7,}/)||[''])[0];
      if(num){
        const r=await fetch(SB+'/rest/v1/aos_pacientes?select="Nombres","Apellidos","SCORE_ESTADO",n_ventas,"TOTAL_FACTURADO"&numero_limpio=eq.'+num+'&limit=1',{headers:H});
        const d=await r.json();
        if(d&&d[0]){
          const p=d[0];
          respuesta='El cliente '+num+' se llama '+(p['Nombres']||'sin nombre')+' '+(p['Apellidos']||'')+'. Tiene '+p.n_ventas+' compras por un total de S/ '+(p['TOTAL_FACTURADO']||0)+'. Estado: '+(p['SCORE_ESTADO']||'sin score')+'.';
        } else respuesta='No encontré al cliente con ese número.';
        activateTable('aos_pacientes','CONSULTA');
      } else respuesta='Por favor dime el número del cliente.';
    }
    // LLAMADAS
    else if(q.includes('llamada')){
      const hoy=new Date().toISOString().split('T')[0];
      const r=await fetch(SB+'/rest/v1/aos_llamadas?select=asesor,estado&fecha=eq.'+hoy,{headers:H});
      const d=await r.json();
      respuesta=d&&d.length?'Hoy se hicieron '+d.length+' llamadas. El asesor con más llamadas fue '+top(d,'asesor')+'.':'No hay llamadas registradas hoy.';
      activateTable('aos_llamadas','CONSULTA');
    }
    // RESUMEN DEL DÍA
    else if(q.includes('resumen')||q.includes('dia')||q.includes('día')||q===''||q==='hola'){
      const hoy=new Date().toISOString().split('T')[0];
      const [rv,rl,rc]=await Promise.all([
        fetch(SB+'/rest/v1/aos_ventas?select=monto&fecha=eq.'+hoy+'&estado_pago=eq.PAGO COMPLETO',{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_llamadas?select=id&fecha=eq.'+hoy,{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_agenda_citas?select=id&fecha_cita=eq.'+hoy,{headers:H}).then(r=>r.json()),
      ]);
      const totalV=(rv||[]).reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
      respuesta='Buenos días César. Resumen de hoy: '+(rl||[]).length+' llamadas realizadas, '+(rc||[]).length+' citas agendadas, y S/ '+totalV.toFixed(0)+' en ventas.';
      ['aos_ventas','aos_llamadas','aos_agenda_citas'].forEach((t,i)=>setTimeout(()=>activateTable(t,'CONSULTA'),i*300));
    }
    // ESTADO DEL SISTEMA
    else if(q.includes('estado')||q.includes('sistema')||q.includes('conexi')){
      const dot=document.getElementById('sb-dot');
      respuesta=dot.classList.contains('on')?'El sistema está conectado a Supabase y todos los registros están activos. '+evCnt+' eventos registrados en esta sesión.':'Hay un problema de conexión con Supabase. Verifica la red.';
    }
    // SEGUIMIENTOS
    else if(q.includes('seguimiento')){
      const r=await fetch(SB+'/rest/v1/aos_seguimientos?select="ESTADO","ASESOR"&"ESTADO"=eq.PENDIENTE',{headers:H});
      const d=await r.json();
      respuesta=d&&d.length?'Hay '+d.length+' seguimientos pendientes. El asesor con más pendientes es '+top(d,'ASESOR')+'.':'No hay seguimientos pendientes.';
      activateTable('aos_seguimientos','CONSULTA');
    }
    else{
      respuesta='Entendí: '+q+'. Puedo consultarte ventas, leads, citas, llamadas, seguimientos o el resumen del día. ¿Qué necesitas?';
    }
  }catch(e){
    respuesta='Tuve un problema consultando la información. Intenta de nuevo.';
  }
  if(respuesta) kkSpeak(respuesta);
}

// Helper: valor más frecuente en array de objetos
function top(arr,key){
  const cnt={};let max=0,res='';
  arr.forEach(o=>{const v=o[key]||'sin datos';cnt[v]=(cnt[v]||0)+1;if(cnt[v]>max){max=cnt[v];res=v;}});
  return res;
}

// ── Draw ─────────────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='rgba(248,250,254,0.14)';ctx.fillRect(0,0,W,H2);
  cam.z+=(cam.tz-cam.z)*0.07;
  document.getElementById('zoom-pill').textContent='zoom '+cam.z.toFixed(1)+'×';
  if(!pausedPhys&&Math.random()<.15)phys(.978); // respiro muy lento
  ctx.save();ctx.translate(W/2+cam.x,H2/2+cam.y);ctx.scale(cam.z,cam.z);ctx.translate(-W/2,-H2/2);
  edges.forEach(e=>{const p=Math.max(e.a.pulse,e.b.pulse),ci=e.cross?lR(e.a.idle,e.b.idle,.5):e.a.idle,ca=e.cross?lR(e.a.live,e.b.live,.5):e.a.live,c=lR(ci,ca,p);ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);ctx.strokeStyle='rgba('+c+','+(e.cross?0.06+p*.55:0.18+p*.42).toFixed(2)+')';ctx.lineWidth=(e.cross?.4:.28)/cam.z;ctx.stroke();});
  nodes.forEach(n=>{n.phase+=n.pspd;if(n.pulse>0)n.pulse=Math.max(0,n.pulse-0.018);const p=n.pulse,c=lR(n.idle,n.live,p),isH=n===hovered,r=n.r+(isH?1.2:0);if(p>0.04||isH){ctx.beginPath();ctx.arc(n.x,n.y,r*(2.8+p*3),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.09+(isH?.06:0)).toFixed(2)+')';ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r*(1.5+p),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.20+(isH?.13:0)).toFixed(2)+')';ctx.fill();}ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(0.72+p*.28).toFixed(2)+')';ctx.fill();if(r>1.0){ctx.beginPath();ctx.arc(n.x,n.y,r*.30,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(0.50+p*.42).toFixed(2)+')';ctx.fill();}if(n.label&&cam.z>.55){const sz=Math.max(6.5,9/cam.z);ctx.font='600 '+sz+'px \'SF Pro Display\',\'Segoe UI\',sans-serif';ctx.textAlign='center';const cc=lR(n.idle,n.live,Math.max(.3,p));ctx.fillStyle='rgba('+cc+','+Math.min(.72,.18+cam.z*.33)+')';ctx.fillText(n.label,n.x,n.y-r-3/cam.z);}});
  for(let i=travelers.length-1;i>=0;i--){const tv=travelers[i];tv.t+=tv.speed;if(tv.t>=1){travelers.splice(i,1);continue;}const x=tv.a.x+(tv.b.x-tv.a.x)*tv.t,y=tv.a.y+(tv.b.y-tv.a.y)*tv.t,xt=tv.a.x+(tv.b.x-tv.a.x)*Math.max(0,tv.t-.2),yt=tv.a.y+(tv.b.y-tv.a.y)*Math.max(0,tv.t-.2);const g2=ctx.createLinearGradient(xt,yt,x,y);g2.addColorStop(0,'rgba('+tv.color+',0)');g2.addColorStop(1,'rgba('+tv.color+',.9)');ctx.beginPath();ctx.moveTo(xt,yt);ctx.lineTo(x,y);ctx.strokeStyle=g2;ctx.lineWidth=1.5/cam.z;ctx.stroke();const hr=2.1/cam.z;ctx.beginPath();ctx.arc(x,y,hr*2,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.12)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.92)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr*.32,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.86)';ctx.fill();}
  ctx.restore();requestAnimationFrame(draw);
}
