<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=10">
<title>AscendaOS · Brain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#0A4FBF;--blue2:#071D4A;--blue3:#378ADD;--cyan:#00C9A7;--mint:#00E5A0;--bg:#F8FAFE;--white:#FFFFFF;--muted:rgba(10,79,191,0.10);--text:#071D4A;--text2:rgba(7,29,74,0.40);--card:rgba(255,255,255,0.90);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;display:block}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none}
#brand{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--muted);border-radius:10px;padding:6px 10px;backdrop-filter:blur(12px);pointer-events:all}
.bc-dot{width:7px;height:7px;border-radius:50%;background:#E53935;box-shadow:0 0 5px #E53935;transition:all .5s;flex-shrink:0}
.bc-dot.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:cpulse 2.5s infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.35}}
.bc-name{font-size:10px;font-weight:700;color:var(--blue2);letter-spacing:.04em;white-space:nowrap}
.bc-sub{font-size:7.5px;color:var(--text2);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}
#metrics{position:absolute;top:10px;right:10px;display:flex;gap:5px;align-items:flex-start;flex-direction:column}
.mcard{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 9px;backdrop-filter:blur(10px);display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.mval{font-size:14px;font-weight:800;color:var(--blue)}
.mlbl{font-size:7px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
#notif-left{position:absolute;top:66px;left:10px;width:min(220px,40vw);display:flex;flex-direction:column;gap:4px;pointer-events:all}
#notif-right{position:absolute;top:66px;right:10px;width:min(200px,38vw);display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:all}
#notif-bottom{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);width:min(360px,86vw);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:all}
.notif{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:5px 8px;backdrop-filter:blur(10px);animation:nIn .22s ease;max-width:100%;transition:opacity .35s,transform .35s}
@keyframes nIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.notif.rIn{animation:rIn .22s ease}
@keyframes rIn{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.notif.out{opacity:0;transform:translateY(-3px) scale(.97)}
.ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.ntime{font-size:7.5px;font-weight:600;min-width:32px;white-space:nowrap}
.nmsg{font-size:8.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.ndism{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;padding:0 2px;margin-left:2px;flex-shrink:0;line-height:1}
.notif-alert{border-color:rgba(220,50,50,0.18);background:rgba(255,248,248,0.93)}
.notif-ins{flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;border-color:rgba(0,201,167,0.18);background:rgba(248,254,252,0.92)}
.notif-ins .nh{display:flex;align-items:center;gap:5px;width:100%}
.notif-ins .nd{font-size:8px;color:#006655;display:none;margin-top:3px;padding-top:4px;border-top:1px solid rgba(0,201,167,0.12);line-height:1.5;max-width:340px;white-space:normal}
.notif-ins.exp .nd{display:block}
#zoom-pill{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--text2);letter-spacing:.08em;pointer-events:none;background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:3px 10px;backdrop-filter:blur(8px);white-space:nowrap}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:7.5px;color:var(--text2);letter-spacing:.07em;pointer-events:none;background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:2px 10px;backdrop-filter:blur(8px);white-space:nowrap}
#tt{position:fixed;background:var(--white);border:1px solid rgba(10,79,191,0.14);border-radius:12px;padding:10px 14px;min-width:170px;max-width:220px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:30;box-shadow:0 4px 18px rgba(10,79,191,0.09)}
#tt-name{font-size:11px;font-weight:700;color:var(--blue2);margin-bottom:6px;display:block}
.tt-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.tt-k{font-size:9px;color:var(--text2)}.tt-v{font-size:9px;font-weight:700;color:var(--blue2)}
@media(max-width:480px){#notif-left{width:min(170px,36vw)}#notif-right{width:min(155px,34vw)}.nmsg{max-width:100px;font-size:8px}.mval{font-size:12px}}
</style>
</head>
<body>

    <div class="bc-dot" id="sb-dot"></div>

</div>
<div id="tt"><span id="tt-name"></span><div id="tt-body"></div></div>
<script>
const SB_URL='https://ituyqwstonmhnfshnaqz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',()=>{resize();initG();});
const TS={
  aos_llamadas:{idle:[180,210,250],live:[55,138,221],label:'Llamadas',n:12229},
  aos_pacientes:{idle:[155,235,218],live:[0,201,167],label:'Pacientes',n:7010},
  aos_base_etiquetas:{idle:[195,215,240],live:[10,79,191],label:'Etiquetas',n:6547},
  aos_leads:{idle:[190,215,255],live:[10,79,191],label:'Leads',n:2704},
  aos_ventas:{idle:[172,235,192],live:[34,200,112],label:'Ventas',n:608},
  aos_agenda_citas:{idle:[162,240,212],live:[0,229,160],label:'Citas',n:480},
  aos_seguimientos:{idle:[250,218,168],live:[240,160,32],label:'Seguim.',n:231},
  aos_inversion_campanas:{idle:[212,208,252],live:[127,119,221],label:'Inversión',n:19},
  aos_rrhh:{idle:[208,222,248],live:[7,29,74],label:'RRHH',n:6},

};
const CONN=[['aos_leads','aos_llamadas'],['aos_leads','aos_pacientes'],['aos_leads','aos_agenda_citas'],['aos_llamadas','aos_agenda_citas'],['aos_llamadas','aos_ventas'],['aos_llamadas','aos_seguimientos'],['aos_llamadas','aos_pacientes'],['aos_pacientes','aos_agenda_citas'],['aos_pacientes','aos_ventas'],['aos_agenda_citas','aos_ventas'],['aos_ventas','aos_seguimientos'],['aos_inversion_campanas','aos_leads'],['aos_base_etiquetas','aos_pacientes'],['aos_rrhh','aos_llamadas']];
let nodes=[],edges=[],gmap={};
const eSet=new Set();
function nR(n){return Math.max(1.2,Math.log10(n+1)*2.4);}
function lR(a,b,t){return[~~(a[0]+(b[0]-a[0])*t),~~(a[1]+(b[1]-a[1])*t),~~(a[2]+(b[2]-a[2])*t)];}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function addE(a,b,cr){if(a===b)return;const k=a.id<b.id?a.id+'|'+b.id:b.id+'|'+a.id;if(!eSet.has(k)){eSet.add(k);edges.push({a,b,cross:cr});}}
function initG(){
  nodes=[];edges=[];gmap={};eSet.clear();
  const keys=Object.keys(TS),N=keys.length,R=Math.min(W,H)*.32;
  keys.forEach((k,i)=>{
    const st=TS[k],ang=(i/N)*Math.PI*2-Math.PI/2;
    const gcx=W/2+R*.65*Math.cos(ang),gcy=H/2+R*.65*Math.sin(ang);
    const cnt=Math.max(3,Math.floor(Math.log10(st.n+1)*5.5));
    gmap[k]=[];
    for(let j=0;j<cnt;j++){
      const a=Math.random()*Math.PI*2,r=Math.random()*R*.18*(0.4+Math.random()*.6);
      const hub=j===0,nr=hub?nR(st.n)*1.8:nR(st.n)*(.45+Math.random()*.65);
      const node={id:nodes.length,x:gcx+Math.cos(a)*r,y:gcy+Math.sin(a)*r,ox:gcx,oy:gcy,vx:0,vy:0,r:nr,group:k,idle:st.idle,live:st.live,pulse:0,phase:Math.random()*Math.PI*2,pspd:.003+Math.random()*.003,label:hub?st.label:null};
      nodes.push(node);gmap[k].push(node);
    }
  });
  Object.values(gmap).forEach(gn=>{gn.forEach(n=>{[...gn].filter(m=>m!==n).sort((a,b)=>d2(n,a)-d2(n,b)).slice(0,2+~~(Math.random()*2)).forEach(m=>addE(n,m,false));});});
  CONN.forEach(([ga,gb])=>{const na=gmap[ga]||[],nb=gmap[gb]||[];if(!na.length||!nb.length)return;for(let i=0;i<Math.min(2,na.length);i++)for(let j=0;j<Math.min(2,nb.length);j++)addE(na[i],nb[j],true);const x=~~(Math.min(na.length,nb.length)*.12)+1;for(let k=0;k<x;k++)addE(na[~~(Math.random()*na.length)],nb[~~(Math.random()*nb.length)],true);});
  for(let i=0;i<200;i++)phys(i<50?.85:.93);
}
function phys(d=.92){
  const k=Math.min(W,H)*.021;
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,mD=(a.r+b.r)*3;if(dd<k*2.8){const f=k*k/dd*.38;a.vx-=dx/dd*f;a.vy-=dy/dd*f;b.vx+=dx/dd*f;b.vy+=dy/dd*f;}if(dd<mD){const p=(mD-dd)*.2;a.vx-=dx/dd*p;a.vy-=dy/dd*p;b.vx+=dx/dd*p;b.vy+=dy/dd*p;}}
  edges.forEach(e=>{const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,ideal=e.cross?k*2.5:k*1.1,f=(dd-ideal)/dd*.08;e.a.vx+=dx*f;e.a.vy+=dy*f;e.b.vx-=dx*f;e.b.vy-=dy*f;});
  nodes.forEach(n=>{n.vx+=(n.ox-n.x)*.014;n.vy+=(n.oy-n.y)*.014;n.vx+=(W/2-n.x)*.002;n.vy+=(H/2-n.y)*.002;n.vx*=d;n.vy*=d;n.x+=n.vx;n.y+=n.vy;});
}
let cam={x:0,y:0,z:1,tz:1};
let drag={on:false,lx:0,ly:0};
let pinch={on:false,d0:0,z0:1};
let hovered=null;
cv.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(drag.on){cam.x+=e.clientX-drag.lx;cam.y+=e.clientY-drag.ly;drag.lx=e.clientX;drag.ly=e.clientY;return;}if(cam.z>1.8)chkHov(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{drag.on=false;cv.style.cursor='default';});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.tz=Math.max(.12,Math.min(16,cam.tz*(e.deltaY<0?1.12:.9)));},{passive:false});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;}if(e.touches.length===2){pinch.on=true;drag.on=false;pinch.d0=ptd(e);pinch.z0=cam.z;}},{passive:true});
cv.addEventListener('touchmove',e=>{if(drag.on&&e.touches.length===1){cam.x+=e.touches[0].clientX-drag.lx;cam.y+=e.touches[0].clientY-drag.ly;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;if(cam.z>1.8)chkHov(e.touches[0].clientX,e.touches[0].clientY);}if(pinch.on&&e.touches.length===2)cam.tz=Math.max(.12,Math.min(16,pinch.z0*(ptd(e)/pinch.d0)));},{passive:true});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinch.on=false;if(!e.touches.length)drag.on=false;},{passive:true});
function ptd(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function chkHov(sx,sy){const wx=(sx-W/2-cam.x)/cam.z+W/2,wy=(sy-H/2-cam.y)/cam.z+H/2;let best=null,bd=Infinity;nodes.forEach(n=>{const dd=(n.x-wx)**2+(n.y-wy)**2;if(dd<(n.r*3)**2&&dd<bd){bd=dd;best=n;}});hovered=best;const tt=document.getElementById('tt');if(best){const st=TS[best.group]||TS.otros;document.getElementById('tt-name').textContent=st.label;document.getElementById('tt-body').innerHTML='<div class="tt-row"><span class="tt-k">Tabla</span><span class="tt-v">'+best.group+'</span></div><div class="tt-row"><span class="tt-k">Registros</span><span class="tt-v">'+st.n.toLocaleString()+'</span></div>';const sx2=best.x*cam.z+W/2+cam.x-W/2*cam.z+W*(1-cam.z)/2,sy2=best.y*cam.z+H/2+cam.y-H/2*cam.z+H*(1-cam.z)/2;tt.style.left=Math.min(W-230,sx2+14)+'px';tt.style.top=Math.max(10,sy2-55)+'px';tt.style.opacity='1';}else tt.style.opacity='0';}
const travelers=[];
function spawnT(a,b,color){travelers.push({a,b,t:0,speed:.014+Math.random()*.012,color});}
let evCnt=0;
function activateTable(tbl,action){
  const gn=gmap[tbl]||gmap.otros;if(!gn||!gn.length)return;
  gn.forEach((n,i)=>setTimeout(()=>{n.pulse=1;},i*5));
  edges.filter(e=>e.cross&&(e.a.group===tbl||e.b.group===tbl)).sort(()=>Math.random()-.5).slice(0,8).forEach((e,i)=>setTimeout(()=>spawnT(e.a,e.b,(TS[tbl]||TS.otros).live),i*55));
  evCnt++;document.getElementById('m-ev').textContent=evCnt;
  pushN(tbl,action||'INSERT');
}
function tStr(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}
function rgbStr(c){return'rgb('+c[0]+','+c[1]+','+c[2]+')';}
function pushN(tbl,action){
  const st=TS[tbl]||TS.otros,c=rgbStr(st.live);
  const label=(st.label||tbl.replace('aos_',''))+' → '+action;
  const ul=document.getElementById('notif-left');
  const li=document.createElement('li');li.className='notif';
  li.innerHTML='<span class="ndot" style="background:'+c+'"></span><span class="ntime" style="color:'+c+'">'+tStr()+'</span><span class="nmsg" style="color:'+c+'">'+label+'</span>';
  ul.insertBefore(li,ul.firstChild);
  while(ul.children.length>5)ul.removeChild(ul.lastChild);
  setTimeout(()=>{li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);},5000);
}
function pushAlert(msg){
  const ul=document.getElementById('notif-right');
  const li=document.createElement('li');li.className='notif notif-alert rIn';
  li.innerHTML='<span class="ndot" style="background:#E53935"></span><span class="ntime" style="color:#B01010">'+tStr()+'</span><span class="nmsg" style="color:#B01010;max-width:110px">'+msg+'</span><button class="ndism" onclick="this.closest(\'li\').remove()">×</button>';
  ul.insertBefore(li,ul.firstChild);
  while(ul.children.length>4)ul.removeChild(ul.lastChild);
}
function pushInsight(title,detail){
  const ul=document.getElementById('notif-bottom');
  const li=document.createElement('li');li.className='notif notif-ins';
  li.innerHTML='<div class="nh"><span class="ndot" style="background:#00C9A7"></span><span class="ntime" style="color:#007060">'+tStr()+'</span><span class="nmsg" style="color:#007060;max-width:260px">'+title+'</span><button class="ndism" style="margin-left:auto" onclick="event.stopPropagation();this.closest(\'li\').remove()">×</button></div><div class="nd">'+detail+'</div>';

  ul.insertBefore(li,ul.firstChild);
  while(ul.children.length>3)ul.removeChild(ul.lastChild);
  setTimeout(()=>{if(!li.classList.contains('exp')){li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);}},30000);
}
function checkSB(){fetch(SB_URL+'/rest/v1/aos_log_auditoria?select=id&limit=1',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(r=>{const on=r.ok;document.getElementById('sb-dot').className=on?'on':'';document.getElementById('sb-lbl').textContent=on?'Live · Supabase conectado':'Sin conexión';if(!on)pushAlert('Supabase desconectado');}).catch(()=>{document.getElementById('sb-dot').className='';document.getElementById('sb-lbl').textContent='Sin conexión';pushAlert('Sin conexión a Supabase');});}
checkSB();setInterval(checkSB,30000);
let ws=null,wsR=0;
function connectRT(){ws=new WebSocket('wss://ituyqwstonmhnfshnaqz.supabase.co/realtime/v1/websocket?apikey='+SB_KEY+'&vsn=1.0.0');ws.onopen=()=>{wsR=0;ws.send(JSON.stringify({topic:'realtime:public:aos_log_auditoria',event:'phx_join',payload:{config:{postgres_changes:[{event:'INSERT',schema:'public',table:'aos_log_auditoria'}]}},ref:'1'}));};ws.onmessage=e=>{try{const msg=JSON.parse(e.data),rec=msg.payload?.data?.record||msg.payload?.record;if(rec&&rec.tabla&&rec.tabla!=='sistema'){activateTable(rec.tabla,rec.accion||'INSERT');if(rec.accion==='DELETE')pushAlert('Eliminación en '+(rec.tabla.replace('aos_','')));}}catch(_){}};ws.onclose=()=>{wsR++;setTimeout(connectRT,Math.min(30000,2000*wsR));};ws.onerror=()=>ws.close();}

let lastId=0;
async function poll(){try{const r=await fetch(SB_URL+'/rest/v1/aos_log_auditoria?select=id,tabla,accion&id=gt.'+lastId+'&order=id.asc&limit=10',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});const rows=await r.json();if(Array.isArray(rows)&&rows.length){rows.forEach(row=>{if(row.tabla&&row.tabla!=='sistema')activateTable(row.tabla,row.accion);lastId=Math.max(lastId,row.id);});}}catch(_){}}
fetch(SB_URL+'/rest/v1/aos_log_auditoria?select=id&order=id.desc&limit=1',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(r=>r.json()).then(d=>{if(d&&d[0])lastId=d[0].id;});
setInterval(poll,8000);
function draw(){
  ctx.fillStyle='rgba(248,250,254,0.14)';ctx.fillRect(0,0,W,H);
  cam.z+=(cam.tz-cam.z)*0.07;
  document.getElementById('zoom-pill').textContent='zoom '+cam.z.toFixed(1)+'×';
