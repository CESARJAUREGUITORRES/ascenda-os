<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=10">
<title>AscendaOS · Brain · KronIA</title>
<!-- PWA: permite instalar como app nativa en Chrome/Edge -->
<!-- PWA desactivada (SES-038 rollback): la PWA estaba rompiendo el Brain.
     AscendaOS se usa en Chrome normal. Si despues queremos PWA, restaurar
     estas lineas:
     <link rel="manifest" href="/manifest-kronia.webmanifest">
     <meta name="theme-color" content="#0A4FBF">
     <meta name="application-name" content="KronIA">
     <meta name="apple-mobile-web-app-capable" content="yes">
     <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
     <meta name="apple-mobile-web-app-title" content="KronIA">
     <meta name="mobile-web-app-capable" content="yes">
     <link rel="apple-touch-icon" href="/icons/kronia-apple-180.png">
-->
<link rel="icon" type="image/png" sizes="192x192" href="/icons/kronia-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/kronia-512.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#0A4FBF;--blue2:#071D4A;--cyan:#00C9A7;--bg:#F8FAFE;--card:rgba(255,255,255,0.92);--muted:rgba(10,79,191,0.10);--t2:rgba(7,29,74,0.40);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;display:block}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none}

/* Brand */
#brand{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--muted);border-radius:10px;padding:6px 10px;backdrop-filter:blur(12px);pointer-events:all}
.bc-dot{width:8px;height:8px;border-radius:50%;background:#E53935;box-shadow:0 0 6px #E53935;flex-shrink:0;transition:all .5s}
.bc-dot.on{background:#00C9A7;box-shadow:0 0 8px #00C9A7;animation:glow 2.5s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
.bc-name{font-size:10px;font-weight:700;color:var(--blue2);letter-spacing:.04em;white-space:nowrap}
#sb-lbl{font-size:8px;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;color:#E53935;transition:color .5s}
#sb-lbl.on{color:#00C9A7}
.bc-sep{width:1px;height:20px;background:rgba(10,79,191,0.10);flex-shrink:0;margin:0 1px}
#btn-mic-cfg{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.30);border:1px solid rgba(10,79,191,0.10);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:11px;opacity:0.50;line-height:1}
#btn-mic-cfg:hover{opacity:0.9;background:rgba(0,201,167,0.10);border-color:rgba(0,201,167,0.22)}

/* Métricas */
#metrics{position:absolute;top:10px;right:10px;display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.mc{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 9px;backdrop-filter:blur(10px);display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.mv{font-size:14px;font-weight:800;color:var(--blue)}.ml{font-size:7px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase}

/* Notificaciones */
#nl{position:absolute;top:66px;left:10px;width:min(200px,36vw);display:flex;flex-direction:column;gap:4px;pointer-events:all}
#nr{position:absolute;top:66px;right:10px;width:min(185px,34vw);display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:all}
#nb{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);width:min(320px,84vw);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:all}
.notif{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:5px 8px;backdrop-filter:blur(10px);animation:nIn .22s ease;max-width:100%;transition:opacity .35s,transform .35s}
@keyframes nIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.rIn{animation:rIn .22s ease}@keyframes rIn{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.out{opacity:0!important;transform:translateY(-3px) scale(.97)!important}
.ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.ntime{font-size:7.5px;font-weight:600;min-width:32px;white-space:nowrap}
.nmsg{font-size:8.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.ndism{background:none;border:none;color:var(--t2);font-size:11px;cursor:pointer;padding:0 2px;margin-left:2px}
.na{border-color:rgba(220,50,50,0.18)!important;background:rgba(255,248,248,0.93)!important}
.ni{flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;border-color:rgba(0,201,167,0.18)!important;background:rgba(248,254,252,0.92)!important}
.ni .nh{display:flex;align-items:center;gap:5px;width:100%}
.ni .nd{font-size:8px;color:#006655;display:none;margin-top:3px;padding-top:4px;border-top:1px solid rgba(0,201,167,0.12);line-height:1.5;white-space:normal;max-width:300px}
.ni.exp .nd{display:block}

/* ── KronIA chip flotante ── */
#kronia{
  position:absolute;bottom:52px;right:14px;
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(145deg,#00C9A7,#0A4FBF);
  border:none;
  box-shadow:0 4px 16px rgba(0,201,167,0.40);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  opacity:0;transition:opacity .3s,width .3s,height .3s,border-radius .3s,background .3s,padding .3s;
  pointer-events:none;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
#kronia.vis{opacity:1;pointer-events:all}
#kronia.expanded{
  width:min(300px,84vw);height:auto;border-radius:16px;
  padding:10px 13px 10px;
  background:var(--card);
  border:1.5px solid rgba(0,201,167,0.22);
  box-shadow:0 6px 28px rgba(10,79,191,0.12);
  flex-direction:column;gap:6px;align-items:stretch;
  cursor:default;
}
/* ── ESTADO MINI RECTANGULAR (140x50 — ultra compacto) ──
   Solo waveform fina + boton mic + acciones discretas.
   Sin nombre "K KronIA", sin texto, sin canvas grande.
   Cesar quiere algo que NO estorbe en el escritorio. */
#kronia.mini{
  width:160px;height:50px;border-radius:25px;
  padding:5px 5px 5px 10px;
  background:var(--card);
  border:1.5px solid rgba(0,201,167,0.30);
  box-shadow:0 4px 14px rgba(10,79,191,0.15), 0 1px 4px rgba(0,0,0,0.06);
  flex-direction:row;gap:5px;align-items:center;
  cursor:default;
  -webkit-app-region:no-drag;
}
#kronia.mini #kk-chip-icon{display:none}
#kronia.mini #kk-inner{display:flex;flex-direction:row;align-items:center;gap:5px;width:100%}
#kronia.mini .kk-top{display:none} /* oculta nombre + dot, queda ultra limpio */
#kronia.mini #kk-cv{flex:1;height:24px;border-radius:12px;background:rgba(0,201,167,0.05);min-width:40px}
#kronia.mini #kk-txt{display:none}
#kronia.mini #tap-hint{display:none}
#kronia.mini #btn-tap{
  width:36px;height:36px;flex-shrink:0;font-size:14px;
  box-shadow:0 2px 8px rgba(0,201,167,0.40);
  margin:0;
}
#kronia.mini #kk-st{display:none}
#kronia.mini #kk-close{display:none}
#kronia.mini .kk-mini-actions{display:flex;align-items:center;gap:1px;flex-shrink:0}
/* En mini, los botones de control son micro (24x24) y solo iconos */
#kronia.mini .kk-mini-btn{
  width:24px;height:24px;padding:0;
  border-radius:6px;font-size:10px;
  background:transparent;border:none;
  color:var(--t2);
}
#kronia.mini .kk-mini-btn:hover{background:rgba(0,201,167,0.15);color:var(--blue);transform:none}
/* Indicador visual de modo standby (gris claro) */
#kronia.mini.standby{
  border-color:rgba(150,150,150,0.25);
  opacity:0.75;
}
#kronia.mini.standby #btn-tap{
  background:linear-gradient(145deg,#888,#666);
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.kk-mini-btn{
  background:rgba(0,201,167,0.10);border:1.5px solid rgba(0,201,167,0.30);cursor:pointer;
  height:28px;border-radius:8px;padding:0 9px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  color:var(--blue);font-size:11px;font-weight:700;line-height:1;
  transition:background .15s,color .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  font-family:inherit;letter-spacing:0.02em;
}
.kk-mini-btn:hover{background:rgba(0,201,167,0.20);transform:scale(1.05)}
.kk-mini-btn:active{transform:scale(0.95)}
#kronia.expanded .kk-mini-actions{display:none}
/* En expanded mostramos botones MINI / CERRAR grandes y visibles */
.kk-expanded-min{
  display:none;
  background:linear-gradient(135deg,#00C9A7,#0A4FBF);
  border:none;cursor:pointer;color:#fff;
  font-size:11px;font-weight:800;padding:6px 12px;border-radius:8px;
  line-height:1;flex-shrink:0;letter-spacing:0.04em;
  font-family:inherit;
  box-shadow:0 2px 8px rgba(0,201,167,0.30);
  transition:transform .12s,box-shadow .15s;
}
#kronia.expanded .kk-expanded-min{display:inline-flex;align-items:center;justify-content:center;gap:4px}
.kk-expanded-min:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,201,167,0.45)}
.kk-expanded-min:active{transform:scale(0.96)}
/* ── NOTIFICACION PROACTIVA (toast sobre el mini) ── */
#kk-proactive{
  position:absolute;bottom:calc(100% + 8px);right:0;
  width:280px;max-width:84vw;
  background:linear-gradient(145deg,rgba(0,201,167,0.95),rgba(10,79,191,0.95));
  color:#fff;
  border-radius:12px;padding:9px 12px;
  box-shadow:0 8px 24px rgba(10,79,191,0.30);
  font-size:11px;line-height:1.4;font-weight:600;
  opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;
  pointer-events:none;
  display:none;
}
#kk-proactive.show{opacity:1;transform:none;pointer-events:all;display:block;animation:kkPing 1.6s ease-out}
#kk-proactive::after{
  content:'';position:absolute;bottom:-6px;right:24px;
  width:12px;height:12px;background:inherit;
  transform:rotate(45deg);border-radius:2px;
}
@keyframes kkPing{
  0%{box-shadow:0 0 0 0 rgba(0,201,167,0.4)}
  60%{box-shadow:0 0 0 14px rgba(0,201,167,0)}
  100%{box-shadow:0 0 0 0 rgba(0,201,167,0)}
}
#kk-chip-icon{font-size:21px;line-height:1;color:#fff;transition:opacity .2s;flex-shrink:0}
#kronia.expanded #kk-chip-icon{display:none}
#kk-inner{display:none;flex-direction:column;gap:6px;width:100%}
#kronia.expanded #kk-inner{display:flex}
.kk-top{display:flex;align-items:center;gap:6px}
#kk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--t2);transition:background .3s,box-shadow .3s}
#kk-dot.idle{background:#00C9A7;box-shadow:0 0 7px #00C9A7}
#kk-dot.recording{background:#E53935;box-shadow:0 0 10px #E53935;animation:kpulse .45s infinite}
#kk-dot.speaking{background:#0A4FBF;box-shadow:0 0 8px #0A4FBF;animation:kpulse .7s infinite}
#kk-dot.thinking{background:#F0A020;box-shadow:0 0 8px #F0A020;animation:kpulse 1s infinite}
#kk-dot.nomic{background:#E53935}
@keyframes kpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}
.kk-name{font-size:11px;font-weight:700;color:var(--blue2);letter-spacing:.04em}
#kk-st{font-size:8px;color:var(--t2);flex:1;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#kk-close{background:none;border:none;font-size:14px;color:var(--t2);cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
#kk-cv{width:100%;height:24px;border-radius:5px;background:rgba(0,201,167,0.04)}
#kk-txt{font-size:9.5px;color:var(--blue2);line-height:1.45;min-height:13px;max-height:54px;overflow:hidden;opacity:.76;word-break:break-word}
#btn-tap{
  align-self:center;width:46px;height:46px;border-radius:50%;
  background:linear-gradient(145deg,#00C9A7,#0A4FBF);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;color:#fff;
  box-shadow:0 3px 14px rgba(0,201,167,0.35);
  transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;margin-top:1px;
}
#btn-tap.recording{background:linear-gradient(145deg,#E53935,#B01010);box-shadow:0 3px 18px rgba(229,57,53,0.45);animation:tapRec .9s infinite}
#btn-tap.thinking{background:linear-gradient(145deg,#F0A020,#D08000);animation:none}
@keyframes tapRec{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
#tap-hint{font-size:7.5px;color:var(--t2);text-align:center;letter-spacing:.05em}
/* ── Modal mic ── */
#mic-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(7,29,74,0.22);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .22s}
#mic-modal.open{opacity:1;pointer-events:all}
#mic-card{background:#fff;border:1px solid rgba(10,79,191,0.14);border-radius:14px;
  padding:18px 20px;width:min(320px,88vw);box-shadow:0 8px 32px rgba(10,79,191,0.12);
  display:flex;flex-direction:column;gap:12px}
.mic-title{font-size:13px;font-weight:700;color:var(--blue2);display:flex;align-items:center;gap:7px}
.mic-sub{font-size:9px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-top:-6px}
#mic-list{display:flex;flex-direction:column;gap:6px}
.mic-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;
  border:1.5px solid transparent;cursor:pointer;transition:all .18s;background:var(--bg)}
.mic-opt:hover{border-color:rgba(0,201,167,0.3);background:rgba(248,254,252,0.8)}
.mic-opt.sel{border-color:#00C9A7;background:rgba(0,201,167,0.07)}
.mic-opt-dot{width:8px;height:8px;border-radius:50%;background:var(--t2);flex-shrink:0;transition:background .2s}
.mic-opt.sel .mic-opt-dot{background:#00C9A7;box-shadow:0 0 6px #00C9A7}
.mic-opt-name{font-size:10px;font-weight:600;color:var(--blue2);flex:1}
.mic-opt-type{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em}
.mic-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.mic-btn{padding:6px 14px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
#mic-cancel{background:transparent;border:1px solid var(--muted);color:var(--t2)}
#mic-accept{background:var(--cyan);color:#fff}
#mic-accept:hover{background:#00b090}

/* Controles */
#ctrls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;pointer-events:all}
.cb{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 10px;font-size:8.5px;color:var(--blue2);cursor:pointer;backdrop-filter:blur(8px);font-weight:600;transition:all .2s;white-space:nowrap}
.cb:hover{background:rgba(10,79,191,0.06)}.cb.on{border-color:var(--cyan);color:#007060}
#zpill{font-size:8px;color:var(--t2);background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:3px 9px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}

/* Tooltip */
#tt{position:fixed;background:#fff;border:1px solid rgba(10,79,191,0.14);border-radius:12px;padding:10px 14px;min-width:160px;max-width:210px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:30;box-shadow:0 4px 18px rgba(10,79,191,0.09)}
#tt-n{font-size:11px;font-weight:700;color:var(--blue2);margin-bottom:5px;display:block}
.tr{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.tk{font-size:9px;color:var(--t2)}.tv{font-size:9px;font-weight:700;color:var(--blue2)}
@media(max-width:480px){#nl{width:min(150px,32vw)}#nr{width:min(140px,30vw)}.nmsg{max-width:85px;font-size:8px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="brand">
    <div class="bc-dot" id="sb-dot"></div>
    <div>
      <div class="bc-name">AscendaOS · Brain</div>
      <div id="sb-lbl">Sin conexión</div>
    </div>
    <div class="bc-sep"></div>
    <button id="btn-mic-cfg" title="Configurar micrófono">⚙︎</button>
  </div>
  <div id="metrics">
    <div class="mc"><span class="mv" id="m-ev">0</span><span class="ml">eventos</span></div>
    <div class="mc"><span class="mv" id="m-tb" style="color:var(--cyan)">8</span><span class="ml">tablas</span></div>
  </div>
  <div id="nl"></div>
  <div id="nr"></div>
  <div id="nb"></div>

  <!-- KronIA chip flotante v6 — 3 estados: burbuja / mini / expanded -->
  <div id="kronia">
    <div id="kk-proactive"></div>
    <span id="kk-chip-icon">&#127908;</span>
    <div id="kk-inner">
      <div class="kk-top">
        <div id="kk-dot"></div>
        <span class="kk-name">KronIA</span>
        <span id="kk-st">Toca para hablar</span>
        <button class="kk-expanded-min" id="kk-btn-mini" title="Hacer chiquito (solo voz)">⊟ MINI</button>
        <button id="kk-close" title="Cerrar">&#215;</button>
      </div>
      <canvas id="kk-cv"></canvas>
      <div id="kk-txt">...</div>
      <button id="btn-tap">&#127908;</button>
      <div id="tap-hint">Toca &middot; Habla &middot; Para solo</div>
      <div class="kk-mini-actions">
        <button class="kk-mini-btn" id="kk-btn-expand" title="Abrir Brain completo">⊞ AMPLIAR</button>
        <button class="kk-mini-btn" id="kk-btn-bubble" title="Cerrar">✕</button>
      </div>
    </div>
  </div>
  <div id="ctrls">
    <button class="cb" id="btn-fs">⛶ Pantalla completa</button>
    <div id="zpill">zoom 1.0×</div>
    <button class="cb" id="btn-kk">🧠 KronIA</button>
  </div>
</div>

<!-- Modal micrófono -->
<div id="mic-modal">
  <div id="mic-card">
    <div>
      <div class="mic-title">🎤 Micrófono</div>
      <div class="mic-sub">Selecciona el dispositivo de entrada</div>
    </div>
    <div id="mic-list">Cargando dispositivos…</div>
    <div class="mic-actions">
      <button class="mic-btn" id="mic-cancel">Cancelar</button>
      <button class="mic-btn" id="mic-accept">Aceptar</button>
    </div>
  </div>
</div>

<div id="tt"><span id="tt-n"></span><div id="tt-b"></div></div>

<script src="/kronia-core.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// ASCENDAOS BRAIN v3 + KRONIA v4.1 — usa kronia-core.js compartido
// Sin palabras clave. Presiona → habla → suelta → KronIA responde.
// ═══════════════════════════════════════════════════════════════

const SB  = 'https://ituyqwstonmhnfshnaqz.supabase.co';
const SK  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
const SK2 = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbmV6bGh0cWtpdWN3bXJkaXJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDY5OTY4MjAsImV4cCI6MjAyMjU3MjgyMH0.R5-sbTxsHf-7oSsIw0ZRMqBobDUz0vI62f19hmJKmMA';
const H   = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };

// ── Canvas principal ─────────────────────────────────────────────
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H2;
function resize() { W = cv.width = innerWidth; H2 = cv.height = innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); initG(); });

// ── Tablas ───────────────────────────────────────────────────────

// ── Grafo ────────────────────────────────────────────────────────
let nodes=[], edges=[], gmap={};
const eSet = new Set();
function nR(n){ return Math.max(1.2, Math.log10(n+1)*2.3); }
function lR(a,b,t){ return [~~(a[0]+(b[0]-a[0])*t),~~(a[1]+(b[1]-a[1])*t),~~(a[2]+(b[2]-a[2])*t)]; }
function d2(a,b){ return (a.x-b.x)**2+(a.y-b.y)**2; }
function addE(a,b,cr){ if(a===b)return; const k=a.id<b.id?a.id+'|'+b.id:b.id+'|'+a.id; if(!eSet.has(k)){eSet.add(k);edges.push({a,b,cross:cr});} }
function initG(){
  nodes=[];edges=[];gmap={};eSet.clear();
  const keys=Object.keys(TS),N=keys.length,R=Math.min(W,H2)*.32;
  keys.forEach((k,i)=>{
    const st=TS[k],ang=(i/N)*Math.PI*2-Math.PI/2;
    const gcx=W/2+R*.65*Math.cos(ang),gcy=H2/2+R*.65*Math.sin(ang);
    const cnt=Math.max(3,Math.floor(Math.log10(st.n+1)*5.5));
    gmap[k]=[];
    for(let j=0;j<cnt;j++){
      const a=Math.random()*Math.PI*2,r=Math.random()*R*.18*(0.4+Math.random()*.6);
      const hub=j===0,nr=hub?nR(st.n)*1.8:nR(st.n)*(.45+Math.random()*.65);
      const node={id:nodes.length,x:gcx+Math.cos(a)*r,y:gcy+Math.sin(a)*r,ox:gcx,oy:gcy,vx:0,vy:0,r:nr,group:k,idle:st.idle,live:st.live,pulse:0,phase:Math.random()*Math.PI*2,pspd:.002+Math.random()*.002,label:hub?st.label:null};
      nodes.push(node);gmap[k].push(node);
    }
  });
  Object.values(gmap).forEach(gn=>{ gn.forEach(n=>{ [...gn].filter(m=>m!==n).sort((a,b)=>d2(n,a)-d2(n,b)).slice(0,2+~~(Math.random()*2)).forEach(m=>addE(n,m,false)); }); });
  CONN.forEach(([ga,gb])=>{ const na=gmap[ga]||[],nb=gmap[gb]||[]; if(!na.length||!nb.length)return; for(let i=0;i<Math.min(2,na.length);i++)for(let j=0;j<Math.min(2,nb.length);j++)addE(na[i],nb[j],true); const x=~~(Math.min(na.length,nb.length)*.12)+1; for(let k=0;k<x;k++)addE(na[~~(Math.random()*na.length)],nb[~~(Math.random()*nb.length)],true); });
  for(let i=0;i<350;i++)phys(i<80?.82:i<200?.92:.97);
  nodes.forEach(n=>{n.ox=n.x;n.oy=n.y;});
}
function phys(d=.92){
  const k=Math.min(W,H2)*.021;
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,mD=(a.r+b.r)*3;if(dd<k*2.8){const f=k*k/dd*.38;a.vx-=dx/dd*f;a.vy-=dy/dd*f;b.vx+=dx/dd*f;b.vy+=dy/dd*f;}if(dd<mD){const p=(mD-dd)*.2;a.vx-=dx/dd*p;a.vy-=dy/dd*p;b.vx+=dx/dd*p;b.vy+=dy/dd*p;}}
  edges.forEach(e=>{const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,ideal=e.cross?k*2.5:k*1.1,f=(dd-ideal)/dd*.08;e.a.vx+=dx*f;e.a.vy+=dy*f;e.b.vx-=dx*f;e.b.vy-=dy*f;});
  nodes.forEach(n=>{n.vx+=(n.ox-n.x)*.018;n.vy+=(n.oy-n.y)*.018;n.vx+=(W/2-n.x)*.001;n.vy+=(H2/2-n.y)*.001;n.vx*=d;n.vy*=d;n.x+=n.vx;n.y+=n.vy;});
}

function ptd(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function chkHov(sx,sy){const wx=(sx-W/2-cam.x)/cam.z+W/2,wy=(sy-H2/2-cam.y)/cam.z+H2/2;let best=null,bd=Infinity;nodes.forEach(n=>{const dd=(n.x-wx)**2+(n.y-wy)**2;if(dd<(n.r*3)**2&&dd<bd){bd=dd;best=n;}});hovered=best;const tt=document.getElementById('tt');if(best){const st=TS[best.group]||TS.otros;document.getElementById('tt-n').textContent=st.label;document.getElementById('tt-b').innerHTML='<div class="tr"><span class="tk">Tabla</span><span class="tv">'+best.group+'</span></div><div class="tr"><span class="tk">Registros</span><span class="tv">'+st.n.toLocaleString()+'</span></div>';const sx2=best.x*cam.z+W/2+cam.x-W/2*cam.z+W*(1-cam.z)/2,sy2=best.y*cam.z+H2/2+cam.y-H2/2*cam.z+H2*(1-cam.z)/2;tt.style.left=Math.min(W-220,sx2+14)+'px';tt.style.top=Math.max(10,sy2-50)+'px';tt.style.opacity='1';}else tt.style.opacity='0';}

  const vs=synth.getVoices(); if(!vs.length)return null;
  const p=[
    v=>v.name==='Google espanol',
    v=>v.name.toLowerCase().includes('google')&&v.lang.startsWith('es'),
    v=>v.lang==='es-MX', v=>v.lang==='es-US',
    v=>v.lang==='es-419', v=>v.lang.startsWith('es')

  for(const t of p){const v=vs.find(t);if(v)return v;}

let kkMode = 'closed'; // 'closed' | 'bubble' | 'mini' | 'expanded'

function setKKMode(mode){
  const el = document.getElementById('kronia');
  if(!el) return;
  el.classList.remove('expanded','mini');
  if(mode === 'closed'){
    el.classList.remove('vis');
    kkVis = false; kkExpanded = false;
    stopWave();
  } else if(mode === 'bubble'){
    el.classList.add('vis');
    kkVis = true; kkExpanded = false;
    stopWave();
  } else if(mode === 'mini'){
    el.classList.add('vis','mini');
    kkVis = true; kkExpanded = false; /* mini cuenta como NO-expanded para UI */

    el.classList.add('vis','expanded');
    kkVis = true; kkExpanded = true;
    if(analyser) waveReal(); else waveSynth('listen');
  }
  kkMode = mode;
  /* Guardar preferencia */
  try{ localStorage.setItem('kk_last_mode', mode); }catch(e){}
}

// ── Hablar — flujo conversacional natural v3 ─────────────────────
// (SES-038) Mecanismos:
//   - BARGE-IN: si detecta voz mientras KronIA habla, ella se calla y escucha
//   - AUTO-ESCUCHA al terminar de hablar (no hay que tocar boton)
//   - STANDBY: tras 5s en silencio sin voz, pasa a modo standby silencioso
//     (sigue corriendo, sigue recibiendo notificaciones proactivas, pero
//      ya no procesa speech-to-text. Se reactiva con cualquier voz detectada)
//   - PALABRAS DE CIERRE: "gracias", "listo", "ok", "ya", "ya entendi" cierran turno
let bargeInTimer = null;
let standbyTimer = null;
let standbyMode  = false;     // true = no procesa STT, solo escucha para reactivar
let standbyWatcher = null;     // intervalo que escucha en standby por voz

/* Palabras/frases que terminan la conversacion conversacional */
const CIERRE_REGEX = /\b(gracias|listo|ok|ya entendi|ya entendí|perfecto|de acuerdo|entendido|cierra|chao|adios|nada mas|nada más|eso es todo|suficiente|claro|copiado|dale)\b/i;

function esPalabraDeCierre(texto){
  if(!texto || texto.length > 25) return false; /* solo frases cortas son cierre */
  return CIERRE_REGEX.test(texto.trim());
}

function entrarStandby(){
  if(standbyMode) return;
  standbyMode = true;
  /* Parar grabacion activa si la hay */
  if(isRecording) pararGrabacion();
  /* Marcar visualmente en mini */
  const el = document.getElementById('kronia');
  if(el && kkMode==='mini') el.classList.add('standby');
  kkState('idle');
  setKKTxt('En standby (habla para reactivar)');
  console.log('[KronIA] → STANDBY (escuchando silenciosamente)');
  /* Activar watcher de bajo costo: solo detecta voz para reactivar */
  iniciarStandbyWatcher();
}

function salirStandby(){
  if(!standbyMode) return;
  standbyMode = false;
  /* Limpiar watcher */
  if(standbyWatcher){ clearInterval(standbyWatcher); standbyWatcher = null; }
  const el = document.getElementById('kronia');
  if(el) el.classList.remove('standby');
  console.log('[KronIA] ← REACTIVADA');
  /* Empezar a grabar inmediatamente */
  if(micReady && !isRecording && !isSpeaking){
    startGrabacion();
  }
}

function iniciarStandbyWatcher(){
  if(standbyWatcher){ clearInterval(standbyWatcher); }
  if(!analyser || !dataArr) return;
  let vozAcum = 0;
  standbyWatcher = setInterval(()=>{
    if(!standbyMode){ clearInterval(standbyWatcher); standbyWatcher=null; return; }
    if(isSpeaking || isRecording) return;
    analyser.getByteFrequencyData(dataArr);
    const avg = dataArr.reduce((a,v)=>a+v,0)/dataArr.length;
    /* Umbral alto para evitar reactivar por ruido ambiente.
       Necesitamos ~400ms de voz sostenida para reactivar. */
    if(avg > 18){
      vozAcum += 100;
      if(vozAcum >= 400){
        salirStandby();
      }
    } else {
      vozAcum = Math.max(0, vozAcum - 80);
    }
  }, 100);
}

function programarStandby(){
  /* Tras responder, programar paso a standby si no hay actividad en 5s */
  if(standbyTimer){ clearTimeout(standbyTimer); standbyTimer=null; }
  standbyTimer = setTimeout(()=>{
    if(!isSpeaking && !isRecording){
      entrarStandby();
    }
  }, STANDBY_AFTER_MS);
}

function cancelarStandby(){
  if(standbyTimer){ clearTimeout(standbyTimer); standbyTimer=null; }
}

function kkSpeak(text){
  /* Si vamos a hablar, cancelar standby pendiente */
  cancelarStandby();
  if(standbyMode) salirStandby();

  synth.cancel(); isSpeaking=true;
  const u=new SpeechSynthesisUtterance(text);
  if(!kkVoice)kkVoice=getVoz();
  if(kkVoice)u.voice=kkVoice;
  u.lang='es-419'; u.rate=0.98; u.pitch=1.06; u.volume=1;
  setKKTxt(text);
  kkState('speaking');
  waveSynth('speak');
  if(kkMode === 'closed' || kkMode === 'bubble') setKKMode('mini');

  /* BARGE-IN: monitorear nivel del mic mientras KronIA habla */
  if(bargeInTimer){clearInterval(bargeInTimer);bargeInTimer=null;}
  let vozSostenida = 0;
  if(analyser && dataArr){
    bargeInTimer = setInterval(()=>{
      if(!isSpeaking){clearInterval(bargeInTimer);bargeInTimer=null;return;}
      analyser.getByteFrequencyData(dataArr);
      const avg = dataArr.reduce((a,v)=>a+v,0)/dataArr.length;
      if(avg > 22){
        vozSostenida += 80;
        if(vozSostenida >= 350){
          clearInterval(bargeInTimer); bargeInTimer = null;
          synth.cancel(); isSpeaking = false;
          setTimeout(()=>{ if(!isRecording) startGrabacion(); }, 100);
        }
      } else {
        vozSostenida = Math.max(0, vozSostenida - 60);
      }
    }, 80);
  }

  u.onend=()=>{
    isSpeaking=false;
    if(bargeInTimer){clearInterval(bargeInTimer);bargeInTimer=null;}
    kkState('idle');
    if(analyser)waveReal(); else waveSynth('listen');
    /* AUTO-ESCUCHA: arrancar grabacion inmediatamente */
    setTimeout(()=>{
      if(!isSpeaking && !isRecording && micReady && (kkMode==='mini'||kkMode==='expanded')){
        startGrabacion();
        /* Programar standby por si el usuario no dice nada en 5s */
        programarStandby();
      }
    }, 450);
  };
  u.onerror=()=>{
    isSpeaking=false;
    if(bargeInTimer){clearInterval(bargeInTimer);bargeInTimer=null;}
    kkState('idle');
  };
  synth.speak(u);
}

    setKKMode('mini');
    if(!micReady) pedirPermiso();
  } else if(kkMode === 'mini'){
    setKKMode('expanded');
    if(!micReady) pedirPermiso();
  } else { /* expanded → mini (no cerrar del todo desde aqui) */
    setKKMode('mini');
  }
}

// ── Permisos + stream ────────────────────────────────────────────
async function pedirPermiso(){
  kkState('idle');
  setKKTxt('Verificando micrófono...');

  /* 1) Verificar contexto seguro (HTTPS) */
  if(!window.isSecureContext){
    micReady=false; kkState('nomic');
    setKKTxt('Error: requiere HTTPS');
    pushAlert('Mic: requiere conexion segura HTTPS');
    return;
  }

  /* 2) Verificar API disponible */
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    micReady=false; kkState('nomic');
    setKKTxt('Tu navegador no soporta audio');
    pushAlert('Mic: getUserMedia no disponible');
    return;
  }

  /* 3) Verificar estado de permiso previo (Chrome/Edge) */
  try{
    if(navigator.permissions && navigator.permissions.query){
      const p = await navigator.permissions.query({name:'microphone'});
      if(p.state === 'denied'){
        micReady=false; kkState('nomic');
        setKKTxt('Permiso denegado. Click candado URL para activar');
        pushAlert('Mic: permiso denegado por el navegador. Abre el candado de la barra de direcciones > Microfono > Permitir');
        return;
      }
    }
  }catch(e){ /* no critical, browser sin permissions API */ }

  setKKTxt('Solicitando microfono...');
  try{
    const tmp=await navigator.mediaDevices.getUserMedia({audio:true});
    tmp.getTracks().forEach(t=>t.stop());
    const devs=await navigator.mediaDevices.enumerateDevices();
    availableDevices=devs.filter(d=>d.kind==='audioinput');
    if(availableDevices.length===0){
      micReady=false; kkState('nomic');
      setKKTxt('No se detectaron microfonos');
      pushAlert('Mic: no hay dispositivos de entrada');
      return;
    }
    if(availableDevices.length>0)selectedDeviceId=availableDevices[0].deviceId;
    await startStream();
    micReady=true;
    kkState('idle');
    setKKTxt('Listo. Toca el boton y habla.');
    waveReal();
  }catch(err){
    micReady=false; kkState('nomic');
    let msg='Error: '+err.name;
    if(err.name==='NotAllowedError') msg='Permiso denegado. Click candado URL';
    else if(err.name==='NotFoundError') msg='Sin microfono conectado';
    else if(err.name==='NotReadableError') msg='Mic en uso por otra app';
    else if(err.name==='OverconstrainedError') msg='Mic no compatible';
    else if(err.name==='SecurityError') msg='Bloqueado por seguridad';
    setKKTxt(msg);
    pushAlert('Mic ('+err.name+'): '+msg);
    console.warn('[Brain] Mic error:', err);
  }
}

async function startStream(){
  const c={audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,...(selectedDeviceId?{deviceId:{exact:selectedDeviceId}}:{})}};
  micStream=await navigator.mediaDevices.getUserMedia(c);
  if(audioCtx){audioCtx.close();audioCtx=null;}
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx.createMediaStreamSource(micStream);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=64; analyser.smoothingTimeConstant=0.7;
  dataArr=new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
}
function stopStream(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  analyser=null;dataArr=null;
}
function stopMic(){
  micReady=false;isRecording=false;
  clearVAD();
  if(recognition){try{recognition.abort();}catch(_){}recognition=null;}
  stopStream();
}

// ── VAD — auto-stop por silencio ─────────────────────────────────
function startVAD(){
  clearVAD();silenceMs=0;
  vadTimer=setInterval(()=>{
    if(!analyser||!dataArr||!isRecording){clearVAD();return;}
    analyser.getByteFrequencyData(dataArr);
    const avg=dataArr.reduce((a,v)=>a+v,0)/dataArr.length;
    if(avg<SILENCE_THRESHOLD){
      silenceMs+=100;
      if(silenceMs>=SILENCE_STOP_MS)pararGrabacion();
    } else {
      silenceMs=0;
    }
  },100);
}
function clearVAD(){if(vadTimer){clearInterval(vadTimer);vadTimer=null;}silenceMs=0;}

// ── Reconocimiento de voz mejorado (SES-038) ─────────────────────
// Cambios:
//   - lang es-419 (latino generico) + es-PE como fallback
//   - continuous=true (sigue escuchando entre pausas cortas)
//   - VAD aumentado a 3s (no corta si pausas para pensar)
//   - acepta interim con alta confianza si VAD cierra
//   - reintento automatico una vez si no-speech (puede ser ruido inicial)
let recoRetryCount = 0;
function startSingleReco(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){pushAlert('Tu navegador no soporta voz. Usa Chrome o Edge.');return;}
  recognition=new SR();
  /* Probar primero latino generico, mejor reconocimiento para Peru */
  recognition.lang='es-419';
  recognition.continuous=true;       /* sigue escuchando entre pausas cortas */
  recognition.interimResults=true;
  recognition.maxAlternatives=5;     /* mas opciones de transcripcion */
  let finalTxt='';
  let mejorInterim='';
  let mejorConfidence=0;

  recognition.onresult=function(e){
    /* Procesar TODOS los results, no solo el ultimo */
    for(let i=e.resultIndex;i<e.results.length;i++){
      const res=e.results[i];
      const alt=res[0];
      const txt=alt.transcript.trim();
      const conf=alt.confidence||0;
      if(res.isFinal){
        finalTxt += (finalTxt?' ':'') + txt;
      } else if(conf>mejorConfidence && txt.length>=2){
        mejorInterim=txt;
        mejorConfidence=conf;
      }
      setKKTxt(txt);
    }
  };

  recognition.onend=function(){
    clearVAD();isRecording=false;
    /* Usar finalTxt si existe; sino el mejor interim que tengamos */
    let q = finalTxt.trim();
    if(!q || q.length<2){
      q = mejorInterim.trim();
    }
    if(!q || q.length<2){
      /* Reintentar una vez antes de rendirse */
      if(recoRetryCount<1 && analyser){
        recoRetryCount++;
        kkState('listening'); setKKTxt('No te escuche bien, sigue hablando...');
        setTimeout(()=>{
          if(!isRecording){
            isRecording=true;
            startSingleReco();
            startVAD();
          }
        }, 400);
        return;
      }
      recoRetryCount=0;
      kkState('idle');setKKTxt('No te escuche. Toca el boton e intenta de nuevo.');
      if(analyser)waveReal();
      return;
    }
    recoRetryCount=0;
    processQuery(q);
  };

  recognition.onerror=function(e){
    clearVAD();isRecording=false;
    if(e.error==='not-allowed'){
      pushAlert('Mic: permiso denegado. Click candado URL > Microfono > Permitir');
      micReady=false;kkState('nomic');
      setKKTxt('Permiso denegado. Click candado URL para activar');
    }
    else if(e.error==='no-speech'){
      kkState('idle');setKKTxt('Silencio detectado. Toca y habla.');
      if(analyser)waveReal();
    }
    else if(e.error==='network'){
      kkState('idle');setKKTxt('Sin conexion a servidor de voz. Reintenta.');
    }
    else if(e.error==='audio-capture'){
      kkState('nomic');setKKTxt('No se puede capturar audio. Verifica mic.');
    }
    else {
      kkState('idle');setKKTxt('Error: '+e.error+'. Reintenta.');
      console.warn('[Brain] SpeechRecognition error:', e.error);
    }
  };

  try{recognition.start();}catch(e){
    console.error('[Brain] Start reco error:', e);
    /* Si ya estaba started, intentar parar y reiniciar */
    try{recognition.stop();}catch(_){}
    setTimeout(()=>{try{recognition.start();}catch(_){}}, 200);
  }
}

function norm(s){ return s.toLowerCase().replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i').replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n').replace(/[¿¡]/g,'').trim(); }
async function processQuery(q){
  if(!q || q.trim().length < 2){ kkSpeak('¿Qué quieres saber?'); return; }

  /* DETECCION DE CIERRE: si dices "gracias", "listo", "ok", etc.,
     KronIA responde corto y pasa a standby inmediatamente */
  if(esPalabraDeCierre(q)){
    console.log('[KronIA] Palabra de cierre detectada:', q);
    const cierres = ['De nada.','Listo.','A la orden.','Por aquí estoy.','Cuando quieras.'];
    const cierre = cierres[Math.floor(Math.random()*cierres.length)];
    /* Hablar corto y luego forzar standby tras terminar */
    synth.cancel(); isSpeaking=true;
    const u = new SpeechSynthesisUtterance(cierre);
    if(!kkVoice)kkVoice=getVoz();
    if(kkVoice)u.voice=kkVoice;
    u.lang='es-419'; u.rate=1.0; u.pitch=1.06;
    setKKTxt(cierre);
    kkState('speaking');
    u.onend = ()=>{
      isSpeaking=false; kkState('idle');
      /* NO auto-escuchar; pasar directo a standby */
      setTimeout(()=>{ entrarStandby(); }, 600);
    };
    u.onerror = ()=>{ isSpeaking=false; kkState('idle'); entrarStandby(); };
    synth.speak(u);
    return;
  }

  /* Cualquier nueva pregunta cancela standby pendiente */
  cancelarStandby();
  if(standbyMode) salirStandby();

  kkState('thinking');
  
  // Detectar tablas mencionadas para visualización en Brain
  const qn = norm(q);
  const tablasMencionadas = [];
  if(qn.match(/venta|facturad|cobr|pag/)) tablasMencionadas.push('aos_ventas');
  if(qn.match(/cita|agenda|reserv/)) tablasMencionadas.push('aos_agenda_citas');
  if(qn.match(/llamad|llama|tipif/)) tablasMencionadas.push('aos_llamadas');
  if(qn.match(/lead|prospec|contact/)) tablasMencionadas.push('aos_leads');
  if(qn.match(/pacient|client|hist/)) tablasMencionadas.push('aos_pacientes');
  if(qn.match(/seguim|recontact/)) tablasMencionadas.push('aos_seguimientos');
  if(qn.match(/campan|anunci|invers/)) tablasMencionadas.push('aos_inversion_campanas');
  if(qn.match(/etiquet|tag/)) tablasMencionadas.push('aos_base_etiquetas');
  if(qn.match(/equipo|asesor|doctor|rrhh/)) tablasMencionadas.push('aos_rrhh');
  
  // ─── Llamar a KroniaCore (nucleo compartido — mismos poderes que el chat mayor) ───
  let resp = '';
  try {
    const d = await kronia.chat(q, { session_id: SESSION_ID });
    if (d.ok) resp = d.respuesta || 'No tuve respuesta clara.';
    else resp = d.authExpired ? 'Sesion no autorizada en KronIA.' : ('Error: '+(d.error||'no pude procesar'));
  } catch(e) {
    resp = 'Error de conexion con KronIA. Intenta de nuevo.';
  }
  
  // Activar visualización de tablas en el canvas
  tablasMencionadas.forEach((t,i) => setTimeout(() => activateTable(t,'CONSULTA'), i*200));
  
  // Guardar en memoria local del Brain
  memoria.unshift({i:'kronia', q, r:resp, tabs:tablasMencionadas, ts:Date.now()});
  if(memoria.length > 5) memoria.pop();
  
  // Limpiar respuesta para TTS (quitar markdown/emojis para mejor lectura)
  const respLimpia = resp.replace(/[*_`#]/g,'').replace(/\n+/g,' ').replace(/\s+/g,' ').trim();
  
  kkSpeak(respLimpia);
}

// ── Waveforms ────────────────────────────────────────────────────
function stopWave(){
  if(waveAnim){ cancelAnimationFrame(waveAnim); waveAnim = null; }
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  kkCtx2.clearRect(0, 0, kkCv.width, kkCv.height);
}
function waveReal(){
  if(waveAnim) cancelAnimationFrame(waveAnim);
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  const cw = kkCv.width, ch = kkCv.height;
  function frame(){
    if(!analyser || isSpeaking){ waveAnim = null; return; }
    analyser.getByteFrequencyData(dataArr);
    kkCtx2.clearRect(0, 0, cw, ch);
    const bars = dataArr.length, bw = cw / bars;
    const sig = dataArr.some(v => v > 8);
    const col = isRecording ? '229,57,53' : '0,201,167';
    for(let i = 0; i < bars; i++){
      const h = sig ? Math.max(2,(dataArr[i]/255)*ch*.88) : 2;
      const al = sig ? (0.3 + dataArr[i]/255*.65) : 0.18;
      kkCtx2.fillStyle = 'rgba(' + col + ',' + al.toFixed(2) + ')';
      kkCtx2.beginPath();
      if(kkCtx2.roundRect) kkCtx2.roundRect(i*bw+1, ch/2-h/2, bw-2, h, 2);
      else kkCtx2.rect(i*bw+1, ch/2-h/2, bw-2, h);
      kkCtx2.fill();
    }
    waveAnim = requestAnimationFrame(frame);
  }
  frame();
}
function waveSynth(mode){
  if(waveAnim) cancelAnimationFrame(waveAnim);
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  const cw = kkCv.width, ch = kkCv.height;
  const spd = mode==='speak' ? .10 : .04, amp = mode==='speak' ? .75 : .30;
  let t = 0;
  function frame(){
    t += spd; kkCtx2.clearRect(0, 0, cw, ch);
    for(let i = 0; i < 22; i++){
      const h = Math.max(2,(Math.sin(t+i*.42)*amp+amp+.05)*ch*.82);
      kkCtx2.fillStyle = 'rgba(0,201,167,' + (mode==='speak'?.65:.30) + ')';
      kkCtx2.beginPath();
      if(kkCtx2.roundRect) kkCtx2.roundRect(i*(cw/22)+1, ch/2-h/2, cw/22-2, h, 2);
      else kkCtx2.rect(i*(cw/22)+1, ch/2-h/2, cw/22-2, h);
      kkCtx2.fill();
    }
    waveAnim = requestAnimationFrame(frame);
  }
  frame();
}

// FIX SES-038: arranque robusto con reintentos exponenciales para evitar
// que aparezca "SIN CONEXION" en los primeros 30s cuando el DNS aun no
// resolvio o Railway aun no cacheo. Antes: 1 chequeo y rojo hasta el proximo poll.
let sbBackoff = 0;
function setSBStatus(on, mensaje){
  const dot = document.getElementById('sb-dot');
  const lbl = document.getElementById('sb-lbl');
  if(!dot || !lbl) return;
  if(on === 'checking'){
    dot.className = 'bc-dot';
    lbl.className = '';
    lbl.textContent = mensaje || 'Conectando...';
    return;
  }
  dot.className = 'bc-dot' + (on ? ' on' : '');
  lbl.className = on ? 'on' : '';
  lbl.textContent = on ? (mensaje || 'Live · Supabase') : (mensaje || 'Sin conexión');
}
function checkSB(){
  fetch(SB+'/rest/v1/aos_log_auditoria?select=id&limit=1',{headers:H, cache:'no-store'}).then(r=>{
    if(r.ok){
      sbBackoff = 0;
      setSBStatus(true);
    } else {
      // 4xx no es "sin conexion" — es respuesta del servidor pero con error
      sbBackoff++;
      if(sbBackoff <= 3){
        setSBStatus('checking', 'Reintentando...');
        setTimeout(checkSB, Math.min(8000, 1500 * sbBackoff));
      } else {
        setSBStatus(false, 'Sin conexión (HTTP '+r.status+')');
        pushAlert('Supabase: HTTP '+r.status);
      }
    }
  }).catch(()=>{
    sbBackoff++;
    if(sbBackoff <= 3){
      setSBStatus('checking', 'Conectando...');
      setTimeout(checkSB, Math.min(8000, 1500 * sbBackoff));
    } else {
      setSBStatus(false);
    }
  });
}

  edges.forEach(e=>{const p=Math.max(e.a.pulse,e.b.pulse),ci=e.cross?lR(e.a.idle,e.b.idle,.5):e.a.idle,ca=e.cross?lR(e.a.live,e.b.live,.5):e.a.live,c=lR(ci,ca,p);ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);ctx.strokeStyle='rgba('+c+','+(e.cross?0.05+p*.6:0.16+p*.45).toFixed(2)+')';ctx.lineWidth=(e.cross?.38:.26)/cam.z;ctx.stroke();});
  nodes.forEach(n=>{n.phase+=n.pspd;if(n.pulse>0)n.pulse=Math.max(0,n.pulse-0.016);const p=n.pulse,c=lR(n.idle,n.live,p),isH=n===hovered,r=n.r+(isH?1.2:0);if(p>0.05||isH){ctx.beginPath();ctx.arc(n.x,n.y,r*(2.6+p*2.8),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.08+(isH?.05:0)).toFixed(2)+')';ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r*(1.4+p*.8),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.18+(isH?.12:0)).toFixed(2)+')';ctx.fill();}ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(0.68+p*.32).toFixed(2)+')';ctx.fill();if(r>1.0){ctx.beginPath();ctx.arc(n.x,n.y,r*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(0.48+p*.45).toFixed(2)+')';ctx.fill();}if(n.label&&cam.z>.55){const sz=Math.max(6.5,9/cam.z);ctx.font='600 '+sz+'px \'SF Pro Display\',\'Segoe UI\',sans-serif';ctx.textAlign='center';const cc=lR(n.idle,n.live,Math.max(.25,p));ctx.fillStyle='rgba('+cc+','+Math.min(.7,.15+cam.z*.32)+')';ctx.fillText(n.label,n.x,n.y-r-2.5/cam.z);}});
  for(let i=travelers.length-1;i>=0;i--){const tv=travelers[i];tv.t+=tv.speed;if(tv.t>=1){travelers.splice(i,1);continue;}const x=tv.a.x+(tv.b.x-tv.a.x)*tv.t,y=tv.a.y+(tv.b.y-tv.a.y)*tv.t,xt=tv.a.x+(tv.b.x-tv.a.x)*Math.max(0,tv.t-.18),yt=tv.a.y+(tv.b.y-tv.a.y)*Math.max(0,tv.t-.18);const g2=ctx.createLinearGradient(xt,yt,x,y);g2.addColorStop(0,'rgba('+tv.color+',0)');g2.addColorStop(1,'rgba('+tv.color+',.95)');ctx.beginPath();ctx.moveTo(xt,yt);ctx.lineTo(x,y);ctx.strokeStyle=g2;ctx.lineWidth=1.8/cam.z;ctx.stroke();const hr=2.4/cam.z;ctx.beginPath();ctx.arc(x,y,hr*2.2,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.12)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.95)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr*.32,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();}
  ctx.restore();
  requestAnimationFrame(draw);
}

async function openMicModal(){
  const modal = document.getElementById('mic-modal');
  const list  = document.getElementById('mic-list');
  list.innerHTML = '<p style="font-size:10px;color:var(--t2);text-align:center;padding:8px">Cargando dispositivos…</p>';
  modal.classList.add('open');
  try{
    try{ const tmp=await navigator.mediaDevices.getUserMedia({audio:true}); tmp.getTracks().forEach(t=>t.stop()); }catch(e){}
    const devs = await navigator.mediaDevices.enumerateDevices();
    availableDevices = devs.filter(d=>d.kind==='audioinput');
    if(!availableDevices.length){ list.innerHTML='<p style="font-size:10px;color:var(--t2);text-align:center;padding:8px">No hay micrófonos detectados.</p>'; return; }
    if(!selectedDeviceId&&availableDevices.length>0) selectedDeviceId = availableDevices[0].deviceId;
    pendingDeviceId = selectedDeviceId;
    list.innerHTML = '';
    availableDevices.forEach((d,idx)=>{
      const label = d.label || ('Micrófono '+(idx+1));
      const ln = label.toLowerCase();
      const tipo = ln.includes('bluetooth')||ln.includes('airpod')||ln.includes('wireless')?'🔵 Bluetooth':ln.includes('hdmi')||ln.includes('display')?'🖥️ HDMI':d.deviceId==='default'||ln.includes('default')||ln.includes('predeterminado')?'🎤 Predeterminado':'🎙️ Interno';
      const item = document.createElement('div');
      item.className = 'mic-opt' + (d.deviceId===pendingDeviceId?' sel':'');
      item.innerHTML = '<div class="mic-opt-dot"></div><div style="flex:1;min-width:0"><div class="mic-opt-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+label+'</div><div class="mic-opt-type">'+tipo+'</div></div>';
      item.onclick = () => { pendingDeviceId=d.deviceId; list.querySelectorAll('.mic-opt').forEach(o=>o.classList.remove('sel')); item.classList.add('sel'); };
      list.appendChild(item);
    });
  }catch(e){ list.innerHTML='<p style="font-size:10px;color:#B01010;text-align:center;padding:8px">Error: '+e.name+'</p>'; }
}
function closeMicModal(){ document.getElementById('mic-modal').classList.remove('open'); }

    selectedDeviceId = pendingDeviceId;
    if(micReady){ stopStream(); await startStream(); kkSpeak('Micrófono cambiado.'); }

}

// DRAG: el chip se puede arrastrar (en mini y expanded)
// La posicion se guarda en localStorage para persistir
// ═══════════════════════════════════════════════════════════════
(function setupDrag(){
  const el = document.getElementById('kronia');
  if(!el) return;
  let drag = { active:false, startX:0, startY:0, origLeft:0, origTop:0, moved:false };
  function down(e){
    /* No arrastrar si el target es un boton interno */
    if(e.target && (e.target.closest('button') || e.target.closest('canvas'))) return;
    /* Solo arrastrable cuando esta visible */
    if(kkMode === 'closed') return;
    const r = el.getBoundingClientRect();
    drag.active = true; drag.moved = false;
    const pt = e.touches ? e.touches[0] : e;
    drag.startX = pt.clientX; drag.startY = pt.clientY;
    drag.origLeft = r.left; drag.origTop = r.top;
    el.style.transition = 'none';
  }
  function move(e){
    if(!drag.active) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - drag.startX;
    const dy = pt.clientY - drag.startY;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) drag.moved = true;
    if(drag.moved){
      el.style.left = (drag.origLeft + dx) + 'px';
      el.style.top  = (drag.origTop + dy) + 'px';
      el.style.right = 'auto'; el.style.bottom = 'auto';
      if(e.cancelable) e.preventDefault();
    }
  }
  function up(){
    if(!drag.active) return;
    el.style.transition = '';
    if(drag.moved){
      /* Limitar a viewport */
      const r = el.getBoundingClientRect();
      const maxL = window.innerWidth - r.width - 4;
      const maxT = window.innerHeight - r.height - 4;
      if(r.left < 4){ el.style.left = '4px'; }
      else if(r.left > maxL){ el.style.left = maxL + 'px'; }
      if(r.top < 4){ el.style.top = '4px'; }
      else if(r.top > maxT){ el.style.top = maxT + 'px'; }
      /* Guardar posicion */
      try{
        localStorage.setItem('kk_pos', JSON.stringify({
          left: el.style.left, top: el.style.top
        }));
      }catch(_){}
    }
    drag.active = false;
    /* Prevent click event si hubo drag */
    if(drag.moved) setTimeout(()=>{drag.moved=false;}, 50);
  }
  el.addEventListener('mousedown', down);
  el.addEventListener('touchstart', down, {passive:true});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
  /* Restaurar posicion al cargar */
  try{
    const saved = localStorage.getItem('kk_pos');
    if(saved){
      const p = JSON.parse(saved);
      if(p.left) el.style.left = p.left;
      if(p.top)  el.style.top  = p.top;
      if(p.left || p.top){ el.style.right = 'auto'; el.style.bottom = 'auto'; }
    }
  }catch(_){}
})();

// PROACTIVIDAD: KronIA detecta eventos importantes y HABLA
// ═══════════════════════════════════════════════════════════════
// Reusa el polling existente de aos_log_auditoria (cada 8s)
// Cuando detecta una venta nueva, cita o lead → habla en voz alta + toast
let proactiveLastIds = { ventas:0, agenda:0, leads:0 };
let proactiveInit = false;
let proactiveEnabled = true;
let proactiveCooldown = 0; /* evita avisos en cascada */

function showProactiveToast(texto, ms){
  const el = document.getElementById('kk-proactive');
  if(!el) return;
  el.textContent = texto;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>{
    el.classList.remove('show');
  }, ms || 7000);
}

function speakProactive(mensaje){
  if(!proactiveEnabled) return;
  const now = Date.now();
  if(now - proactiveCooldown < 6000) return; /* no avisar 2 cosas en 6s */
  proactiveCooldown = now;
  /* Mostrar toast */
  showProactiveToast(mensaje, 8000);
  /* Si KronIA esta cerrada, abrir en mini para mostrar */
  if(kkMode === 'closed' || kkMode === 'bubble') setKKMode('mini');
  /* Hablar */
  if(!isSpeaking){
    kkSpeak(mensaje);
  } else {
    /* Si esta hablando, esperar y reintentar */
    setTimeout(()=>kkSpeak(mensaje), 1500);
  }
}

async function checkProactiveEvents(){
  try{
    /* Solo despues del primer init para no avisar de eventos antiguos */
    if(!proactiveInit){
      /* Init: capturar el id mas reciente de cada categoria */
      const [v,a,l] = await Promise.all([
        fetch(SB+'/rest/v1/aos_ventas?select=id&order=id.desc&limit=1',{headers:H}).then(r=>r.json()).catch(()=>[]),
        fetch(SB+'/rest/v1/aos_agenda_citas?select=id&order=id.desc&limit=1',{headers:H}).then(r=>r.json()).catch(()=>[]),
        fetch(SB+'/rest/v1/aos_leads?select=id&order=id.desc&limit=1',{headers:H}).then(r=>r.json()).catch(()=>[])
      ]);
      proactiveLastIds.ventas = (v[0]&&v[0].id) || 0;
      proactiveLastIds.agenda = (a[0]&&a[0].id) || 0;
      proactiveLastIds.leads  = (l[0]&&l[0].id) || 0;
      proactiveInit = true;
      return;
    }

    /* Detectar nuevas ventas */
    const nuevasVentas = await fetch(
      SB+'/rest/v1/aos_ventas?select=id,nombres,apellidos,tratamiento,monto,asesor&id=gt.'+proactiveLastIds.ventas+'&order=id.asc&limit=5',
      {headers:H}
    ).then(r=>r.json()).catch(()=>[]);
    if(Array.isArray(nuevasVentas) && nuevasVentas.length){
      const v0 = nuevasVentas[0];
      const cliente = ((v0.nombres||'') + ' ' + (v0.apellidos||'')).trim() || 'un cliente';
      const trat = v0.tratamiento || 'un servicio';
      const monto = v0.monto ? ('soles '+Math.round(v0.monto)) : '';
      const asesor = v0.asesor ? (' por '+v0.asesor) : '';
      const extra = nuevasVentas.length > 1 ? (' y '+(nuevasVentas.length-1)+' venta'+(nuevasVentas.length>2?'s':'')+' mas') : '';
      speakProactive('Nueva venta: '+cliente+', '+trat+'. '+monto+asesor+extra+'.');
      activateTable('aos_ventas','INSERT');
      proactiveLastIds.ventas = nuevasVentas[nuevasVentas.length-1].id;
    }

    /* Detectar nuevas citas */
    if(!nuevasVentas.length){ /* prioridad: ventas > citas > leads */
      const nuevasCitas = await fetch(
        SB+'/rest/v1/aos_agenda_citas?select=id,nombre,tratamiento,fecha_cita,hora_cita,sede&id=gt.'+proactiveLastIds.agenda+'&order=id.asc&limit=3',
        {headers:H}
      ).then(r=>r.json()).catch(()=>[]);
      if(Array.isArray(nuevasCitas) && nuevasCitas.length){
        const c0 = nuevasCitas[0];
        speakProactive('Nueva cita: '+(c0.nombre||'paciente')+', '+(c0.tratamiento||'')+(c0.fecha_cita?', el '+c0.fecha_cita:'')+(c0.sede?' en '+c0.sede:'')+'.');
        activateTable('aos_agenda_citas','INSERT');
        proactiveLastIds.agenda = nuevasCitas[nuevasCitas.length-1].id;
      }
    }

    /* Detectar leads nuevos */
    const nuevosLeads = await fetch(
      SB+'/rest/v1/aos_leads?select=id&id=gt.'+proactiveLastIds.leads+'&order=id.asc',
      {headers:H}
    ).then(r=>r.json()).catch(()=>[]);
    if(Array.isArray(nuevosLeads) && nuevosLeads.length >= 5){
      /* Solo avisar cuando entran varios juntos (importacion) */
      speakProactive('Entraron '+nuevosLeads.length+' leads nuevos a la base.');
      activateTable('aos_leads','INSERT');
      proactiveLastIds.leads = nuevosLeads[nuevosLeads.length-1].id;
    } else if(Array.isArray(nuevosLeads) && nuevosLeads.length){
      proactiveLastIds.leads = nuevosLeads[nuevosLeads.length-1].id;
    }
  }catch(e){ /* silencioso */ }
}

/* Polling cada 15s */
setTimeout(checkProactiveEvents, 3000); /* primer check tras 3s */
setInterval(checkProactiveEvents, 15000);

// PWA: registrar service worker + boton de instalacion
// ═══════════════════════════════════════════════════════════════
(function setupPWA(){
  /* DESINSTALAR cualquier service worker previo.
     SES-038: el SW estaba rompiendo la PWA de Cesar mostrando pantallas blancas.
     Decision: quitar PWA por completo. AscendaOS se usa en Chrome normal.
     El mini-modal del Brain (3 estados) sigue funcionando sin PWA. */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){
        reg.unregister().then(function(){
          console.log('[KronIA] Service Worker desinstalado:', reg.scope);
        });
      });
    }).catch(function(e){ console.warn('[KronIA] unregister error:', e); });

    /* Limpiar caches que el SW haya creado */
    if(window.caches && caches.keys){
      caches.keys().then(function(names){
        names.forEach(function(n){ caches.delete(n); });
      }).catch(function(){});
    }
  }
})();
/* Bloque viejo PWA desactivado */
(function setupPWA_OLD_DISABLED(){
  /* Registrar SW si el navegador lo soporta */
  if(false && 'serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/sw-kronia.js')
        .then(function(reg){
          console.log('[KronIA PWA] SW registrado, scope:', reg.scope);

          /* Buscar actualizaciones cada vez que se carga la pagina */
          reg.update();

          /* Detectar nueva version disponible */
          reg.addEventListener('updatefound', function(){
            var nuevo = reg.installing;
            if(!nuevo) return;
            nuevo.addEventListener('statechange', function(){
              if(nuevo.state === 'installed' && navigator.serviceWorker.controller){
                /* Hay version nueva: forzar activacion + recargar */
                console.log('[KronIA PWA] Nueva version detectada, actualizando...');
                nuevo.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        })
        .catch(function(e){ console.warn('[KronIA PWA] SW error:', e); });

      /* Cuando el nuevo SW toma control, recargar para usar la version nueva */
      var primerRefresh = true;
      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(!primerRefresh) return;
        primerRefresh = false;
        console.log('[KronIA PWA] SW actualizado. Recargando...');
        window.location.reload();
      });
    });
  }

  /* Capturar el prompt de instalacion para mostrarlo cuando queramos */
  var deferredPrompt = null;
  var installBtn = null;

  function crearBotonInstalar(){
    if(installBtn) return installBtn;
    installBtn = document.createElement('button');
    installBtn.id = 'kk-install-pwa';
    installBtn.innerHTML = '&#x2B07; Instalar como app';
    installBtn.title = 'Instalar KronIA como aplicacion nativa';
    installBtn.style.cssText = [
      'position:fixed','bottom:12px','left:50%','transform:translateX(-50%)',
      'z-index:9999',
      'background:linear-gradient(135deg,#00C9A7,#0A4FBF)','color:#fff',
      'border:none','border-radius:20px','padding:8px 16px',
      'font-family:inherit','font-size:11px','font-weight:700',
      'letter-spacing:.04em','cursor:pointer',
      'box-shadow:0 4px 16px rgba(10,79,191,0.35)',
      'transition:transform .15s,opacity .15s',
      'animation:kkInstallPulse 2.4s ease-in-out infinite'
    ].join(';');
    installBtn.onmouseenter = function(){ installBtn.style.transform = 'translateX(-50%) scale(1.06)'; };
    installBtn.onmouseleave = function(){ installBtn.style.transform = 'translateX(-50%)'; };
    installBtn.onclick = async function(){
      if(!deferredPrompt) return;
      installBtn.style.opacity = '.55';
      deferredPrompt.prompt();
      try{
        var choice = await deferredPrompt.userChoice;
        if(choice.outcome === 'accepted'){
          installBtn.remove(); installBtn = null;
          pushAlert('✓ KronIA instalada como app');
        }
      }catch(e){}
      deferredPrompt = null;
      if(installBtn) installBtn.style.opacity = '1';
    };
    /* Animacion pulse */
    var st = document.createElement('style');
    st.textContent = '@keyframes kkInstallPulse{0%,100%{box-shadow:0 4px 16px rgba(10,79,191,0.35)}50%{box-shadow:0 4px 22px rgba(0,201,167,0.55)}}';
    document.head.appendChild(st);
    document.body.appendChild(installBtn);
    return installBtn;
  }

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    crearBotonInstalar();
  });

  /* Si ya esta instalada (running standalone), ocultar boton */
  window.addEventListener('appinstalled', function(){
    if(installBtn){ installBtn.remove(); installBtn = null; }
    pushAlert && pushAlert('✓ KronIA instalada como app');
  });

  /* Si la app ya esta corriendo como standalone, marcar body */
  if(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches){
    document.body.classList.add('kronia-pwa-installed');
  }
})();
