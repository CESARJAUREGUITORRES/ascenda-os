<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=10">
<title>AscendaOS · Brain · KronIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#0A4FBF;--blue2:#071D4A;--blue3:#378ADD;--cyan:#00C9A7;--bg:#F8FAFE;--white:#FFFFFF;--muted:rgba(10,79,191,0.10);--text2:rgba(7,29,74,0.40);--card:rgba(255,255,255,0.90);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;display:block}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none}
#brand{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--muted);border-radius:10px;padding:6px 10px;backdrop-filter:blur(12px);pointer-events:all}
.bc-dot{width:7px;height:7px;border-radius:50%;background:#E53935;box-shadow:0 0 5px #E53935;transition:all .5s;flex-shrink:0}
.bc-dot.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:cpulse 2.5s infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.35}}
.bc-name{font-size:10px;font-weight:700;color:var(--blue2);letter-spacing:.04em;white-space:nowrap}
.bc-sub{font-size:7.5px;color:var(--text2);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}
#metrics{position:absolute;top:10px;right:10px;display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.mcard{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 9px;backdrop-filter:blur(10px);display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.mval{font-size:14px;font-weight:800;color:var(--blue)}.mlbl{font-size:7px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
/* KronIA */
#kronia{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);width:min(340px,88vw);background:var(--card);border:1px solid rgba(0,201,167,0.18);border-radius:14px;padding:10px 14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;gap:7px;pointer-events:all;opacity:0;transition:all .3s;translate:0 6px}
#kronia.vis{opacity:1;translate:0 0}
.kk-hdr{display:flex;align-items:center;gap:8px}
.kk-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00C9A7,#0A4FBF);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.kk-name{font-size:11px;font-weight:700;color:var(--blue2);letter-spacing:.04em}
.kk-st{font-size:8px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
#kk-cv{width:100%;height:30px;border-radius:6px;background:rgba(0,201,167,0.04)}
#kk-txt{font-size:10px;color:var(--blue2);line-height:1.5;min-height:16px;font-style:italic;opacity:.8;max-height:48px;overflow:hidden}
.kk-row{display:flex;align-items:center;gap:6px}
#kk-btn{background:rgba(0,201,167,0.10);border:1px solid rgba(0,201,167,0.25);border-radius:8px;padding:4px 10px;font-size:9px;color:#007060;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.04em}
#kk-btn.on{background:rgba(0,201,167,0.18);border-color:var(--cyan);animation:micpulse 1s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,201,167,.3)}50%{box-shadow:0 0 0 5px rgba(0,201,167,0)}}
#kk-hint{font-size:8px;color:var(--text2);flex:1;letter-spacing:.04em}
/* Notifs */
#nl{position:absolute;top:66px;left:10px;width:min(205px,37vw);display:flex;flex-direction:column;gap:4px;pointer-events:all}
#nr{position:absolute;top:66px;right:10px;width:min(190px,35vw);display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:all}
#nb{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);width:min(340px,86vw);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:all}
.notif{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:5px 8px;backdrop-filter:blur(10px);animation:nIn .22s ease;max-width:100%;transition:opacity .35s,transform .35s}
@keyframes nIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.rIn{animation:rIn .22s ease}
@keyframes rIn{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.out{opacity:0!important;transform:translateY(-3px) scale(.97)!important}
.ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}.ntime{font-size:7.5px;font-weight:600;min-width:32px;white-space:nowrap}.nmsg{font-size:8.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:125px}.ndism{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;padding:0 2px;margin-left:2px;flex-shrink:0}
.na{border-color:rgba(220,50,50,0.18)!important;background:rgba(255,248,248,0.93)!important}
.ni{flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;border-color:rgba(0,201,167,0.18)!important;background:rgba(248,254,252,0.92)!important}
.ni .nh{display:flex;align-items:center;gap:5px;width:100%}
.ni .nd{font-size:8px;color:#006655;display:none;margin-top:3px;padding-top:4px;border-top:1px solid rgba(0,201,167,0.12);line-height:1.5;white-space:normal;max-width:320px}
.ni.exp .nd{display:block}
#ctrls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;pointer-events:all}
.cb{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 10px;font-size:8.5px;color:var(--blue2);cursor:pointer;backdrop-filter:blur(8px);font-weight:600;transition:all .2s;white-space:nowrap}
.cb:hover{background:rgba(10,79,191,0.06)}.cb.on{border-color:var(--cyan);color:#007060}
#zpill{font-size:8px;color:var(--text2);background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:3px 9px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}
#tt{position:fixed;background:var(--white);border:1px solid rgba(10,79,191,0.14);border-radius:12px;padding:10px 14px;min-width:170px;max-width:220px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:30;box-shadow:0 4px 18px rgba(10,79,191,0.09)}
#tt-n{font-size:11px;font-weight:700;color:var(--blue2);margin-bottom:6px;display:block}
.tr{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}.tk{font-size:9px;color:var(--text2)}.tv{font-size:9px;font-weight:700;color:var(--blue2)}
@media(max-width:480px){#nl{width:min(155px,33vw)}#nr{width:min(145px,31vw)}.nmsg{max-width:90px;font-size:8px}.mval{font-size:12px}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
// ASCENDAOS BRAIN + KRONIA v2.0

const SB='https://ituyqwstonmhnfshnaqz.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
const SK2='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbmV6bGh0cWtpdWN3bXJkaXJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDY5OTY4MjAsImV4cCI6MjAyMjU3MjgyMH0.R5-sbTxsHf-7oSsIw0ZRMqBobDUz0vI62f19hmJKmMA';
const H={'apikey':SK,'Authorization':'Bearer '+SK};
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H2;function resize(){W=cv.width=innerWidth;H2=cv.height=innerHeight;}
resize();window.addEventListener('resize',()=>{resize();initG();});

// Paleta
const TS={aos_llamadas:{idle:[180,210,250],live:[55,138,221],label:'Llamadas',n:12229},aos_pacientes:{idle:[155,235,218],live:[0,201,167],label:'Pacientes',n:7010},aos_base_etiquetas:{idle:[195,215,240],live:[10,79,191],label:'Etiquetas',n:6547},aos_leads:{idle:[190,215,255],live:[10,79,191],label:'Leads',n:2704},aos_ventas:{idle:[172,235,192],live:[34,200,112],label:'Ventas',n:608},aos_agenda_citas:{idle:[162,240,212],live:[0,229,160],label:'Citas',n:480},aos_seguimientos:{idle:[250,218,168],live:[240,160,32],label:'Seguim.',n:231},aos_inversion_campanas:{idle:[212,208,252],live:[127,119,221],label:'Inversión',n:19},aos_rrhh:{idle:[208,222,248],live:[7,29,74],label:'RRHH',n:6},otros:{idle:[212,222,238],live:[100,130,180],label:'Sistema',n:1}};
const CONN=[['aos_leads','aos_llamadas'],['aos_leads','aos_pacientes'],['aos_leads','aos_agenda_citas'],['aos_llamadas','aos_agenda_citas'],['aos_llamadas','aos_ventas'],['aos_llamadas','aos_seguimientos'],['aos_llamadas','aos_pacientes'],['aos_pacientes','aos_agenda_citas'],['aos_pacientes','aos_ventas'],['aos_agenda_citas','aos_ventas'],['aos_ventas','aos_seguimientos'],['aos_inversion_campanas','aos_leads'],['aos_base_etiquetas','aos_pacientes'],['aos_rrhh','aos_llamadas']];
let nodes=[],edges=[],gmap={};const eSet=new Set();
function nR(n){return Math.max(1.2,Math.log10(n+1)*2.4);}
function lR(a,b,t){return[~~(a[0]+(b[0]-a[0])*t),~~(a[1]+(b[1]-a[1])*t),~~(a[2]+(b[2]-a[2])*t)];}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function addE(a,b,cr){if(a===b)return;const k=a.id<b.id?a.id+'|'+b.id:b.id+'|'+a.id;if(!eSet.has(k)){eSet.add(k);edges.push({a,b,cross:cr});}}
function initG(){nodes=[];edges=[];gmap={};eSet.clear();const keys=Object.keys(TS),N=keys.length,R=Math.min(W,H2)*.32;keys.forEach((k,i)=>{const st=TS[k],ang=(i/N)*Math.PI*2-Math.PI/2,gcx=W/2+R*.65*Math.cos(ang),gcy=H2/2+R*.65*Math.sin(ang),cnt=Math.max(3,Math.floor(Math.log10(st.n+1)*5.5));gmap[k]=[];for(let j=0;j<cnt;j++){const a=Math.random()*Math.PI*2,r=Math.random()*R*.18*(0.4+Math.random()*.6),hub=j===0,nr=hub?nR(st.n)*1.8:nR(st.n)*(.45+Math.random()*.65),node={id:nodes.length,x:gcx+Math.cos(a)*r,y:gcy+Math.sin(a)*r,ox:gcx,oy:gcy,vx:0,vy:0,r:nr,group:k,idle:st.idle,live:st.live,pulse:0,phase:Math.random()*Math.PI*2,pspd:.003+Math.random()*.003,label:hub?st.label:null};nodes.push(node);gmap[k].push(node);}});Object.values(gmap).forEach(gn=>{gn.forEach(n=>{[...gn].filter(m=>m!==n).sort((a,b)=>d2(n,a)-d2(n,b)).slice(0,2+~~(Math.random()*2)).forEach(m=>addE(n,m,false));});});CONN.forEach(([ga,gb])=>{const na=gmap[ga]||[],nb=gmap[gb]||[];if(!na.length||!nb.length)return;for(let i=0;i<Math.min(2,na.length);i++)for(let j=0;j<Math.min(2,nb.length);j++)addE(na[i],nb[j],true);const x=~~(Math.min(na.length,nb.length)*.12)+1;for(let k=0;k<x;k++)addE(na[~~(Math.random()*na.length)],nb[~~(Math.random()*nb.length)],true);});for(let i=0;i<200;i++)phys(i<50?.85:.93);}
function phys(d=.92){const k=Math.min(W,H2)*.021;for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,mD=(a.r+b.r)*3;if(dd<k*2.8){const f=k*k/dd*.38;a.vx-=dx/dd*f;a.vy-=dy/dd*f;b.vx+=dx/dd*f;b.vy+=dy/dd*f;}if(dd<mD){const p=(mD-dd)*.2;a.vx-=dx/dd*p;a.vy-=dy/dd*p;b.vx+=dx/dd*p;b.vy+=dy/dd*p;}}edges.forEach(e=>{const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,ideal=e.cross?k*2.5:k*1.1,f=(dd-ideal)/dd*.08;e.a.vx+=dx*f;e.a.vy+=dy*f;e.b.vx-=dx*f;e.b.vy-=dy*f;});nodes.forEach(n=>{n.vx+=(n.ox-n.x)*.014;n.vy+=(n.oy-n.y)*.014;n.vx+=(W/2-n.x)*.002;n.vy+=(H2/2-n.y)*.002;n.vx*=d;n.vy*=d;n.x+=n.vx;n.y+=n.vy;});}

// Cámara
let cam={x:0,y:0,z:1,tz:1},drag={on:false,lx:0,ly:0},pinch={on:false,d0:0,z0:1},hovered=null;
cv.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(drag.on){cam.x+=e.clientX-drag.lx;cam.y+=e.clientY-drag.ly;drag.lx=e.clientX;drag.ly=e.clientY;return;}if(cam.z>1.8)chkHov(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{drag.on=false;cv.style.cursor='default';});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.tz=Math.max(.12,Math.min(16,cam.tz*(e.deltaY<0?1.12:.9)));},{passive:false});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;}if(e.touches.length===2){pinch.on=true;drag.on=false;pinch.d0=ptd(e);pinch.z0=cam.z;}},{passive:true});
cv.addEventListener('touchmove',e=>{if(drag.on&&e.touches.length===1){cam.x+=e.touches[0].clientX-drag.lx;cam.y+=e.touches[0].clientY-drag.ly;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;if(cam.z>1.8)chkHov(e.touches[0].clientX,e.touches[0].clientY);}if(pinch.on&&e.touches.length===2)cam.tz=Math.max(.12,Math.min(16,pinch.z0*(ptd(e)/pinch.d0)));},{passive:true});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinch.on=false;if(!e.touches.length)drag.on=false;},{passive:true});
function ptd(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function chkHov(sx,sy){const wx=(sx-W/2-cam.x)/cam.z+W/2,wy=(sy-H2/2-cam.y)/cam.z+H2/2;let best=null,bd=Infinity;nodes.forEach(n=>{const dd=(n.x-wx)**2+(n.y-wy)**2;if(dd<(n.r*3)**2&&dd<bd){bd=dd;best=n;}});hovered=best;const tt=document.getElementById('tt');if(best){const st=TS[best.group]||TS.otros;document.getElementById('tt-n').textContent=st.label;document.getElementById('tt-b').innerHTML='<div class="tr"><span class="tk">Tabla</span><span class="tv">'+best.group+'</span></div><div class="tr"><span class="tk">Registros</span><span class="tv">'+st.n.toLocaleString()+'</span></div>';const sx2=best.x*cam.z+W/2+cam.x-W/2*cam.z+W*(1-cam.z)/2,sy2=best.y*cam.z+H2/2+cam.y-H2/2*cam.z+H2*(1-cam.z)/2;tt.style.left=Math.min(W-230,sx2+14)+'px';tt.style.top=Math.max(10,sy2-55)+'px';tt.style.opacity='1';}else tt.style.opacity='0';}

function rS(c){return'rgb('+c[0]+','+c[1]+','+c[2]+')';}
function pushN(tbl,action){const st=TS[tbl]||TS.otros,c=rS(st.live),label=(st.label||tbl.replace('aos_',''))+' → '+action;const ul=document.getElementById('nl');const li=document.createElement('li');li.className='notif';li.innerHTML='<span class="ndot" style="background:'+c+'"></span><span class="ntime" style="color:'+c+'">'+tStr()+'</span><span class="nmsg" style="color:'+c+'">'+label+'</span>';ul.insertBefore(li,ul.firstChild);while(ul.children.length>5)ul.removeChild(ul.lastChild);setTimeout(()=>{li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);},5000);}
function pushAlert(msg){const ul=document.getElementById('nr');const li=document.createElement('li');li.className='notif na rIn';li.innerHTML='<span class="ndot" style="background:#E53935"></span><span class="ntime" style="color:#B01010">'+tStr()+'</span><span class="nmsg" style="color:#B01010;max-width:105px">'+msg+'</span><button class="ndism" onclick="this.closest(\'li\').remove()">×</button>';ul.insertBefore(li,ul.firstChild);while(ul.children.length>4)ul.removeChild(ul.lastChild);}
function pushInsight(title,detail){const ul=document.getElementById('nb');const li=document.createElement('li');li.className='notif ni';li.innerHTML='<div class="nh"><span class="ndot" style="background:#00C9A7"></span><span class="ntime" style="color:#007060">'+tStr()+'</span><span class="nmsg" style="color:#007060;max-width:230px">'+title+'</span><button class="ndism" style="margin-left:auto" onclick="event.stopPropagation();this.closest(\'li\').remove()">×</button></div><div class="nd">'+detail+'</div>';li.addEventListener('click',()=>li.classList.toggle('exp'));ul.insertBefore(li,ul.firstChild);while(ul.children.length>3)ul.removeChild(ul.lastChild);setTimeout(()=>{if(!li.classList.contains('exp')){li.classList.add('out');setTimeout(()=>{if(li.parentNode)li.remove();},380);}},30000);}

// ══ KRONIA ENGINE v2 ════════════════════════════════════════════
const SESSION_ID='ses_'+Date.now();
let memoria=[],ultimaIntencion=null,ultimoCtx={};

function norm(s){return s.toLowerCase().replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i').replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/[ñ]/g,'n').replace(/[¿¡]/g,'').trim();}

const INTS={ventas:['venta','vendim','factur','cobr','ingreso','cuanto hicim','cuanto ganamos','cuanto vendim','cuanto hemos','cuanto hicimos'],citas:['cita','agenda','quien viene','citados','consulta','atencion de hoy','quien tenemos','visita','a quien tengo'],leads:['lead','prospecto','contacto nuevo','base de datos','cuantos nuevos','cuantos llegaron','campana','nuevos clientes'],cliente:['cliente','paciente','busca','informacion de','dime sobre','numero de telefono','quien es','datos de'],llamadas:['llamada','llame','llamo','llaman','cuantas llamadas','equipo llamo','llamaron'],seguimientos:['seguimiento','pendiente','hay que llamar','sin contactar','no respondio','retomar','contactar'],resumen:['resumen','como va','que paso','ponte al dia','hola','buenos dias','buenas','que hay','novedad','informe','empezamos'],estado:['estado','conexion','sistema','funciona','como estamos','todo bien','hay problemas']};

const APERT=['Claro que sí,','Déjame revisar,','Aquí lo que encontré:','Te cuento César,','Revisando los datos,','Mira,','Encontré esto:'];
const CONT=['Siguiendo con eso,','Sobre lo mismo,','Para complementar,'];
const NO_SE=['Eso no lo tengo en mis datos aún. Puedo ayudarte con ventas, citas, leads, pacientes, llamadas o el resumen del día.','Mmm, no estoy segura. ¿Me lo dices de otra forma? Manejo ventas, citas, leads y seguimientos.','Por ahora no tengo acceso a eso. ¿Quieres que te diga algo sobre las ventas o el equipo?'];
const OPTS={ventas:'¿Quieres verlo por sede, por tratamiento o por asesor?',citas:'¿Te digo el tratamiento que tienen o quién las agendó?',leads:'¿Por campaña o por fecha de ingreso?',cliente:'¿Te busco sus compras o sus llamadas?',llamadas:'¿Por asesor o por resultado?',seguimientos:'¿Los que llevan más tiempo sin contacto?'};

function ap(esC){return(esC?CONT:APERT)[~~(Math.random()*(esC?CONT:APERT).length)];}
function opt(i){return OPTS[i]?' '+OPTS[i]:'';}
function noSe(){return NO_SE[~~(Math.random()*NO_SE.length)];}
function topV(arr,key){const c={};let mx=0,res='sin datos';arr.forEach(o=>{const v=o[key]||'sin datos';c[v]=(c[v]||0)+1;if(c[v]>mx){mx=c[v];res=v;}});return res;}

function detectIntent(q){
  const qn=norm(q);
  if(qn.length<20&&ultimaIntencion){const cont=['y','por','de','en','ese','esa','eso','cual','cuales','mas','tambien','ahora','el','la'];if(cont.some(c=>qn===c||qn.startsWith(c+' ')))return{i:ultimaIntencion,c:true};}
  for(const[int,cls]of Object.entries(INTS)){if(cls.some(c=>qn.includes(c)))return{i:int,c:false};}
  if(ultimaIntencion)return{i:ultimaIntencion,c:true};
  return{i:'resumen',c:false};
}
function periodo(q,ctx){
  const qn=norm(q),hoy=new Date().toISOString().split('T')[0];
  if(qn.includes('hoy')||qn.includes('dia')||qn.includes('dia'))return{label:'hoy',f:'fecha=eq.'+hoy};
  if(qn.includes('semana')||qn.includes('7 dias')){const d7=new Date(Date.now()-7*86400000).toISOString().split('T')[0];return{label:'esta semana',f:'fecha=gte.'+d7};}
  if(qn.includes('mes'))return{label:'este mes',f:'fecha=gte.'+hoy.slice(0,7)+'-01'};
  if(qn.includes('ayer')){const ay=new Date(Date.now()-86400000).toISOString().split('T')[0];return{label:'ayer',f:'fecha=eq.'+ay};}
  if(ctx&&ctx.per)return ctx.per;
  return{label:'este mes',f:'fecha=gte.'+hoy.slice(0,7)+'-01'};
}
function sede(q){const qn=norm(q);if(qn.includes('pueblo')||qn.includes('libre')||qn.includes('brasil'))return'PUEBLO LIBRE';if(qn.includes('isidro')||qn.includes('prado'))return'SAN ISIDRO';return null;}

async function processQuery(q){
  if(!q||q.trim().length<2){kkSpeak('¿En qué te puedo ayudar?');return;}
  document.getElementById('kk-st').textContent='Consultando…';
  const{i:int,c:esC}=detectIntent(q);
  const per=periodo(q,ultimoCtx);
  const sd=sede(q);
  const a=ap(esC);
  const esRed=memoria.length>0&&memoria[0].i===int&&(Date.now()-memoria[0].ts)<30000;
  let resp='',tabs=[];
  try{
    if(int==='ventas'){
      let url=SB+'/rest/v1/aos_ventas?select=monto,tratamiento,sede,asesor,fecha&'+per.f+'&estado_pago=eq.PAGO COMPLETO';
      if(sd)url+='&sede=eq.'+encodeURIComponent(sd);
      const d=await fetch(url,{headers:H}).then(r=>r.json());tabs=['aos_ventas'];
      if(d&&d.length){const total=d.reduce((a,v)=>a+(parseFloat(v.monto)||0),0);const tT=topV(d,'tratamiento');const tA=topV(d,'asesor');
        resp=esRed?'Como te comenté, '+per.label+' van '+d.length+' ventas por S/ '+total.toFixed(0)+'. ¿Quieres el desglose por '+(sd?'tratamiento':'sede')+'?':a+' '+per.label+(sd?' en '+sd:'')+' van '+d.length+' ventas por S/ '+total.toFixed(0)+'. El tratamiento estrella fue '+tT+' y quien más vendió fue '+tA+'.'+opt('ventas');
        ultimoCtx={per,i:'ventas',total,count:d.length};
      }else resp='No encontré ventas para '+per.label+(sd?' en '+sd:'')+'. ¿Quieres que revise otro período?';
    }
    else if(int==='citas'){
      const qn=norm(q),hoy=new Date().toISOString().split('T')[0],man=new Date(Date.now()+86400000).toISOString().split('T')[0];
      const fc=qn.includes('mañana')||qn.includes('manana')?man:hoy;const lf=fc===man?'mañana':'hoy';
      let url=SB+'/rest/v1/aos_agenda_citas?select=nombre,apellido,tratamiento,hora_cita,sede,asesor&fecha_cita=eq.'+fc;
      if(sd)url+='&sede=eq.'+encodeURIComponent(sd);
      const d=await fetch(url,{headers:H}).then(r=>r.json());tabs=['aos_agenda_citas'];
      if(d&&d.length){const p=d[0];const nom=((p.nombre||'')+(p.apellido?' '+p.apellido:'')).trim()||'primer paciente';
        resp=a+' hay '+d.length+' cita'+(d.length>1?'s':'')+' para '+lf+'. La primera es '+nom+' a las '+(p.hora_cita||'hora por confirmar')+' por '+(p.tratamiento||'tratamiento sin registrar')+'.'+opt('citas');
        ultimoCtx={fc,i:'citas',count:d.length};
      }else resp='No hay citas para '+lf+(sd?' en '+sd:'')+'. ¿Quieres que revise otra fecha?';
    }
    else if(int==='leads'){
      const d=await fetch(SB+'/rest/v1/aos_leads?select=tratamiento,fecha&'+per.f,{headers:H}).then(r=>r.json());tabs=['aos_leads'];
      if(d&&d.length){const tC=topV(d,'tratamiento');resp=a+' '+per.label+' ingresaron '+d.length+' leads. La campaña líder fue '+tC+'.'+opt('leads');ultimoCtx={per,i:'leads'};}
      else resp='No encontré leads para '+per.label+'. ¿Quieres otro período?';
    }
    else if(int==='cliente'){
      const num=(q.match(/\d{7,}/)||[''])[0];
      if(num){const d=await fetch(SB+'/rest/v1/aos_pacientes?select="Nombres","Apellidos","SCORE_ESTADO",n_ventas,"TOTAL_FACTURADO",tratamiento_principal&numero_limpio=eq.'+num+'&limit=1',{headers:H}).then(r=>r.json());tabs=['aos_pacientes'];
        if(d&&d[0]){const p=d[0];const nom=((p['Nombres']||'')+(p['Apellidos']?' '+p['Apellidos']:'')).trim();resp=a+' el '+num+' es '+nom+'. Tiene '+p.n_ventas+' compras por S/ '+parseFloat(p['TOTAL_FACTURADO']||0).toFixed(0)+'. Tratamiento principal: '+(p.tratamiento_principal||'sin registrar')+'. Estado: '+(p['SCORE_ESTADO']||'sin score')+'.'+opt('cliente');ultimoCtx={num,nom,i:'cliente'};}
        else resp='No encontré paciente con el número '+num+'. ¿Puedes verificarlo?';
      }else resp='Dime el número de teléfono y te doy toda la información del paciente.';
    }
    else if(int==='llamadas'){
      const hoy=new Date().toISOString().split('T')[0];const d=await fetch(SB+'/rest/v1/aos_llamadas?select=asesor,estado&fecha=eq.'+hoy,{headers:H}).then(r=>r.json());tabs=['aos_llamadas'];
      if(d&&d.length){const tA=topV(d,'asesor');resp=a+' hoy van '+d.length+' llamadas. El que más llamó fue '+tA+'.'+opt('llamadas');}
      else resp='No hay llamadas registradas por hoy todavía.';
    }
    else if(int==='seguimientos'){
      const d=await fetch(SB+'/rest/v1/aos_seguimientos?select="ESTADO","ASESOR"&"ESTADO"=eq.PENDIENTE',{headers:H}).then(r=>r.json());tabs=['aos_seguimientos'];
      if(d&&d.length){const tA=topV(d,'ASESOR');resp=a+' hay '+d.length+' seguimientos pendientes. El que tiene más es '+tA+'.'+opt('seguimientos');}
      else resp='No hay seguimientos pendientes. ¡Todo al día!';
    }
    else if(int==='resumen'){
      const hoy=new Date().toISOString().split('T')[0];
      const[rv,rl,rc,rs]=await Promise.all([
        fetch(SB+'/rest/v1/aos_ventas?select=monto&fecha=eq.'+hoy+'&estado_pago=eq.PAGO COMPLETO',{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_llamadas?select=id&fecha=eq.'+hoy,{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_agenda_citas?select=id&fecha_cita=eq.'+hoy,{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_seguimientos?select=id&"ESTADO"=eq.PENDIENTE',{headers:H}).then(r=>r.json()),
      ]);
      tabs=['aos_ventas','aos_llamadas','aos_agenda_citas','aos_seguimientos'];
      const totalV=(rv||[]).reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
      const hora=new Date().getHours();const sal=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
      resp=sal+' César. Hoy: '+(rl||[]).length+' llamadas, '+(rc||[]).length+' citas, S/ '+totalV.toFixed(0)+' en ventas y '+(rs||[]).length+' seguimientos pendientes. ¿Por dónde empezamos?';
      ultimoCtx={i:'resumen'};
    }
    else if(int==='estado'){
      const on=document.getElementById('sb-dot').classList.contains('on');
      resp=on?'Todo funciona bien César. Supabase está conectado, '+evCnt+' eventos en esta sesión y las ocho tablas activas.':'Hay un problema de conexión con Supabase. Verifica la red o escríbeme para revisarlo.';
    }
    else resp=noSe();
  }catch(e){resp='Tuve un problema consultando. Intenta de nuevo en un momento.';}

  tabs.forEach((t,i)=>setTimeout(()=>activateTable(t,'CONSULTA'),i*200));
  memoria.unshift({i:int,q,r:resp,tabs,ts:Date.now()});if(memoria.length>5)memoria.pop();
  ultimaIntencion=int;
  guardar(int,q,resp,tabs);aprender(int,q);
  kkSpeak(resp);
}

let synth=window.speechSynthesis,kkVoice=null,kkVis=false,micOn=false,recognition=null,audioCtx=null,analyser=null,dataArray=null,micStream=null,waveAnim=null;
const kkCv=document.getElementById('kk-cv'),kkCtx=kkCv.getContext('2d');

function loadVoices(){const vs=synth.getVoices();kkVoice=vs.find(v=>v.lang.startsWith('es')&&/female|mujer|monica|paulina|marisol|elena|lucia|google español/i.test(v.name))||vs.find(v=>v.lang==='es-US'||v.lang==='es-MX'||v.lang==='es-419')||vs.find(v=>v.lang.startsWith('es'))||null;}
loadVoices();if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;

function kkSpeak(text){if(!synth)return;synth.cancel();const u=new SpeechSynthesisUtterance(text);if(kkVoice)u.voice=kkVoice;u.lang='es-PE';u.rate=0.92;u.pitch=1.05;u.volume=1;document.getElementById('kk-txt').textContent=text;document.getElementById('kk-st').textContent='Hablando…';u.onend=()=>{document.getElementById('kk-st').textContent=micOn?'Escuchando…':'Di "Cronia" para activarme';};synth.speak(u);showKronIA();}
function toggleKronIA(){kkVis=!kkVis;document.getElementById('kronia').classList.toggle('vis',kkVis);document.getElementById('btn-kk').classList.toggle('on',kkVis);if(kkVis&&!micOn)kkSpeak('Hola César, soy KronIA. Di Cronia seguido de tu consulta.');}
function showKronIA(){if(!kkVis){kkVis=true;document.getElementById('kronia').classList.add('vis');document.getElementById('btn-kk').classList.add('on');}}

function toggleMic(){if(micOn)stopMic();else startMic();}
function startMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){pushAlert('Micrófono no disponible en este navegador');return;}recognition=new SR();recognition.lang='es-PE';recognition.continuous=true;recognition.interimResults=false;recognition.onresult=e=>{const t=e.results[e.results.length-1][0].transcript.trim().toLowerCase();document.getElementById('kk-txt').textContent='Escuché: '+t;if(t.includes('cronia')||t.includes('kronia')){const q=t.replace(/k?k?r?o?n?i?a/,'').trim();processQuery(q||'resumen');}};recognition.onerror=e=>{if(e.error!=='no-speech')pushAlert('Error mic: '+e.error);};recognition.onend=()=>{if(micOn)recognition.start();};recognition.start();micOn=true;document.getElementById('kk-btn').textContent='Mic activo';document.getElementById('kk-btn').classList.add('on');document.getElementById('kk-st').textContent='Escuchando…';startWave();showKronIA();}
function stopMic(){if(recognition)recognition.stop();if(micStream)micStream.getTracks().forEach(t=>t.stop());micOn=false;document.getElementById('kk-btn').textContent='Activar mic';document.getElementById('kk-btn').classList.remove('on');document.getElementById('kk-st').textContent='Di "Cronia" para activarme';stopWave();}

function startWave(){navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{micStream=stream;audioCtx=new AudioContext();const src=audioCtx.createMediaStreamSource(stream);analyser=audioCtx.createAnalyser();analyser.fftSize=64;dataArray=new Uint8Array(analyser.frequencyBinCount);src.connect(analyser);drawWave();}).catch(()=>drawWaveSynth());}
function stopWave(){if(waveAnim)cancelAnimationFrame(waveAnim);if(audioCtx)audioCtx.close();kkCtx.clearRect(0,0,kkCv.width,kkCv.height);}
function drawWave(){kkCv.width=kkCv.offsetWidth;kkCv.height=kkCv.offsetHeight;const cw=kkCv.width,ch=kkCv.height;analyser.getByteFrequencyData(dataArray);kkCtx.clearRect(0,0,cw,ch);const bars=dataArray.length,bw=cw/bars;for(let i=0;i<bars;i++){const h=(dataArray[i]/255)*ch*.85,alpha=0.4+dataArray[i]/255*.5;kkCtx.fillStyle='rgba(0,201,167,'+alpha.toFixed(2)+')';kkCtx.beginPath();if(kkCtx.roundRect)kkCtx.roundRect(i*bw+1,ch/2-h/2,bw-2,h,2);else kkCtx.rect(i*bw+1,ch/2-h/2,bw-2,h);kkCtx.fill();}waveAnim=requestAnimationFrame(drawWave);}
function drawWaveSynth(){kkCv.width=kkCv.offsetWidth;kkCv.height=kkCv.offsetHeight;const cw=kkCv.width,ch=kkCv.height;let t=0;function f(){t+=0.08;kkCtx.clearRect(0,0,cw,ch);const bars=24;for(let i=0;i<bars;i++){const h=(Math.sin(t+i*.4)*0.3+0.4)*ch*.7;kkCtx.fillStyle='rgba(0,201,167,0.55)';kkCtx.beginPath();if(kkCtx.roundRect)kkCtx.roundRect(i*(cw/bars)+1,ch/2-h/2,cw/bars-2,h,2);else kkCtx.rect(i*(cw/bars)+1,ch/2-h/2,cw/bars-2,h);kkCtx.fill();}waveAnim=requestAnimationFrame(f);}f();}
