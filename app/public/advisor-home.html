<style>
.vh-root{padding:16px;display:flex;flex-direction:column;gap:12px;}
.embudo-bar{background:#fff;border:1px solid #DDE4F5;border-radius:13px;padding:11px 18px;display:flex;align-items:center;gap:0;overflow:hidden;}
.emb-item{display:flex;flex-direction:column;align-items:center;flex:1;padding:4px 6px;position:relative;}
.emb-item:not(:last-child)::after{content:'›';position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:16px;color:#DDE4F5;font-weight:700;}
.emb-v{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;color:#0A4FBF;line-height:1;}
.emb-v.fact{font-size:14px;color:#16A34A;}
.emb-l{font-size:9px;font-weight:600;color:#9AAAC8;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.emb-titulo{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9AAAC8;margin-right:14px;white-space:nowrap;flex-shrink:0;}
.main3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:start;}
.scard{background:#fff;border:1px solid #DDE4F5;border-radius:14px;padding:15px;}
.schd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.st{font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;letter-spacing:.5px;color:#0D1B3E;}
.slink{font-size:11px;font-weight:600;color:#0A4FBF;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;}
.atc-row{display:flex;align-items:center;justify-content:space-around;padding:18px 0;}
.atc-item{text-align:center;}
.atc-v{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;color:#0A4FBF;line-height:1;}
.atc-v.g{color:#16A34A;}.atc-v.m{color:#6B7BA8;}
.atc-l{font-size:9px;color:#9AAAC8;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.atc-div{width:1px;height:30px;background:#DDE4F5;}
.com-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.com-v{font-family:'Exo 2',sans-serif;font-size:24px;font-weight:800;color:#0A4FBF;}
.com-meta{font-size:10px;color:#9AAAC8;}
.prog{background:#F0F4FC;border-radius:20px;height:6px;overflow:hidden;border:1px solid #DDE4F5;margin:8px 0 5px;}
.prog-f{height:100%;border-radius:20px;background:linear-gradient(90deg,#0A4FBF,#00C9A7);transition:width .5s;}
.com-labels{display:flex;justify-content:space-between;font-size:10px;color:#9AAAC8;}
.delta-row{display:flex;gap:7px;margin-top:10px;}
.dc{flex:1;padding:6px 8px;border-radius:8px;background:#F0F4FC;border:1px solid #DDE4F5;text-align:center;}
.dc-l{font-size:9px;color:#9AAAC8;margin-bottom:2px;}
.dc-v{font-size:12px;font-weight:700;}
/* Calendario mini */
.mini-cal{background:#F8F9FF;border:1px solid #DDE4F5;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.mc-titulo{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9AAAC8;margin-bottom:7px;}
.mc-dias{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.mc-dia{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:7px;border:1.5px solid transparent;}
.mc-dia.hoy{border-color:#0A4FBF;background:#EBF2FF;}
.mc-dia.pasado{opacity:.4;}
.mc-lbl{font-size:8px;font-weight:600;color:#9AAAC8;margin-bottom:3px;}
.mc-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
.mc-dot.si{background:#DCFCE7;color:#16A34A;border:1.5px solid #BBF7D0;}
.mc-dot.pl{background:#FFFBEB;color:#D97706;border:1.5px solid #FDE68A;}
.mc-dot.libre{background:#F0F4FC;color:#CDD5E0;border:1.5px solid transparent;}
.mc-dia-num{font-size:8px;color:#9AAAC8;margin-top:2px;}
/* Seguimientos */
.seg-list{display:flex;flex-direction:column;gap:6px;}
.si-item{padding:9px 11px;border-radius:9px;border:1px solid;cursor:pointer;}
.si-item:hover{opacity:.8;}
.sh2{background:#F0FDF4;border-color:#BBF7D0;}
.sp{background:#F0F4FC;border-color:#DDE4F5;}
.sv{background:#FEF2F2;border-color:#FECACA;}
.st2{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.sh2 .st2{color:#16A34A;}.sp .st2{color:#9AAAC8;}.sv .st2{color:#DC2626;}
.sn{font-size:12px;font-weight:600;color:#0D1B3E;}
.sm{font-size:10px;color:#6B7BA8;margin-top:1px;}
.empty-state{text-align:center;padding:16px 12px;color:#9AAAC8;}
.empty-state .ico{font-size:22px;margin-bottom:5px;}
.empty-state .msg{font-size:11px;}
.sp-sm{width:14px;height:14px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

<div class="vh-root">

  <!-- Embudo del mes -->
  <div class="embudo-bar">
    <div class="emb-titulo">📊 MES</div>
    <div class="emb-item"><div class="emb-v" id="emb-llam">—</div><div class="emb-l">Llamadas</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-citas">—</div><div class="emb-l">Citas</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-asist">—</div><div class="emb-l">Asistidos</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-ventas">—</div><div class="emb-l">Ventas</div></div>
    <div class="emb-item"><div class="emb-v fact" id="emb-fact">S/—</div><div class="emb-l">Facturado</div></div>
  </div>

  <div class="main3">

    <!-- Mis Atenciones -->
    <div class="scard">
      <div class="schd">
        <div class="st">MIS ATENCIONES</div>
        <button class="slink" onclick="window.AOS_navigateTo('advisor-attendance')">Ver más →</button>
      </div>
      <div class="atc-row">
        <div class="atc-item"><div class="atc-v" id="atc-total">0</div><div class="atc-l">Atendidos</div></div>
        <div class="atc-div"></div>
        <div class="atc-item"><div class="atc-v g" id="atc-nota">—</div><div class="atc-l">Nota prom.</div></div>
        <div class="atc-div"></div>
        <div class="atc-item"><div class="atc-v m" id="atc-recom">0%</div><div class="atc-l">Recom.</div></div>
      </div>
    </div>

    <!-- Mis Comisiones -->
    <div class="scard">
      <div class="schd">
        <div class="st">MIS COMISIONES</div>
        <button class="slink" onclick="window.AOS_navigateTo('advisor-commissions')">Ver detalle →</button>
      </div>
      <!-- com-v muestra comisión real (S/38.94), NO el facturado -->
      <div class="com-hd">
        <div class="com-v" id="com-total">S/. —</div>
        <div class="com-meta" id="com-meta">/ Meta S/. —</div>
      </div>
      <div class="prog"><div class="prog-f" id="com-prog" style="width:0%;"></div></div>
      <div class="com-labels">
        <span id="com-pct">—% completado</span>
        <span id="com-rank-lbl" style="font-weight:700;color:#0A4FBF;">Rank —</span>
      </div>
      <div class="delta-row">
        <div class="dc"><div class="dc-l">Ventas</div><div class="dc-v" id="com-delta-v">—</div></div>
        <div class="dc"><div class="dc-l">S/ Fact.</div><div class="dc-v" id="com-delta-fact" style="color:#16A34A;">—</div></div>
      </div>
    </div>

    <!-- Mi Semana -->
    <div class="scard">
      <div class="schd">
        <div class="st">MI SEMANA</div>
        <button class="slink" onclick="window.AOS_navigateTo('advisor-followups')">Ver segs →</button>
      </div>

      <!-- Calendario mini de turnos -->
      <div class="mini-cal">
        <div class="mc-titulo">
          📅 Turnos esta semana
          <span id="mc-leyenda" style="margin-left:6px;font-weight:400;">
            <span style="color:#16A34A;">■</span> S.Isidro
            <span style="margin-left:5px;color:#D97706;">■</span> P.Libre
          </span>
        </div>
        <div class="mc-dias" id="mc-dias">
          <div style="text-align:center;font-size:10px;color:#9AAAC8;grid-column:1/-1;padding:8px;"><span class="sp-sm"></span>Cargando...</div>
        </div>
        <div id="mc-sede-hoy" style="margin-top:6px;font-size:10px;font-weight:600;color:#6B7BA8;text-align:center;"></div>
      </div>

      <!-- Seguimientos pendientes -->
      <div style="font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9AAAC8;margin-bottom:7px;">
        Seguimientos pendientes
      </div>
      <div class="seg-list" id="seg-list">
        <div class="empty-state"><div class="ico">⏳</div><div class="msg">Cargando...</div></div>
      </div>

    </div>
  </div>
</div>

<script>
var _SB='https://ituyqwstonmhnfshnaqz.supabase.co',_SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function _rpc(fn,p,ok,fail){fetch(_SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(ok||function(){}).catch(fail||function(e){console.error('[SB]',fn,e);});}
function _q(t,f,ok){fetch(_SB+'/rest/v1/'+t+'?'+f,{headers:{'apikey':_SK,'Authorization':'Bearer '+_SK}}).then(function(r){return r.json();}).then(ok||function(){});}
function _hoy(){
  return new Date().toISOString().slice(0,10);
}
function _mes(){
  return new Date().toISOString().slice(0,7)+'-01';
}
function _ctx(){
  try {
    var s=JSON.parse(localStorage.getItem('aos_session')||'{}');
    return { a:(s.nombre||'').toUpperCase(), id:s.codigo_asesor||'' };
  } catch(e) { return { a:'', id:'' }; }
}

var VH = { token: '' };

(function() {
  VH.token = window.AOS_getToken ? window.AOS_getToken() : '';
  loadPanelFast();   // embudo + comisiones reales
  loadTurnos();      // calendario semanal
  loadSeguimientos();// seguimientos pendientes
})();

//  Panel rpido (embudo + comisiones REALES) 
// Fuente: api_getPanelAsesorFastT  res.embudo + res.comisiones
// IMPORTANTE: res.comisiones.total = comisin real (S/38.94)
//             res.embudo.fact      = facturado (S/9,094)
function loadPanelFast() {
  (function(){var x=_ctx();_rpc("aos_panel_asesor",{p_asesor:x.a,p_id_asesor:x.id,p_hoy:_hoy(),p_mes_inicio:_mes()},function(res) {
      if (!res || !res.ok) return;
      var el = function(id) { return document.getElementById(id); };

      // Embudo
      if (res.embudo) {
        var d = res.embudo;
        if (el('emb-llam'))   el('emb-llam').textContent   = d.llamadas   || 0;
        if (el('emb-citas'))  el('emb-citas').textContent  = d.citas      || 0;
        if (el('emb-asist'))  el('emb-asist').textContent  = d.asistieron || 0;
        if (el('emb-ventas')) el('emb-ventas').textContent = d.ventas     || 0;
        if (el('emb-fact'))   el('emb-fact').textContent   = 'S/' + ((d.fact||0).toLocaleString('es-PE',{minimumFractionDigits:0}));
      }

      // Comisiones REALES (no confundir con facturado)
      if (res.comisiones) {
        var c = res.comisiones;
        var comReal = parseFloat(c.total) || 0;
        var meta    = parseFloat(c.meta)  || 100;
        var pct     = Number(c.pct)       || 0;

        if (el('com-total')) el('com-total').textContent = 'S/. ' + comReal.toFixed(2);
        if (el('com-meta'))  el('com-meta').textContent  = '/ Meta S/. ' + meta.toFixed(2);
        if (el('com-prog'))  el('com-prog').style.width  = Math.min(pct, 100) + '%';
        if (el('com-pct'))   el('com-pct').textContent   = pct + '% completado';
        if (el('com-rank-lbl')) el('com-rank-lbl').textContent = 'Rank ' + (c.rank || '#1');
      }

      // Ventas y facturado en las delta cards
      if (res.embudo) {
        if (el('com-delta-v'))    el('com-delta-v').textContent    = res.embudo.ventas || 0;
        if (el('com-delta-fact')) el('com-delta-fact').textContent = 'S/' + ((res.embudo.fact||0).toLocaleString('es-PE',{minimumFractionDigits:0}));
      }
    });})()
;
}

//  Calendario de turnos (Mi Semana) 
// Fuente: api_getMisSemanaT  res.dias[{diaSem,dia,esHoy,esPasado,tieneTurno,sede}]
function loadTurnos() {
  (function(){var x=_ctx();_rpc("aos_semana_asesor",{p_id_asesor:x.id,p_hoy:_hoy()},function(res) {
      var cont = document.getElementById('mc-dias');
      if (!res || !res.ok || !res.dias || !res.dias.length) {
        cont.innerHTML = '<div style="grid-column:1/-1;text-align:center;font-size:10px;color:#9AAAC8;padding:6px;">Sin datos de turnos</div>';
        return;
      }
      cont.innerHTML = res.dias.map(function(d) {
        var tieneT = d.tieneTurno;
        var esSI   = tieneT && d.sede === 'SAN ISIDRO';
        var esPL   = tieneT && d.sede === 'PUEBLO LIBRE';
        var dotCls = esSI ? 'si' : esPL ? 'pl' : 'libre';
        var dotTxt = esSI ? 'SI' : esPL ? 'PL' : '';
        var cls    = (d.esHoy ? ' hoy' : '') + (d.esPasado && !d.esHoy ? ' pasado' : '');
        return '<div class="mc-dia' + cls + '" title="' + esc(d.fecha) + (tieneT?' · '+esc(d.sede):'') + '">' +
          '<div class="mc-lbl">' + esc(d.diaSem) + '</div>' +
          '<div class="mc-dot ' + dotCls + '">' + dotTxt + '</div>' +
          '<div class="mc-dia-num">' + (d.dia||'') + '</div></div>';
      }).join('');

      // Sede de hoy
      var hoy = res.dias.find(function(d) { return d.esHoy; });
      var sedeEl = document.getElementById('mc-sede-hoy');
      if (hoy && hoy.tieneTurno) {
        sedeEl.textContent = '📍 Hoy: ' + hoy.sede;
        sedeEl.style.color = hoy.sede === 'SAN ISIDRO' ? '#16A34A' : '#D97706';
      } else if (hoy) {
        sedeEl.textContent = '— Sin turno hoy';
        sedeEl.style.color = '#9AAAC8';
      }
    });})()
;
}

//  Seguimientos pendientes 
// Fuente: api_getMySeguimientosT  res.items[{segId,num,trat,obs,fecha,fechaHora,tipo,whatsapp}]
function loadSeguimientos() {
  (function(){var x=_ctx();_rpc("aos_get_seguimientos",{p_asesor:x.a,p_id_asesor:x.id,p_hoy:_hoy()},function(res){renderSegs(res&&res.items?res.items:[]);},function(){renderSegs([]);});})();
}

function renderSegs(items) {
  var el = document.getElementById('seg-list');

  // Filtrar los invlidos (fecha 1899, etc.)
  var validos = (items || []).filter(function(s) {
    if ((s.fecha || '').indexOf('1899') >= 0) return false;
    return true;
  });

  if (!validos.length) {
    el.innerHTML = '<div class="empty-state"><div class="ico">🎉</div><div class="msg">Sin seguimientos pendientes</div></div>';
    return;
  }

  el.innerHTML = validos.slice(0, 5).map(function(s) {
    var esHoy  = s.esHoy    || s.tipo === 'hoy';
    var esVenc = s.vencido  || s.tipo === 'vencido';
    var cls    = esVenc ? 'sv' : esHoy ? 'sh2' : 'sp';
    var tag    = esVenc ? '⚠ VENCIDO' : esHoy ? '● HOY' : '○ PRÓXIMO';
    var fechaStr = (s.fecha && s.fecha.indexOf('1899') < 0 && s.fecha !== '')
                   ? ' · ' + s.fecha.slice(5) : '';
    return '<div class="si-item ' + cls + '"' +
           ' onclick="window.open(\'' + esc(s.whatsapp||('https://wa.me/51'+(s.num||'').replace(/\\D/g,''))) + '\',\'_blank\')">' +
      '<div class="st2">' + tag + esc(fechaStr) + '</div>' +
      '<div class="sn">' + esc(s.num||'—') + ' · ' + esc(s.trat||'—') + '</div>' +
      (s.obs ? '<div class="sm">' + esc(s.obs.slice(0, 50)) + '</div>' : '') +
      '</div>';
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

</script>
