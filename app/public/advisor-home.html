<!-- advisor-home.html v2 — AscendaOS SES-015 | Layout: 2/3 libre + 1/3 derecha -->
<style>
.vh-root{padding:16px;display:flex;flex-direction:column;gap:12px;}
.embudo-bar{background:#fff;border:1px solid #DDE4F5;border-radius:13px;padding:11px 18px;display:flex;align-items:center;gap:0;overflow:hidden;}
.emb-item{display:flex;flex-direction:column;align-items:center;flex:1;padding:4px 6px;position:relative;}
.emb-item:not(:last-child)::after{content:'\203A';position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:16px;color:#DDE4F5;font-weight:700;}
.emb-v{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;color:#0A4FBF;line-height:1;}
.emb-v.fact{font-size:14px;color:#16A34A;}
.emb-l{font-size:9px;font-weight:600;color:#9AAAC8;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.emb-titulo{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9AAAC8;margin-right:14px;white-space:nowrap;flex-shrink:0;}
.main-layout{display:grid;grid-template-columns:2fr 1fr;gap:12px;align-items:start;}
.zone-left{min-height:200px;}
.scard{background:#fff;border:1px solid #DDE4F5;border-radius:14px;padding:15px;margin-bottom:12px;}
.schd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.st{font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;letter-spacing:.5px;color:#0D1B3E;}
.slink{font-size:11px;font-weight:600;color:#0A4FBF;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;}.slink:hover{text-decoration:underline;}
.atc-row{display:flex;align-items:center;justify-content:space-around;padding:14px 0;}
.atc-item{text-align:center;}.atc-v{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;color:#0A4FBF;line-height:1;}
.atc-v.g{color:#16A34A;}.atc-v.m{color:#6B7BA8;}.atc-l{font-size:9px;color:#9AAAC8;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}.atc-div{width:1px;height:24px;background:#DDE4F5;}
.com-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.com-v{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;color:#0A4FBF;}
.com-meta{font-size:10px;color:#9AAAC8;}
.prog{background:#F0F4FC;border-radius:20px;height:6px;overflow:hidden;border:1px solid #DDE4F5;margin:8px 0 5px;}
.prog-f{height:100%;border-radius:20px;background:linear-gradient(90deg,#0A4FBF,#00C9A7);transition:width .5s;}
.com-labels{display:flex;justify-content:space-between;font-size:10px;color:#9AAAC8;}
.delta-row{display:flex;gap:7px;margin-top:10px;}
.dc{flex:1;padding:5px 8px;border-radius:8px;background:#F0F4FC;border:1px solid #DDE4F5;text-align:center;}
.dc-l{font-size:9px;color:#9AAAC8;margin-bottom:2px;}.dc-v{font-size:12px;font-weight:700;}
/* ===== CALENDARIO MENSUAL ===== */
.cal-mes{background:#F8F9FF;border:1px solid #DDE4F5;border-radius:10px;padding:10px 12px;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cal-titulo{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;color:#0D1B3E;}
.cal-leyenda{font-size:8px;color:#9AAAC8;display:flex;gap:8px;align-items:center;}
.cal-leyenda span{display:inline-flex;align-items:center;gap:2px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:7px;font-weight:700;color:#9AAAC8;text-transform:uppercase;padding:2px 0;}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:3px 1px;border-radius:6px;min-height:28px;justify-content:center;position:relative;}
.cal-cell.hoy{background:#EBF2FF;border:1.5px solid #0A4FBF;}
.cal-cell.pasado{opacity:.35;}
.cal-num{font-size:9px;font-weight:700;color:#0D1B3E;}
.cal-dot{width:6px;height:6px;border-radius:50%;margin-top:2px;}
.cal-dot.si{background:#16A34A;}.cal-dot.pl{background:#D97706;}.cal-dot.off{background:transparent;}
.cal-sede-hoy{margin-top:7px;font-size:10px;font-weight:600;text-align:center;}
@media(max-width:900px){.main-layout{grid-template-columns:1fr;}}
</style>
<div class="vh-root">
  <!-- ===== EMBUDO BAR ===== -->
  <div class="embudo-bar">
    <div class="emb-titulo">&#128197; Mes</div>
    <div class="emb-item"><div class="emb-v" id="emb-llam">—</div><div class="emb-l">Llamadas</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-citas">—</div><div class="emb-l">Citas</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-asist">—</div><div class="emb-l">Asistidos</div></div>
    <div class="emb-item"><div class="emb-v" id="emb-ventas">—</div><div class="emb-l">Ventas</div></div>
    <div class="emb-item"><div class="emb-v fact" id="emb-fact">S/—</div><div class="emb-l">Facturado</div></div>
  </div>

  <div class="main-layout">
    <!-- ===== ZONA IZQUIERDA (2/3) — Reservada para futuro ===== -->
    <div class="zone-left"></div>

    <!-- ===== ZONA DERECHA (1/3) ===== -->
    <div class="zone-right">

      <!-- CALENDARIO MENSUAL -->
      <div class="scard">
        <div class="cal-hdr">
          <div class="cal-titulo" id="cal-mes-titulo">Abril 2026</div>
          <div class="cal-leyenda">
            <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#16A34A;"></span> S.Isidro</span>
            <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#D97706;"></span> P.Libre</span>
          </div>
        </div>
        <div class="cal-mes" id="cal-mes-grid">
          <div style="text-align:center;font-size:10px;color:#9AAAC8;padding:12px;">Cargando calendario...</div>
        </div>
        <div class="cal-sede-hoy" id="cal-sede-hoy"></div>
      </div>

      <!-- COMISIONES -->
      <div class="scard">
        <div class="schd">
          <div class="st">MIS COMISIONES</div>
          <button class="slink" onclick="navTo('advisor-commissions')">Ver detalle &#8594;</button>
        </div>
        <div class="com-hd">
          <div class="com-v" id="com-total">S/. —</div>
          <div class="com-meta" id="com-meta">/ Meta S/. —</div>
        </div>
        <div class="prog"><div class="prog-f" id="com-prog" style="width:0%;"></div></div>
        <div class="com-labels">
          <span id="com-pct">—% completado</span>
          <span id="com-rank-lbl" style="font-weight:700;color:#0A4FBF;">Rank —</span>
        </div>
        <div class="delta-row">
          <div class="dc"><div class="dc-l">Ventas</div><div class="dc-v" id="com-delta-v">—</div></div>
          <div class="dc"><div class="dc-l">S/ Fact.</div><div class="dc-v" id="com-delta-fact" style="color:#16A34A;">—</div></div>
        </div>
      </div>

      <!-- ATENCIONES -->
      <div class="scard">
        <div class="schd">
          <div class="st">MIS ATENCIONES</div>
          <button class="slink" onclick="navTo('advisor-attendance')">Ver m&aacute;s &#8594;</button>
        </div>
        <div class="atc-row">
          <div class="atc-item"><div class="atc-v" id="atc-total">0</div><div class="atc-l">Atendidos</div></div>
          <div class="atc-div"></div>
          <div class="atc-item"><div class="atc-v g" id="atc-nota">—</div><div class="atc-l">Nota prom.</div></div>
          <div class="atc-div"></div>
          <div class="atc-item"><div class="atc-v m" id="atc-recom">0%</div><div class="atc-l">Recom.</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
var _SB='https://ituyqwstonmhnfshnaqz.supabase.co';
var _SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
function _rpc(fn,p,ok,fail){fetch(_SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(ok||function(){}).catch(fail||function(e){console.error('[SB]',fn,e);});}
function _hoy(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function _mes(){return new Date().toISOString().slice(0,7)+'-01';}
function _ctx(){try{var s=JSON.parse(localStorage.getItem('aos_session')||'{}');return{a:(s.nombre||'').toUpperCase(),id:s.codigo_asesor||''};}catch(e){return{a:'',id:''};}}
function $(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return(n||0).toLocaleString('es-PE',{minimumFractionDigits:0});}
function navTo(v){if(window.navigateTo)window.navigateTo(v);else if(window.AOS_navigateTo)window.AOS_navigateTo(v);}
var MES_NOM=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

(function(){loadEmbudo();loadComisiones();loadCalendarioMes();})();

/* ═════ 1. EMBUDO DEL MES ═════ */
function loadEmbudo(){
  var x=_ctx();
  _rpc('aos_panel_asesor',{p_asesor:x.a,p_id_asesor:x.id,p_hoy:_hoy(),p_mes_inicio:_mes()},function(r){
    if(!r)return;
    if($('emb-llam'))$('emb-llam').textContent=r.llamMes||0;
    if($('emb-citas'))$('emb-citas').textContent=r.citasMes||0;
    if($('emb-asist'))$('emb-asist').textContent=r.asistMes||0;
    if($('emb-ventas'))$('emb-ventas').textContent=r.ventasMes||0;
    if($('emb-fact'))$('emb-fact').textContent='S/'+fmt(r.factMes);
    if($('com-delta-v'))$('com-delta-v').textContent=r.ventasMes||0;
    if($('com-delta-fact'))$('com-delta-fact').textContent='S/'+fmt(r.factMes);
  });
}

/* ═════ 2. COMISIONES ═════ */
function loadComisiones(){
  var x=_ctx(),h=new Date();
  var mes=String(h.getMonth()+1).padStart(2,'0'),anio=String(h.getFullYear());
  _rpc('aos_comisiones_asesor',{p_asesor:x.a,p_id_asesor:x.id,p_mes:mes,p_anio:anio},function(r){
    if(!r)return;
    var com=parseFloat(r.comTotal)||0,meta=parseFloat(r.meta)||100,pct=Number(r.pct)||0;
    if($('com-total'))$('com-total').textContent='S/. '+com.toFixed(2);
    if($('com-meta'))$('com-meta').textContent='/ Meta S/ '+fmt(meta);
    if($('com-prog'))$('com-prog').style.width=Math.min(pct,100)+'%';
    if($('com-pct'))$('com-pct').textContent=pct+'% completado';
    if($('com-rank-lbl'))$('com-rank-lbl').textContent='Rank #'+(r.ranking||'\u2014');
  });
}

/* ═════ 3. CALENDARIO MENSUAL (30 días con puntos) ═════ */
function loadCalendarioMes(){
  var now=new Date(),anio=now.getFullYear(),mes=now.getMonth()+1;
  if($('cal-mes-titulo'))$('cal-mes-titulo').textContent=MES_NOM[mes-1]+' '+anio;
  var x=_ctx();
  _rpc('aos_mes_asesor',{p_asesor:x.a,p_anio:anio,p_mes:mes},function(r){
    if(!r||!r.ok){$('cal-mes-grid').innerHTML='<div style="text-align:center;font-size:10px;color:#9AAAC8;padding:8px;">Sin datos</div>';return;}
    var diasMes=r.dias_mes||30;
    var primerDia=r.primer_dia_sem; // 0=domingo
    // Convertir para que lunes=0
    var offset=(primerDia===0)?6:primerDia-1;
    var turnos=r.turnos||[];
    var turnoMap={};
    turnos.forEach(function(t){turnoMap[t.dia]=t;});
    var hoyDia=now.getDate();
    var hoyMes=now.getMonth()+1;
    var esEsteMes=(mes===hoyMes&&anio===now.getFullYear());
    var html='<div class="cal-grid">';
    // Headers
    var dows=['LU','MA','MI','JU','VI','SA','DO'];
    dows.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
    // Espacios vacíos antes del día 1
    for(var i=0;i<offset;i++){html+='<div class="cal-cell"></div>';}
    // Días del mes
    for(var d=1;d<=diasMes;d++){
      var t=turnoMap[d];
      var esHoy=esEsteMes&&d===hoyDia;
      var esPasado=esEsteMes&&d<hoyDia;
      var cls='cal-cell'+(esHoy?' hoy':'')+(esPasado?' pasado':'');
      var dotCls='cal-dot off';
      if(t){
        var sede=(t.sede||'').toUpperCase();
        if(sede.indexOf('SAN')>=0)dotCls='cal-dot si';
        else if(sede.indexOf('PUEBLO')>=0)dotCls='cal-dot pl';
      }
      html+='<div class="'+cls+'"><div class="cal-num">'+d+'</div><div class="'+dotCls+'"></div></div>';
    }
    html+='</div>';
    $('cal-mes-grid').innerHTML=html;
    // Sede hoy
    var se=$('cal-sede-hoy');
    if(esEsteMes&&turnoMap[hoyDia]){
      var sn=(turnoMap[hoyDia].sede||'').replace(/_/g,' ');
      se.textContent='\uD83D\uDCCD Hoy: '+sn+' ('+turnoMap[hoyDia].hora_inicio+'-'+turnoMap[hoyDia].hora_fin+')';
      se.style.color=sn.indexOf('SAN')>=0?'#16A34A':'#D97706';
    }else if(esEsteMes){
      se.textContent='\u2014 Sin turno hoy';se.style.color='#9AAAC8';
    }
  },function(){$('cal-mes-grid').innerHTML='<div style="text-align:center;font-size:10px;color:#9AAAC8;padding:8px;">Sin acceso al calendario</div>';});
}
</script>
