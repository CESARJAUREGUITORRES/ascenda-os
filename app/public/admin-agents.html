// ═══ GLOBALS QUE LOS JSX ESPERAN ═══
window.TILE = 24;
window.MAP_W = 36;
window.MAP_H = 20;

window.DEPARTMENTS = {

  ventas:       { name: 'Ventas',       color: '#1E40AF', icon: '📞' },

  cafe:         { name: 'Cafetería',    color: '#92400E', icon: '☕' },
};

window.ZONES = [

  { id: 'z-marketing',    dept: 'marketing',    name: 'Marketing',    x: 10, y: 1, w: 8, h: 6 },
  { id: 'z-datos',        dept: 'datos',        name: 'Datos',        x: 19, y: 1, w: 8, h: 6 },
  { id: 'z-operaciones',  dept: 'operaciones',  name: 'Operaciones',  x: 1,  y: 9, w: 8, h: 6 },
  { id: 'z-chatbot',      dept: 'chatbot',      name: 'Chatbot',      x: 10, y: 9, w: 8, h: 6 },
  { id: 'z-coordinacion', dept: 'coordinacion',  name: 'Coordinación', x: 19, y: 9, w: 8, h: 6 },
  { id: 'z-cafe',         dept: 'cafe',          name: 'Cafetería',    x: 28, y: 1, w: 7, h: 14, floor: 'wood' },
];

window.DESKS = [];
window.AGENTS = [];

// ═══ LOAD FROM SUPABASE ═══
function loadAgentsFromDB() {
  return sbGet('/rest/v1/aos_agentes?select=*&order=area,nombre').then(function(rows) {
    if (!rows || !rows.length) return [];
    // Map DB fields to the format JSX components expect
    var deskId = 0;
    var deptPositions = {};
    window.AGENTS = rows.map(function(a) {
      var dept = a.area;
      if (!deptPositions[dept]) deptPositions[dept] = 0;
      var idx = deptPositions[dept]++;
      var zone = window.ZONES.find(function(z) { return z.dept === dept; });
      if (!zone) zone = window.ZONES[0];
      // Position within zone
      var col = idx % 3, row = Math.floor(idx / 3);
      var deskX = zone.x + 1 + col * 2;
      var deskY = zone.y + 1 + row * 2;
      var did = 'd-' + a.id;
      window.DESKS.push({ id: did, x: deskX, y: deskY, facing: 'down' });

      return {
        id: a.id,
        name: a.nombre,
        avatar: a.emoji,
        dept: dept,
        role: a.cargo,
        level: a.motor_ai === 'script' ? 'Script' : a.motor_ai === 'groq' ? 'Groq' : a.motor_ai === 'gemini' ? 'Gemini' : 'Claude',
        status: a.activo ? (a.estado || 'idle') : 'paused',
        home: did,
        skin: a.sprite_skin || '#F1C27D',
        hair: a.sprite_hair || '#1F1F1F',
        shirt: a.sprite_shirt || (window.DEPARTMENTS[dept] || {}).color || '#64748B',
        px: (deskX + 0.5) * window.TILE,
        py: (deskY - 0.5) * window.TILE,
        tx: (deskX + 0.5) * window.TILE,
        ty: (deskY - 0.5) * window.TILE,
        walking: false,
        selected: false,
        hovered: false,
        efficiency: a.eficiencia || 85,
        tasksDone: a.total_ejecuciones || 0,
        tasksQueued: 0,
        totalTokens: a.total_tokens_usados || 0,
        bubble: a.bubble_text ? { text: a.bubble_text, type: a.bubble_type || 'thought' } : null,
        activity: a.estado === 'working' ? { label: a.bubble_text || 'Procesando...', thought: 'Analizando datos...' } : { label: 'En espera', thought: '' },
        log: [],
        activo: a.activo,
        motor_ai: a.motor_ai,
        modelo: a.modelo,
        cron: a.cron_intervalo,
      };
    });
    return window.AGENTS;
  });
}

<script type="text/babel">
// Office Pixel — canvas renderer with Ascenda OS palette (navy/emerald/sky)
// Light glass background, rich decoration, department drill-down support.

const { useRef: useOfRef, useEffect: useOfEffect, useState: useOfState, useCallback: useOfCallback } = React;

// ————— Ascenda OS theme — light glass + navy + emerald —————
const THEME = {
  // Ascenda brand palette (from logo)
  navy:      '#1E40AF',
  navyDk:    '#0F1F4A',
  navyMid:   '#1E3A8A',
  navyLt:    '#3B82F6',
  emerald:   '#10B981',
  emeraldDk: '#059669',
  emeraldLt: '#34D399',
  sky:       '#0EA5E9',
  // Surfaces (light)
  bgSoft:    '#EEF2FA',   // the pale blue-ish tint of Ascenda hero
  bgPaper:   '#F8FAFC',
  paper:     '#FFFFFF',
  ink:       '#0F172A',
  mute:      '#64748B',
  line:      '#E2E8F0',
  lineSoft:  '#F1F5F9',
  // Floor palettes — LIGHT TONES
  woodLt:    '#F5E6D3',   // warm parquet
  woodMid:   '#E8D5B7',
  woodDk:    '#D4B896',
  tileLt:    '#F8FAFC',   // cool office tile
  tileDk:    '#E2E8F0',
  // Department carpets (soft pastel tints aligned with dept color)
  carpet: {
    navy:    ['#DBEAFE', '#BFDBFE'],   // executive
    blue:    ['#DBEAFE', '#C7D7FA'],   // marketing
    emerald: ['#D1FAE5', '#A7F3D0'],   // finance, research
    sky:     ['#E0F2FE', '#BAE6FD'],   // callcenter
    azul:    ['#DBEAFE', '#BFDBFE'],   // sales
    teal:    ['#CCFBF1', '#99F6E4'],   // hr
    cyan:    ['#CFFAFE', '#A5F3FC'],   // scheduler, accounting
    slate:   ['#E0E7FF', '#C7D2FE'],   // legal
    cafe:    ['#FEF3C7', '#FDE68A'],   // cafeteria warm
  },
  wall:      '#CBD5E1',
  wallDk:    '#94A3B8',
};

// Map department → carpet palette key
const DEPT_CARPET = {
  executive:  'navy',
  marketing:  'blue',
  finance:    'emerald',
  callcenter: 'sky',
  sales:      'azul',
  hr:         'teal',
  scheduler:  'cyan',
  research:   'emerald',
  accounting: 'cyan',
  legal:      'slate',
  cafe:       'cafe',
  meeting:    'slate',
};

// ————— Floor drawing —————
function drawFloor(ctx, zone, tile) {
  const { x, y, w, h, dept } = zone;
  const px = x * tile, py = y * tile;
  const pw = w * tile, ph = h * tile;

  if (zone.floor === 'wood' || dept === 'cafe' || dept === 'meeting') {
    // Parquet — light warm wood
    for (let i = 0; i < h; i++) {
      for (let j = 0; j < w; j++) {
        const alt = (Math.floor(i / 1) + Math.floor(j / 2)) % 2 === 0;
        ctx.fillStyle = alt ? THEME.woodLt : THEME.woodMid;
        ctx.fillRect(px + j * tile, py + i * tile, tile, tile);
      }
    }
    // Plank seams
    ctx.strokeStyle = 'rgba(139, 92, 46, 0.15)';
    ctx.lineWidth = 1;
    for (let i = 1; i < h; i++) {
      ctx.beginPath();
      ctx.moveTo(px, py + i * tile + 0.5);
      ctx.lineTo(px + pw, py + i * tile + 0.5);
      ctx.stroke();
    }
    return;
  }

  // Tinted tile for departments
  const carpetKey = DEPT_CARPET[dept];
  const palette = THEME.carpet[carpetKey] || [THEME.tileLt, THEME.tileDk];
  const [c1, c2] = palette;

  for (let i = 0; i < h; i++) {
    for (let j = 0; j < w; j++) {
      const alt = (i + j) % 2 === 0;
      ctx.fillStyle = alt ? c1 : c2;
      ctx.fillRect(px + j * tile, py + i * tile, tile, tile);
    }
  }
  // Subtle grid
  ctx.strokeStyle = 'rgba(15, 23, 42, 0.04)';
  ctx.lineWidth = 1;
  for (let j = 0; j <= w; j++) {
    ctx.beginPath();
    ctx.moveTo(px + j * tile + 0.5, py);
    ctx.lineTo(px + j * tile + 0.5, py + ph);
    ctx.stroke();
  }
  for (let i = 0; i <= h; i++) {
    ctx.beginPath();
    ctx.moveTo(px, py + i * tile + 0.5);
    ctx.lineTo(px + pw, py + i * tile + 0.5);
    ctx.stroke();
  }
}

function drawZoneWalls(ctx, zone, tile) {
  const { x, y, w, h, dept } = zone;
  const deptColor = window.DEPARTMENTS[dept]?.color || THEME.wallDk;
  const px = x * tile, py = y * tile;
  const pw = w * tile, ph = h * tile;

  // Thin dept-colored border
  ctx.fillStyle = deptColor + '80';
  ctx.fillRect(px - 1, py - 1, pw + 2, 1);
  ctx.fillRect(px - 1, py + ph, pw + 2, 1);
  ctx.fillRect(px - 1, py - 1, 1, ph + 2);
  ctx.fillRect(px + pw, py - 1, 1, ph + 2);
  // Corners: solid dept dot
  ctx.fillStyle = deptColor;
  ctx.fillRect(px - 2, py - 2, 3, 3);
  ctx.fillRect(px + pw - 1, py - 2, 3, 3);
  ctx.fillRect(px - 2, py + ph - 1, 3, 3);
  ctx.fillRect(px + pw - 1, py + ph - 1, 3, 3);
}

// ————— Furniture —————
function drawDesk(ctx, desk, tile) {
  const px = desk.x * tile, py = desk.y * tile;
  // Desk body (light wood)
  ctx.fillStyle = '#E8D5B7';
  ctx.fillRect(px + 1, py + 2, tile - 2, tile - 8);
  ctx.fillStyle = '#D4B896';
  ctx.fillRect(px + 1, py + tile - 7, tile - 2, 2);  // front edge shadow
  // Monitor arm
  ctx.fillStyle = '#64748B';
  ctx.fillRect(px + tile/2 - 1, py + 4, 2, 4);
  // Monitor
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px + 4, py + 2, tile - 8, 8);
  ctx.fillStyle = '#1E293B';
  ctx.fillRect(px + 5, py + 3, tile - 10, 1);
  // Screen content — app-like
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(px + 5, py + 4, tile - 10, 6);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 6, py + 5, 3, 1);
  ctx.fillStyle = '#60A5FA';
  ctx.fillRect(px + 10, py + 5, 5, 1);
  ctx.fillStyle = '#93C5FD';
  ctx.fillRect(px + 6, py + 7, 8, 1);
  ctx.fillRect(px + 6, py + 9, 6, 1);
  // Keyboard + mousepad
  ctx.fillStyle = '#F1F5F9';
  ctx.fillRect(px + 4, py + 13, tile - 8, 3);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 4, py + 13, tile - 8, 1);
  // Coffee cup (random desks)
  if ((desk.x + desk.y) % 3 === 0) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + tile - 5, py + 12, 3, 3);
    ctx.fillStyle = '#78350F';
    ctx.fillRect(px + tile - 4, py + 12, 1, 1);
  }
}

function drawChair(ctx, x, y, facing, tile, color = '#1E40AF') {
  const px = x * tile, py = y * tile;
  const cy = facing === 'down' ? py + tile + 2 : py - 6;
  // seat
  ctx.fillStyle = color;
  ctx.fillRect(px + 4, cy, tile - 8, 4);
  // back
  if (facing === 'down') {
    ctx.fillStyle = color;
    ctx.fillRect(px + 4, cy + 4, tile - 8, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(px + 4, cy + 3, tile - 8, 1);
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(px + 4, cy - 2, tile - 8, 2);
  }
  // wheel base
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + tile/2 - 2, cy + (facing === 'down' ? 6 : -4), 4, 1);
}

function drawPlant(ctx, x, y, tile, variant = 0) {
  const px = x * tile, py = y * tile;
  // Pot (terracotta or white modern)
  if (variant === 0) {
    ctx.fillStyle = '#DC7A4C';
    ctx.fillRect(px + 6, py + 15, tile - 12, 6);
    ctx.fillStyle = '#C66A3C';
    ctx.fillRect(px + 6, py + 15, tile - 12, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px + 6, py + 20, tile - 12, 1);
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 6, py + 15, tile - 12, 6);
    ctx.fillStyle = '#E2E8F0';
    ctx.fillRect(px + 6, py + 15, tile - 12, 1);
  }
  // Leaves — lush multi-layer
  ctx.fillStyle = '#065F46';
  ctx.fillRect(px + 5, py + 8, tile - 10, 7);
  ctx.fillStyle = '#047857';
  ctx.fillRect(px + 7, py + 4, tile - 14, 10);
  ctx.fillStyle = '#059669';
  ctx.fillRect(px + 4, py + 6, 4, 8);
  ctx.fillRect(px + tile - 8, py + 6, 4, 8);
  ctx.fillStyle = '#10B981';
  ctx.fillRect(px + 9, py + 2, tile - 18, 8);
  ctx.fillStyle = '#34D399';
  ctx.fillRect(px + 10, py + 4, 3, 3);
  ctx.fillRect(px + tile - 13, py + 6, 2, 2);
}

function drawLargePlant(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Big planter
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 3, py + 16, tile - 6, tile - 18);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 3, py + 16, tile - 6, 1);
  // Fronds
  ctx.fillStyle = '#064E3B';
  ctx.fillRect(px + 2, py + 8, tile - 4, 10);
  ctx.fillStyle = '#065F46';
  ctx.fillRect(px, py + 10, tile, 6);
  ctx.fillStyle = '#047857';
  ctx.fillRect(px + 4, py + 2, tile - 8, 12);
  ctx.fillStyle = '#10B981';
  ctx.fillRect(px + 7, py, tile - 14, 10);
  ctx.fillStyle = '#34D399';
  ctx.fillRect(px + 9, py - 2, 3, 5);
}

function drawMeetingTable(ctx, x, y, w, h, tile) {
  const px = x * tile, py = y * tile;
  // Table surface (light wood)
  ctx.fillStyle = '#E8D5B7';
  ctx.fillRect(px + 3, py + 3, w * tile - 6, h * tile - 6);
  ctx.fillStyle = '#D4B896';
  ctx.fillRect(px + 3, py + h * tile - 6, w * tile - 6, 2);
  ctx.strokeStyle = '#B89968';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 3, py + 3, w * tile - 6, h * tile - 6);
  // Laptops + papers
  const cx = px + (w * tile) / 2;
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + 8, py + 7, 8, 5);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 9, py + 8, 6, 3);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + w * tile - 16, py + 9, 8, 5);
  // Central element
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(cx - 3, py + (h * tile) / 2 - 2, 6, 4);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(cx - 2, py + (h * tile) / 2 - 1, 4, 2);
}

function drawCoffeeMachine(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Counter
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 2, py + 14, tile - 4, tile - 15);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 2, py + 14, tile - 4, 1);
  // Machine body (chrome + navy)
  ctx.fillStyle = '#1E293B';
  ctx.fillRect(px + 4, py + 2, tile - 8, 14);
  ctx.fillStyle = '#334155';
  ctx.fillRect(px + 4, py + 2, tile - 8, 2);
  // Brand strip
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 6, py + 4, tile - 12, 1);
  // Display
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 7, py + 6, 3, 2);
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + 7, py + 9, tile - 14, 2);
  // Cup area
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 7, py + 13, tile - 14, 2);
  // Cup
  ctx.fillStyle = '#FEF3C7';
  ctx.fillRect(px + tile/2 - 2, py + 10, 4, 4);
  ctx.fillStyle = '#78350F';
  ctx.fillRect(px + tile/2 - 1, py + 10, 2, 1);
}

function drawWaterCooler(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Base (white)
  ctx.fillStyle = '#F8FAFC';
  ctx.fillRect(px + 4, py + 10, tile - 8, tile - 11);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 4, py + 10, tile - 8, 1);
  // Blue tank
  ctx.fillStyle = '#60A5FA';
  ctx.fillRect(px + 5, py + 2, tile - 10, 9);
  ctx.fillStyle = '#93C5FD';
  ctx.fillRect(px + 6, py + 3, tile - 14, 4);
  // Bubbles
  ctx.fillStyle = '#DBEAFE';
  ctx.fillRect(px + 7, py + 5, 1, 1);
  ctx.fillRect(px + 10, py + 7, 1, 1);
  // Tap
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + tile/2 - 1, py + 11, 2, 2);
}

function drawWhiteboard(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Board (white)
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 2, py + 3, tile - 4, tile - 10);
  ctx.strokeStyle = '#94A3B8';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 2, py + 3, tile - 4, tile - 10);
  // Frame shadow
  ctx.fillStyle = '#475569';
  ctx.fillRect(px + 2, py + tile - 7, tile - 4, 1);
  // Content: chart bars
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(px + 4, py + tile - 11, 1, 4);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 6, py + tile - 13, 1, 6);
  ctx.fillStyle = THEME.sky;
  ctx.fillRect(px + 8, py + tile - 10, 1, 3);
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(px + 10, py + tile - 12, 1, 5);
  // Trend line
  ctx.strokeStyle = THEME.emerald;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px + 4, py + 7);
  ctx.lineTo(px + 8, py + 6);
  ctx.lineTo(px + tile - 4, py + 5);
  ctx.stroke();
  // Tray + markers
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(px + 2, py + tile - 7, tile - 4, 2);
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(px + 5, py + tile - 6, 3, 1);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 10, py + tile - 6, 3, 1);
  ctx.fillStyle = '#DC2626';
  ctx.fillRect(px + 15, py + tile - 6, 3, 1);
}

function drawSofa(ctx, x, y, tile, color = '#1E40AF') {
  const px = x * tile, py = y * tile;
  // Sofa body
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 7, tile - 2, tile - 9);
  // Cushions
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(px + 2, py + 8, (tile - 4) / 2 - 1, tile - 13);
  ctx.fillRect(px + tile / 2 + 1, py + 8, (tile - 4) / 2 - 1, tile - 13);
  // Armrests
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 5, 4, tile - 7);
  ctx.fillRect(px + tile - 5, py + 5, 4, tile - 7);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(px + 1, py + tile - 3, tile - 2, 2);
  // Pillows
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 4, py + 8, 3, 3);
}

function drawBookshelf(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Case
  ctx.fillStyle = '#6B4423';
  ctx.fillRect(px + 1, py + 1, tile - 2, tile - 2);
  ctx.fillStyle = '#8B5A2B';
  ctx.fillRect(px + 1, py + 1, tile - 2, 1);
  // Shelves w/ books
  const shelves = 3;
  for (let i = 0; i < shelves; i++) {
    const sy = py + 3 + i * 6;
    ctx.fillStyle = '#A67B4A';
    ctx.fillRect(px + 2, sy + 5, tile - 4, 1);
    // Books
    const colors = ['#1E40AF', '#10B981', '#DC2626', '#F59E0B', '#8B5CF6', '#0EA5E9'];
    let bx = px + 2;
    while (bx < px + tile - 3) {
      const bw = 1 + Math.floor(Math.abs(Math.sin(bx * (i+1))) * 2) + 1;
      ctx.fillStyle = colors[(bx + i) % colors.length];
      ctx.fillRect(bx, sy, bw, 5);
      bx += bw + 1;
    }
  }
}

function drawPrinter(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Body
  ctx.fillStyle = '#F8FAFC';
  ctx.fillRect(px + 2, py + 6, tile - 4, tile - 10);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 2, py + 6, tile - 4, 2);
  // Top output
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + 4, py + 3, tile - 8, 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 5, py + 4, tile - 10, 2);
  // Status LED
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + tile - 5, py + 9, 1, 1);
  // Paper tray
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 3, py + tile - 5, tile - 6, 2);
}

function drawFilingCabinet(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(px + 2, py + 2, tile - 4, tile - 4);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 2, py + 2, tile - 4, 1);
  // 3 drawers
  for (let i = 0; i < 3; i++) {
    const dy = py + 4 + i * 6;
    ctx.fillStyle = '#64748B';
    ctx.fillRect(px + 3, dy + 4, tile - 6, 1);
    // handle
    ctx.fillStyle = '#1E293B';
    ctx.fillRect(px + tile/2 - 2, dy + 1, 4, 1);
  }
}

function drawWindow(ctx, x, y, tile) {
  // Window on wall (narrow strip showing "sky")
  const px = x * tile, py = y * tile;
  const grd = ctx.createLinearGradient(px, py, px + tile, py + tile);
  grd.addColorStop(0, '#BAE6FD');
  grd.addColorStop(1, '#7DD3FC');
  ctx.fillStyle = grd;
  ctx.fillRect(px + 2, py + 2, tile - 4, tile - 4);
  // Frame cross
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + tile/2 - 1, py + 2, 2, tile - 4);
  ctx.fillRect(px + 2, py + tile/2 - 1, tile - 4, 2);
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(px + 3, py + 3, 3, tile - 6);
}

function drawRug(ctx, x, y, w, h, tile, color) {
  const px = x * tile, py = y * tile;
  const pw = w * tile, ph = h * tile;
  ctx.fillStyle = color;
  ctx.fillRect(px + 3, py + 3, pw - 6, ph - 6);
  // Pattern border
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 5, py + 5, pw - 10, ph - 10);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.strokeRect(px + 3, py + 3, pw - 6, ph - 6);
  // Tassels (corners)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(px + 3, py + 3, 2, 2);
  ctx.fillRect(px + pw - 5, py + 3, 2, 2);
  ctx.fillRect(px + 3, py + ph - 5, 2, 2);
  ctx.fillRect(px + pw - 5, py + ph - 5, 2, 2);
}

function drawLamp(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Stand
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(px + tile/2 - 1, py + 10, 2, tile - 12);
  ctx.fillStyle = '#64748B';
  ctx.fillRect(px + tile/2 - 4, py + tile - 3, 8, 2);
  // Shade
  ctx.fillStyle = '#FEF3C7';
  ctx.fillRect(px + tile/2 - 5, py + 4, 10, 8);
  ctx.fillStyle = '#FDE68A';
  ctx.fillRect(px + tile/2 - 5, py + 4, 10, 2);
  // Glow
  ctx.fillStyle = 'rgba(253, 224, 71, 0.2)';
  ctx.fillRect(px + tile/2 - 8, py + 12, 16, 4);
}

function drawSink(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Counter
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 1, py + 4, tile - 2, tile - 5);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 1, py + 4, tile - 2, 1);
  // Sink basin
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 4, py + 8, tile - 8, 10);
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(px + 5, py + 9, tile - 10, 8);
  // Faucet
  ctx.fillStyle = '#64748B';
  ctx.fillRect(px + tile/2 - 1, py + 5, 2, 5);
  ctx.fillRect(px + tile/2 - 2, py + 8, 4, 2);
}

function drawFridge(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 2, py + 1, tile - 4, tile - 2);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 2, py + 1, tile - 4, 1);
  // Door divide
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 2, py + 10, tile - 4, 1);
  // Handles
  ctx.fillStyle = '#64748B';
  ctx.fillRect(px + tile - 5, py + 4, 2, 4);
  ctx.fillRect(px + tile - 5, py + 14, 2, 4);
}

function drawTV(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  // Frame
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px + 1, py + 3, tile - 2, tile - 8);
  // Screen — showing Ascenda dashboard
  ctx.fillStyle = THEME.navy;
  ctx.fillRect(px + 2, py + 4, tile - 4, tile - 10);
  // chart bars
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 4, py + tile - 8, 2, 2);
  ctx.fillRect(px + 7, py + tile - 10, 2, 4);
  ctx.fillRect(px + 10, py + tile - 9, 2, 3);
  ctx.fillStyle = THEME.emerald;
  ctx.fillRect(px + 4, py + 6, 4, 1);
  ctx.fillStyle = THEME.sky;
  ctx.fillRect(px + 10, py + 6, 4, 1);
  // Stand
  ctx.fillStyle = '#475569';
  ctx.fillRect(px + tile/2 - 3, py + tile - 5, 6, 3);
}

function drawServerRack(ctx, x, y, tile) {
  const px = x * tile, py = y * tile;
  ctx.fillStyle = '#18181B';
  ctx.fillRect(px + 3, py + 1, tile - 6, tile - 2);
  ctx.fillStyle = '#27272A';
  ctx.fillRect(px + 3, py + 1, tile - 6, 1);
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = i % 2 ? '#27272A' : '#3F3F46';
    ctx.fillRect(px + 5, py + 3 + i * 5, tile - 10, 3);
    ctx.fillStyle = i === 0 ? THEME.emerald : i === 1 ? '#60A5FA' : THEME.emerald;
    ctx.fillRect(px + tile - 7, py + 4 + i * 5, 1, 1);
    ctx.fillRect(px + tile - 9, py + 4 + i * 5, 1, 1);
  }
}

// ————— Main office draw —————
function drawOffice(ctx, state) {
  const { zones, desks, tile, mapW, mapH } = state;

  // Outer floor (hallway + void): light tile
  ctx.fillStyle = THEME.bgSoft;
  ctx.fillRect(0, 0, mapW * tile, mapH * tile);

  // Floors per zone
  zones.forEach(z => drawFloor(ctx, z, tile));

  // Zone borders
  zones.forEach(z => drawZoneWalls(ctx, z, tile));

  // Decorations per zone — RICH
  zones.forEach(z => {
    const d = window.DEPARTMENTS[z.dept];

    if (z.dept === 'executive') {
      // CEO corner: rug + sofas + plants + bookshelf
      drawRug(ctx, z.x + 1, z.y + 4, 5, 3, tile, 'rgba(30, 64, 175, 0.1)');
      drawLargePlant(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawLargePlant(ctx, z.x + 1,       z.y + z.h - 2, tile);
      drawSofa(ctx, z.x + z.w - 3,  z.y + z.h - 2, tile, THEME.navy);
      drawBookshelf(ctx, z.x + z.w - 4, z.y + 1, tile);
      drawWindow(ctx, z.x + 2, z.y, tile);
      drawWindow(ctx, z.x + 5, z.y, tile);
    }
    else if (z.dept === 'meeting') {
      drawMeetingTable(ctx, z.x + 1, z.y + 1, z.w - 2, z.h - 2, tile);
      drawWhiteboard(ctx, z.x + z.w - 2, z.y + 2, tile);
      drawWhiteboard(ctx, z.x + z.w - 2, z.y + 4, tile);
      drawTV(ctx, z.x + 1, z.y + 2, tile);
      drawLargePlant(ctx, z.x + 1, z.y + z.h - 2, tile);
    }
    else if (z.dept === 'marketing') {
      drawLargePlant(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
      drawWhiteboard(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawWhiteboard(ctx, z.x + 3, z.y + z.h - 2, tile);
      drawTV(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawWindow(ctx, z.x + z.w - 3, z.y, tile);
      drawPlant(ctx, z.x + 1, z.y + 1, tile, 0);
    }
    else if (z.dept === 'finance') {
      drawServerRack(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
      drawServerRack(ctx, z.x + z.w - 3, z.y + z.h - 2, tile);
      drawLargePlant(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawTV(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawFilingCabinet(ctx, z.x + 1, z.y + 1, tile);
      drawWindow(ctx, z.x + 4, z.y, tile);
    }
    else if (z.dept === 'cafe') {
      // Cafeteria: coffee bar + lounge
      drawCoffeeMachine(ctx, z.x + 1, z.y + 1, tile);
      drawCoffeeMachine(ctx, z.x + 2, z.y + 1, tile);
      drawSink(ctx, z.x + 3, z.y + 1, tile);
      drawFridge(ctx, z.x + 4, z.y + 1, tile);
      drawSofa(ctx, z.x + 1, z.y + z.h - 2, tile, '#F59E0B');
      drawSofa(ctx, z.x + 5, z.y + z.h - 2, tile, THEME.emerald);
      drawMeetingTable(ctx, z.x + 3, z.y + 2, 3, 2, tile);
      drawLargePlant(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawLargePlant(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
      drawWindow(ctx, z.x + 6, z.y, tile);
    }
    else if (z.dept === 'hr') {
      drawPlant(ctx, z.x + z.w - 2, z.y + z.h - 2, tile, 1);
      drawSofa(ctx, z.x + 1, z.y + z.h - 2, tile, THEME.sky);
      drawBookshelf(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawLamp(ctx, z.x + 1, z.y + 1, tile);
    }
    else if (z.dept === 'research') {
      drawWhiteboard(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawWhiteboard(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
      drawBookshelf(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawLargePlant(ctx, z.x + z.w - 3, z.y + z.h - 2, tile);
    }
    else if (z.dept === 'scheduler') {
      drawWhiteboard(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawTV(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawPlant(ctx, z.x + z.w - 2, z.y + z.h - 2, tile, 1);
    }
    else if (z.dept === 'legal') {
      drawBookshelf(ctx, z.x + 1, z.y + 1, tile);
      drawBookshelf(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawBookshelf(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawLamp(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
      drawFilingCabinet(ctx, z.x + 2, z.y + 1, tile);
    }
    else if (z.dept === 'accounting') {
      drawFilingCabinet(ctx, z.x + 1, z.y + 1, tile);
      drawFilingCabinet(ctx, z.x + 2, z.y + 1, tile);
      drawPrinter(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawPlant(ctx, z.x + z.w - 2, z.y + z.h - 2, tile, 0);
    }
    else if (z.dept === 'callcenter') {
      drawWaterCooler(ctx, z.x + z.w - 1, z.y + z.h - 2, tile);
      drawTV(ctx, z.x + 1, z.y + 1, tile);
      drawPlant(ctx, z.x + 1, z.y + z.h - 2, tile, 1);
      drawWindow(ctx, z.x + 6, z.y, tile);
    }
    else if (z.dept === 'sales') {
      drawTV(ctx, z.x + z.w - 2, z.y + 1, tile);
      drawLargePlant(ctx, z.x + 1, z.y + z.h - 2, tile);
      drawWhiteboard(ctx, z.x + z.w - 2, z.y + z.h - 2, tile);
    }
  });

  // Hallway decoration (central strip)
  drawPlant(ctx, 11, 10, tile, 0);
  drawPlant(ctx, 22, 10, tile, 1);
  drawPlant(ctx, 33, 10, tile, 0);
  drawPlant(ctx, 11, 9, tile, 1);
  drawPlant(ctx, 22, 9, tile, 0);
  // Seating in hallway
  // drawSofa(ctx, 5, 10, tile, '#CBD5E1');

  // Desks + chairs on top
  desks.forEach(d => {
    drawDesk(ctx, d, tile);
    const chairColor = window.DEPARTMENTS[
      window.AGENTS.find(a => a.home === d.id)?.dept
    ]?.color || THEME.navy;
    drawChair(ctx, d.x, d.y, d.facing, tile, chairColor);
  });

  // Zone labels (glass pills)
  state.zones.forEach(z => {
    const d = window.DEPARTMENTS[z.dept];
    if (!d) return;
    const label = z.name.toUpperCase();
    ctx.font = 'bold 9px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    const w = ctx.measureText(label).width + 18;
    const lx = z.x * tile + 4;
    const ly = z.y * tile + 4;
    // Pill bg
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    roundRect(ctx, lx, ly, w, 14, 4);
    ctx.fill();
    ctx.strokeStyle = d.color + '40';
    ctx.lineWidth = 1;
    roundRect(ctx, lx + 0.5, ly + 0.5, w, 14, 4);
    ctx.stroke();
    // Icon
    ctx.fillStyle = d.color;
    ctx.font = 'bold 10px system-ui';
    ctx.fillText(d.icon, lx + 4, ly + 11);
    // Text
    ctx.fillStyle = THEME.ink;
    ctx.font = 'bold 9px "JetBrains Mono", monospace';
    ctx.fillText(label, lx + 14, ly + 10);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ————— Agent sprite — more detailed, Ascenda-style —————
function drawAgent(ctx, a, tile, now) {
  const px = a.px, py = a.py;
  const deptColor = window.DEPARTMENTS[a.dept]?.color || '#64748B';
  const bob = a.walking ? Math.sin(now / 120 + a.id.charCodeAt(1)) * 1 : 0;

  // Shadow (soft elliptical)
  ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
  ctx.beginPath();
  ctx.ellipse(px, py + tile * 0.9, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  const legOffset = a.walking ? Math.sin(now / 100) * 1.5 : 0;
  ctx.fillStyle = '#1E293B';
  ctx.fillRect(px - 3, py + 16 + bob, 2, 5 - legOffset);
  ctx.fillRect(px + 1, py + 16 + bob, 2, 5 + legOffset);
  // Shoes
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px - 3, py + 20 + bob - legOffset, 3, 1);
  ctx.fillRect(px + 1, py + 20 + bob + legOffset, 3, 1);

  // Body (shirt)
  ctx.fillStyle = a.shirt || deptColor;
  ctx.fillRect(px - 4, py + 9 + bob, 8, 8);
  // Shirt highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px - 4, py + 9 + bob, 8, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(px - 4, py + 15 + bob, 8, 2);
  // Collar / tie
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px - 1, py + 9 + bob, 2, 2);
  ctx.fillStyle = deptColor;
  ctx.fillRect(px, py + 11 + bob, 1, 3);

  // Head
  ctx.fillStyle = a.skin || '#F1C27D';
  ctx.fillRect(px - 3, py + 3 + bob, 6, 7);
  // Hair
  ctx.fillStyle = a.hair || '#1F1F1F';
  ctx.fillRect(px - 3, py + 3 + bob, 6, 3);
  ctx.fillRect(px - 3, py + 3 + bob, 2, 5);
  ctx.fillRect(px + 1, py + 3 + bob, 2, 5);
  // Eyes
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px - 2, py + 7 + bob, 1, 1);
  ctx.fillRect(px + 1, py + 7 + bob, 1, 1);

  // Status indicator orb (above head)
  const orbY = py + 1 + bob;
  if (a.status === 'meeting') {
    ctx.fillStyle = '#F59E0B';
    ctx.beginPath(); ctx.arc(px + 4, orbY, 2, 0, Math.PI * 2); ctx.fill();
  } else if (a.status === 'blocked') {
    const pulse = 0.5 + 0.5 * Math.sin(now / 200);
    ctx.fillStyle = `rgba(239, 68, 68, ${0.7 + pulse * 0.3})`;
    ctx.beginPath(); ctx.arc(px + 4, orbY, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(239, 68, 68, ${pulse * 0.6})`;
    ctx.beginPath(); ctx.arc(px + 4, orbY, 4, 0, Math.PI * 2); ctx.stroke();
  } else if (a.status === 'paused') {
    ctx.fillStyle = '#94A3B8';
    ctx.beginPath(); ctx.arc(px + 4, orbY, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(px + 3, orbY - 1, 1, 2);
    ctx.fillRect(px + 5, orbY - 1, 1, 2);
  } else if (a.status === 'working') {
    const pulse = 0.5 + 0.5 * Math.sin(now / 300);
    ctx.fillStyle = `rgba(16, 185, 129, ${0.6 + pulse * 0.4})`;
    ctx.beginPath(); ctx.arc(px + 4, orbY, 2, 0, Math.PI * 2); ctx.fill();
  } else if (a.status === 'traveling') {
    ctx.fillStyle = '#0EA5E9';
    ctx.beginPath(); ctx.arc(px + 4, orbY, 2, 0, Math.PI * 2); ctx.fill();
  }

  // Selection ring (emerald)
  if (a.selected) {
    const pulse = 0.4 + 0.3 * Math.sin(now / 200);
    ctx.strokeStyle = THEME.emerald;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(px, py + tile * 0.85, 10, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(16, 185, 129, ${pulse})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, py + tile * 0.85, 13 + pulse * 2, 5 + pulse, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (a.hovered && !a.selected) {
    ctx.strokeStyle = 'rgba(30, 64, 175, 0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, py + tile * 0.85, 10, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ————— Bubbles (light glass) —————
function drawBubble(ctx, a, tile, now) {
  if (!a.bubble) return;
  const text = a.bubble.text;
  const isThought = a.bubble.type === 'thought';
  ctx.font = '10px "JetBrains Mono", system-ui';
  const metrics = ctx.measureText(text);
  const tw = Math.min(metrics.width, 180);
  const bw = tw + 14;
  const bh = 20;
  const bx = a.px - bw / 2;
  const by = a.py - 22;

  // Shadow
  ctx.fillStyle = 'rgba(15, 23, 42, 0.12)';
  roundRect(ctx, bx + 1, by + 2, bw, bh, 6);
  ctx.fill();

  // Bubble bg (glass)
  ctx.fillStyle = isThought ? 'rgba(255, 255, 255, 0.96)' : 'rgba(30, 64, 175, 0.95)';
  roundRect(ctx, bx, by, bw, bh, 6);
  ctx.fill();
  ctx.strokeStyle = isThought ? 'rgba(203, 213, 225, 0.8)' : 'rgba(16, 185, 129, 0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tail
  if (isThought) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.96)';
    ctx.beginPath(); ctx.arc(a.px - 2, by + bh + 3, 2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(203, 213, 225, 0.8)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(a.px + 1, by + bh + 7, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.stroke();
  } else {
    ctx.fillStyle = 'rgba(30, 64, 175, 0.95)';
    ctx.beginPath();
    ctx.moveTo(a.px - 3, by + bh);
    ctx.lineTo(a.px, by + bh + 4);
    ctx.lineTo(a.px + 3, by + bh);
    ctx.closePath();
    ctx.fill();
  }

  // Text
  let display = text;
  if (metrics.width > 180) {
    while (ctx.measureText(display + '…').width > 175 && display.length > 3) display = display.slice(0, -1);
    display += '…';
  }
  ctx.fillStyle = isThought ? THEME.ink : '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.fillText(display, bx + 7, by + 13);
}

// ————— Connections —————
function drawConnection(ctx, a, b, now) {
  ctx.strokeStyle = 'rgba(16, 185, 129, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.lineDashOffset = -now / 40;
  ctx.beginPath();
  ctx.moveTo(a.px, a.py);
  ctx.lineTo(b.px, b.py);
  ctx.stroke();
  ctx.setLineDash([]);
  // Packet
  const t = ((now / 1000) % 1);
  const px = a.px + (b.px - a.px) * t;
  const py = a.py + (b.py - a.py) * t;
  ctx.fillStyle = THEME.emerald;
  ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(16, 185, 129, 0.3)';
  ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
}

// ————— Heatmap —————
function drawHeatmap(ctx, agents, tile, mapW, mapH) {
  const res = 4;
  const cellW = Math.ceil((mapW * tile) / res);
  const cellH = Math.ceil((mapH * tile) / res);
  const grid = new Float32Array(cellW * cellH);
  agents.forEach(a => {
    if (a.status !== 'working' && a.status !== 'meeting') return;
    const cx = Math.floor(a.px / res);
    const cy = Math.floor(a.py / res);
    const radius = 14;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const x = cx + dx, y = cy + dy;
        if (x < 0 || y < 0 || x >= cellW || y >= cellH) continue;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > radius) continue;
        grid[y * cellW + x] += 1 - d / radius;
      }
    }
  });
  const img = ctx.createImageData(cellW, cellH);
  for (let i = 0; i < grid.length; i++) {
    const v = Math.min(1, grid[i] / 3);
    if (v < 0.05) continue;
    const r = v < 0.5 ? Math.floor(16 + v * 2 * (245 - 16))   : Math.floor(245 - (v - 0.5) * 2 * (245 - 239));
    const g = v < 0.5 ? Math.floor(185 + v * 2 * (158 - 185)) : Math.floor(158 - (v - 0.5) * 2 * (158 - 68));
    const b = v < 0.5 ? Math.floor(129 - v * 2 * (129 - 11))  : Math.floor(11  + (v - 0.5) * 2 * (68 - 11));
    const idx = i * 4;
    img.data[idx] = r; img.data[idx + 1] = g; img.data[idx + 2] = b;
    img.data[idx + 3] = Math.floor(v * 180);
  }
  const tmp = document.createElement('canvas');
  tmp.width = cellW; tmp.height = cellH;
  tmp.getContext('2d').putImageData(img, 0, 0);
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(tmp, 0, 0, cellW * res, cellH * res);
  ctx.restore();
}

function drawHoloOverlay(ctx, w, h, now) {
  ctx.save();
  ctx.globalCompositeOperation = 'overlay';
  for (let y = 0; y < h; y += 3) {
    ctx.fillStyle = 'rgba(30, 64, 175, 0.04)';
    ctx.fillRect(0, y, w, 1);
  }
  ctx.globalCompositeOperation = 'source-over';
  const pulse = 0.015 + 0.01 * Math.sin(now / 700);
  ctx.fillStyle = `rgba(16, 185, 129, ${pulse})`;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// Focus overlay: dim everything EXCEPT the focused zone
function drawFocusMask(ctx, zone, tile, mapW, mapH) {
  if (!zone) return;
  const px = zone.x * tile, py = zone.y * tile;
  const pw = zone.w * tile, ph = zone.h * tile;
  // Dark overlay with cutout for zone
  ctx.save();
  ctx.fillStyle = 'rgba(15, 23, 42, 0.45)';
  // Four rects around the zone
  ctx.fillRect(0, 0, mapW * tile, py - 2);                           // top
  ctx.fillRect(0, py + ph + 2, mapW * tile, mapH * tile - (py + ph + 2)); // bottom
  ctx.fillRect(0, py - 2, px - 2, ph + 4);                           // left
  ctx.fillRect(px + pw + 2, py - 2, mapW * tile - (px + pw + 2), ph + 4); // right
  // Highlight border around zone
  ctx.strokeStyle = THEME.emerald;
  ctx.lineWidth = 3;
  ctx.setLineDash([6, 4]);
  ctx.lineDashOffset = -performance.now() / 50;
  ctx.strokeRect(px - 2, py - 2, pw + 4, ph + 4);
  ctx.setLineDash([]);
  ctx.restore();
}

// ————— Main component —————
function OfficePixel({
  agents, selectedId, onSelectAgent, onHoverAgent, mode, viewport, setViewport,
  connections, tileSize, onZoneClick, focusedZoneId,
}) {
  const canvasRef = useOfRef(null);
  const rafRef = useOfRef(null);
  const lastHoverRef = useOfRef(null);
  const lastZoneHoverRef = useOfRef(null);
  const [dragging, setDragging] = useOfState(null);
  const mouseRef = useOfRef({ x: 0, y: 0, down: false, hasDragged: false });

  const { ZONES, DESKS, MAP_W, MAP_H } = window;
  const tile = tileSize || window.TILE;
  const focusedZone = focusedZoneId ? ZONES.find(z => z.id === focusedZoneId) : null;

  // Resize canvas
  useOfEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const resize = () => {
      const parent = canvas.parentElement;
      const rect = parent.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas.parentElement);
    return () => ro.disconnect();
  }, []);

  // Render loop
  useOfEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    let running = true;
    const render = (now) => {
      if (!running) return;
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width, h = canvas.height;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      // Light background: subtle gradient from Ascenda bgSoft → white
      const grd = ctx.createLinearGradient(0, 0, 0, h);
      grd.addColorStop(0, '#EEF2FA');
      grd.addColorStop(1, '#F8FAFC');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);

      // Apply transform
      ctx.setTransform(dpr * viewport.zoom, 0, 0, dpr * viewport.zoom, dpr * viewport.x, dpr * viewport.y);

      // Office
      drawOffice(ctx, { zones: ZONES, desks: DESKS, tile, mapW: MAP_W, mapH: MAP_H });

      if (mode === 'holo') {
        ctx.globalCompositeOperation = 'overlay';
        ctx.fillStyle = 'rgba(30, 64, 175, 0.2)';
        ctx.fillRect(0, 0, MAP_W * tile, MAP_H * tile);
        ctx.globalCompositeOperation = 'source-over';
      }
      if (mode === 'heatmap') drawHeatmap(ctx, agents, tile, MAP_W, MAP_H);

      connections.forEach(([idA, idB]) => {
        const a = agents.find(x => x.id === idA);
        const b = agents.find(x => x.id === idB);
        if (a && b) drawConnection(ctx, a, b, now);
      });

      agents.forEach(a => drawAgent(ctx, a, tile, now));
      agents.forEach(a => drawBubble(ctx, a, tile, now));

      // Focus mask on top (before holo overlay)
      if (focusedZone) drawFocusMask(ctx, focusedZone, tile, MAP_W, MAP_H);

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      if (mode === 'holo') drawHoloOverlay(ctx, w, h, now);

      rafRef.current = requestAnimationFrame(render);
    };
    rafRef.current = requestAnimationFrame(render);
    return () => { running = false; cancelAnimationFrame(rafRef.current); };
  }, [agents, mode, viewport, connections, tile, focusedZoneId]);

  const getWorldPos = useOfCallback((sx, sy) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return {
      x: (sx - rect.left - viewport.x) / viewport.zoom,
      y: (sy - rect.top  - viewport.y) / viewport.zoom,
    };
  }, [viewport]);

  const pickAgent = useOfCallback((sx, sy) => {
    const { x: wx, y: wy } = getWorldPos(sx, sy);
    let best = null, bestD = 14;
    for (const a of agents) {
      const d = Math.hypot(a.px - wx, a.py - wy - tile * 0.4);
      if (d < bestD) { bestD = d; best = a; }
    }
    return best;
  }, [agents, getWorldPos, tile]);

  const pickZone = useOfCallback((sx, sy) => {
    const { x: wx, y: wy } = getWorldPos(sx, sy);
    const tx = wx / tile, ty = wy / tile;
    for (const z of ZONES) {
      if (tx >= z.x && tx < z.x + z.w && ty >= z.y && ty < z.y + z.h) {
        if (z.dept === 'hall') continue;
        return z;
      }
    }
    return null;
  }, [getWorldPos, tile, ZONES]);

  const onPointerDown = (e) => {
    mouseRef.current = { x: e.clientX, y: e.clientY, down: true, hasDragged: false };
    setDragging({ startX: e.clientX, startY: e.clientY, vx: viewport.x, vy: viewport.y });
  };
  const onPointerMove = (e) => {
    if (mouseRef.current.down) {
      const dx = e.clientX - mouseRef.current.x;
      const dy = e.clientY - mouseRef.current.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mouseRef.current.hasDragged = true;
      if (dragging) {
        setViewport(v => ({ ...v, x: dragging.vx + (e.clientX - dragging.startX), y: dragging.vy + (e.clientY - dragging.startY) }));
      }
    } else {
      const picked = pickAgent(e.clientX, e.clientY);
      if (picked?.id !== lastHoverRef.current) {
        lastHoverRef.current = picked?.id || null;
        onHoverAgent && onHoverAgent(picked?.id || null);
      }
    }
  };
  const onPointerUp = (e) => {
    if (!mouseRef.current.hasDragged) {
      const pickedAgent = pickAgent(e.clientX, e.clientY);
      if (pickedAgent) {
        onSelectAgent(pickedAgent.id);
      } else {
        // No agent — maybe zone
        const zone = pickZone(e.clientX, e.clientY);
        if (zone && onZoneClick) {
          onZoneClick(zone.id);
        } else {
          onSelectAgent(null);
        }
      }
    }
    mouseRef.current.down = false;
    setDragging(null);
  };
  const onWheel = (e) => {
    e.preventDefault();
    const delta = -e.deltaY * 0.001;
    setViewport(v => {
      const newZoom = Math.max(0.4, Math.min(3, v.zoom + delta * v.zoom));
      const rect = canvasRef.current.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const scale = newZoom / v.zoom;
      return { zoom: newZoom, x: mx - (mx - v.x) * scale, y: my - (my - v.y) * scale };
    });
  };

  return (
    <canvas
      ref={canvasRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={() => { mouseRef.current.down = false; setDragging(null); }}
      onWheel={onWheel}
      style={{
        width: '100%', height: '100%',
        cursor: dragging ? 'grabbing' : lastHoverRef.current ? 'pointer' : 'grab',
        imageRendering: 'pixelated',
        display: 'block',
        touchAction: 'none',
      }}
    />
  );
}

function formatTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  return Math.floor(diff / 86400000) + 'd';
}

function Sparkline({ data, color = '#10B981', h = 32, w = 140 }) {
  const max = Math.max(...data, 1);
  const points = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - (v / max) * (h - 3) - 1.5}`).join(' ');
  const area = `0,${h} ${points} ${w},${h}`;
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`sg-${color.slice(1)}`} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#sg-${color.slice(1)})`} />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>

                    maxWidth: '82%', padding: '9px 12px', borderRadius: 14,
                    background: m.from === 'me' ? '#0F2847' : '#fff',

                    fontSize: 12.5, lineHeight: 1.45,

                    borderBottomRightRadius: m.from === 'me' ? 4 : 14,
                    borderBottomLeftRadius:  m.from === 'me' ? 14 : 4,
                  }}>{m.text}</div>
                </div>
              ))}
            </div>
            <div style={{ padding: 10, borderTop: '1px solid rgba(15,23,42,0.06)', display: 'flex', gap: 6, background: 'rgba(255,255,255,0.5)' }}>
              <input
                value={draft}
                onChange={e => setDraft(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && draft.trim()) { onSendMessage(draft); setDraft(''); }
                }}
                placeholder="Mensaje directo…"
                style={{
                  flex: 1, border: '1px solid rgba(15,23,42,0.1)', borderRadius: 8,
                  padding: '8px 11px', fontSize: 12.5, outline: 'none',
                  background: '#fff',
                }}
              />
              <button className="sp-btn accent" onClick={() => { if (draft.trim()) { onSendMessage(draft); setDraft(''); } }}>
                ↵
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function DepartmentFocus({ zoneId, agents, onBack, onSelectAgent, onNavigate }) {
  const [tab, setTab] = useDfState('overview'); // overview | projects | chat
  const [chatDraft, setChatDraft] = useDfState('');
  const [chatMessages, setChatMessages] = useDfState([]);
  const chatScrollRef = useDfRef();

  const zone = window.ZONES.find(z => z.id === zoneId);
  if (!zone) return null;
  const dept = window.DEPARTMENTS[zone.dept];
  const deptKey = zone.dept;
  const deptAgents = useDfMemo(() => agents.filter(a => a.dept === deptKey), [agents, deptKey]);
  const projects = DEPT_PROJECTS[deptKey] || [];

  // Metrics
  const metrics = useDfMemo(() => {
    const total = deptAgents.length;
    const working = deptAgents.filter(a => ['working','traveling','meeting'].includes(a.status)).length;
    const blocked = deptAgents.filter(a => a.status === 'blocked').length;
    const paused = deptAgents.filter(a => a.status === 'paused').length;
    const avgEff = total ? Math.round(deptAgents.reduce((s, a) => s + a.efficiency, 0) / total) : 0;
    const totalTasks = deptAgents.reduce((s, a) => s + a.tasksDone, 0);
    const queued = deptAgents.reduce((s, a) => s + a.tasksQueued, 0);
    return { total, working, blocked, paused, avgEff, totalTasks, queued };
  }, [deptAgents]);

  // All depts for quick nav
  const allZones = window.ZONES.filter(z => z.dept !== 'hall' && z.dept !== 'meeting');

  useDfEffect(() => {
    if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
  }, [chatMessages]);

  const sendGroupMessage = () => {
    if (!chatDraft.trim()) return;
    const myMsg = { id: Date.now(), from: 'me', name: 'Tú', text: chatDraft, ts: Date.now() };
    setChatMessages(prev => [...prev, myMsg]);
    setChatDraft('');
    // Auto-replies from 1-2 agents
    const responders = [...deptAgents].sort(() => Math.random() - 0.5).slice(0, 1 + Math.floor(Math.random() * 2));
    responders.forEach((agent, i) => {
      setTimeout(() => {
        const reply = groupReply(agent, chatDraft, projects);
        setChatMessages(prev => [...prev, {
          id: Date.now() + Math.random(),
          from: agent.id, name: agent.name, avatar: agent.avatar,
          color: dept.color, text: reply, ts: Date.now(),
        }]);
      }, 900 + i * 1200 + Math.random() * 600);
    });
  };

  return (
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column',
      background: `
        radial-gradient(ellipse at top left, ${dept.color}18, transparent 50%),
        radial-gradient(ellipse at bottom right, ${dept.color}10, transparent 50%),
        linear-gradient(180deg, #F8FAFC 0%, #EEF2FA 100%)
      `,
      borderRadius: 14,
      overflow: 'hidden',
      animation: 'df-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
    }}>
      <style>{`
        @keyframes df-enter {
          from { opacity: 0; transform: scale(1.03); }
          to { opacity: 1; transform: scale(1); }
        }
      `}</style>

      {/* Breadcrumb + header */}
      <div style={{
        padding: '14px 20px',
        background: 'rgba(255, 255, 255, 0.7)',
        backdropFilter: 'blur(24px) saturate(180%)',
        WebkitBackdropFilter: 'blur(24px) saturate(180%)',
        borderBottom: '1px solid rgba(15, 23, 42, 0.06)',
        display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0,
      }}>
        {/* Back chip */}
        <button onClick={onBack} style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          padding: '7px 12px', borderRadius: 8,
          background: '#fff', border: '1px solid rgba(15,23,42,0.1)',
          color: '#0F172A', fontSize: 12, fontWeight: 600,
          cursor: 'pointer', fontFamily: 'inherit',
          boxShadow: '0 1px 2px rgba(15,23,42,0.04)',

          ← Vista general

        <div style={{ flex: 1 }} />

          display: 'flex', gap: 4, alignItems: 'center',
          padding: 3, background: 'rgba(15,23,42,0.04)', borderRadius: 9,

          {allZones.map(z => {
            const dz = window.DEPARTMENTS[z.dept];
            if (!dz) return null;
            const active = z.id === zoneId;
            return (

        borderBottom: '1px solid rgba(15,23,42,0.06)',
        display: 'flex', gap: 4, flexShrink: 0,
      }}>
        {[
          { id: 'overview', label: 'Vista general', icon: '◉' },
          { id: 'projects', label: 'Proyectos', icon: '▦', count: projects.length },
          { id: 'chat',     label: 'Chat grupal',  icon: '◇' },

            padding: '10px 14px', border: 'none', background: 'none',
            borderBottom: `2px solid ${tab === x.id ? dept.color : 'transparent'}`,
            color: tab === x.id ? '#0F172A' : '#64748B',
            fontSize: 12, fontWeight: 600, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 6,
            fontFamily: 'inherit',
            transition: 'all 0.15s',
          }}>
            <span>{x.icon}</span>{x.label}
            {x.count !== undefined && (
              <span style={{
                padding: '1px 6px', borderRadius: 10,
                background: tab === x.id ? dept.color + '18' : 'rgba(15,23,42,0.06)',
                color: tab === x.id ? dept.color : '#64748B',
                fontSize: 10, fontWeight: 700,
              }}>{x.count}</span>
            )}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>
        {tab === 'overview' && (
          <OverviewTab metrics={metrics} agents={deptAgents} dept={dept} onSelectAgent={onSelectAgent} />
        )}
        {tab === 'projects' && (
          <ProjectsTab projects={projects} dept={dept} agents={agents} onSelectAgent={onSelectAgent} />
        )}
        {tab === 'chat' && (
          <ChatTab
            agents={deptAgents}
            dept={dept}
            messages={chatMessages}
            draft={chatDraft}
            setDraft={setChatDraft}
            onSend={sendGroupMessage}
            chatScrollRef={chatScrollRef}
          />
        )}
      </div>
    </div>
  );
}

    <div style={{

function groupReply(agent, text, projects) {
  const low = text.toLowerCase();
  if (low.includes('status') || low.includes('estado') || low.includes('?')) {
    if (projects.length > 0) {
      const p = projects[Math.floor(Math.random() * projects.length)];
      return `Estoy con "${p.name}" (${p.progress}%). ${agent.activity?.label}`;
    }
    return `Estoy en: ${agent.activity?.label}. ${agent.efficiency}% eficiencia.`;
  }
  if (low.includes('urgente') || low.includes('prior')) {
    return `Entendido, reviso ahora y priorizo.`;
  }
  const replies = [
    `👍 Recibido.`,
    `Confirmado desde ${window.DEPARTMENTS[agent.dept].name}.`,
    `Ok, ajusto y reporto.`,
    `Procesando tu mensaje.`,
    `Agendado, te aviso en 30 min.`,
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}

// Meeting Room — grupo chat con múltiples agentes
const { useState: useMRState, useEffect: useMREffect, useRef: useMRRef, useMemo: useMRMemo } = React;

function MeetingRoom({ agents, onClose, onPingAgent }) {
  const [selectedAgents, setSelectedAgents] = useMRState([]);
  const [topic, setTopic] = useMRState('');
  const [started, setStarted] = useMRState(false);
  const [messages, setMessages] = useMRState([]);
  const [draft, setDraft] = useMRState('');
  const [thinking, setThinking] = useMRState([]);
  const scrollRef = useMRRef();

  useMREffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  const toggleAgent = (id) => {
    setSelectedAgents(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };
  const toggleDept = (dept) => {
    const deptAgents = agents.filter(a => a.dept === dept).map(a => a.id);
    const allIn = deptAgents.every(id => selectedAgents.includes(id));
    setSelectedAgents(prev => allIn
      ? prev.filter(id => !deptAgents.includes(id))
      : [...new Set([...prev, ...deptAgents])]);
  };

  const startMeeting = () => {
    if (selectedAgents.length === 0 || !topic.trim()) return;
    setStarted(true);
    setMessages([{
      id: 'sys-' + Date.now(),
      from: 'system',
      text: `Reunión iniciada · ${selectedAgents.length} participantes · Tema: "${topic}"`,
      t: Date.now(),
    }]);
    // Each agent opens with a thought
    setTimeout(() => {
      selectedAgents.forEach((id, i) => {
        setTimeout(() => agentRespond(id, topic, true), 600 + i * 900 + Math.random() * 400);
      });
    }, 400);
  };

  const agentRespond = (agentId, prompt, isOpening = false) => {
    const a = agents.find(x => x.id === agentId);
    if (!a) return;
    setThinking(prev => [...prev, agentId]);
    onPingAgent && onPingAgent(agentId);
    setTimeout(() => {
      setThinking(prev => prev.filter(x => x !== agentId));
      setMessages(prev => [...prev, {
        id: 'm-' + Math.random().toString(36).slice(2),
        from: agentId,
        text: generateResponse(a, prompt, isOpening),
        t: Date.now(),
      }]);
    }, 1400 + Math.random() * 1800);
  };

  const sendQuestion = () => {
    if (!draft.trim()) return;
    const userMsg = {
      id: 'u-' + Date.now(),
      from: 'me',
      text: draft,
      t: Date.now(),
    };
    setMessages(prev => [...prev, userMsg]);
    const currentDraft = draft;
    setDraft('');
    // 60-80% of selected agents respond
    const responders = selectedAgents.filter(() => Math.random() > 0.25);
    responders.forEach((id, i) => {
      setTimeout(() => agentRespond(id, currentDraft), 500 + i * 1000 + Math.random() * 600);
    });
  };

  const endMeeting = () => {
    setStarted(false);
    setMessages([]);
    setSelectedAgents([]);
    setTopic('');
  };

  // ————— Setup view —————
  if (!started) {
    const deptGroups = {};
    agents.forEach(a => {
      (deptGroups[a.dept] = deptGroups[a.dept] || []).push(a);
    });

    return (
      <div className="mr-modal">
        <div className="mr-panel" style={{ width: 540, maxHeight: '85vh' }}>
          <div className="mr-header">
            <div>
              <div className="mr-title">Convocar reunión</div>
              <div className="mr-subtitle">Invita agentes y plantea un tema para discutir.</div>
            </div>
            <button className="mr-close" onClick={onClose}>×</button>
          </div>

          <div className="mr-body" style={{ overflow: 'auto', flex: 1 }}>
            <div className="mr-field">
              <label className="mr-label">Tema de la reunión</label>
              <input
                autoFocus
                className="mr-input"
                value={topic}
                onChange={e => setTopic(e.target.value)}
                placeholder="¿Cómo aumentamos la conversión del call center un 20%?"
              />
            </div>

            <div className="mr-field">
              <label className="mr-label">Participantes ({selectedAgents.length})</label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 8 }}>
                {Object.entries(deptGroups).map(([dept, list]) => {
                  const d = window.DEPARTMENTS[dept];
                  if (!d) return null;
                  const allIn = list.every(a => selectedAgents.includes(a.id));
                  return (
                    <div key={dept}>
                      <button className="mr-dept-head" onClick={() => toggleDept(dept)} style={{ borderLeftColor: d.color }}>
                        <span style={{ color: d.color, fontWeight: 700 }}>{d.icon}</span>
                        <span style={{ flex: 1, textAlign: 'left' }}>{d.name}</span>
                        <span style={{ fontSize: 10, color: '#64748B', fontFamily: 'JetBrains Mono, monospace' }}>
                          {list.filter(a => selectedAgents.includes(a.id)).length}/{list.length}
                        </span>
                        <span style={{ fontSize: 11, color: allIn ? '#10B981' : '#94A3B8' }}>
                          {allIn ? 'Todos' : 'Añadir todos'}
                        </span>
                      </button>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 6, paddingLeft: 2 }}>
                        {list.map(a => {
                          const on = selectedAgents.includes(a.id);
                          return (
                            <button key={a.id} className={'mr-agent-chip' + (on ? ' on' : '')}
                              onClick={() => toggleAgent(a.id)}
                              style={on ? { background: d.color + '18', borderColor: d.color, color: d.color } : {}}
                            >
                              <span style={{ fontSize: 14, lineHeight: 1 }}>{a.avatar}</span>
                              <span>{a.name.split(' ')[0]}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="mr-footer">
            <button className="mr-btn-ghost" onClick={onClose}>Cancelar</button>
            <button className="mr-btn-primary" onClick={startMeeting}
              disabled={selectedAgents.length === 0 || !topic.trim()}>
              Iniciar reunión · {selectedAgents.length}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ————— Active meeting —————
  return (
    <div className="mr-modal">
      <div className="mr-panel" style={{ width: 720, height: '85vh' }}>
        <div className="mr-header" style={{ borderBottom: '1px solid rgba(148,163,184,0.2)' }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span className="live-dot" style={{ background: '#EF4444', animation: 'pulse-red 1.8s infinite' }} />
              <div className="mr-title" style={{ fontSize: 14 }}>Reunión en curso</div>
            </div>
            <div className="mr-subtitle" style={{ fontSize: 12, marginTop: 2 }}>"{topic}"</div>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button className="mr-btn-ghost" onClick={endMeeting} style={{ fontSize: 11 }}>Finalizar</button>
            <button className="mr-close" onClick={onClose}>×</button>
          </div>
        </div>

        {/* Participants bar */}
        <div style={{ padding: '8px 16px', borderBottom: '1px solid rgba(148,163,184,0.15)', display: 'flex', gap: 6, flexWrap: 'wrap', flexShrink: 0 }}>
          {selectedAgents.map(id => {
            const a = agents.find(x => x.id === id);
            if (!a) return null;
            const d = window.DEPARTMENTS[a.dept];
            const isThinking = thinking.includes(id);
            return (
              <div key={id} style={{
                display: 'inline-flex', alignItems: 'center', gap: 5,
                padding: '3px 7px', background: '#F8FAFC', borderRadius: 12,
                border: `1px solid ${d.color}40`, fontSize: 11, color: '#0F172A',
              }}>
                <span style={{ fontSize: 13 }}>{a.avatar}</span>
                <span style={{ fontWeight: 500 }}>{a.name.split(' ')[0]}</span>
                {isThinking && (
                  <span style={{ color: d.color, fontSize: 10, fontStyle: 'italic' }}>escribiendo...</span>
                )}
              </div>
            );
          })}
        </div>

        {/* Messages */}
        <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', padding: 16, background: '#FAFBFC' }}>
          {messages.map(m => {
            if (m.from === 'system') {
              return (
                <div key={m.id} style={{ textAlign: 'center', padding: '10px 0', fontSize: 11, color: '#64748B', fontFamily: 'JetBrains Mono, monospace' }}>
                  · {m.text} ·
                </div>

            }
            if (m.from === 'me') {
              return (
                <div key={m.id} style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                  <div style={{ maxWidth: '70%' }}>
                    <div style={{ fontSize: 10, color: '#64748B', textAlign: 'right', marginBottom: 2, fontFamily: 'JetBrains Mono, monospace' }}>TÚ</div>
                    <div style={{

      </div>
    </div>
  );
}

function generateResponse(agent, prompt, isOpening) {
  const d = window.DEPARTMENTS[agent.dept];
  const low = prompt.toLowerCase();
  const templates = {
    executive: [
      `Desde estrategia: esto es prioridad si mueve ARR más de 5%. Necesito data de ${d.name} para el board.`,
      `Alineado. Propongo OKR trimestral: objetivo medible, owner único, revisión semanal.`,
      `Antes de comprometer recursos — ¿cuál es el ROI esperado? Nori, ¿puedes modelar escenarios?`,
    ],
    marketing: [
      `Puedo lanzar una campaña test en 48h con $3-5k budget. Medimos CAC y conversión por canal.`,
      `Desde mi lado: el mensaje debe enfocarse en "tiempo ahorrado", no en features. Ya probé ambos en A/B.`,
      `Tengo data de que LinkedIn performa 3× mejor que Meta para este perfil. Recomiendo ahí.`,
    ],
    finance: [
      `Cash flow lo soporta si no supera 8% del OPEX mensual. Runway actual: 14 meses — margen seguro.`,
      `Necesito ver el supuesto de ingresos. Si el payback es >9 meses no lo apruebo.`,
      `OK pero meto guardrail: si burn sube 10% en 30 días pausamos.`,
    ],
    callcenter: [
      `Con 5 agentes puedo procesar 200 llamadas/día. Script nuevo aumentó conversión 12% la semana pasada.`,
      `Detecté que 40% de los no-show son por horario. Si cambiamos slot a 6pm sube asistencia.`,
      `Llevo 3 semanas midiendo: el mejor handoff es cuando ventas llama a los 12 min post-demo.`,
    ],
    sales: [
      `Pipeline actual: $680k ponderado, 14 opps. Si cerramos 30% llegamos al target Q2.`,
      `El bloqueo principal es precio — 60% pide descuento. Propongo plan "starter" a $49/mes.`,
      `Demo-to-close subió a 28% con el nuevo deck. Puedo replicarlo en outbound.`,
    ],
    hr: [
      `Para sostener este ritmo hay que contratar 2 personas más en call center en 30 días.`,
      `El engagement cayó 4 pts este mes — relacionado a carga. Propongo bloque "focus time" protegido.`,
      `Tengo 3 perfiles pre-validados para marketing senior. Puedo hacer shortlist esta semana.`,
    ],
    scheduler: [
      `Puedo bloquear calendarios ya. Martes y jueves 10-12 son los picos de productividad.`,
      `Si agrupamos reuniones en 2 días salen 14h de focus time por persona/semana.`,
      `Detecté 12h/semana en meetings sin agenda clara. Auto-cancelo los sin objetivo?`,
    ],
    research: [
      `Según el último user research, el 73% abandona en el onboarding paso 3. Es el bloqueador #1.`,
      `Competidor X acaba de bajar precios 18%. Nuestro pricing necesita revisarse antes de Q3.`,
      `Hay 2 segments no atendidos que suman $240M TAM. Puedo armar deep-dive en 5 días.`,
    ],
    accounting: [
      `Cierre de abril al día. IVA Q1 ya presentado — $8.2k recuperables de crédito fiscal.`,
      `Detecté 2 facturas sin conciliar por $3.4k. Flagged y esperando respuesta del proveedor.`,
      `Si facturamos 3 días antes del fin de mes mejora el DSO a 28 días.`,
    ],
    legal: [
      `Antes de firmar con ese proveedor hay 3 cláusulas que debo renegociar — cláusula 7.3 es un riesgo.`,
      `GDPR compliance del nuevo feature requiere DPA actualizado. Lo tengo en draft, listo mañana.`,
      `Propongo NDA mutuo para todas las conversaciones de partnership. Template estándar, 5 min.`,
    ],
  };
  const pool = templates[agent.dept] || [`Desde ${d.name}: recibido, procesando.`];
  if (low.includes('urg') || low.includes('alert') || low.includes('rojo')) {
    return `Desde ${d.name}: ya lo estoy escalando. Priorizado en mi cola.`;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

window.MeetingRoom = MeetingRoom;

// ═══ MAIN APP — Orquesta OfficePixel + SidePanel ═══
const { useState, useEffect, useCallback, useRef } = React;

function AgentsApp() {
  const [agents, setAgents] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [mode, setMode] = useState('normal');
  const [viewport, setViewport] = useState({ x: 30, y: 10, zoom: 1.6 });
  const [connections, setConnections] = useState([]);
  const [focusedZoneId, setFocusedZoneId] = useState(null);
  const [events, setEvents] = useState([]);
  const [messages, setMessages] = useState([]);
  const [showMeeting, setShowMeeting] = useState(false);
  const [showDeptFocus, setShowDeptFocus] = useState(null);
  const [sideVisible, setSideVisible] = useState(true);

  // Load agents from Supabase
  useEffect(() => {
    loadAgentsFromDB().then(function(ags) {
      setAgents([...ags]);
      // Generate initial events
      var evts = ags.slice(0, 5).map(function(a, i) {
        return { id: 'e-' + i, agentId: a.id, text: a.activo ? a.role + ' — listo' : 'Desactivado', t: Date.now() - i * 60000, isAlert: a.status === 'blocked' };
      });
      setEvents(evts);
    });
  }, []);

  // Auto-refresh every 15s
  useEffect(() => {
    var timer = setInterval(function() {
      sbGet('/rest/v1/aos_agentes?select=id,estado,bubble_text,total_ejecuciones,total_tokens_usados,activo,ultima_actividad&order=area').then(function(rows) {
        if (!rows) return;
        setAgents(function(prev) {
          return prev.map(function(a) {
            var upd = rows.find(function(r) { return r.id === a.id; });
            if (!upd) return a;
            return Object.assign({}, a, {
              status: upd.activo ? (upd.estado || 'idle') : 'paused',
              bubble: upd.bubble_text ? { text: upd.bubble_text, type: 'thought' } : null,
              tasksDone: upd.total_ejecuciones || 0,
              totalTokens: upd.total_tokens_usados || 0,
              activo: upd.activo,
              activity: upd.estado === 'working' ? { label: upd.bubble_text || 'Procesando...', thought: 'Ejecutando tarea...' } : { label: 'En espera', thought: '' },
            });
          });
        });
      });
    }, 15000);
    return function() { clearInterval(timer); };
  }, []);

  var selectedAgent = agents.find(function(a) { return a.id === selectedId; });
  var metrics = {
    working: agents.filter(function(a) { return a.status === 'working'; }).length,
    meeting: agents.filter(function(a) { return a.status === 'meeting'; }).length,
    blocked: agents.filter(function(a) { return a.status === 'blocked'; }).length,
    tasksDone: agents.reduce(function(s, a) { return s + (a.tasksDone || 0); }, 0),
    avgEfficiency: agents.length ? Math.round(agents.reduce(function(s, a) { return s + a.efficiency; }, 0) / agents.length) : 0,
  };

  function handleAction(action) {
    if (!selectedAgent) return;
    if (action === 'toggle-pause') {
      var newActive = !selectedAgent.activo;
      fetch(SB_URL + '/rest/v1/aos_agentes?id=eq.' + selectedAgent.id, {
        method: 'PATCH', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ activo: newActive, estado: newActive ? 'idle' : 'paused' })
      }).then(function() {
        setAgents(function(prev) { return prev.map(function(a) { return a.id === selectedAgent.id ? Object.assign({}, a, { activo: newActive, status: newActive ? 'idle' : 'paused' }) : a; }); });
      });
    }
    if (action === 'run-now') {
      setAgents(function(prev) { return prev.map(function(a) { return a.id === selectedAgent.id ? Object.assign({}, a, { status: 'working', bubble: { text: 'Ejecutando...', type: 'thought' } }) : a; }); });
      fetch(RW_URL + '/api/agents/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent_id: selectedAgent.id }) })
      .then(function(r) { return r.json(); }).then(function(res) {
        setEvents(function(prev) { return [{ id: 'e-' + Date.now(), agentId: selectedAgent.id, text: res.ok ? 'Tarea completada' : 'Error: ' + (res.error || ''), t: Date.now(), isAlert: !res.ok }].concat(prev).slice(0, 30); });
        setTimeout(function() { loadAgentsFromDB().then(function(ags) { setAgents([...ags]); }); }, 2000);
      });
    }
  }

  function handleSendMessage(text) {
    setMessages(function(prev) { return prev.concat([{ from: 'me', text: text, t: Date.now() }]); });
    setTimeout(function() {
      setMessages(function(prev) { return prev.concat([{ from: selectedAgent.id, text: 'Entendido. Procesando tu solicitud...', t: Date.now() }]); });
    }, 1200);
  }

  if (showDeptFocus) {
    return React.createElement(window.DepartmentFocus, {
      zoneId: showDeptFocus, agents: agents,
      onBack: function() { setShowDeptFocus(null); },
      onSelectAgent: function(id) { setSelectedId(id); setShowDeptFocus(null); },
    });
  }

  return React.createElement('div', { className: 'ag-shell', style: { height: '100%' } },
    // Top bar
    React.createElement('div', { className: 'ag-topbar', style: sideVisible ? {} : { right: 0 } },
      React.createElement('div', { className: 'ag-topbar-t' }, '👑 Oficina Virtual — ', agents.length, ' agentes'),
      React.createElement('div', { style: { marginLeft: 'auto', display: 'flex', gap: 6 } },
        React.createElement('button', { className: 'abtn abtn-o', onClick: function() { setMode(mode === 'heatmap' ? 'normal' : 'heatmap'); } }, mode === 'heatmap' ? '🗺 Normal' : '🔥 Heatmap'),
        React.createElement('button', { className: 'abtn abtn-g', onClick: function() { fetch(RW_URL + '/api/agents/tick', { method: 'POST' }); } }, '▶ Tick'),
        React.createElement('button', { className: 'abtn abtn-o', onClick: function() { window.open(window.location.href, 'AgentsOffice', 'width=1400,height=800'); } }, '⬗'),
        React.createElement('button', { className: 'abtn abtn-o', onClick: function() { setSideVisible(!sideVisible); } }, sideVisible ? '→' : '←'),
      ),
    ),
    // Canvas
    React.createElement('div', { className: 'ag-canvas-wrap', style: { paddingTop: 42 } },
      React.createElement(window.OfficePixel, {
        agents: agents, selectedId: selectedId,
        onSelectAgent: function(id) { setSelectedId(id); },
        onHoverAgent: function(id) { setHoveredId(id); },
        mode: mode, viewport: viewport, setViewport: setViewport,
        connections: connections, tileSize: window.TILE,
        onZoneClick: function(zid) { setShowDeptFocus(zid); },
        focusedZoneId: focusedZoneId,
      }),
    ),
    // Sidebar
    sideVisible && React.createElement('div', { className: 'ag-sidebar' },
      selectedAgent
        ? React.createElement(window.AgentProfile, {
            agent: selectedAgent,
            onAction: handleAction,
            messages: messages,
            onSendMessage: handleSendMessage,
          })
        : React.createElement(window.LiveFeed, {
            agents: agents, events: events,
            onSelectAgent: function(id) { setSelectedId(id); },
            metrics: metrics,
          }),
    ),
  );
}

// ═══ MOUNT ═══
loadAgentsFromDB().then(function() {
  ReactDOM.render(React.createElement(AgentsApp), document.getElementById('agents-app'));
});
</script>
