<!-- admin-agents.html — Lanzador del Panel de Agentes AI -->
<style>
.launch{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px;font-family:'DM Sans',sans-serif;text-align:center;}
.launch-ico{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 8px 24px rgba(10,79,191,.2));}
.launch-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:24px;color:#071D4A;margin-bottom:8px;}
.launch-d{font-size:13px;color:#6B7BA8;max-width:400px;margin-bottom:24px;line-height:1.6;}
.launch-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:14px;font-family:'Exo 2',sans-serif;font-weight:800;font-size:15px;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#071D4A,#0A4FBF);box-shadow:0 8px 32px rgba(10,79,191,.3);transition:all .2s;}
.launch-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(10,79,191,.4);}
.launch-stats{display:flex;gap:16px;margin-top:24px;}
.launch-stat{padding:12px 20px;border-radius:12px;background:#fff;border:1px solid #EEF0F8;text-align:center;min-width:80px;}
.launch-stat-v{font-family:'Exo 2';font-weight:800;font-size:20px;color:#0A4FBF;}
.launch-stat-l{font-size:9px;color:#9AAAC8;margin-top:2px;font-weight:600;}
</style>
<div class="launch">
  <div class="launch-ico">👑</div>
  <div class="launch-t">Oficina Virtual — Agentes AI</div>
  <div class="launch-d">Monitorea en tiempo real a tu equipo de 13 agentes trabajando. Oficina pixel-art con sprites animados, métricas en vivo, y control completo.</div>
  <button class="launch-btn" onclick="window.open('/agents','AscendaOS_Agents','width=1400,height=850,resizable=yes')">
    ⬗ Abrir Oficina Virtual
  </button>
  <div class="launch-stats" id="ag-stats"></div>
</div>
<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
fetch(SB+'/rest/v1/aos_agentes?select=id,nombre,estado,activo,motor_ai',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(function(rows){
  if(!rows)return;
  var total=rows.length;
  var activos=rows.filter(function(a){return a.activo;}).length;
  var gratis=rows.filter(function(a){return a.motor_ai==='script';}).length;
  var ai=rows.filter(function(a){return a.motor_ai==='groq'||a.motor_ai==='gemini';}).length;
  document.getElementById('ag-stats').innerHTML=
    '<div class="launch-stat"><div class="launch-stat-v">'+total+'</div><div class="launch-stat-l">AGENTES</div></div>'
    +'<div class="launch-stat"><div class="launch-stat-v">'+activos+'</div><div class="launch-stat-l">ACTIVOS</div></div>'
    +'<div class="launch-stat"><div class="launch-stat-v">'+gratis+'</div><div class="launch-stat-l">GRATIS 24/7</div></div>'
    +'<div class="launch-stat"><div class="launch-stat-v">'+ai+'</div><div class="launch-stat-l">AI FREE</div></div>';
});
</script>
