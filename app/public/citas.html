<!-- citas.html — Mis Citas | AscendaOS v1 | 100% Supabase -->
<style>
.vc-root{padding:13px;display:flex;flex-direction:column;gap:10px;min-height:100%;}
.vc-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.vc-title{font-family:Exo\ 2,sans-serif;font-weight:800;font-size:18px;color:#0D1B3E;}
.psel{padding:6px 10px;border-radius:8px;border:1px solid #DDE4F5;background:#fff;font-size:12px;font-family:DM\ Sans,sans-serif;color:#0D1B3E;outline:none;}
.krow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.kc{background:#fff;border:1px solid #DDE4F5;border-radius:12px;padding:12px;text-align:center;}
.kc-lbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9AAAC8;margin-bottom:5px;}
.kc-val{font-family:Exo\ 2,sans-serif;font-size:28px;font-weight:800;line-height:1;}
.kc-sub{font-size:10px;color:#6B7BA8;margin-top:3px;}
.kc-blue{background:linear-gradient(135deg,#071D4A,#0A4FBF);}.kc-blue .kc-lbl{color:rgba(255,255,255,.7);}.kc-blue .kc-val{color:#fff;}.kc-blue .kc-sub{color:rgba(255,255,255,.6);}
.kc-green .kc-val{color:#16A34A;}.kc-red .kc-val{color:#DC2626;}.kc-amber .kc-val{color:#D97706;}
.main2{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(0,1fr);gap:10px;}
.crd{background:#fff;border:1px solid #DDE4F5;border-radius:14px;padding:14px;}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.ct{font-family:Exo\ 2,sans-serif;font-weight:800;font-size:12px;letter-spacing:.6px;color:#0D1B3E;}
.ftabs{display:flex;gap:4px;flex-wrap:wrap;}
.ftab{padding:4px 10px;border-radius:6px;border:1px solid #DDE4F5;background:#fff;font-size:10px;font-weight:700;cursor:pointer;color:#6B7BA8;font-family:DM\ Sans,sans-serif;}
.ftab.act{background:#0A4FBF;color:#fff;border-color:#0A4FBF;}
.ctable{width:100%;border-collapse:collapse;}
.ctable th{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9AAAC8;padding:5px 6px;border-bottom:1px solid #DDE4F5;text-align:left;}
.ctable td{padding:7px 6px;border-bottom:1px solid rgba(221,228,245,.4);font-size:11px;vertical-align:middle;}
.ctable tr:last-child td{border-bottom:none;}
.ctable tr:hover td{background:#F8FAFF;}
.est-b{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;}
.est-pend{background:#FEF3C7;color:#D97706;}.est-asist{background:#F0FDF4;color:#16A34A;}
.est-noasist{background:#FEF2F2;color:#DC2626;}.est-cancel{background:#F0F4FC;color:#6B7BA8;}
.bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.bar-lbl{font-size:11px;color:#0D1B3E;font-weight:600;min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:#F0F4FC;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:#0A4FBF;}
.bar-n{font-size:11px;font-weight:700;color:#0A4FBF;min-width:24px;text-align:right;}
.ld{text-align:center;padding:20px;color:#9AAAC8;font-size:12px;}
.sp{width:16px;height:16px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
.wrap-sc{overflow-y:auto;max-height:400px;}.wrap-sc::-webkit-scrollbar{width:3px;}.wrap-sc::-webkit-scrollbar-thumb{background:#DDE4F5;}
@media(max-width:768px){.krow{grid-template-columns:repeat(3,1fr);}.main2{grid-template-columns:1fr;}}
.vc-mov{display:none;position:fixed;inset:0;background:rgba(13,27,62,.42);z-index:800;align-items:center;justify-content:center;padding:16px;}.vc-mov.open{display:flex;}
.vc-mbox{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:700px;border:1px solid #DDE4F5;max-height:90vh;overflow-y:auto;}
</style>

<div class="vc-root">
  <div class="vc-hdr">
    <div class="vc-title">Mis Citas</div>
    <div style="display:flex;gap:7px;">
      <select class="psel" id="vc-mes" onchange="vcReload()"><option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option><option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option><option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option><option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option></select>
      <select class="psel" id="vc-anio" onchange="vcReload()"><option value="2026">2026</option><option value="2025">2025</option></select>
    </div>
  </div>

  <div class="krow">
    <div class="kc kc-blue"><div class="kc-lbl">Total citas</div><div class="kc-val" id="vc-total">--</div><div class="kc-sub">del mes</div></div>
    <div class="kc"><div class="kc-lbl">Pendientes</div><div class="kc-val kc-amber" id="vc-pend" style="color:#D97706;">--</div><div class="kc-sub">por confirmar</div></div>
    <div class="kc kc-green"><div class="kc-lbl">Asistieron</div><div class="kc-val" id="vc-asist">--</div><div class="kc-sub" id="vc-pct">0%</div></div>
    <div class="kc kc-red"><div class="kc-lbl">No asistieron</div><div class="kc-val" id="vc-noasist">--</div><div class="kc-sub">inasistencias</div></div>
    <div class="kc"><div class="kc-lbl">Canceladas</div><div class="kc-val" id="vc-cancel">--</div><div class="kc-sub">del mes</div></div>
  </div>

  <div class="main2">
    <div class="crd">
      <div class="chd">
        <div class="ct">Citas del mes</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="vc-buscar" placeholder="Buscar nombre o número..." oninput="vcBuscar()" style="padding:5px 10px;border-radius:7px;border:1px solid #DDE4F5;background:#F0F4FC;font-size:11px;font-family:DM Sans,sans-serif;outline:none;width:180px;">
          <div class="ftabs">
            <div class="ftab act" data-f="all" onclick="vcFilter(this)">Todas</div>
            <div class="ftab" data-f="PENDIENTE" onclick="vcFilter(this)">Pendientes</div>
            <div class="ftab" data-f="ASISTIO" onclick="vcFilter(this)">Asistieron</div>
            <div class="ftab" data-f="NO ASISTIO" onclick="vcFilter(this)">No asistieron</div>
            <div class="ftab" data-f="CANCELADA" onclick="vcFilter(this)">Canceladas</div>
          </div>
        </div>
      </div>
      <div class="wrap-sc">
        <table class="ctable"><thead><tr><th>Fecha</th><th>Hora</th><th>Paciente</th><th>Tratamiento</th><th>Sede</th><th>Estado</th><th>Doctora</th></tr></thead>
        <tbody id="vc-tbody"><tr><td colspan="7" class="ld"><span class="sp"></span>Cargando...</td></tr></tbody></table>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="crd"><div class="chd"><div class="ct">Por sede</div></div><div id="vc-sedes"><div class="ld"><span class="sp"></span></div></div></div>
      <div class="crd"><div class="chd"><div class="ct">Por tratamiento</div></div><div class="wrap-sc" id="vc-trats"><div class="ld"><span class="sp"></span></div></div></div>
      <div class="crd"><div class="chd"><div class="ct">Por estado</div></div><div id="vc-estados"><div class="ld"><span class="sp"></span></div></div></div>
    </div>
  </div>
</div>

<script>
// citas.js INLINE — Mis Citas | AscendaOS v1 | 100% Supabase
var _SB='https://ituyqwstonmhnfshnaqz.supabase.co';
var _SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';

// ===== ENVÍO AUTOMÁTICO DE EMAIL AL REAGENDAR CITA =====
function enviarEmailConfirmacionCita(datosCita) {
  var correo = (datosCita.correo || '').trim();
  if (!correo || correo.indexOf('@') < 0) return;
  var nombre = ((datosCita.nombre || '') + ' ' + (datosCita.apellido || '')).trim();
  var fechaRaw = datosCita.fecha_cita || '';
  var fechaLabel = fechaRaw;
  try {
    var dp = new Date(fechaRaw + 'T12:00:00');
    var dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    fechaLabel = dias[dp.getDay()] + ' ' + dp.getDate() + ' de ' + meses[dp.getMonth()] + ', ' + dp.getFullYear();
  } catch(e) {}
  fetch('https://ascenda-os-production.up.railway.app/api/send-template', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ to: correo, template: 'confirmacion_cita', nombre: nombre, tratamiento: datosCita.tratamiento || 'Consulta', hora: datosCita.hora_cita || '', sede: datosCita.sede || '', fecha: fechaLabel, dni: datosCita.dni || '', telefono: datosCita.numero_limpio || '', email: correo })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d && (d.ok || d.id)) { if (window.AOS_showToast) AOS_showToast('📧 Email enviado', correo, ''); }
    else { console.log('[EMAIL-CITA] Error:', d); }
  }).catch(function(e) { console.log('[EMAIL-CITA] Error:', e.message); });
}
function _rpc(fn,p,ok,fail){fetch(_SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(ok||function(){}).catch(fail||function(e){console.error('[SB]',fn,e);});}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
var VC={mes:new Date().getMonth()+1, anio:new Date().getFullYear(), data:null, filtro:'all', busqueda:'', _filtered:[], _citaSel:null};

(function(){el('vc-mes').value=String(VC.mes);el('vc-anio').value=String(VC.anio);vcReload();})();

function vcReload(){
  VC.mes=Number(el('vc-mes').value);VC.anio=Number(el('vc-anio').value);VC.filtro='all';VC.busqueda='';
  var bi=el('vc-buscar');if(bi)bi.value='';
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.toggle('act',t.getAttribute('data-f')==='all');});
  var ctx=(window.AOS_getCtx&&window.AOS_getCtx())||{};var nom=(ctx.asesor||'').toUpperCase();var idAs=ctx.idAsesor||'';
  if(!nom){el('vc-total').textContent='Sin sesion';return;}
  _rpc('aos_citas_asesor',{p_asesor:nom,p_id_asesor:idAs,p_mes:VC.mes,p_anio:VC.anio},function(d){
    if(!d){el('vc-total').textContent='Error';return;}
    VC.data=d;renderKPIs(d);renderDetalle(d.detalle||[],'all');renderSedes(d.porSede||[]);renderTrats(d.porTratamiento||[]);renderEstados(d.porEstado||[]);
  });
}
function renderKPIs(d){el('vc-total').textContent=d.total||0;el('vc-pend').textContent=d.pendientes||0;el('vc-asist').textContent=d.asistio||0;el('vc-pct').textContent=(d.pctAsistencia||0)+'% asistencia';el('vc-noasist').textContent=d.noAsistio||0;el('vc-cancel').textContent=d.canceladas||0;}
function estCls(e){var u=(e||'').toUpperCase();if(u==='PENDIENTE'||u==='CONFIRMADA')return'est-pend';if(u.indexOf('ASISTI')>=0&&u.indexOf('NO')<0||u==='EFECTIVA')return'est-asist';if(u.indexOf('NO ASISTI')>=0||u==='NO ASISTIO')return'est-noasist';if(u==='CANCELADA')return'est-cancel';return'est-pend';}

function renderDetalle(rows,filtro){
  var q=VC.busqueda.toLowerCase();
  var filtered=rows.filter(function(r){
    var eMatch=filtro==='all'?true:(function(){var e=(r.estado_cita||'').toUpperCase();var f=filtro.toUpperCase();if(f==='ASISTIO')return e.indexOf('ASISTI')>=0&&e.indexOf('NO')<0;if(f==='NO ASISTIO')return e.indexOf('NO ASISTI')>=0||e==='NO ASISTIO';return e===f;})();
    if(!eMatch)return false;if(!q)return true;
    var cli=((r.nombre||'')+' '+(r.apellido||'')).toLowerCase();var num=(r.numero_limpio||r.numero||'').toLowerCase();
    return cli.indexOf(q)>=0||num.indexOf(q)>=0;
  });
  VC._filtered=filtered;var tb=el('vc-tbody');
  if(!filtered.length){tb.innerHTML='<tr><td colspan="7" class="ld">Sin citas</td></tr>';return;}
  tb.innerHTML=filtered.map(function(c,i){
    var cli=((c.nombre||'')+' '+(c.apellido||'')).trim();var hora=(c.hora_cita||'').toString().substring(0,5);var cls=estCls(c.estado_cita);
    return '<tr style="cursor:pointer;" onclick="vcAbrirCita('+i+')"><td style="white-space:nowrap;color:#6B7BA8;">'+h(c.fecha_cita||'')+'</td><td style="font-weight:700;color:#0D1B3E;">'+h(hora||'--')+'</td><td><div style="font-weight:700;font-size:11px;">'+h((cli||'--').substring(0,22))+'</div><div style="font-size:9px;color:#9AAAC8;">'+h(c.numero_limpio||c.numero||'')+'</div></td><td style="font-size:10px;">'+h((c.tratamiento||'').substring(0,18))+'</td><td style="font-size:10px;color:#6B7BA8;">'+h((c.sede||'').substring(0,8))+'</td><td><span class="est-b '+cls+'">'+h(c.estado_cita||'')+'</span></td><td style="font-size:10px;color:#6B7BA8;">'+h((c.doctora||'').substring(0,15))+'</td></tr>';
  }).join('');
}
function vcBuscar(){VC.busqueda=(el('vc-buscar')||{}).value||'';if(VC.data)renderDetalle(VC.data.detalle||[],VC.filtro);}
function vcFilter(btn){document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('act');});btn.classList.add('act');VC.filtro=btn.getAttribute('data-f');if(VC.data)renderDetalle(VC.data.detalle||[],VC.filtro);}
function renderBars(items,containerId,maxVal,color){var box=el(containerId);if(!items||!items.length){box.innerHTML='<div class="ld">Sin datos</div>';return;}var mx=maxVal||Math.max.apply(null,items.map(function(i){return i.n||0;}));box.innerHTML=items.map(function(i){var pct=mx>0?Math.round((i.n||0)/mx*100):0;return '<div class="bar-row"><div class="bar-lbl">'+h(i.sede||i.tratamiento||i.estado||'--')+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(color||'#0A4FBF')+';"></div></div><div class="bar-n">'+(i.n||0)+'</div></div>';}).join('');}
function renderSedes(s){renderBars(s,'vc-sedes',0,'#0A4FBF');}
function renderTrats(t){renderBars(t,'vc-trats',0,'#00C9A7');}
function renderEstados(estados){var colors={'PENDIENTE':'#D97706','ASISTIO':'#16A34A','NO ASISTIO':'#DC2626','CANCELADA':'#6B7BA8','CONFIRMADA':'#0A4FBF','EFECTIVA':'#16A34A','REAGENDADA':'#7C3AED'};var box=el('vc-estados');if(!estados||!estados.length){box.innerHTML='<div class="ld">Sin datos</div>';return;}var mx=Math.max.apply(null,estados.map(function(i){return i.n||0;}));box.innerHTML=estados.map(function(i){var pct=mx>0?Math.round((i.n||0)/mx*100):0;var c=colors[(i.estado||'').toUpperCase()]||'#0A4FBF';return '<div class="bar-row"><div class="bar-lbl">'+h(i.estado||'--')+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+c+';"></div></div><div class="bar-n">'+(i.n||0)+'</div></div>';}).join('');}

// ═══ MODAL CITA — estilo agenda ═══
function vcAbrirCita(idx){
  var c=(VC._filtered||[])[idx];if(!c)return;VC._citaSel=c;
  var cli=((c.nombre||'')+' '+(c.apellido||'')).trim();
  var m=document.getElementById('vc-modal');
  if(!m){m=document.createElement('div');m.id='vc-modal';m.className='vc-mov';m.innerHTML='<div class="vc-mbox" id="vc-mbox"></div>';m.addEventListener('click',function(e){if(e.target===m)vcCerrarModal();});document.querySelector('.vc-root').appendChild(m);}
  var estados=['PENDIENTE','CONFIRMADA','ASISTIO','EFECTIVA','NO ASISTIO','CANCELADA','REAGENDADA'];
  var cols={'PENDIENTE':'#D97706','CONFIRMADA':'#0A4FBF','ASISTIO':'#16A34A','EFECTIVA':'#16A34A','NO ASISTIO':'#DC2626','CANCELADA':'#6B7BA8','REAGENDADA':'#7C3AED'};
  var estBtns=estados.map(function(e){var ac=(c.estado_cita||'').toUpperCase()===e;return '<div onclick="vcCambiarEstado(\''+e+'\')" style="padding:3px 9px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid '+(cols[e]||'#DDE4F5')+';'+(ac?'background:'+(cols[e]||'#DDE4F5')+';color:#fff;':'background:#fff;color:'+(cols[e]||'#6B7BA8')+';')+'">'+e.replace('_',' ')+'</div>';}).join('');
  var sedes=['SAN ISIDRO','PUEBLO LIBRE'];var sedeOpts='<option value="">--</option>'+sedes.map(function(s){return '<option value="'+s+'"'+(s===(c.sede||'')?'selected':'')+'>'+s+'</option>';}).join('');
  var tipoAt=['DOCTORA','ENFERMERIA'];var tipoAtOpts='<option value="">--</option>'+tipoAt.map(function(t){return '<option value="'+t+'"'+(t===(c.tipo_atencion||'')?'selected':'')+'>'+t+'</option>';}).join('');
  var mk=function(id,val,lbl,type){return '<div style="display:flex;flex-direction:column;gap:2px;"><label style="font-size:9px;font-weight:700;color:#9AAAC8;text-transform:uppercase;">'+lbl+'</label><input id="'+id+'" type="'+(type||'text')+'" value="'+h(val||'')+'" style="padding:5px 8px;border-radius:7px;border:1px solid #DDE4F5;background:#F0F4FC;font-size:11px;font-family:DM Sans,sans-serif;outline:none;width:100%;"></div>';};
  var mksel=function(id,lbl,opts){return '<div style="display:flex;flex-direction:column;gap:2px;"><label style="font-size:9px;font-weight:700;color:#9AAAC8;">'+lbl+'</label><select id="'+id+'" style="padding:5px 8px;border-radius:7px;border:1px solid #DDE4F5;background:#F0F4FC;font-size:11px;outline:none;">'+opts+'</select></div>';};
  document.getElementById('vc-mbox').innerHTML=
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:36px;height:36px;border-radius:10px;background:#EBF2FF;display:flex;align-items:center;justify-content:center;font-size:18px;">&#128197;</div><div><div style="font-family:Exo\\ 2,sans-serif;font-weight:800;font-size:16px;color:#0D1B3E;">'+h(cli||'Sin nombre')+'</div><div style="font-size:11px;color:#6B7BA8;">'+h(c.numero_limpio||c.numero||'')+' &middot; '+h(c.tratamiento||'')+'</div></div></div><div style="cursor:pointer;width:28px;height:28px;border-radius:7px;border:1px solid #DDE4F5;background:#F0F4FC;display:flex;align-items:center;justify-content:center;font-size:14px;" onclick="vcCerrarModal()">&times;</div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div>'+
    '<div style="font-family:Exo\\ 2,sans-serif;font-weight:800;font-size:13px;color:#0D1B3E;margin-bottom:8px;">Datos de la cita</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">'+
    mk('vc-e-fecha',c.fecha_cita,'Fecha','date')+mk('vc-e-hora',(c.hora_cita||'').toString().substring(0,5),'Hora','time')+
    mksel('vc-e-sede','Sede',sedeOpts)+mksel('vc-e-tipoat','Atenci\u00f3n',tipoAtOpts)+
    mk('vc-e-trat',c.tratamiento,'Tratamiento')+mk('vc-e-doctora',c.doctora||'','Doctora')+
    mk('vc-e-nombre',c.nombre,'Nombre')+mk('vc-e-apellido',c.apellido,'Apellido')+
    mk('vc-e-dni',c.dni||'','DNI')+mk('vc-e-correo',c.correo||'','Correo','email')+
    '</div>'+
    '<div style="margin-top:8px;"><div style="font-size:9px;font-weight:700;color:#9AAAC8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;">CAMBIAR ESTADO</div><div style="display:flex;gap:4px;flex-wrap:wrap;">'+estBtns+'</div></div>'+
    '<div style="margin-top:8px;"><label style="font-size:9px;font-weight:700;color:#9AAAC8;">OBS</label><textarea id="vc-e-obs" style="width:100%;padding:6px 8px;border-radius:7px;border:1px solid #DDE4F5;background:#F0F4FC;font-size:11px;font-family:DM Sans,sans-serif;resize:none;height:45px;margin-top:3px;">'+h(c.obs||'')+'</textarea></div>'+
    '</div><div><div style="font-family:Exo\\ 2,sans-serif;font-weight:800;font-size:13px;color:#0D1B3E;margin-bottom:8px;">Historial del paciente</div><div id="vc-hist-pac" style="max-height:320px;overflow-y:auto;"><div style="text-align:center;padding:12px;color:#9AAAC8;font-size:11px;"><span class="sp"></span> Cargando...</div></div></div></div>'+
    '<div style="display:flex;gap:8px;margin-top:14px;">'+
    '<button onclick="vcCerrarModal()" style="flex:1;padding:9px;border-radius:9px;border:1px solid #DDE4F5;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#6B7BA8;">Cerrar</button>'+
    '<button onclick="vcEliminarCita()" style="padding:9px 14px;border-radius:9px;border:none;background:#DC2626;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">Eliminar</button>'+
    '<button onclick="vcReagendarCita()" style="padding:9px 14px;border-radius:9px;border:none;background:#D97706;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">Reagendar</button>'+
    '<button onclick="vcGuardarCita()" style="flex:1;padding:9px;border-radius:9px;border:none;background:#16A34A;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">&#10003; Guardar</button></div>';
  m.classList.add('open');vcCargarHist(c.numero_limpio||c.numero||'');
}
function vcCargarHist(num){
  var box=document.getElementById('vc-hist-pac');if(!box||!num)return;
  _rpc('aos_paciente_360',{p_numero:num},function(d){
    if(!d){box.innerHTML='<div style="color:#9AAAC8;font-size:10px;">Sin historial</div>';return;}
    var htm='';var compras=d.compras||[];
    if(compras.length){htm+='<div style="font-size:10px;font-weight:700;color:#0A4FBF;margin-bottom:4px;">COMPRAS ('+compras.length+')</div>';htm+=compras.slice(0,5).map(function(v){return '<div style="font-size:10px;padding:2px 0;">'+h(v.fecha||'')+' '+h(v.tratamiento||'')+' <span style="color:#16A34A;font-weight:700;">S/'+h(v.monto||'0')+'</span></div>';}).join('');}
    var citas=d.citas||[];
    if(citas.length){htm+='<div style="font-size:10px;font-weight:700;color:#0A4FBF;margin-top:8px;margin-bottom:4px;">CITAS ('+citas.length+')</div>';htm+=citas.slice(0,6).map(function(c2){var ec=c2.estado_cita||'';var ecol={'PENDIENTE':'#D97706','ASISTIO':'#16A34A','NO ASISTIO':'#DC2626','CANCELADA':'#6B7BA8','CONFIRMADA':'#0A4FBF','EFECTIVA':'#16A34A'}[ec.toUpperCase()]||'#6B7BA8';return '<div style="font-size:10px;padding:2px 0;">'+h(c2.fecha_cita||'')+' '+h(c2.tratamiento||'')+' <span style="font-weight:700;color:'+ecol+';">'+h(ec)+'</span></div>';}).join('');}
    var llam=d.llamadas||[];
    if(llam.length){htm+='<div style="font-size:10px;font-weight:700;color:#0A4FBF;margin-top:8px;margin-bottom:4px;">LLAMADAS ('+llam.length+')</div>';htm+=llam.slice(0,5).map(function(l){return '<div style="font-size:10px;padding:2px 0;">'+h(l.fecha||'')+' '+h(l.tratamiento||'')+' <span style="color:#6B7BA8;">'+h(l.estado||'')+'</span></div>';}).join('');}
    if(!htm)htm='<div style="color:#9AAAC8;font-size:10px;">Sin historial registrado</div>';box.innerHTML=htm;
  },function(){box.innerHTML='<div style="color:#DC2626;font-size:10px;">Error al cargar</div>';});
}
function vcCerrarModal(){var m=document.getElementById('vc-modal');if(m)m.classList.remove('open');}
function vcCambiarEstado(est){var c=VC._citaSel;if(!c||!c.id)return;fetch(_SB+'/rest/v1/aos_agenda_citas?id=eq.'+c.id,{method:'PATCH',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({estado_cita:est,ts_actualizado:new Date().toISOString()})}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);if(window.AOS_showToast)AOS_showToast('Estado: '+est,'','');vcCerrarModal();vcReload();}).catch(function(e){if(window.AOS_showToast)AOS_showToast('Error',e.message||'','toast-alerta');});}
function vcGuardarCita(){
  var c=VC._citaSel;if(!c||!c.id)return;
  var row={fecha_cita:el('vc-e-fecha').value,hora_cita:el('vc-e-hora').value,sede:el('vc-e-sede').value,tipo_atencion:el('vc-e-tipoat').value,tratamiento:el('vc-e-trat').value,doctora:el('vc-e-doctora').value,nombre:el('vc-e-nombre').value.trim(),apellido:el('vc-e-apellido').value.trim(),dni:el('vc-e-dni').value.trim(),correo:el('vc-e-correo').value.trim(),obs:el('vc-e-obs').value.trim(),ts_actualizado:new Date().toISOString()};
  fetch(_SB+'/rest/v1/aos_agenda_citas?id=eq.'+c.id,{method:'PATCH',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(row)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);if(window.AOS_showToast)AOS_showToast('Cita actualizada','','');vcCerrarModal();vcReload();}).catch(function(e){if(window.AOS_showToast)AOS_showToast('Error',e.message||'','toast-alerta');});
}
function vcReagendarCita(){
  var c=VC._citaSel;if(!c||!c.id)return;var nf=el('vc-e-fecha').value;
  if(!nf||nf===c.fecha_cita){if(window.AOS_showToast)AOS_showToast('Cambia la fecha primero','','toast-alerta');el('vc-e-fecha').focus();return;}
  var now=new Date();
  Promise.all([
    fetch(_SB+'/rest/v1/aos_agenda_citas?id=eq.'+c.id,{method:'PATCH',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({estado_cita:'REAGENDADA',obs:(c.obs?c.obs+' | ':'')+'Reagendada a '+nf,ts_actualizado:now.toISOString()})}),
    fetch(_SB+'/rest/v1/aos_agenda_citas',{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nombre:el('vc-e-nombre').value.trim(),apellido:el('vc-e-apellido').value.trim(),numero:c.numero||'',numero_limpio:c.numero_limpio||'',dni:el('vc-e-dni').value.trim(),correo:el('vc-e-correo').value.trim(),sede:el('vc-e-sede').value,tipo_atencion:el('vc-e-tipoat').value,fecha_cita:nf,hora_cita:el('vc-e-hora').value,tratamiento:el('vc-e-trat').value,doctora:el('vc-e-doctora').value,tipo_cita:c.tipo_cita||'',asesor:c.asesor||'',id_asesor:c.id_asesor||'',estado_cita:'PENDIENTE',origen_cita:'REAGENDADA',obs:el('vc-e-obs').value.trim(),ts_creado:now.toISOString()})})
  ]).then(function(){
    // Enviar email de confirmación de la nueva cita
    enviarEmailConfirmacionCita({nombre:el('vc-e-nombre').value.trim(),apellido:el('vc-e-apellido').value.trim(),correo:el('vc-e-correo').value.trim(),fecha_cita:nf,hora_cita:el('vc-e-hora').value,tratamiento:el('vc-e-trat').value,sede:el('vc-e-sede').value,dni:el('vc-e-dni').value.trim(),numero_limpio:c.numero_limpio||''});
    if(window.AOS_showToast)AOS_showToast('Reagendada','Original marcada + nueva en '+nf,'toast-venta');vcCerrarModal();vcReload();}).catch(function(e){if(window.AOS_showToast)AOS_showToast('Error',e.message||'','toast-alerta');});
}
function vcEliminarCita(){var c=VC._citaSel;if(!c||!c.id||!confirm('Eliminar esta cita?'))return;fetch(_SB+'/rest/v1/aos_agenda_citas?id=eq.'+c.id,{method:'DELETE',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Prefer':'return=minimal'}}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);if(window.AOS_showToast)AOS_showToast('Cita eliminada','','');vcCerrarModal();vcReload();}).catch(function(e){if(window.AOS_showToast)AOS_showToast('Error',e.message||'','toast-alerta');});}

</script>
