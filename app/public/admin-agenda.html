<style>
*{box-sizing:border-box;margin:0;padding:0;}
.ag{display:flex;flex-direction:column;height:calc(100vh - 52px);font-family:'DM Sans',sans-serif;overflow:hidden;}
.ag-hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #DDE4F5;flex-shrink:0;}
.ag-title{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;color:#071D4A;}
.ag-tabs{display:flex;gap:2px;background:#F0F4FC;border-radius:10px;padding:3px;}
.ag-tab{padding:6px 16px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;color:#6B7BA8;background:transparent;font-family:'DM Sans';}
.ag-tab.act{background:#0A4FBF;color:#fff;}
.ag-nav{display:flex;align-items:center;gap:6px;}
.ag-nb{width:26px;height:26px;border-radius:6px;border:1px solid #DDE4F5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#6B7BA8;}.ag-nb:hover{background:#EBF2FF;}
.ag-td{padding:4px 12px;border-radius:6px;border:1px solid #00C9A7;font-size:10px;font-weight:700;color:#00C9A7;cursor:pointer;background:rgba(0,201,167,.05);font-family:'DM Sans';}
.ag-wl{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;color:#071D4A;margin:0 4px;}
.ag-btn{padding:5px 12px;border-radius:8px;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans';}
.ag-bp{background:#00C9A7;color:#fff;}.ag-bs{background:#F0F4FC;color:#071D4A;border:1px solid #DDE4F5;}
.ag-body{display:flex;flex:1;overflow:hidden;}
.ag-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* Day header row */
.ag-dh{display:grid;grid-template-columns:42px repeat(7,1fr);border-bottom:1px solid #DDE4F5;flex-shrink:0;}
.ag-dc{text-align:center;padding:8px 3px;border-right:1px solid #F0F4FC;}
.ag-dc:last-child{border-right:none;}
.ag-dow{font-size:10px;font-weight:700;letter-spacing:.5px;color:#9AAAC8;}
.ag-dn{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;color:#071D4A;line-height:1.1;}
.ag-dc.today .ag-dow{color:#00C9A7;}
.ag-dc.today .ag-dn{color:#00C9A7;}
.ag-dc.sun{background:rgba(220,38,38,.02);}
.ag-dc.sun .ag-dow,.ag-dc.sun .ag-dn{color:#DC2626;}
/* Grid scroll area */
.ag-grid-wrap{flex:1;overflow-y:auto;position:relative;}
.ag-grid{display:grid;grid-template-columns:42px repeat(7,1fr);position:relative;}
.ag-hl{text-align:right;padding:2px 4px 0 0;font-size:9px;color:#9AAAC8;font-weight:600;height:52px;}
.ag-hc{border-left:1px solid #F0F4FC;border-bottom:1px solid #F5F7FB;height:52px;cursor:pointer;position:relative;}
.ag-hc:hover{background:rgba(10,79,191,.01);}
.ag-hc.sun{background:rgba(220,38,38,.015);}
/* Turno blocks — rounded, NO border-left, soft bg */
.ag-bk{position:absolute;border-radius:10px;padding:6px 7px;cursor:pointer;overflow:hidden;z-index:1;transition:box-shadow .12s;}
.ag-bk:hover{box-shadow:0 3px 12px rgba(7,29,74,.1);z-index:2;}
.ag-bk.si{background:rgba(10,79,191,.06);}
.ag-bk.pl{background:rgba(0,201,167,.06);}
.ag-bk-name{font-weight:800;font-size:11px;}
.ag-bk.si .ag-bk-name{color:#0A4FBF;}
.ag-bk.pl .ag-bk-name{color:#00A88A;}
.ag-bk-sede{font-size:9px;opacity:.7;}
.ag-bk.si .ag-bk-sede{color:#0A4FBF;}
.ag-bk.pl .ag-bk-sede{color:#00A88A;}
.ag-bk-hrs{font-size:8px;color:#6B7BA8;margin-top:1px;}
/* Cita mini-cards — white rounded inside blocks */
.ag-ci{background:#fff;border-radius:6px;padding:3px 5px;font-size:8px;display:flex;align-items:center;gap:3px;margin-top:2px;}
.ag-ci-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ci-pend{background:#D97706;}.ci-conf{background:#0A4FBF;}.ci-asist{background:#00C9A7;}.ci-no{background:#DC2626;}.ci-canc{background:#9AAAC8;}
.ag-ci-h{color:#071D4A;font-weight:700;}
.ag-ci-t{color:#6B7BA8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* NOW line */
.ag-now{position:absolute;left:42px;right:0;height:2px;background:#DC2626;z-index:4;pointer-events:none;}
.ag-now::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#DC2626;}
/* SIDEBAR RIGHT */
.ag-side{width:200px;border-left:1px solid #DDE4F5;flex-shrink:0;padding:12px 14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;background:#FAFBFE;}
.ag-mc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ag-mc-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;color:#071D4A;}
.ag-mc-n{font-size:9px;color:#9AAAC8;cursor:pointer;padding:2px 4px;}
.ag-mc-g{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:9px;line-height:2;}
.ag-mc-dw{color:#9AAAC8;font-weight:700;font-size:8px;}
.ag-mc-d{border-radius:4px;cursor:pointer;color:#071D4A;}.ag-mc-d:hover{background:#EBF2FF;}
.ag-mc-d.today{background:#00C9A7;color:#fff;font-weight:800;}
.ag-mc-d.inw{background:rgba(0,201,167,.1);color:#00A88A;font-weight:700;}
.ag-mc-d.oth{opacity:.35;}
.ag-sec-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9AAAC8;margin-bottom:6px;}
.ag-si{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:8px;font-size:11px;font-weight:600;color:#071D4A;cursor:pointer;transition:background .1s;}
.ag-si:hover{background:rgba(10,79,191,.04);}
.ag-si.sel{background:rgba(10,79,191,.08);}
.ag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ag-si-sede{margin-left:auto;font-size:8px;font-weight:700;}
.ag-legend{border-top:1px solid #F0F4FC;padding-top:8px;margin-top:auto;}
.ag-legend-t{font-size:8px;font-weight:700;color:#9AAAC8;margin-bottom:5px;}
.ag-legend-i{display:flex;flex-wrap:wrap;gap:6px;font-size:8px;color:#6B7BA8;}
.ag-legend-d{display:flex;align-items:center;gap:3px;}
/* Agenda frame */
.ag-af{flex:1;overflow:auto;}
/* Modal */
.ag-mo{display:none;position:fixed;inset:0;background:rgba(7,29,74,.4);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;}.ag-mo.open{display:flex;}
.ag-mm{background:#fff;border-radius:16px;width:min(400px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(7,29,74,.18);}
.ag-mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #DDE4F5;}
.ag-mt{font-family:'Exo 2',sans-serif;font-weight:800;font-size:14px;color:#071D4A;}
.ag-mx{width:26px;height:26px;border-radius:6px;background:#F0F4FC;border:none;cursor:pointer;font-size:14px;color:#6B7BA8;display:flex;align-items:center;justify-content:center;}
.ag-mb{padding:14px 18px;display:flex;flex-direction:column;gap:8px;}
.ag-f label{font-size:9px;font-weight:700;color:#9AAAC8;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px;}
.ag-f input,.ag-f select,.ag-f textarea{width:100%;padding:7px 9px;border-radius:8px;border:1px solid #DDE4F5;font-size:11px;font-family:'DM Sans';outline:none;color:#071D4A;}.ag-f input:focus,.ag-f select:focus{border-color:#0A4FBF;}
.ag-f textarea{resize:none;height:44px;}
.ag-mf{display:flex;gap:6px;padding:12px 18px;border-top:1px solid #DDE4F5;}
.ag-mf .ag-btn{flex:1;padding:9px;text-align:center;font-size:11px;}
.ag-del{background:none;border:none;color:#DC2626;font-size:10px;font-weight:700;cursor:pointer;}
.ag-ld{display:flex;align-items:center;gap:8px;padding:30px;color:#6B7BA8;font-size:11px;justify-content:center;}
.ag-sp{width:14px;height:14px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:agsp .7s linear infinite;}@keyframes agsp{to{transform:rotate(360deg)}}
</style>

<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
var G={so:0,mo:0,st:null,tu:null,ci:null,sp:null,sd:null},DS=['DOM','LUN','MAR','MIE','JUE','VIE','SAB'],MS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],HM=9,HX=21,RH=52;
function rpc(f,p,c){fetch(SB+'/rest/v1/rpc/'+f,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(function(d){c(Array.isArray(d)?d[0]:d);}).catch(function(e){console.error(f,e);});}
function q(t,f,c){fetch(SB+'/rest/v1/'+t+'?'+f,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(c).catch(function(e){console.error(t,e);});}
function rest(p,o){return fetch(SB+'/rest/v1/'+p,Object.assign({headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'}},o||{}));}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// Tabs
function T(t){document.getElementById('at-a').classList.toggle('act',t==='a');document.getElementById('at-g').classList.toggle('act',t==='g');document.getElementById('ap-a').style.display=t==='a'?'':'none';document.getElementById('ap-g').style.display=t==='g'?'flex':'none';document.getElementById('ag-nav').style.display=t==='g'?'flex':'none';if(t==='a')LA();if(t==='g')LG();}

// Agenda tab
var _al=false;function LA(){if(_al)return;var el=document.getElementById('ap-a');fetch('/agenda.html').then(function(r){return r.text();}).then(function(h){el.innerHTML=h;var sc=el.querySelectorAll('script');var ex=[],il=[];sc.forEach(function(s){if(s.src){var u=s.getAttribute('src');if(u.charAt(0)==='/')u=location.origin+u;ex.push(u);}else if(s.textContent.trim())il.push(s.textContent);s.remove();});function ld(){if(ex.length){var u=ex.shift();if(document.querySelector('script[src="'+u+'"]')){ld();return;}var n=document.createElement('script');n.src=u;n.onload=ld;document.head.appendChild(n);}else if(il.length){var b=new Blob([il.join('\n;\n')],{type:'application/javascript'});var u=URL.createObjectURL(b);var n=document.createElement('script');n.src=u;n.onload=function(){URL.revokeObjectURL(u);};document.head.appendChild(n);}}ld();_al=true;}).catch(function(){});}

// Week calc
function gS(){var d=new Date();d.setDate(d.getDate()-d.getDay()+1+G.so*7);var r=[];for(var i=0;i<7;i++){var dd=new Date(d);dd.setDate(d.getDate()+i);r.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0'));}return r;}
function NS(d){G.so+=d;LG();}
function TD(){G.so=0;LG();}

// Load gestion
function LG(){
  var s=gS(),d0=new Date(s[0]+'T12:00:00'),d6=new Date(s[6]+'T12:00:00');
  document.getElementById('ag-wl').textContent=d0.getDate()+' - '+d6.getDate()+' '+MS[d6.getMonth()]+' '+d6.getFullYear();
  q('aos_rrhh','select=codigo_asesor,nombre,puesto&estado=eq.ACTIVO&order=puesto,nombre',function(st){
    G.st=st||[];
    var sel=document.getElementById('mt-p');sel.innerHTML=st.map(function(x){return '<option value="'+e(x.nombre)+'|'+e(x.puesto)+'">'+e(x.nombre)+' ('+e(x.puesto.substring(0,3))+')</option>';}).join('');
    q('aos_horarios_personal','select=id,personal,rol,fecha,sede,hora_inicio,hora_fin,notas,activo&fecha=gte.'+s[0]+'&fecha=lte.'+s[6]+'&activo=eq.true&order=personal,fecha',function(tu){
      G.tu=tu||[];
      q('aos_agenda_citas','select=id,fecha_cita,hora_cita,estado_cita,sede,asesor,tratamiento,nombre&fecha_cita=gte.'+s[0]+'&fecha_cita=lte.'+s[6]+'&limit=500',function(ci){
        G.ci=ci||[];
        rpc('aos_sede_personal_hoy',{p_fecha:hoy()},function(sd){
          G.sd=sd||{};RDH(s);RG(s);RSL();RMC();
        });

}

// Render day headers
function RDH(s){
  var h=hoy(),html='<div style="border-right:1px solid #F0F4FC"></div>';
  s.forEach(function(f){
    var d=new Date(f+'T12:00:00'),isSun=d.getDay()===0,isToday=f===h;
    var cls='ag-dc'+(isToday?' today':'')+(isSun?' sun':'');
    html+='<div class="'+cls+'"><div class="ag-dow">'+DS[d.getDay()]+'</div><div class="ag-dn">'+d.getDate()+'</div>';
    if(isToday)html+='<div style="font-size:7px;color:#00C9A7;margin-top:1px">HOY</div>';
    html+='</div>';
  });
  document.getElementById('ag-dh').innerHTML=html;
}

// Render grid + blocks
function RG(sem){
  var gw=document.getElementById('ag-gw');if(!gw)return;
  var h=hoy(),hrs=[];for(var i=HM;i<=HX;i++)hrs.push(i);

  // Index data
  var tD={};(G.tu||[]).forEach(function(t){if(G.sp&&t.personal!==G.sp)return;if(!tD[t.fecha])tD[t.fecha]=[];tD[t.fecha].push(t);});
  var cD={};(G.ci||[]).forEach(function(c){if(!cD[c.fecha_cita])cD[c.fecha_cita]=[];cD[c.fecha_cita].push(c);});

  // Grid lines
  var html='<div class="ag-grid">';
  hrs.forEach(function(hr){
    var lbl=hr>12?(hr-12)+':00':(hr===12?'12:00':hr+':00');
    html+='<div class="ag-hl">'+lbl+'</div>';
    sem.forEach(function(f){
      var d=new Date(f+'T12:00:00');
      html+='<div class="ag-hc'+(d.getDay()===0?' sun':'')+'" onclick="OT(null,null,null,\''+f+'\','+hr+')"></div>';
    });
  });
  html+='</div>';

  // Turno blocks overlay
  html+='<div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none">';
  sem.forEach(function(f,di){
    var dt=tD[f]||[],dc=cD[f]||[];
    var bc=dt.length;
    dt.forEach(function(t,ti){
      var hi=parseInt(t.hora_inicio)||10,mi=parseInt((t.hora_inicio||'').split(':')[1])||0;
      var hf=parseInt(t.hora_fin)||20,mf=parseInt((t.hora_fin||'').split(':')[1])||0;
      var sd=hi+mi/60,ed=hf+mf/60;
      var top=((sd-HM)*RH)+'px',height=((ed-sd)*RH)+'px';
      var sc=t.sede==='SAN ISIDRO'?'si':'pl';
      var sl=t.sede==='SAN ISIDRO'?'S. Isidro':'P. Libre';
      var bw=bc>1?(1/bc):1;
      var bl=bc>1?(ti/bc):0;
      var pc=dc.filter(function(c){return c.asesor===t.personal||c.asesor===('SRA '+t.personal);});

      html+='<div class="ag-bk '+sc+'" style="pointer-events:all;top:'+top+';height:'+height+';left:calc(42px + (100% - 42px)/7 * '+di+' + (100% - 42px)/7 * '+bl*bw+' + 2px);width:calc((100% - 42px)/7 * '+bw+' - 4px)" onclick="ET(\''+t.id+'\',\''+e(t.personal)+'\',\''+e(t.rol)+'\',\''+t.fecha+'\',\''+e(t.sede)+'\',\''+(t.hora_inicio||'').substring(0,5)+'\',\''+(t.hora_fin||'').substring(0,5)+'\',\''+e((t.notas||'').replace(/'/g,''))+'\')">';
      html+='<div class="ag-bk-name">'+e(t.personal)+'</div>';
      html+='<div class="ag-bk-sede">'+sl+'</div>';
      html+='<div class="ag-bk-hrs">'+(t.hora_inicio||'').substring(0,5)+' - '+(t.hora_fin||'').substring(0,5)+'</div>';
      if(pc.length){
        html+='<div style="margin-top:4px;display:flex;flex-direction:column;gap:2px">';
        pc.slice(0,6).forEach(function(c){
          var es=(c.estado_cita||'').toUpperCase();
          var dc2=es==='PENDIENTE'?'ci-pend':es==='CITA CONFIRMADA'?'ci-conf':(es.indexOf('ASIST')>=0&&es.indexOf('NO')<0)?'ci-asist':es==='NO ASISTIO'?'ci-no':'ci-canc';
          html+='<div class="ag-ci"><div class="ag-ci-dot '+dc2+'"></div><span class="ag-ci-h">'+(c.hora_cita||'').substring(0,5)+'</span><span class="ag-ci-t">'+e(c.nombre||c.tratamiento||'')+'</span></div>';
        });
        if(pc.length>6)html+='<div style="font-size:7px;color:#9AAAC8;margin-top:1px;pointer-events:all">+'+(pc.length-6)+' mas</div>';
        html+='</div>';
      }
      html+='</div>';
    });
  });

  // NOW line
  var nH=new Date().getHours()+new Date().getMinutes()/60;
  if(sem.indexOf(h)>=0&&nH>=HM&&nH<=HX+1)html+='<div class="ag-now" style="top:'+((nH-HM)*RH)+'px"></div>';
  html+='</div>';

  gw.innerHTML=html;
  // Scroll to ~10am
  gw.scrollTop=RH*1.5;
}

// Render sidebar staff list
function RSL(){
  var el=document.getElementById('ag-sl');if(!el)return;
  var roles=[{t:'ENFERMERIA',c:'#00C9A7'},{t:'DOCTORA',c:'#0A4FBF'},{t:'ASESOR',c:'#D97706'},{t:'ADMINISTRADOR',c:'#7C3AED'}];
  var html='';
  roles.forEach(function(r){
    var people=(G.st||[]).filter(function(s){return s.puesto===r.t;});
    if(!people.length)return;
    html+='<div style="margin-bottom:10px"><div class="ag-sec-t">'+e(r.t==='ENFERMERIA'?'Enfermeria':r.t==='DOCTORA'?'Doctoras':r.t==='ASESOR'?'Asesores':'Admin')+'</div>';
    people.forEach(function(p){
      var sede=G.sd[p.nombre]||'';var ss=sede==='SAN ISIDRO'?'S.I.':sede==='PUEBLO LIBRE'?'P.L.':'';
      var scol=sede==='SAN ISIDRO'?'#0A4FBF':'#00A88A';
      var sel=G.sp===p.nombre?' sel':'';
      html+='<div class="ag-si'+sel+'" onclick="SP(\''+e(p.nombre)+'\')"><div class="ag-dot" style="background:'+r.c+'"></div>'+e(p.nombre);
      if(ss)html+='<span class="ag-si-sede" style="color:'+scol+'">'+ss+'</span>';
      html+='</div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}
function SP(n){G.sp=G.sp===n?null:n;RSL();RG(gS());}

// Render mini calendar
function RMC(){
  var el=document.getElementById('ag-mc');if(!el)return;
  var now=new Date();now.setMonth(now.getMonth()+G.mo);
  var y=now.getFullYear(),m=now.getMonth(),f=new Date(y,m,1),l=new Date(y,m+1,0),sw=f.getDay();
  var sem=gS(),h=hoy();
  var html='<div class="ag-mc-h"><span class="ag-mc-n" onclick="G.mo--;RMC()">&#9664;</span><span class="ag-mc-t">'+MS[m]+' '+y+'</span><span class="ag-mc-n" onclick="G.mo++;RMC()">&#9654;</span></div><div class="ag-mc-g">';
  ['D','L','M','M','J','V','S'].forEach(function(d){html+='<div class="ag-mc-dw">'+d+'</div>';});
  for(var i=0;i<sw;i++)html+='<div class="ag-mc-d oth"></div>';
  for(var d=1;d<=l.getDate();d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var c='ag-mc-d';if(ds===h)c+=' today';else if(sem.indexOf(ds)>=0)c+=' inw';html+='<div class="'+c+'" onclick="GD(\''+ds+'\')">'+d+'</div>';}
  html+='</div>';el.innerHTML=html;
}
function GD(ds){var d=new Date(ds+'T12:00:00'),t=new Date();t.setHours(12,0,0,0);var mn=new Date(d);mn.setDate(mn.getDate()-mn.getDay()+1);var tm=new Date(t);tm.setDate(tm.getDate()-tm.getDay()+1);G.so=Math.round((mn-tm)/(7*86400000));LG();}

// ═══ TURNO CRUD ═══
function OT(id,nm,rl,f,hr){
  document.getElementById('mt-t').textContent=id?'Editar turno':'Nuevo turno';
  document.getElementById('mt-id').value=id||'';
  document.getElementById('mt-f').value=f||hoy();
  document.getElementById('mt-i').value=hr?String(hr).padStart(2,'0')+':00':'10:30';
  document.getElementById('mt-e').value=hr?String(Math.min(hr+10,21)).padStart(2,'0')+':00':'20:30';
  document.getElementById('mt-n').value='';
  document.getElementById('mt-d').style.display=id?'':'none';
  document.getElementById('m-t').classList.add('open');
}
function ET(id,nm,rl,f,sd,i,en,nt){
  document.getElementById('mt-t').textContent='Editar turno';
  document.getElementById('mt-id').value=id;
  var sel=document.getElementById('mt-p');for(var x=0;x<sel.options.length;x++){if(sel.options[x].value.indexOf(nm)===0){sel.selectedIndex=x;break;}}
  document.getElementById('mt-f').value=f;document.getElementById('mt-s').value=sd;
  document.getElementById('mt-i').value=i;document.getElementById('mt-e').value=en;
  document.getElementById('mt-n').value=nt;document.getElementById('mt-d').style.display='';
  document.getElementById('m-t').classList.add('open');
}
function CT(){document.getElementById('m-t').classList.remove('open');}
function ST(){
  var pv=document.getElementById('mt-p').value,pts=pv.split('|'),nm=pts[0],pu=pts[1]||'ENFERMERIA';
  var f=document.getElementById('mt-f').value,sd=document.getElementById('mt-s').value;
  var i=document.getElementById('mt-i').value,en=document.getElementById('mt-e').value;
  var nt=document.getElementById('mt-n').value,id=document.getElementById('mt-id').value;
  if(!nm||!f)return;
  var rl=pu==='DOCTORA'?'DOCTORA':(pu==='ASESOR'?'ASESOR':'ENFERMERIA');
  if(id){rest('aos_horarios_personal?id=eq.'+id,{method:'PATCH',body:JSON.stringify({personal:nm,rol:rl,sede:sd,hora_inicio:i,hora_fin:en,notas:nt||null,ts_actualizado:new Date().toISOString()})}).then(function(){CT();LG();if(window.AOS_showToast)AOS_showToast('Turno actualizado',nm,'success');});}
  else{rest('aos_horarios_personal',{method:'POST',body:JSON.stringify({personal:nm,rol:rl,fecha:f,sede:sd,hora_inicio:i,hora_fin:en,tipo_turno:'NORMAL',notas:nt||null,activo:true,creado_por:'ADMIN_PANEL'})}).then(function(r){if(r.ok||r.status===201){CT();LG();if(window.AOS_showToast)AOS_showToast('Turno creado',nm+' - '+sd,'success');}});}
}
function DT(){var id=document.getElementById('mt-id').value;if(!id||!confirm('Eliminar turno?'))return;rest('aos_horarios_personal?id=eq.'+id,{method:'DELETE'}).then(function(){CT();LG();});}
// Eventos
function OE(){document.getElementById('me-f').value=hoy();document.getElementById('me-t').value='';document.getElementById('m-e').classList.add('open');}
function SE(){var t=document.getElementById('me-t').value,f=document.getElementById('me-f').value;if(!t||!f)return;rpc('aos_guardar_evento',{p_titulo:t,p_fecha:f,p_hora_inicio:document.getElementById('me-i').value,p_hora_fin:document.getElementById('me-e').value,p_tipo:document.getElementById('me-tp').value,p_sede:document.getElementById('me-sd').value||null},function(){document.getElementById('m-e').classList.remove('open');LG();if(window.AOS_showToast)AOS_showToast('Evento creado',t,'success');});}
// Init
LA();
</script>
