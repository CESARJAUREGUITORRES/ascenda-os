<!-- ===== ADMIN AGENDA v2 — TIMELINE SEMANAL + GESTIÓN ===== -->
<style>
.aa{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:calc(100vh - 52px);font-family:'DM Sans',sans-serif;}
.aa-tabs{display:flex;gap:3px;background:#F0F4FC;border-radius:10px;padding:3px;width:fit-content;}
.aa-tab{padding:7px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;color:#6B7BA8;background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s;}
.aa-tab.act{background:#0A4FBF;color:#fff;box-shadow:0 2px 6px rgba(10,79,191,0.2);}
.aa-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.aa-title{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;color:#0D1B3E;}
.aa-c{background:#fff;border:1px solid #DDE4F5;border-radius:14px;padding:14px;overflow:hidden;}
.aa-ct{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;letter-spacing:.5px;color:#0D1B3E;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.aa-btn{padding:6px 14px;border-radius:8px;border:none;background:#0A4FBF;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.aa-btn:hover{background:#071D4A;}
.aa-btn.sec{background:#F0F4FC;color:#0D1B3E;border:1px solid #DDE4F5;}
.aa-btn.cyan{background:#00C9A7;}.aa-btn.cyan:hover{background:#00A88A;}
/* Role filter pills */
.aa-pills{display:flex;gap:4px;flex-wrap:wrap;}
.aa-pill{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #DDE4F5;background:#fff;color:#6B7BA8;transition:all .12s;letter-spacing:.3px;}
.aa-pill.act{border-color:transparent;}
.aa-pill.enf.act{background:rgba(0,201,167,0.1);color:#00A88A;border-color:#00C9A7;}
.aa-pill.doc.act{background:rgba(10,79,191,0.08);color:#0A4FBF;border-color:#0A4FBF;}
.aa-pill.ase.act{background:rgba(217,119,6,0.08);color:#D97706;border-color:#D97706;}
.aa-pill.adm.act{background:rgba(124,58,237,0.08);color:#7C3AED;border-color:#7C3AED;}
.aa-pill.all.act{background:#0D1B3E;color:#fff;border-color:#0D1B3E;}
/* Week nav */
.aa-week-nav{display:flex;align-items:center;gap:8px;}
.aa-week-lbl{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;color:#0D1B3E;min-width:200px;text-align:center;}
.aa-nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid #DDE4F5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0D1B3E;transition:background .12s;}
.aa-nav-btn:hover{background:#EBF2FF;}
.aa-today-btn{padding:4px 12px;border-radius:6px;border:1px solid #00C9A7;font-size:10px;font-weight:700;cursor:pointer;color:#00C9A7;background:rgba(0,201,167,0.06);}
/* Timeline grid */
.aa-tl{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;}
.aa-tl th{padding:8px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.5px;color:#9AAAC8;text-transform:uppercase;border-bottom:2px solid #DDE4F5;position:sticky;top:0;background:#fff;z-index:2;}
.aa-tl th.today{color:#00C9A7;border-bottom-color:#00C9A7;}
.aa-tl td{padding:3px;vertical-align:top;border-bottom:1px solid #F0F4FC;min-width:90px;}
.aa-tl td.name-col{padding:8px 6px;vertical-align:middle;font-weight:700;font-size:12px;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:1;min-width:130px;border-right:1px solid #DDE4F5;}
.aa-tl tr:last-child td{border-bottom:none;}
/* Turn block inside cell */
.aa-block{border-radius:8px;padding:5px 6px;min-height:44px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.aa-block:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.aa-block.si{background:rgba(10,79,191,0.08);border-left:3px solid #0A4FBF;}
.aa-block.pl{background:rgba(0,201,167,0.08);border-left:3px solid #00C9A7;}
.aa-block-sede{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.aa-block.si .aa-block-sede{color:#0A4FBF;}
.aa-block.pl .aa-block-sede{color:#00C9A7;}
.aa-block-hrs{font-size:9px;color:#6B7BA8;margin-top:1px;}
.aa-block-note{font-size:8px;color:#9AAAC8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aa-block-citas{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;}
.aa-block-cita{width:6px;height:6px;border-radius:50%;}
.aa-cita-pend{background:#D97706;}.aa-cita-conf{background:#0A4FBF;}.aa-cita-asist{background:#00C9A7;}.aa-cita-no{background:#DC2626;}.aa-cita-cancel{background:#9AAAC8;}
/* Empty cell */
.aa-empty{border-radius:8px;padding:10px;min-height:44px;cursor:pointer;border:1px dashed #DDE4F5;display:flex;align-items:center;justify-content:center;color:#DDE4F5;font-size:16px;transition:all .12s;}
.aa-empty:hover{border-color:#0A4FBF;color:#0A4FBF;background:rgba(10,79,191,0.02);}
/* Sunday */
.aa-sun{border-radius:8px;padding:5px;min-height:44px;background:rgba(220,38,38,0.03);display:flex;align-items:center;justify-content:center;font-size:8px;color:#DC2626;font-weight:700;}
/* Role badge */
.aa-role{font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;letter-spacing:.3px;}
.aa-role-enf{background:rgba(0,201,167,0.1);color:#00A88A;}
.aa-role-doc{background:rgba(10,79,191,0.08);color:#0A4FBF;}
.aa-role-ase{background:rgba(217,119,6,0.08);color:#D97706;}
/* Agenda iframe */
.aa-agenda-frame{min-height:600px;}
/* Loading */
.aa-ld{display:flex;align-items:center;gap:8px;padding:20px;color:#6B7BA8;font-size:11px;justify-content:center;}
.aa-sp{width:14px;height:14px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:aasp .7s linear infinite;flex-shrink:0;}
@keyframes aasp{to{transform:rotate(360deg)}}
/* Modal */
.aa-mo{display:none;position:fixed;inset:0;background:rgba(7,29,74,0.4);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
.aa-mo.open{display:flex;}
.aa-mm{background:#fff;border-radius:18px;width:min(420px,96vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(7,29,74,0.18);overflow:hidden;}
.aa-mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #DDE4F5;}
.aa-mh-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:15px;}
.aa-mx{width:28px;height:28px;border-radius:8px;background:#F0F4FC;border:none;cursor:pointer;font-size:16px;color:#6B7BA8;display:flex;align-items:center;justify-content:center;}
.aa-mb{padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.aa-field{display:flex;flex-direction:column;gap:3px;}
.aa-field label{font-size:10px;font-weight:700;color:#9AAAC8;text-transform:uppercase;letter-spacing:.5px;}
.aa-field input,.aa-field select,.aa-field textarea{padding:8px 10px;border-radius:8px;border:1px solid #DDE4F5;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:#0D1B3E;}
.aa-field textarea{resize:none;height:50px;}
.aa-mf{display:flex;gap:8px;padding:14px 20px;border-top:1px solid #DDE4F5;}
.aa-mf .aa-btn{flex:1;padding:10px;text-align:center;}
.aa-del-btn{background:none;border:none;color:#DC2626;font-size:10px;font-weight:700;cursor:pointer;padding:4px 8px;}
@media(max-width:900px){.aa-tl{font-size:9px;}.aa-tl td{min-width:70px;}.aa-tl td.name-col{min-width:80px;font-size:10px;}}
</style>

<div class="aa">
  <div class="aa-hdr">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="aa-title">Agenda</span>
      <div class="aa-tabs">
        <button class="aa-tab act" id="aa-tab-agenda" onclick="aaTab('agenda')">📅 Agenda</button>
        <button class="aa-tab" id="aa-tab-gestion" onclick="aaTab('gestion')">⚙️ Gestión</button>
      </div>
    </div>
  </div>

  <!-- TAB 1: AGENDA -->
  <div id="aa-panel-agenda" class="aa-agenda-frame">
    <div class="aa-ld"><div class="aa-sp"></div>Cargando agenda...</div>
  </div>

  <!-- TAB 2: GESTIÓN TIMELINE -->
  <div id="aa-panel-gestion" style="display:none">
    <div class="aa-c">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div class="aa-week-nav">
          <button class="aa-nav-btn" onclick="aaNavSem(-1)">◀</button>
          <span class="aa-week-lbl" id="aa-sem-lbl"></span>

          <div class="aa-pills" id="aa-pills">
            <span class="aa-pill all act" onclick="aaFilterRol(null,this)">Todos</span>
            <span class="aa-pill enf" onclick="aaFilterRol('ENFERMERIA',this)">Enfermería</span>
            <span class="aa-pill doc" onclick="aaFilterRol('DOCTORA',this)">Doctoras</span>
            <span class="aa-pill ase" onclick="aaFilterRol('ASESOR',this)">Asesores</span>
            <span class="aa-pill adm" onclick="aaFilterRol('ADMINISTRADOR',this)">Admin</span>
          </div>
          <button class="aa-btn cyan" onclick="aaAbrirEvento()">+ Evento</button>
          <button class="aa-btn sec" onclick="aaAbrirBloqueo()">+ Bloqueo</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="aa-tl" id="aa-timeline">
          <thead id="aa-tl-head"></thead>
          <tbody id="aa-tl-body">
            <tr><td colspan="8"><div class="aa-ld"><div class="aa-sp"></div>Cargando...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Turno -->
<div class="aa-mo" id="aa-mo-turno">
  <div class="aa-mm">
    <div class="aa-mh">
      <span class="aa-mh-t" id="aa-mt-title">Asignar turno</span>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="aa-del-btn" id="aa-mt-del" style="display:none" onclick="aaEliminarTurno()">Eliminar</button>
        <button class="aa-mx" onclick="aaCerrarTurno()">✕</button>
      </div>
    </div>
    <div class="aa-mb">
      <div class="aa-field"><label>Personal</label><input id="aa-mt-nombre" readonly style="font-weight:700;background:#F0F4FC"></div>
      <input type="hidden" id="aa-mt-codigo"><input type="hidden" id="aa-mt-puesto"><input type="hidden" id="aa-mt-id">

      <div class="aa-field"><label>Sede</label>

</div>

<!-- Modal Evento -->

        <div class="aa-field"><label>Fin</label><input type="time" id="aa-ev-fin" value="10:00"></div>

<!-- Modal Bloqueo -->

  <div class="aa-mm">
    <div class="aa-mh"><span class="aa-mh-t">Nuevo bloqueo</span><button class="aa-mx" onclick="document.getElementById('aa-mo-bloqueo').classList.remove('open')">✕</button></div>
    <div class="aa-mb">
      <div class="aa-field"><label>Tipo</label><select id="aa-bl-tipo"><option>PERSONAL</option><option>FERIADO</option><option>MANTENIMIENTO</option></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="aa-field"><label>Desde</label><input type="date" id="aa-bl-inicio"></div>
        <div class="aa-field"><label>Hasta</label><input type="date" id="aa-bl-fin"></div>
      </div>
      <div class="aa-field"><label>Personal</label><select id="aa-bl-personal"><option value="">Todos</option></select></div>
      <div class="aa-field"><label>Motivo</label><textarea id="aa-bl-motivo" placeholder="Ej: Feriado nacional"></textarea></div>
    </div>
    <div class="aa-mf"><button class="aa-btn sec" onclick="document.getElementById('aa-mo-bloqueo').classList.remove('open')">Cancelar</button><button class="aa-btn" onclick="aaGuardarBloqueo()">Crear</button></div>
  </div>
</div>

<script>
var _S='https://ituyqwstonmhnfshnaqz.supabase.co';
var _K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
var _AA={tab:'agenda',semOff:0,staff:null,turnos:null,citas:null,rolFilter:null};
var DS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
var DL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function _r(fn,p,cb){fetch(_S+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':_K,'Authorization':'Bearer '+_K,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(function(d){cb(Array.isArray(d)?d[0]:d);}).catch(function(e){console.error(fn,e);});}
function _q(t,f,cb){fetch(_S+'/rest/v1/'+t+'?'+f,{headers:{'apikey':_K,'Authorization':'Bearer '+_K}}).then(function(r){return r.json();}).then(cb).catch(function(e){console.error(t,e);});}
function _rest(path,opts){return fetch(_S+'/rest/v1/'+path,Object.assign({headers:{'apikey':_K,'Authorization':'Bearer '+_K,'Content-Type':'application/json','Prefer':'return=minimal'}},opts||{}));}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _fmtDate(s){var d=new Date(s+'T12:00:00');return d.getDate()+' '+MS[d.getMonth()].substring(0,3);}

// ═══════ TABS ═══════
function aaTab(t){
  _AA.tab=t;
  document.getElementById('aa-tab-agenda').classList.toggle('act',t==='agenda');
  document.getElementById('aa-tab-gestion').classList.toggle('act',t==='gestion');
  document.getElementById('aa-panel-agenda').style.display=t==='agenda'?'':'none';
  document.getElementById('aa-panel-gestion').style.display=t==='gestion'?'':'none';
  if(t==='agenda')aaLoadAgenda();
  if(t==='gestion')aaLoadGestion();
}

// ═══════ AGENDA TAB ═══════
var _agLoaded=false;
function aaLoadAgenda(){
  if(_agLoaded)return;
  var el=document.getElementById('aa-panel-agenda');
  fetch('/agenda.html').then(function(r){return r.text();}).then(function(html){
    el.innerHTML=html;
    var scripts=el.querySelectorAll('script');var ext=[],inl=[];
    scripts.forEach(function(s){if(s.src){var src=s.getAttribute('src');if(src.charAt(0)==='/')src=location.origin+src;ext.push(src);}else if(s.textContent.trim())inl.push(s.textContent);s.remove();});
    function loadNext(){if(ext.length){var url=ext.shift();if(document.querySelector('script[src="'+url+'"]')){loadNext();return;}var ns=document.createElement('script');ns.src=url;ns.onload=loadNext;document.head.appendChild(ns);}else if(inl.length){var blob=new Blob([inl.join('\n;\n')],{type:'application/javascript'});var bu=URL.createObjectURL(blob);var ns=document.createElement('script');ns.src=bu;ns.onload=function(){URL.revokeObjectURL(bu);};document.head.appendChild(ns);}}
    loadNext();_agLoaded=true;
  }).catch(function(){el.innerHTML='<div style="text-align:center;padding:40px;color:#DC2626">Error cargando agenda</div>';});
}

// ═══════ GESTIÓN TAB ═══════
function aaGetSemana(){
  var d=new Date();
  d.setDate(d.getDate()-d.getDay()+1+_AA.semOff*7); // Monday
  var dias=[];
  for(var i=0;i<7;i++){var dd=new Date(d);dd.setDate(d.getDate()+i);dias.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0'));}
  return dias;
}

function aaLoadGestion(){
  var sem=aaGetSemana();
  var d0=new Date(sem[0]+'T12:00:00'),d6=new Date(sem[6]+'T12:00:00');
  document.getElementById('aa-sem-lbl').textContent=d0.getDate()+' '+MS[d0.getMonth()]+' — '+d6.getDate()+' '+MS[d6.getMonth()]+' '+d6.getFullYear();

  // Load staff
  _q('aos_rrhh','select=codigo_asesor,nombre,puesto&estado=eq.ACTIVO&order=puesto,nombre',function(staff){
    _AA.staff=staff||[];
    // Populate bloqueo dropdown
    var sel=document.getElementById('aa-bl-personal');
    sel.innerHTML='<option value="">Todos</option>';
    (staff||[]).forEach(function(s){sel.innerHTML+='<option value="'+_e(s.nombre)+'">'+_e(s.nombre)+'</option>';});

    // Load turnos for the week
    _q('aos_horarios_personal','select=id,personal,rol,fecha,sede,hora_inicio,hora_fin,notas,activo&fecha=gte.'+sem[0]+'&fecha=lte.'+sem[6]+'&activo=eq.true&order=personal,fecha',function(turnos){
      _AA.turnos=turnos||[];

      // Load citas for the week
      _q('aos_agenda_citas','select=fecha_cita,hora_cita,estado_cita,sede,asesor,tratamiento,nombre&fecha_cita=gte.'+sem[0]+'&fecha_cita=lte.'+sem[6]+'&limit=500',function(citas){
        _AA.citas=citas||[];
        aaRenderTimeline(sem);
      });
    });
  });
}

function aaNavSem(dir){_AA.semOff+=dir;aaLoadGestion();}
function aaHoy(){_AA.semOff=0;aaLoadGestion();}
function aaFilterRol(rol,el){
  _AA.rolFilter=rol;
  document.querySelectorAll('.aa-pill').forEach(function(p){p.classList.remove('act');});
  el.classList.add('act');
  aaRenderTimeline(aaGetSemana());
}

function aaRenderTimeline(sem){
  var hoy=_hoy();
  var head=document.getElementById('aa-tl-head');
  var body=document.getElementById('aa-tl-body');

  // Header row: empty + 7 days
  var hhtml='<tr><th style="min-width:130px;text-align:left">Personal</th>';
  sem.forEach(function(fecha){
    var d=new Date(fecha+'T12:00:00');
    var isToday=fecha===hoy;
    hhtml+='<th class="'+(isToday?'today':'')+'">'+DS[d.getDay()]+'<br><span style="font-size:12px;font-weight:800">'+(d.getDate())+'</span></th>';
  });
  hhtml+='</tr>';
  head.innerHTML=hhtml;

  // Index turnos and citas
  var tMap={};(_AA.turnos||[]).forEach(function(t){tMap[t.personal+'|'+t.fecha]=t;});
  var cMap={};(_AA.citas||[]).forEach(function(c){var key=c.fecha_cita;if(!cMap[key])cMap[key]=[];cMap[key].push(c);});

  // Filter staff by role
  var staff=(_AA.staff||[]).filter(function(s){
    if(!_AA.rolFilter)return true;
    return s.puesto===_AA.rolFilter;
  });

  // Group by role for section separators
  var roles=['ENFERMERIA','DOCTORA','ASESOR','ADMINISTRADOR'];
  var bhtml='';

  roles.forEach(function(rol){
    var personas=staff.filter(function(s){return s.puesto===rol;});
    if(!personas.length)return;

    personas.forEach(function(p,pi){
      var rolCls=rol==='ENFERMERIA'?'aa-role-enf':rol==='DOCTORA'?'aa-role-doc':rol==='ASESOR'?'aa-role-ase':'';
      bhtml+='<tr><td class="name-col">'+_e(p.nombre)+'<span class="aa-role '+rolCls+'">'+_e(rol.substring(0,3))+'</span></td>';

      sem.forEach(function(fecha){
        var d=new Date(fecha+'T12:00:00');
        var isSun=d.getDay()===0;
        var isToday=fecha===hoy;
        var turno=tMap[p.nombre+'|'+fecha];

        // Count citas for this person on this day
        var dayCitas=(cMap[fecha]||[]).filter(function(c){
          return c.asesor===p.nombre||c.asesor===('SRA '+p.nombre);
        });

        if(isSun){
          bhtml+='<td><div class="aa-sun">DESC.</div></td>';
        }else if(turno){
          var sedeCls=turno.sede==='SAN ISIDRO'?'si':'pl';
          var sedeLabel=turno.sede==='SAN ISIDRO'?'San Isidro':'Pueblo Libre';
          var hIni=(turno.hora_inicio||'').substring(0,5);
          var hFin=(turno.hora_fin||'').substring(0,5);
          bhtml+='<td><div class="aa-block '+sedeCls+'" onclick="aaEditarTurno(\''+_e(turno.id)+'\',\''+_e(p.codigo_asesor)+'\',\''+_e(p.nombre)+'\',\''+_e(p.puesto)+'\',\''+fecha+'\',\''+_e(turno.sede)+'\',\''+hIni+'\',\''+hFin+'\',\''+_e((turno.notas||'').replace(/'/g,''))+'\')">'+
            '<div class="aa-block-sede">'+sedeLabel+'</div>'+
            '<div class="aa-block-hrs">'+hIni+' — '+hFin+'</div>';
          if(turno.notas)bhtml+='<div class="aa-block-note">'+_e(turno.notas)+'</div>';
          // Citas dots
          if(dayCitas.length){
            bhtml+='<div class="aa-block-citas">';
            dayCitas.forEach(function(c){
              var est=(c.estado_cita||'').toUpperCase();
              var cls=est==='PENDIENTE'?'aa-cita-pend':est==='CITA CONFIRMADA'?'aa-cita-conf':(est.indexOf('ASIST')>=0&&est.indexOf('NO')<0)?'aa-cita-asist':est==='NO ASISTIO'?'aa-cita-no':'aa-cita-cancel';
              bhtml+='<div class="aa-block-cita '+cls+'" title="'+_e(c.hora_cita)+' '+_e(c.tratamiento)+' - '+_e(c.nombre)+'"></div>';
            });
            bhtml+='</div>';
          }
          bhtml+='</div></td>';
        }else{
          bhtml+='<td><div class="aa-empty" onclick="aaCrearTurno(\''+_e(p.codigo_asesor)+'\',\''+_e(p.nombre)+'\',\''+_e(p.puesto)+'\',\''+fecha+'\')">+</div></td>';
        }
      });
      bhtml+='</tr>';
    });
  });

  body.innerHTML=bhtml;
}

// ═══════ TURNO CRUD ═══════
function aaCrearTurno(codigo,nombre,puesto,fecha){
  document.getElementById('aa-mt-title').textContent='Nuevo turno';
  document.getElementById('aa-mt-nombre').value=nombre;
  document.getElementById('aa-mt-codigo').value=codigo;
  document.getElementById('aa-mt-puesto').value=puesto;
  document.getElementById('aa-mt-id').value='';
  document.getElementById('aa-mt-fecha').value=fecha;
  document.getElementById('aa-mt-sede').value='SAN ISIDRO';
  document.getElementById('aa-mt-entrada').value=puesto==='DOCTORA'?'14:30':'10:30';
  document.getElementById('aa-mt-salida').value=puesto==='DOCTORA'?'19:30':'20:30';
  document.getElementById('aa-mt-notas').value=puesto==='DOCTORA'?'PROCEDIMIENTO':'Turno Enfermeria';
  document.getElementById('aa-mt-del').style.display='none';
  document.getElementById('aa-mo-turno').classList.add('open');
}

function aaEditarTurno(id,codigo,nombre,puesto,fecha,sede,entrada,salida,notas){
  document.getElementById('aa-mt-title').textContent='Editar turno';
  document.getElementById('aa-mt-nombre').value=nombre;
  document.getElementById('aa-mt-codigo').value=codigo;
  document.getElementById('aa-mt-puesto').value=puesto;
  document.getElementById('aa-mt-id').value=id;
  document.getElementById('aa-mt-fecha').value=fecha;
  document.getElementById('aa-mt-sede').value=sede;
  document.getElementById('aa-mt-entrada').value=entrada;
  document.getElementById('aa-mt-salida').value=salida;
  document.getElementById('aa-mt-notas').value=notas;
  document.getElementById('aa-mt-del').style.display='';
  document.getElementById('aa-mo-turno').classList.add('open');
}

function aaCerrarTurno(){document.getElementById('aa-mo-turno').classList.remove('open');}

function aaGuardarTurno(){
  var nombre=document.getElementById('aa-mt-nombre').value;
  var fecha=document.getElementById('aa-mt-fecha').value;
  var sede=document.getElementById('aa-mt-sede').value;
  var entrada=document.getElementById('aa-mt-entrada').value;
  var salida=document.getElementById('aa-mt-salida').value;
  var notas=document.getElementById('aa-mt-notas').value;
  var puesto=document.getElementById('aa-mt-puesto').value;
  var id=document.getElementById('aa-mt-id').value;
  if(!nombre||!fecha||!sede)return;

  if(id){
    // Update existing
    _rest('aos_horarios_personal?id=eq.'+id,{method:'PATCH',body:JSON.stringify({sede:sede,hora_inicio:entrada,hora_fin:salida,notas:notas||null,ts_actualizado:new Date().toISOString()})})
    .then(function(){aaCerrarTurno();aaLoadGestion();if(window.AOS_showToast)AOS_showToast('Turno actualizado',nombre+' → '+sede,'success');});
  }else{
    // Create new
    _rest('aos_horarios_personal',{method:'POST',body:JSON.stringify({personal:nombre,rol:puesto==='DOCTORA'?'DOCTORA':(puesto==='ASESOR'?'ASESOR':'ENFERMERIA'),fecha:fecha,sede:sede,hora_inicio:entrada,hora_fin:salida,tipo_turno:'NORMAL',notas:notas||null,activo:true,creado_por:'ADMIN_PANEL'})})
    .then(function(r){
      if(r.ok||r.status===201){aaCerrarTurno();aaLoadGestion();if(window.AOS_showToast)AOS_showToast('Turno creado',nombre+' → '+sede+' el '+fecha,'success');}
      else{r.text().then(function(t){console.error('crear turno',t);});}
    });
  }
}

function aaEliminarTurno(){
  var id=document.getElementById('aa-mt-id').value;
  if(!id)return;
  if(!confirm('¿Eliminar este turno?'))return;
  _rest('aos_horarios_personal?id=eq.'+id,{method:'DELETE'})
  .then(function(){aaCerrarTurno();aaLoadGestion();if(window.AOS_showToast)AOS_showToast('Turno eliminado','','');});
}

// ═══════ EVENTOS ═══════
function aaAbrirEvento(){document.getElementById('aa-ev-fecha').value=_hoy();document.getElementById('aa-ev-titulo').value='';document.getElementById('aa-mo-evento').classList.add('open');}
function aaGuardarEvento(){
  var titulo=document.getElementById('aa-ev-titulo').value;var fecha=document.getElementById('aa-ev-fecha').value;
  if(!titulo||!fecha)return;
  _r('aos_guardar_evento',{p_titulo:titulo,p_fecha:fecha,p_hora_inicio:document.getElementById('aa-ev-inicio').value,p_hora_fin:document.getElementById('aa-ev-fin').value,p_tipo:document.getElementById('aa-ev-tipo').value,p_sede:document.getElementById('aa-ev-sede').value||null},function(){
    document.getElementById('aa-mo-evento').classList.remove('open');aaLoadGestion();if(window.AOS_showToast)AOS_showToast('Evento creado',titulo,'success');
  });
}

// ═══════ BLOQUEOS ═══════
function aaAbrirBloqueo(){document.getElementById('aa-bl-inicio').value=_hoy();document.getElementById('aa-bl-fin').value=_hoy();document.getElementById('aa-bl-motivo').value='';document.getElementById('aa-mo-bloqueo').classList.add('open');}
function aaGuardarBloqueo(){
  var inicio=document.getElementById('aa-bl-inicio').value;var fin=document.getElementById('aa-bl-fin').value;
  if(!inicio||!fin)return;
  _r('aos_guardar_bloqueo',{p_tipo:document.getElementById('aa-bl-tipo').value,p_fecha_inicio:inicio,p_fecha_fin:fin,p_nombre:document.getElementById('aa-bl-personal').value||null,p_motivo:document.getElementById('aa-bl-motivo').value||null},function(){
    document.getElementById('aa-mo-bloqueo').classList.remove('open');aaLoadGestion();if(window.AOS_showToast)AOS_showToast('Bloqueo creado','','success');
  });
}

// ═══════ MODALS CLOSE ON OVERLAY ═══════
['aa-mo-turno','aa-mo-evento','aa-mo-bloqueo'].forEach(function(id){var m=document.getElementById(id);if(m)m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});});

// ═══════ INIT ═══════
aaLoadAgenda();
</script>
