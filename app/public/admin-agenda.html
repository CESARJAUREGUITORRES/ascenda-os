<!-- ===== ADMIN AGENDA v5 — COLUMN-BASED BLOCK PLACEMENT ===== -->
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.ag{display:flex;flex-direction:column;height:calc(100vh - 52px);font-family:'DM Sans',sans-serif;overflow:hidden;}
.ag-hdr{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #DDE4F5;flex-shrink:0;gap:6px;flex-wrap:wrap;min-height:38px;}
.ag-title{font-family:'Exo 2',sans-serif;font-weight:800;font-size:16px;color:#071D4A;}
.ag-tabs{display:flex;gap:2px;background:#F0F4FC;border-radius:8px;padding:2px;}
.ag-tab{padding:4px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:none;color:#6B7BA8;background:transparent;font-family:'DM Sans';}
.ag-tab.act{background:#0A4FBF;color:#fff;}
.ag-nav{display:flex;align-items:center;gap:5px;}
.ag-nb{width:24px;height:24px;border-radius:5px;border:1px solid #DDE4F5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#6B7BA8;}.ag-nb:hover{background:#EBF2FF;}
.ag-td{padding:3px 10px;border-radius:5px;border:1px solid #00C9A7;font-size:9px;font-weight:700;color:#00C9A7;cursor:pointer;font-family:'DM Sans';}
.ag-wl{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;color:#071D4A;}
.ag-btn{padding:4px 10px;border-radius:6px;border:none;font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans';}
.ag-bp{background:#00C9A7;color:#fff;}.ag-bs2{background:#F0F4FC;color:#071D4A;border:1px solid #DDE4F5;}
/* Body: main + sidebar */
.ag-body{display:flex;flex:1;overflow:hidden;}
.ag-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* Day header row */
.ag-dh{display:grid;grid-template-columns:40px repeat(7,1fr);border-bottom:1px solid #DDE4F5;flex-shrink:0;}
.ag-dc{text-align:center;padding:6px 2px;border-right:1px solid #F0F4FC;}
.ag-dc:last-child{border-right:none;}
.ag-dow{font-size:9px;font-weight:700;letter-spacing:.5px;color:#9AAAC8;}
.ag-dn{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;color:#071D4A;line-height:1.1;}
.ag-dc.today .ag-dow,.ag-dc.today .ag-dn{color:#00C9A7;}
.ag-dc.sun{background:rgba(220,38,38,.02);}.ag-dc.sun .ag-dow,.ag-dc.sun .ag-dn{color:#DC2626;}
/* Grid area */
.ag-gw{flex:1;overflow-y:auto;overflow-x:hidden;}
.ag-grid{display:grid;grid-template-columns:40px repeat(7,1fr);position:relative;}
.ag-hl{text-align:right;padding:1px 3px 0 0;font-size:8px;color:#9AAAC8;font-weight:600;height:48px;border-bottom:1px solid #F8F9FC;}
/* Day column — this is the key: each column is position:relative so blocks go inside */
.ag-col{border-left:1px solid #F0F4FC;height:48px;border-bottom:1px solid #F8F9FC;position:relative;cursor:pointer;}
.ag-col:hover{background:rgba(10,79,191,.01);}
.ag-col.sun{background:rgba(220,38,38,.015);}
/* Block — now positioned relative to its COLUMN, not the whole grid */
.ag-bk{position:absolute;left:1px;right:1px;border-radius:10px;padding:5px 6px;cursor:pointer;overflow:hidden;z-index:1;transition:box-shadow .12s;}
.ag-bk:hover{box-shadow:0 3px 12px rgba(7,29,74,.1);z-index:2;}
.ag-bk.si{background:rgba(10,79,191,.07);}
.ag-bk.pl{background:rgba(0,201,167,.07);}
.ag-bk-n{font-weight:800;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-bk.si .ag-bk-n{color:#0A4FBF;}.ag-bk.pl .ag-bk-n{color:#00A88A;}
.ag-bk-s{font-size:8px;opacity:.7;}
.ag-bk.si .ag-bk-s{color:#0A4FBF;}.ag-bk.pl .ag-bk-s{color:#00A88A;}
.ag-bk-h{font-size:7px;color:#6B7BA8;margin-top:1px;}
/* Stacked blocks — when multiple in same column */
.ag-bk.w2{left:1px;right:50%;}.ag-bk.w2r{left:50%;right:1px;}
.ag-bk.w3a{left:1px;right:67%;}.ag-bk.w3b{left:33%;right:34%;}.ag-bk.w3c{left:66%;right:1px;}
/* Cita mini cards */
.ag-ci{background:rgba(255,255,255,.85);border-radius:5px;padding:2px 4px;font-size:7px;display:flex;align-items:center;gap:2px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-cd{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.cp{background:#D97706;}.cc{background:#0A4FBF;}.ca{background:#00C9A7;}.cn{background:#DC2626;}.cx{background:#9AAAC8;}
.ag-ci b{font-weight:700;color:#071D4A;}.ag-ci span{color:#6B7BA8;}
/* NOW line */
.ag-now{position:absolute;left:0;right:0;height:2px;background:#DC2626;z-index:4;pointer-events:none;}
.ag-now::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#DC2626;}
/* Sidebar RIGHT */
.ag-side{width:190px;border-left:1px solid #DDE4F5;flex-shrink:0;padding:10px 12px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;background:#FAFBFE;}
.ag-mc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ag-mc-t{font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;color:#071D4A;}
.ag-mc-n{font-size:8px;color:#9AAAC8;cursor:pointer;padding:2px 4px;}
.ag-mc-g{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:8px;line-height:2.2;}
.ag-mc-dw{color:#9AAAC8;font-weight:700;font-size:7px;}
.ag-mc-d{border-radius:3px;cursor:pointer;color:#071D4A;}.ag-mc-d:hover{background:#EBF2FF;}
.ag-mc-d.today{background:#00C9A7;color:#fff;font-weight:800;}.ag-mc-d.inw{background:rgba(0,201,167,.1);color:#00A88A;font-weight:700;}.ag-mc-d.oth{opacity:.3;}
.ag-sec-t{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9AAAC8;margin-bottom:4px;}
.ag-si{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;font-size:10px;font-weight:600;color:#071D4A;cursor:pointer;}.ag-si:hover{background:rgba(10,79,191,.04);}.ag-si.sel{background:rgba(10,79,191,.08);}
.ag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ag-si-sede{margin-left:auto;font-size:7px;font-weight:700;}
.ag-legend{border-top:1px solid #F0F4FC;padding-top:6px;margin-top:auto;}
.ag-legend-t{font-size:7px;font-weight:700;color:#9AAAC8;margin-bottom:4px;}
.ag-legend-i{display:flex;flex-wrap:wrap;gap:5px;font-size:7px;color:#6B7BA8;}
.ag-legend-d{display:flex;align-items:center;gap:2px;}
.ag-af{flex:1;overflow:auto;}
/* Modal */
.ag-mo{display:none;position:fixed;inset:0;background:rgba(7,29,74,.4);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;}.ag-mo.open{display:flex;}
.ag-mm{background:#fff;border-radius:14px;width:min(380px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(7,29,74,.18);}
.ag-mh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #DDE4F5;}
.ag-mtt{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;color:#071D4A;}
.ag-mx{width:24px;height:24px;border-radius:5px;background:#F0F4FC;border:none;cursor:pointer;font-size:13px;color:#6B7BA8;display:flex;align-items:center;justify-content:center;}
.ag-mb{padding:12px 16px;display:flex;flex-direction:column;gap:7px;}
.ag-f label{font-size:8px;font-weight:700;color:#9AAAC8;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:1px;}
.ag-f input,.ag-f select,.ag-f textarea{width:100%;padding:6px 8px;border-radius:7px;border:1px solid #DDE4F5;font-size:10px;font-family:'DM Sans';outline:none;color:#071D4A;}
.ag-f textarea{resize:none;height:40px;}
.ag-mf{display:flex;gap:5px;padding:10px 16px;border-top:1px solid #DDE4F5;}.ag-mf .ag-btn{flex:1;padding:8px;text-align:center;font-size:10px;}
.ag-del{background:none;border:none;color:#DC2626;font-size:9px;font-weight:700;cursor:pointer;}
.ag-ld{display:flex;align-items:center;gap:6px;padding:24px;color:#6B7BA8;font-size:10px;justify-content:center;}
.ag-sp{width:12px;height:12px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:ags .7s linear infinite;}@keyframes ags{to{transform:rotate(360deg)}}
</style>

<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
var G={so:0,mo:0,st:null,tu:null,ci:null,sp:null,sd:null},DS=['DOM','LUN','MAR','MIE','JUE','VIE','SAB'],MS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],HM=9,HX=21,RH=48;
function rpc(f,p,c){fetch(SB+'/rest/v1/rpc/'+f,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(function(d){c(Array.isArray(d)?d[0]:d);}).catch(function(x){console.error(f,x);});}
function q(t,f,c){fetch(SB+'/rest/v1/'+t+'?'+f,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(c).catch(function(x){console.error(t,x);});}
function rest(p,o){return fetch(SB+'/rest/v1/'+p,Object.assign({headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'}},o||{}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function T(t){document.getElementById('at-a').classList.toggle('act',t==='a');document.getElementById('at-g').classList.toggle('act',t==='g');document.getElementById('ap-a').style.display=t==='a'?'':'none';document.getElementById('ap-g').style.display=t==='g'?'flex':'none';document.getElementById('ag-nav').style.display=t==='g'?'flex':'none';if(t==='a')LA();if(t==='g')LG();}

var _al=false;function LA(){if(_al)return;var el=document.getElementById('ap-a');fetch('/agenda.html').then(function(r){return r.text();}).then(function(h){el.innerHTML=h;var sc=el.querySelectorAll('script');var ex=[],il=[];sc.forEach(function(s){if(s.src){var u=s.getAttribute('src');if(u.charAt(0)==='/')u=location.origin+u;ex.push(u);}else if(s.textContent.trim())il.push(s.textContent);s.remove();});function ld(){if(ex.length){var u=ex.shift();if(document.querySelector('script[src="'+u+'"]')){ld();return;}var n=document.createElement('script');n.src=u;n.onload=ld;document.head.appendChild(n);}else if(il.length){var b=new Blob([il.join('\n;\n')],{type:'application/javascript'});var u=URL.createObjectURL(b);var n=document.createElement('script');n.src=u;n.onload=function(){URL.revokeObjectURL(u);};document.head.appendChild(n);}}ld();_al=true;}).catch(function(){});}

function gS(){var d=new Date();d.setDate(d.getDate()-d.getDay()+1+G.so*7);var r=[];for(var i=0;i<7;i++){var dd=new Date(d);dd.setDate(d.getDate()+i);r.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0'));}return r;}
function NS(d){G.so+=d;LG();}
function TD(){G.so=0;LG();}

function LG(){
  var s=gS(),d0=new Date(s[0]+'T12:00:00'),d6=new Date(s[6]+'T12:00:00');
  document.getElementById('ag-wl').textContent=d0.getDate()+' - '+d6.getDate()+' '+MS[d6.getMonth()]+' '+d6.getFullYear();
  q('aos_rrhh','select=codigo_asesor,nombre,puesto&estado=eq.ACTIVO&order=puesto,nombre',function(st){
    G.st=st||[];
    var sel=document.getElementById('mt-p');sel.innerHTML=st.map(function(x){return '<option value="'+esc(x.nombre)+'|'+esc(x.puesto)+'">'+esc(x.nombre)+'</option>';}).join('');
    q('aos_horarios_personal','select=id,personal,rol,fecha,sede,hora_inicio,hora_fin,notas,activo&fecha=gte.'+s[0]+'&fecha=lte.'+s[6]+'&activo=eq.true&order=personal,fecha',function(tu){
      G.tu=tu||[];
      q('aos_agenda_citas','select=id,fecha_cita,hora_cita,estado_cita,sede,asesor,tratamiento,nombre&fecha_cita=gte.'+s[0]+'&fecha_cita=lte.'+s[6]+'&limit=500',function(ci){
        G.ci=ci||[];
        rpc('aos_sede_personal_hoy',{p_fecha:hoy()},function(sd){G.sd=sd||{};RDH(s);RG(s);RSL();RMC();});
      });
    });
  });
}

function RDH(s){
  var h=hoy(),html='<div style="border-right:1px solid #F0F4FC"></div>';
  s.forEach(function(f){var d=new Date(f+'T12:00:00'),isSun=d.getDay()===0,isToday=f===h;
    html+='<div class="ag-dc'+(isToday?' today':'')+(isSun?' sun':'')+'"><div class="ag-dow">'+DS[d.getDay()]+'</div><div class="ag-dn">'+d.getDate()+'</div>';
    if(isToday)html+='<div style="font-size:6px;color:#00C9A7;font-weight:700">HOY</div>';
    html+='</div>';});
  document.getElementById('ag-dh').innerHTML=html;
}

// ═══════ KEY FIX: COLUMN-BASED RENDERING ═══════
function RG(sem){
  var gw=document.getElementById('ag-gw');if(!gw)return;
  var h=hoy(),hrs=[];for(var i=HM;i<=HX;i++)hrs.push(i);
  var totalH=(HX-HM+1)*RH;

  var tD={};(G.tu||[]).forEach(function(t){if(G.sp&&t.personal!==G.sp)return;if(!tD[t.fecha])tD[t.fecha]=[];tD[t.fecha].push(t);});
  var cD={};(G.ci||[]).forEach(function(c){if(!cD[c.fecha_cita])cD[c.fecha_cita]=[];cD[c.fecha_cita].push(c);});

  // Build grid: hour labels column + 7 day columns
  // Each day column is a single tall div with position:relative
  var html='<div style="display:grid;grid-template-columns:40px repeat(7,1fr)">';

  // Hour labels column
  html+='<div>';
  hrs.forEach(function(hr){
    var lbl=hr>12?(hr-12)+':00':(hr===12?'12:00':hr+':00');
    html+='<div class="ag-hl">'+lbl+'</div>';
  });
  html+='</div>';

  // 7 day columns — each is position:relative with blocks INSIDE
  sem.forEach(function(f,di){
    var d=new Date(f+'T12:00:00'),isSun=d.getDay()===0;
    var dt=tD[f]||[],dc=cD[f]||[];
    var bc=dt.length;

    html+='<div style="position:relative;border-left:1px solid #F0F4FC;'+(isSun?'background:rgba(220,38,38,.015)':'')+'">';

    // Hour grid lines
    hrs.forEach(function(hr){
      html+='<div style="height:'+RH+'px;border-bottom:1px solid #F8F9FC;cursor:pointer" onclick="OT(null,\''+f+'\','+hr+')"></div>';
    });

    // Turno blocks positioned inside this column
    dt.forEach(function(t,ti){
      var hi=parseInt(t.hora_inicio)||10,mi=parseInt((t.hora_inicio||'').split(':')[1])||0;
      var hf=parseInt(t.hora_fin)||20,mf=parseInt((t.hora_fin||'').split(':')[1])||0;
      var sd=hi+mi/60,ed=hf+mf/60;
      var top=((sd-HM)*RH)+'px',height=((ed-sd)*RH)+'px';
      var sc=t.sede==='SAN ISIDRO'?'si':'pl';
      var sl=t.sede==='SAN ISIDRO'?'S. Isidro':'P. Libre';

      // Width class for stacking
      var wCls='';
      if(bc===2)wCls=ti===0?' w2':' w2r';
      else if(bc>=3)wCls=ti===0?' w3a':ti===1?' w3b':' w3c';

      var pc=dc.filter(function(c){return c.asesor===t.personal||c.asesor===('SRA '+t.personal);});

      html+='<div class="ag-bk '+sc+wCls+'" style="top:'+top+';height:'+height+'" onclick="event.stopPropagation();ET(\''+t.id+'\',\''+esc(t.personal)+'\',\''+esc(t.rol)+'\',\''+t.fecha+'\',\''+esc(t.sede)+'\',\''+(t.hora_inicio||'').substring(0,5)+'\',\''+(t.hora_fin||'').substring(0,5)+'\',\''+esc((t.notas||'').replace(/'/g,''))+'\')">';
      html+='<div class="ag-bk-n">'+esc(t.personal)+'</div>';
      html+='<div class="ag-bk-s">'+sl+'</div>';
      html+='<div class="ag-bk-h">'+(t.hora_inicio||'').substring(0,5)+' - '+(t.hora_fin||'').substring(0,5)+'</div>';
      if(pc.length){
        html+='<div style="margin-top:3px;display:flex;flex-direction:column;gap:1px">';
        pc.slice(0,5).forEach(function(c){
          var es=(c.estado_cita||'').toUpperCase();
          var dotC=es==='PENDIENTE'?'cp':es==='CITA CONFIRMADA'?'cc':(es.indexOf('ASIST')>=0&&es.indexOf('NO')<0)?'ca':es==='NO ASISTIO'?'cn':'cx';
          html+='<div class="ag-ci"><div class="ag-cd '+dotC+'"></div><b>'+(c.hora_cita||'').substring(0,5)+'</b> <span>'+esc(c.nombre||'')+'</span></div>';
        });
        if(pc.length>5)html+='<div style="font-size:6px;color:#9AAAC8">+'+(pc.length-5)+' mas</div>';
        html+='</div>';
      }
      html+='</div>';
    });

    // NOW line inside today column
    if(f===h){
      var nH=new Date().getHours()+new Date().getMinutes()/60;
      if(nH>=HM&&nH<=HX+1)html+='<div class="ag-now" style="top:'+((nH-HM)*RH)+'px"></div>';
    }

    html+='</div>';
  });

  html+='</div>';
  gw.innerHTML=html;
  gw.scrollTop=RH*1.5;
}

function RSL(){
  var el=document.getElementById('ag-sl');if(!el)return;
  var roles=[{t:'ENFERMERIA',c:'#00C9A7'},{t:'DOCTORA',c:'#0A4FBF'},{t:'ASESOR',c:'#D97706'},{t:'ADMINISTRADOR',c:'#7C3AED'}];
  var html='';
  roles.forEach(function(r){
    var people=(G.st||[]).filter(function(s){return s.puesto===r.t;});if(!people.length)return;
    html+='<div style="margin-bottom:8px"><div class="ag-sec-t">'+esc(r.t==='ENFERMERIA'?'Enfermeria':r.t==='DOCTORA'?'Doctoras':r.t==='ASESOR'?'Asesores':'Admin')+'</div>';
    people.forEach(function(p){
      var sede=G.sd[p.nombre]||'';var ss=sede==='SAN ISIDRO'?'S.I.':sede==='PUEBLO LIBRE'?'P.L.':'';
      var scol=sede==='SAN ISIDRO'?'#0A4FBF':'#00A88A';
      html+='<div class="ag-si'+(G.sp===p.nombre?' sel':'')+'" onclick="SP(\''+esc(p.nombre)+'\')"><div class="ag-dot" style="background:'+r.c+'"></div>'+esc(p.nombre);
      if(ss)html+='<span class="ag-si-sede" style="color:'+scol+'">'+ss+'</span>';
      html+='</div>';});
    html+='</div>';});
  el.innerHTML=html;
}
function SP(n){G.sp=G.sp===n?null:n;RSL();RG(gS());}

function RMC(){
  var el=document.getElementById('ag-mc');if(!el)return;
  var now=new Date();now.setMonth(now.getMonth()+G.mo);var y=now.getFullYear(),m=now.getMonth(),f=new Date(y,m,1),l=new Date(y,m+1,0),sw=f.getDay();var sem=gS(),h=hoy();
  var html='<div class="ag-mc-h"><span class="ag-mc-n" onclick="G.mo--;RMC()">&#9664;</span><span class="ag-mc-t">'+MS[m]+' '+y+'</span><span class="ag-mc-n" onclick="G.mo++;RMC()">&#9654;</span></div><div class="ag-mc-g">';
  ['D','L','M','M','J','V','S'].forEach(function(d){html+='<div class="ag-mc-dw">'+d+'</div>';});
  for(var i=0;i<sw;i++)html+='<div class="ag-mc-d oth"></div>';
  for(var d=1;d<=l.getDate();d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var c='ag-mc-d';if(ds===h)c+=' today';else if(sem.indexOf(ds)>=0)c+=' inw';html+='<div class="'+c+'" onclick="GD(\''+ds+'\')">'+d+'</div>';}
  html+='</div>';el.innerHTML=html;
}
function GD(ds){var d=new Date(ds+'T12:00:00'),t=new Date();t.setHours(12,0,0,0);var mn=new Date(d);mn.setDate(mn.getDate()-mn.getDay()+1);var tm=new Date(t);tm.setDate(tm.getDate()-tm.getDay()+1);G.so=Math.round((mn-tm)/(7*86400000));LG();}

function OT(id,f,hr){
  document.getElementById('mt-t').textContent=id?'Editar turno':'Nuevo turno';
  document.getElementById('mt-id').value=id||'';
  document.getElementById('mt-f').value=f||hoy();
  if(hr!==undefined&&hr!==null){document.getElementById('mt-i').value=String(hr).padStart(2,'0')+':00';document.getElementById('mt-e').value=String(Math.min(hr+10,21)).padStart(2,'0')+':00';}
  document.getElementById('mt-n').value='';document.getElementById('mt-d').style.display=id?'':'none';
  document.getElementById('m-t').classList.add('open');
}
function ET(id,nm,rl,f,sd,i,en,nt){
  document.getElementById('mt-t').textContent='Editar turno';document.getElementById('mt-id').value=id;
  var sel=document.getElementById('mt-p');for(var x=0;x<sel.options.length;x++){if(sel.options[x].value.indexOf(nm)===0){sel.selectedIndex=x;break;}}
  document.getElementById('mt-f').value=f;document.getElementById('mt-s').value=sd;
  document.getElementById('mt-i').value=i;document.getElementById('mt-e').value=en;
  document.getElementById('mt-n').value=nt;document.getElementById('mt-d').style.display='';
  document.getElementById('m-t').classList.add('open');
}
function CT(){document.getElementById('m-t').classList.remove('open');}
function ST(){
  var pv=document.getElementById('mt-p').value,pts=pv.split('|'),nm=pts[0],pu=pts[1]||'ENFERMERIA';
  var f=document.getElementById('mt-f').value,sd=document.getElementById('mt-s').value;
  var i=document.getElementById('mt-i').value,en=document.getElementById('mt-e').value;
  var nt=document.getElementById('mt-n').value,id=document.getElementById('mt-id').value;
  if(!nm||!f)return;var rl=pu==='DOCTORA'?'DOCTORA':(pu==='ASESOR'?'ASESOR':'ENFERMERIA');
  if(id){rest('aos_horarios_personal?id=eq.'+id,{method:'PATCH',body:JSON.stringify({personal:nm,rol:rl,sede:sd,hora_inicio:i,hora_fin:en,notas:nt||null,ts_actualizado:new Date().toISOString()})}).then(function(){CT();LG();if(window.AOS_showToast)AOS_showToast('Turno actualizado',nm,'success');});}
  else{rest('aos_horarios_personal',{method:'POST',body:JSON.stringify({personal:nm,rol:rl,fecha:f,sede:sd,hora_inicio:i,hora_fin:en,tipo_turno:'NORMAL',notas:nt||null,activo:true,creado_por:'ADMIN_PANEL'})}).then(function(r){if(r.ok||r.status===201){CT();LG();if(window.AOS_showToast)AOS_showToast('Turno creado',nm+' - '+sd,'success');}});}
}
function DT(){var id=document.getElementById('mt-id').value;if(!id||!confirm('Eliminar turno?'))return;rest('aos_horarios_personal?id=eq.'+id,{method:'DELETE'}).then(function(){CT();LG();});}
function OE(){document.getElementById('me-f').value=hoy();document.getElementById('me-t').value='';document.getElementById('m-e').classList.add('open');}
function SE(){var t=document.getElementById('me-t').value,f=document.getElementById('me-f').value;if(!t||!f)return;rpc('aos_guardar_evento',{p_titulo:t,p_fecha:f,p_hora_inicio:document.getElementById('me-i').value,p_hora_fin:document.getElementById('me-e').value,p_tipo:document.getElementById('me-tp').value,p_sede:document.getElementById('me-sd').value||null},function(){document.getElementById('m-e').classList.remove('open');LG();if(window.AOS_showToast)AOS_showToast('Evento creado',t,'success');});}
LA();
</script>
