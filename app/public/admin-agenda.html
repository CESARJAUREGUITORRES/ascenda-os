<!-- ===== ADMIN AGENDA v3 — GOOGLE CALENDAR STYLE ===== -->
<style>
*{box-sizing:border-box;}
.ag{display:flex;flex-direction:column;height:calc(100vh - 52px);font-family:'DM Sans',sans-serif;overflow:hidden;}
.ag-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #DDE4F5;flex-shrink:0;}
.ag-title{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;color:#0D1B3E;}
.ag-tabs{display:flex;gap:3px;background:#F0F4FC;border-radius:10px;padding:3px;}
.ag-tab{padding:6px 18px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;color:#6B7BA8;background:transparent;font-family:'DM Sans',sans-serif;transition:all .12s;}
.ag-tab.act{background:#0A4FBF;color:#fff;}
.ag-nav{padding:6px 14px;display:flex;align-items:center;justify-content:space-between;gap:6px;border-bottom:1px solid #F0F4FC;flex-shrink:0;flex-wrap:wrap;}
.ag-nb{width:26px;height:26px;border-radius:6px;border:1px solid #DDE4F5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#0D1B3E;}.ag-nb:hover{background:#EBF2FF;}
.ag-td{padding:3px 10px;border-radius:6px;border:1px solid #00C9A7;font-size:9px;font-weight:700;cursor:pointer;color:#00C9A7;background:rgba(0,201,167,.05);font-family:'DM Sans';}
.ag-wl{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;min-width:180px;text-align:center;}
.ag-pills{display:flex;gap:3px;}
.ag-pill{padding:3px 9px;border-radius:14px;font-size:8px;font-weight:700;cursor:pointer;border:1.5px solid #DDE4F5;background:#fff;color:#6B7BA8;letter-spacing:.3px;text-transform:uppercase;transition:all .12s;}
.ag-pill.act{border-color:transparent;}
.ag-pill[data-r="all"].act{background:#0D1B3E;color:#fff;border-color:#0D1B3E;}
.ag-pill[data-r="ENFERMERIA"].act{background:rgba(0,201,167,.1);color:#00A88A;border-color:#00C9A7;}
.ag-pill[data-r="DOCTORA"].act{background:rgba(10,79,191,.08);color:#0A4FBF;border-color:#0A4FBF;}
.ag-pill[data-r="ASESOR"].act{background:rgba(217,119,6,.08);color:#D97706;border-color:#D97706;}
.ag-pill[data-r="ADMINISTRADOR"].act{background:rgba(124,58,237,.08);color:#7C3AED;border-color:#7C3AED;}
.ag-btn{padding:4px 10px;border-radius:6px;border:none;font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans';}.ag-bp{background:#0A4FBF;color:#fff;}.ag-bc{background:#00C9A7;color:#fff;}.ag-bs{background:#F0F4FC;color:#0D1B3E;border:1px solid #DDE4F5;}
.ag-body{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
.ag-side{width:190px;border-right:1px solid #DDE4F5;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;background:#FAFBFE;}
.ag-ss{padding:10px;border-bottom:1px solid #F0F4FC;}
.ag-st{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9AAAC8;margin-bottom:5px;}
.ag-si{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;color:#0D1B3E;transition:background .1s;}
.ag-si:hover{background:rgba(10,79,191,.04);}.ag-si.sel{background:rgba(10,79,191,.08);}
.ag-sd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.de{background:#00C9A7;}.dd{background:#0A4FBF;}.da{background:#D97706;}.dm{background:#7C3AED;}
.ag-ss-sede{font-size:7px;color:#9AAAC8;margin-left:auto;}
/* Mini cal */
.ag-mc{font-size:8px;text-align:center;}
.ag-mc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.ag-mc-t{font-weight:800;font-size:10px;color:#0D1B3E;}
.ag-mc-n{width:16px;height:16px;border-radius:3px;border:1px solid #DDE4F5;background:#fff;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;}
.ag-mc-g{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
.ag-mc-dw{font-weight:700;color:#9AAAC8;padding:2px 0;font-size:7px;}
.ag-mc-d{padding:2px 0;border-radius:3px;cursor:pointer;color:#0D1B3E;font-weight:500;}.ag-mc-d:hover{background:#EBF2FF;}
.ag-mc-d.today{background:#00C9A7;color:#fff;font-weight:800;}.ag-mc-d.inw{background:rgba(10,79,191,.06);font-weight:700;}.ag-mc-d.oth{color:#D0D5E0;}
/* Calendar */
.ag-cal{flex:1;overflow:auto;position:relative;}
.ag-dh{display:grid;position:sticky;top:0;z-index:3;background:#fff;border-bottom:2px solid #DDE4F5;}
.ag-dc{padding:5px 3px;text-align:center;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#9AAAC8;}
.ag-dc.tod{color:#00C9A7;border-bottom:2px solid #00C9A7;margin-bottom:-2px;}
.ag-dn{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;color:#0D1B3E;line-height:1;}.ag-dc.tod .ag-dn{color:#00C9A7;}
.ag-hr{display:grid;min-height:48px;border-bottom:1px solid #F5F6FA;}
.ag-hl{padding:1px 4px 0 0;text-align:right;font-size:8px;color:#9AAAC8;font-weight:600;width:38px;}
.ag-hc{border-left:1px solid #F0F4FC;position:relative;min-height:48px;cursor:pointer;}.ag-hc:hover{background:rgba(10,79,191,.015);}
/* Blocks */
.ag-bk{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 4px;overflow:hidden;cursor:pointer;z-index:1;font-size:7px;line-height:1.2;transition:box-shadow .1s;}
.ag-bk:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:2;}
.ag-bk.si{background:rgba(10,79,191,.1);border-left:3px solid #0A4FBF;}
.ag-bk.pl{background:rgba(0,201,167,.1);border-left:3px solid #00C9A7;}
.ag-bn{font-weight:800;font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-bk.si .ag-bn{color:#0A4FBF;}.ag-bk.pl .ag-bn{color:#00C9A7;}
.ag-bi{color:#6B7BA8;font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-ct{display:flex;align-items:center;gap:2px;padding:1px 3px;border-radius:2px;margin-top:1px;font-size:6px;font-weight:600;background:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-cd{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.cp{background:#D97706;}.cc{background:#0A4FBF;}.ca{background:#00C9A7;}.cn{background:#DC2626;}.cx{background:#9AAAC8;}
.ag-now{position:absolute;left:38px;right:0;height:2px;background:#DC2626;z-index:4;pointer-events:none;}.ag-now::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#DC2626;}
.ag-af{flex:1;overflow:auto;}
/* Modal */
.ag-mo{display:none;position:fixed;inset:0;background:rgba(7,29,74,.4);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
.ag-mo.open{display:flex;}
.ag-mm{background:#fff;border-radius:14px;width:min(380px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(7,29,74,.18);}
.ag-mh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #DDE4F5;}
.ag-mt{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;}
.ag-mx{width:24px;height:24px;border-radius:5px;background:#F0F4FC;border:none;cursor:pointer;font-size:14px;color:#6B7BA8;display:flex;align-items:center;justify-content:center;}
.ag-mb{padding:12px 16px;display:flex;flex-direction:column;gap:7px;}
.ag-f label{font-size:8px;font-weight:700;color:#9AAAC8;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:1px;}
.ag-f input,.ag-f select,.ag-f textarea{width:100%;padding:6px 8px;border-radius:6px;border:1px solid #DDE4F5;font-size:10px;font-family:'DM Sans';outline:none;color:#0D1B3E;}
.ag-f textarea{resize:none;height:38px;}
.ag-mf{display:flex;gap:5px;padding:10px 16px;border-top:1px solid #DDE4F5;}
.ag-mf .ag-btn{flex:1;padding:8px;text-align:center;}
.ag-del{background:none;border:none;color:#DC2626;font-size:9px;font-weight:700;cursor:pointer;padding:2px 5px;}
.ag-ld{display:flex;align-items:center;gap:8px;padding:20px;color:#6B7BA8;font-size:11px;justify-content:center;}
.ag-sp{width:14px;height:14px;border:2px solid #EBF2FF;border-top-color:#0A4FBF;border-radius:50%;animation:agsp .7s linear infinite;}@keyframes agsp{to{transform:rotate(360deg)}}
</style>

function gD(ds){var d=new Date(ds+'T12:00:00');var t=new Date();t.setHours(12,0,0,0);var mn=new Date(d);mn.setDate(mn.getDate()-mn.getDay()+1);var tm=new Date(t);tm.setDate(tm.getDate()-tm.getDay()+1);G.so=Math.round((mn-tm)/(7*86400000));lG();}
// ═══════ RENDER CALENDAR ═══════
function rC(sem){
  var cl=document.getElementById('ag-cl');if(!cl)return;var hoy=_h();var hrs=[];for(var h=HM;h<=HX;h++)hrs.push(h);
  var tD={};(G.tu||[]).forEach(function(t){if(G.rf&&t.rol!==G.rf)return;if(G.sp&&t.personal!==G.sp)return;if(!tD[t.fecha])tD[t.fecha]=[];tD[t.fecha].push(t);});
  var cD={};(G.ci||[]).forEach(function(c){if(!cD[c.fecha_cita])cD[c.fecha_cita]=[];cD[c.fecha_cita].push(c);});
  // Header
  var html='<div class="ag-dh" style="grid-template-columns:38px repeat(7,1fr)">';
  html+='<div></div>';
  sem.forEach(function(f){var d=new Date(f+'T12:00:00');html+='<div class="ag-dc'+(f===hoy?' tod':'')+'">'+DS[d.getDay()]+'<div class="ag-dn">'+d.getDate()+'</div></div>';});
  html+='</div><div style="position:relative">';
  // Hour rows
  hrs.forEach(function(h){
    var hs=h>12?(h-12)+'p':(h===12?'12p':h+'a');
    html+='<div class="ag-hr" style="display:grid;grid-template-columns:38px repeat(7,1fr);min-height:'+RH+'px"><div class="ag-hl">'+hs+'</div>';
    sem.forEach(function(f){var d=new Date(f+'T12:00:00');html+='<div class="ag-hc" data-f="'+f+'" data-h="'+h+'" onclick="oT(\''+f+'\','+h+')"'+(d.getDay()===0?' style="background:rgba(220,38,38,.02)"':'')+'></div>';});
    html+='</div>';
  });
  // Turno blocks
  sem.forEach(function(f,di){
    var dt=tD[f]||[];var dc=cD[f]||[];var bc=dt.length;
    dt.forEach(function(t,ti){
      var hi=parseInt(t.hora_inicio)||10,mi=parseInt((t.hora_inicio||'').split(':')[1])||0;
      var hf=parseInt(t.hora_fin)||20,mf=parseInt((t.hora_fin||'').split(':')[1])||0;
      var sd=hi+mi/60,ed=hf+mf/60;
      var top=((sd-HM)*RH)+'px',height=((ed-sd)*RH)+'px';
      var sc=t.sede==='SAN ISIDRO'?'si':'pl';
      var sl=t.sede==='SAN ISIDRO'?'S. Isidro':'P. Libre';
      var bw=bc>1?(100/bc)+'%':'100%',bl=bc>1?(ti*100/bc)+'%':'0';
      var pc=dc.filter(function(c){return c.asesor===t.personal||c.asesor===('SRA '+t.personal);});
      html+='<div class="ag-bk '+sc+'" style="top:'+top+';height:'+height+';left:calc(38px + '+di+' * ((100% - 38px)/7) + '+bl+');width:calc((100% - 38px)/7 * '+(1/bc)+' - 3px)" onclick="event.stopPropagation();eT(\''+t.id+'\',\''+_e(t.personal)+'\',\''+_e(t.rol)+'\',\''+t.fecha+'\',\''+_e(t.sede)+'\',\''+(t.hora_inicio||'').substring(0,5)+'\',\''+(t.hora_fin||'').substring(0,5)+'\',\''+_e((t.notas||'').replace(/'/g,''))+'\')"><div class="ag-bn">'+_e(t.personal)+'</div><div class="ag-bi">'+sl+' · '+(t.hora_inicio||'').substring(0,5)+'-'+(t.hora_fin||'').substring(0,5)+'</div>';
      pc.slice(0,5).forEach(function(c){var es=(c.estado_cita||'').toUpperCase();var dc2=es==='PENDIENTE'?'cp':es==='CITA CONFIRMADA'?'cc':(es.indexOf('ASIST')>=0&&es.indexOf('NO')<0)?'ca':es==='NO ASISTIO'?'cn':'cx';html+='<div class="ag-ct"><div class="ag-cd '+dc2+'"></div>'+(c.hora_cita||'').substring(0,5)+' '+_e(c.nombre||'')+'</div>';});
      if(pc.length>5)html+='<div class="ag-ct" style="color:#9AAAC8">+'+(pc.length-5)+' más</div>';
      html+='</div>';
    });
  });
  // Now marker
  var nH=new Date().getHours()+new Date().getMinutes()/60;
  if(sem.indexOf(hoy)>=0&&nH>=HM&&nH<=HX+1)html+='<div class="ag-now" style="top:'+((nH-HM)*RH)+'px"></div>';
  html+='</div>';cl.innerHTML=html;
}
// ═══════ TURNO CRUD ═══════
function oT(f,h){var d=new Date(f+'T12:00:00');if(d.getDay()===0)return;document.getElementById('mt-t').textContent='Nuevo turno';document.getElementById('mt-id').value='';document.getElementById('mt-f').value=f;document.getElementById('mt-i').value=String(h).padStart(2,'0')+':00';document.getElementById('mt-e').value=String(Math.min(h+10,21)).padStart(2,'0')+':00';document.getElementById('mt-n').value='';document.getElementById('mt-d').style.display='none';document.getElementById('m-t').classList.add('open');}
function eT(id,nm,rl,f,sd,i,e,nt){document.getElementById('mt-t').textContent='Editar turno';document.getElementById('mt-id').value=id;var sel=document.getElementById('mt-p');for(var x=0;x<sel.options.length;x++){if(sel.options[x].value.indexOf(nm)===0){sel.selectedIndex=x;break;}}document.getElementById('mt-f').value=f;document.getElementById('mt-s').value=sd;document.getElementById('mt-i').value=i;document.getElementById('mt-e').value=e;document.getElementById('mt-n').value=nt;document.getElementById('mt-d').style.display='';document.getElementById('m-t').classList.add('open');}
function cT(){document.getElementById('m-t').classList.remove('open');}
function sT(){var pv=document.getElementById('mt-p').value;var pts=pv.split('|');var nm=pts[0],pu=pts[1]||'ENFERMERIA';var f=document.getElementById('mt-f').value,sd=document.getElementById('mt-s').value,i=document.getElementById('mt-i').value,e=document.getElementById('mt-e').value,nt=document.getElementById('mt-n').value,id=document.getElementById('mt-id').value;if(!nm||!f)return;var rl=pu==='DOCTORA'?'DOCTORA':(pu==='ASESOR'?'ASESOR':'ENFERMERIA');
  if(id){_p('aos_horarios_personal?id=eq.'+id,{method:'PATCH',body:JSON.stringify({personal:nm,rol:rl,sede:sd,hora_inicio:i,hora_fin:e,notas:nt||null,ts_actualizado:new Date().toISOString()})}).then(function(){cT();lG();if(window.AOS_showToast)AOS_showToast('Turno actualizado',nm,'success');});}
  else{_p('aos_horarios_personal',{method:'POST',body:JSON.stringify({personal:nm,rol:rl,fecha:f,sede:sd,hora_inicio:i,hora_fin:e,tipo_turno:'NORMAL',notas:nt||null,activo:true,creado_por:'ADMIN_PANEL'})}).then(function(r){if(r.ok||r.status===201){cT();lG();if(window.AOS_showToast)AOS_showToast('Turno creado',nm+' → '+sd,'success');}});}}
function dT(){var id=document.getElementById('mt-id').value;if(!id||!confirm('¿Eliminar turno?'))return;_p('aos_horarios_personal?id=eq.'+id,{method:'DELETE'}).then(function(){cT();lG();});}
// Eventos/Bloqueos
function agAE(){document.getElementById('me-f').value=_h();document.getElementById('me-t').value='';document.getElementById('m-e').classList.add('open');}
function sE(){var t=document.getElementById('me-t').value,f=document.getElementById('me-f').value;if(!t||!f)return;_r('aos_guardar_evento',{p_titulo:t,p_fecha:f,p_hora_inicio:document.getElementById('me-i').value,p_hora_fin:document.getElementById('me-e').value,p_tipo:document.getElementById('me-tp').value,p_sede:document.getElementById('me-sd').value||null},function(){document.getElementById('m-e').classList.remove('open');lG();if(window.AOS_showToast)AOS_showToast('Evento creado',t,'success');});}
function agAB(){document.getElementById('mb-i').value=_h();document.getElementById('mb-e').value=_h();document.getElementById('mb-m').value='';document.getElementById('m-b').classList.add('open');}
function sB(){var i=document.getElementById('mb-i').value,e=document.getElementById('mb-e').value;if(!i||!e)return;_r('aos_guardar_bloqueo',{p_tipo:document.getElementById('mb-tp').value,p_fecha_inicio:i,p_fecha_fin:e,p_nombre:document.getElementById('mb-p').value||null,p_motivo:document.getElementById('mb-m').value||null},function(){document.getElementById('m-b').classList.remove('open');lG();if(window.AOS_showToast)AOS_showToast('Bloqueo creado','','success');});}
// Init
lA();
</script>
