<!-- ═══ ASESOR COORD v2 — PRO DESIGN ═══ -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
.A{display:flex;height:calc(100vh - 52px);font-family:'DM Sans',sans-serif;overflow:hidden;background:#f7f8fc}
.AL{width:240px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0}
.ALh{padding:16px;font-family:'Exo 2',sans-serif;font-weight:800;font-size:16px;color:#071D4A;border-bottom:1px solid #f0f4fc}
.ALl{flex:1;overflow-y:auto;padding:4px 0}
.AC{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.AC:hover{background:#f8faff}.AC.act{background:#eef2ff;border-left-color:#00C9A7}
.ACa{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.ACi{flex:1;min-width:0}
.ACn{font-weight:700;font-size:12px;color:#0f172a}.ACr{font-size:9px;color:#94a3b8;margin-top:1px}
.ACm{font-size:10px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ACt{font-size:8px;color:#cbd5e1}
.ACu{background:#00C9A7;color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.AM{flex:1;display:flex;flex-direction:column;min-width:0}
.AMh{padding:12px 20px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-shrink:0}
.AMn{font-family:'Exo 2',sans-serif;font-weight:800;font-size:14px;color:#071D4A}
.AMs{font-size:10px;color:#00C9A7;font-weight:600}
.AMb{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:2px;background:linear-gradient(180deg,#f0f2f8,#e8ecf5)}
.AMd{align-self:center;background:rgba(15,23,42,.06);color:#64748b;font-size:9px;font-weight:700;padding:4px 14px;border-radius:14px;margin:10px 0}
.Am{max-width:70%;display:flex;gap:8px;margin:3px 0}
.Am.me{align-self:flex-end;flex-direction:row-reverse}.Am.th{align-self:flex-start}
.Ama{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;color:#fff;flex-shrink:0;margin-top:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.Am.me .Ama{display:none}
.Amc{padding:10px 14px;font-size:12px;line-height:1.55;word-wrap:break-word}
.Am.me .Amc{background:#00C9A7;color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 1px 3px rgba(0,201,167,.2)}
.Am.th .Amc{background:#fff;color:#0f172a;border-radius:18px 18px 18px 4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.Amt{font-size:8px;margin-top:3px}.Am.me .Amt{color:rgba(255,255,255,.5);text-align:right}.Am.th .Amt{color:#94a3b8}
.AMf{padding:12px 20px;background:#fff;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:10px}
.AMf input{flex:1;padding:12px 18px;border-radius:26px;border:1.5px solid #e5e7eb;font-size:12px;font-family:'DM Sans';outline:none;color:#0f172a;background:#f7f8fc;transition:all .2s}.AMf input:focus{border-color:#00C9A7;background:#fff;box-shadow:0 0 0 4px rgba(0,201,167,.08)}
.ASend{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#00C9A7,#00A88A);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,201,167,.3)}.ASend:hover{transform:scale(1.05)}
.AEmpty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#f0f2f8;color:#94a3b8}
/* RIGHT */
.AR{width:320px;background:#fff;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ARh{padding:10px 14px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
.ARtabs{display:flex;gap:2px;background:#f0f4fc;border-radius:10px;padding:3px}
.ARt{padding:5px 14px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;border:none;color:#94a3b8;background:transparent;font-family:'DM Sans'}.ARt.act{background:#071D4A;color:#fff}
.ATl{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.ATc{background:#fff;border-radius:14px;padding:12px 14px;border:1px solid #f0f4fc;box-shadow:0 1px 4px rgba(0,0,0,.03);transition:all .12s}
.ATc:hover{box-shadow:0 3px 12px rgba(0,0,0,.06)}
.ATt{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ATtn{font-weight:700;font-size:12px;color:#0f172a}
.ATest{padding:3px 8px;border-radius:10px;font-size:8px;font-weight:700}
.ATep{background:rgba(217,119,6,.08);color:#d97706}.ATee{background:rgba(10,79,191,.08);color:#0A4FBF}.ATev{background:rgba(220,38,38,.08);color:#dc2626}
.ATi{font-size:9px;color:#94a3b8;margin-bottom:6px}
.ATck{display:flex;flex-direction:column;gap:2px}
.ATci{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11px;color:#0f172a;border-bottom:1px solid #f8fafc;cursor:pointer}.ATci.dn{text-decoration:line-through;opacity:.4}
.ATci input{width:16px;height:16px;accent-color:#00C9A7;cursor:pointer}
.ATbar{display:flex;gap:2px;margin-top:4px}.ATseg{height:4px;border-radius:2px;flex:1}
.ATpct{font-size:8px;color:#94a3b8;margin-top:2px}
.ATbtn{display:flex;gap:4px;margin-top:8px}
.AB{padding:5px 12px;border-radius:8px;border:none;font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans'}.ABp{background:#0A4FBF;color:#fff}.ABg{background:#00C9A7;color:#fff}.ABs{background:#f0f4fc;color:#475569}
/* Notifs */
.ANl{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.ANc{padding:12px;border-radius:12px;border:1px solid #f0f4fc;background:#fff;display:flex;gap:10px;cursor:pointer}.ANc.unr{border-color:rgba(0,201,167,.2);background:rgba(0,201,167,.02)}
.ANi{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.Ani{background:rgba(10,79,191,.06);color:#0A4FBF}.Anw{background:rgba(217,119,6,.06);color:#d97706}.Ana{background:rgba(220,38,38,.06);color:#dc2626}
</style>

<div class="A">
  <div class="AL"><div class="ALh">Mensajes</div><div class="ALl" id="aCL"></div></div>
  <div class="AM" id="aChat"><div class="AEmpty"><div style="width:60px;height:60px;border-radius:50%;background:rgba(0,201,167,.06);display:flex;align-items:center;justify-content:center"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.9 9.9 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round"/></svg></div><div style="font-size:14px;font-weight:700;color:#475569">Selecciona un chat</div></div></div>
  <div class="AR">
    <div class="ARh"><div class="ARtabs"><button class="ARt act" id="art-t" onclick="aRT('t')">Mis tareas</button><button class="ARt" id="art-n" onclick="aRT('n')">Notifs</button></div></div>
    <div id="aTareas" class="ATl"></div>
    <div id="aNotifs" class="ANl" style="display:none"></div>
  </div>
</div>

<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
var ME='',AD={ch:[],ms:[],ta:[],no:[],ac:null};
function rpc(f,p,c){fetch(SB+'/rest/v1/rpc/'+f,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(p||{})}).then(function(r){return r.json();}).then(function(d){if(c)c(Array.isArray(d)?d[0]:d);}).catch(function(e){console.error(f,e);});}
function q(t,f,c){fetch(SB+'/rest/v1/'+t+'?'+f,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}).then(c).catch(function(e){console.error(t,e);});}
function rest(p,o){return fetch(SB+'/rest/v1/'+p,Object.assign({headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'}},o||{}));}
function E(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function A(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return'ahora';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}
function I(n){return(n||'?').split(' ').map(function(w){return w[0];}).join('').substring(0,2);}
var CL={'ADMIN':'#8B5CF6','CESAR':'#8B5CF6','Todo el equipo':'#071D4A','Enfermería':'#00C9A7','Doctoras':'#3B82F6','Comercial':'#F59E0B'};
function C(n){return CL[n]||'#6B7BA8';}

function aInit(){
  try{var s=JSON.parse(localStorage.getItem('aos_session')||'{}');ME=(s.nombre||'').toUpperCase();}catch(e){}
  if(!ME&&window.AOS&&window.AOS.ctx)ME=(window.AOS.ctx.nombre||'').toUpperCase();
  if(!ME)ME='MIREYA';
  aLoad();
}
function aLoad(){
  rpc('aos_mis_mensajes',{p_usuario:ME},function(d){
    if(!d)return;
    AD.ch=d.canales||[];AD.ta=d.tareas||[];AD.no=d.notificaciones||[];
    aCL();aTa();aNo();
    if(AD.ac)aMs(AD.ac);
    // Update badges
    var unreadMsgs=AD.ch.reduce(function(s,c){return s+(c.no_leidos||0);},0);
    var unreadNotifs=AD.no.filter(function(n){return !n.leido;}).length;
    var pendTasks=AD.ta.length;
    var total=unreadMsgs+unreadNotifs+pendTasks;
    // Update header badge
    var hdr=document.querySelector('.ALh');
    if(hdr)hdr.innerHTML='Mensajes'+(unreadMsgs>0?' <span style="background:#dc2626;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;margin-left:6px">'+unreadMsgs+'</span>':'');
    // Try to update sidebar badge in parent app
    try{var badge=document.querySelector('#nav-advisor-coord .nav-badge')||parent.document.querySelector('#nav-advisor-coord .nav-badge');if(!badge){var nav=document.getElementById('nav-advisor-coord')||parent.document.getElementById('nav-advisor-coord');if(nav){badge=document.createElement('span');badge.className='nav-badge';badge.style.cssText='background:#dc2626;color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;margin-left:auto';nav.appendChild(badge);}}if(badge){badge.textContent=total;badge.style.display=total>0?'inline-flex':'none';}}catch(e){}
  });
}
function aCL(){
  var el=document.getElementById('aCL');
  el.innerHTML=AD.ch.map(function(c){
    var a=AD.ac===c.id;var ig=c.tipo!=='DIRECTO';
    var nm=ig?c.nombre:'Admin';var bg=ig?C(c.nombre):'#8B5CF6';
    return'<div class="AC'+(a?' act':'')+'" onclick="aSel(\''+E(c.id)+'\')">'
      +'<div class="ACa" style="background:'+bg+'">'+(ig?I(c.nombre):'AD')+'</div>'
      +'<div class="ACi"><div class="ACn">'+E(nm)+'</div><div class="ACr">'+(ig?'Grupo':'Chat directo')+'</div><div class="ACm">'+E(c.ultimo_mensaje||'Sin mensajes')+'</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><div class="ACt">'+A(c.ultimo_mensaje_at)+'</div>'
      +(c.no_leidos>0?'<div class="ACu">'+c.no_leidos+'</div>':'')+'</div></div>';
  }).join('')||'<div style="padding:30px;text-align:center;font-size:11px;color:#94a3b8">Sin conversaciones</div>';
}
function aSel(id){AD.ac=id;aCL();aMs(id);rpc('aos_marcar_leido',{p_canal:id,p_usuario:ME},function(){});rpc('aos_marcar_visto',{p_canal:id,p_usuario:ME},function(){});}
function aMs(id){q('aos_mensajes','select=*&canal=eq.'+encodeURIComponent(id)+'&order=created_at.asc&limit=300',function(m){AD.ms=m||[];aRChat();});}
function aRChat(){
  var cv=document.getElementById('aChat');var ch=AD.ch.find(function(c){return c.id===AD.ac;});
  if(!ch){cv.innerHTML='<div class="AEmpty"><div style="font-size:14px;font-weight:700;color:#475569">Selecciona un chat</div></div>';return;}
  var ig=ch.tipo!=='DIRECTO';var nm=ig?ch.nombre:'Admin';var bg=ig?C(ch.nombre):'#8B5CF6';
  var html='<div class="AMh"><div class="ACa" style="background:'+bg+';width:36px;height:36px;font-size:12px">'+(ig?I(ch.nombre):'AD')+'</div><div><div class="AMn">'+E(nm)+'</div><div class="AMs">'+(ig?'Grupo':'Admin')+'</div></div></div>';
  html+='<div class="AMb" id="aMsgs">';
  var ld='';
  AD.ms.forEach(function(m){
    if(m.eliminado)return;
    var d=new Date(m.created_at);var ds=d.toLocaleDateString('es-PE',{day:'numeric',month:'short'});if(ds!==ld){html+='<div class="AMd">'+ds+'</div>';ld=ds;}
    var me=m.de===ME;var tm=d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="Am '+(me?'me':'th')+'">';if(!me)html+='<div class="Ama" style="background:'+C(m.de)+'">'+I(m.de)+'</div>';
    html+='<div>';
    if(m.tipo_contenido==='imagen'&&m.archivo_id){
      html+='<div class="Amc" style="padding:4px"><img style="max-width:200px;border-radius:10px;cursor:pointer" src="'+SB+'/storage/v1/object/public/coordinacion/'+E(m.mensaje)+'" onclick="window.open(this.src)"></div>';
    }else if(m.tipo_contenido==='archivo'&&m.archivo_id){
      html+='<div class="Amc"><div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,.04);border-radius:8px;font-size:10px;cursor:pointer" onclick="window.open(\''+SB+'/storage/v1/object/public/coordinacion/'+E(m.mensaje)+'\')">📎 '+E(m.mensaje)+'</div></div>';
    }else{
      html+='<div class="Amc">'+E(m.mensaje)+(m.editado?' <span style="font-size:8px;opacity:.5">(editado)</span>':'')+'</div>';
    }
    html+='<div class="Amt">'+E(m.de)+' · '+tm+'</div></div></div>';
  });
  html+='</div><div class="AMf"><input type="file" id="aFile" style="display:none" onchange="aUpFile(this)"><button style="width:36px;height:36px;border-radius:50%;border:none;background:#f0f4fc;color:#64748b;font-size:14px;cursor:pointer;flex-shrink:0" onclick="document.getElementById(\'aFile\').click()">📎</button><input type="text" id="aInp" placeholder="Escribe o pega imagen..." onkeydown="if(event.key===\'Enter\')aSend()"><button class="ASend" onclick="aSend()">&#10148;</button></div>';
  cv.innerHTML=html;
  var md=document.getElementById('aMsgs');if(md)md.scrollTop=md.scrollHeight;
  // Paste → preview
  var inp=document.getElementById('aInp');
  if(inp)inp.addEventListener('paste',function(e){
    var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image')>=0){
        e.preventDefault();var file=items[i].getAsFile();if(file)aShowPrev(file);break;
      }
    }
  });
}
var _aPrevFile=null;
function aShowPrev(file){
  _aPrevFile=file;var url=URL.createObjectURL(file);
  var el=document.getElementById('aPrev');
  if(!el){el=document.createElement('div');el.id='aPrev';document.querySelector('.AMf').before(el);}
  el.style.display='block';
  el.innerHTML='<div style="padding:8px 20px;background:#fff;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:10px"><img src="'+url+'" style="width:60px;height:60px;object-fit:cover;border-radius:10px;border:2px solid #e5e7eb"><div style="flex:1;font-size:10px;color:#64748b">Captura de pantalla · '+Math.round(file.size/1024)+'KB</div><button style="padding:6px 16px;border-radius:10px;border:none;background:#00C9A7;color:#fff;font-size:10px;font-weight:700;cursor:pointer" onclick="aSendPrev()">Enviar</button><button style="width:28px;height:28px;border-radius:8px;border:none;background:#f0f4fc;cursor:pointer;font-size:12px;color:#64748b" onclick="aCancelPrev()">✕</button></div>';
}
function aCancelPrev(){_aPrevFile=null;var el=document.getElementById('aPrev');if(el)el.style.display='none';}
function aSendPrev(){
  if(!_aPrevFile||!AD.ac)return;var name='screenshot_'+Date.now()+'.png';
  aUpBlob(_aPrevFile,name);
  _aPrevFile=null;var el=document.getElementById('aPrev');if(el)el.style.display='none';
}
function aSend(){var inp=document.getElementById('aInp');if(!inp||!inp.value.trim()||!AD.ac)return;var msg=inp.value.trim();inp.value='';inp.focus();rpc('aos_enviar_mensaje',{p_canal:AD.ac,p_de:ME,p_mensaje:msg},function(r){if(r&&r.ok){aMs(AD.ac);aLoad();}});}
function aUpFile(input){var file=input.files[0];if(!file||!AD.ac)return;aUpBlob(file,Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,''));input.value='';}
function aUpBlob(file,name){
  fetch(SB+'/storage/v1/object/coordinacion/'+name,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':file.type},body:file})
  .then(function(r){if(!r.ok)throw new Error('fail');return r.json();})
  .then(function(){rpc('aos_registrar_archivo',{p_nombre:name,p_tipo_mime:file.type,p_tamano:file.size,p_url:SB+'/storage/v1/object/public/coordinacion/'+name,p_storage_path:name,p_subido_por:ME,p_canal_id:AD.ac},function(r){if(r&&r.ok){aMs(AD.ac);aLoad();}});})
  .catch(function(e){console.error('Upload',e);alert('Error subiendo archivo');});
}

function aTa(){
  var el=document.getElementById('aTareas');
  if(!AD.ta.length){el.innerHTML='<div style="padding:30px;text-align:center;color:#94a3b8;font-size:11px">Sin tareas pendientes 🎉</div>';return;}
  el.innerHTML=AD.ta.map(function(t){
    var it=typeof t.items==='string'?JSON.parse(t.items||'[]'):(t.items||[]);var tot=it.length;var dn=it.filter(function(i){return i.done;}).length;
    var v=t.vencida||(t.fecha_limite&&new Date(t.fecha_limite+'T23:59:59')<new Date());
    var ec=v?'ATev':t.estado==='PENDIENTE'?'ATep':'ATee';var el2=v?'VENCIDA':t.estado;
    var h='<div class="ATc"><div class="ATt"><div class="ATtn">'+E(t.titulo)+'</div><span class="ATest '+ec+'">'+el2+'</span></div>';
    if(t.fecha_limite)h+='<div class="ATi">Vence: '+t.fecha_limite+(t.tiempo_estimado_min?' · '+t.tiempo_estimado_min+'min':'')+'</div>';
    if(tot){h+='<div class="ATck">';it.forEach(function(item,idx){h+='<label class="ATci'+(item.done?' dn':'')+'"><input type="checkbox" '+(item.done?'checked':'')+' onchange="aTog(\''+t.id+'\','+idx+',this.checked)">'+E(item.text)+'</label>';});h+='</div>';
      h+='<div class="ATbar">';for(var i=0;i<tot;i++)h+='<div class="ATseg" style="background:'+(it[i].done?'#00C9A7':'#e2e8f0')+'"></div>';h+='</div><div class="ATpct">'+dn+'/'+tot+' completados</div>';}
    h+='<div class="ATbtn">';if(t.estado==='PENDIENTE')h+='<button class="AB ABp" onclick="aCst(\''+t.id+'\',\'EN PROGRESO\')">Iniciar</button>';
    if(t.estado==='EN PROGRESO')h+='<button class="AB ABg" onclick="aCst(\''+t.id+'\',\'COMPLETADA\')">Completar</button>';h+='</div></div>';return h;
  }).join('');
}
function aTog(id,i,c){rpc('aos_toggle_tarea_item',{p_tarea_id:id,p_item_idx:i,p_completado:c},function(){aLoad();});}
function aCst(id,e){rest('aos_tareas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({estado:e,completado_at:e==='COMPLETADA'?new Date().toISOString():null,iniciado_at:e==='EN PROGRESO'?new Date().toISOString():null,updated_at:new Date().toISOString()})}).then(function(){aLoad();});}

function aNo(){
  var el=document.getElementById('aNotifs');
  if(!AD.no.length){el.innerHTML='<div style="padding:30px;text-align:center;font-size:11px;color:#94a3b8">Sin notificaciones</div>';return;}
  el.innerHTML=AD.no.map(function(n){var ic=n.tipo==='URGENTE'?'Ana':n.tipo==='ALERTA'?'Anw':'Ani';var sy=n.tipo==='URGENTE'?'⚠':n.tipo==='ALERTA'?'⚡':'ℹ';
    return'<div class="ANc'+(n.leido?'':' unr')+'" onclick="aRN(\''+n.id+'\')"><div class="ANi '+ic+'">'+sy+'</div><div style="flex:1"><div style="font-weight:700;font-size:12px;color:#0f172a">'+E(n.titulo)+'</div>'+(n.contenido?'<div style="font-size:10px;color:#64748b;margin-top:2px">'+E(n.contenido)+'</div>':'')+'<div style="font-size:9px;color:#94a3b8;margin-top:3px">'+A(n.created_at)+(n.leido?'':' · <b style="color:#00C9A7">Nueva</b>')+'</div></div></div>';
  }).join('');
}
function aRN(id){rpc('aos_marcar_notif_leida',{p_notif_id:id,p_usuario:ME},function(){aLoad();});}
function aRT(t){document.getElementById('art-t').classList.toggle('act',t==='t');document.getElementById('art-n').classList.toggle('act',t==='n');document.getElementById('aTareas').style.display=t==='t'?'flex':'none';document.getElementById('aNotifs').style.display=t==='n'?'flex':'none';}

// Notif sound — iPhone tri-tone style
var _pc=0;
function playTone(){
  try{
    var a=new(window.AudioContext||window.webkitAudioContext)();
    var notes=[1046.5,1318.5,1568];
    notes.forEach(function(freq,i){
      var o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.15,a.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.12+0.15);
      o.start(a.currentTime+i*0.12);o.stop(a.currentTime+i*0.12+0.2);
    });
  }catch(e){}
}
function chkN(){
  var unreadMsgs=AD.ch?AD.ch.reduce(function(s,c){return s+(c.no_leidos||0);},0):0;
  var unreadNotifs=AD.no?AD.no.filter(function(n){return!n.leido;}).length:0;
  var totalTasks=AD.ta?AD.ta.length:0;
  var total=unreadMsgs+unreadNotifs+totalTasks;
  if(_pc>0&&total>_pc){
    playTone();
    // Determine what's new
    var newMsgs=unreadMsgs-((_pc_msgs||0));
    var tipo=newMsgs>0?'mensaje':'notificación';
    var lastCh=AD.ch.find(function(c){return c.no_leidos>0;});
    var from=lastCh?lastCh.nombre:'Admin';
    var preview=lastCh?lastCh.ultimo_mensaje:'Nueva actualización';
    // iPhone-style notification from top
    var d=document.createElement('div');
    d.style.cssText='position:fixed;top:-100px;left:50%;transform:translateX(-50%);z-index:9999;width:min(420px,92vw);transition:top .4s cubic-bezier(.21,1.02,.73,1)';
    d.innerHTML='<div style="background:rgba(30,30,30,.88);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:18px;padding:14px 16px;box-shadow:0 10px 40px rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.08)"><div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00C9A7,#0A4FBF);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:18px;filter:brightness(2)">💬</span></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-weight:700;font-size:12px;color:#fff">AscendaOS</div><div style="font-size:9px;color:rgba(255,255,255,.4)">ahora</div></div><div style="font-weight:600;font-size:11px;color:rgba(255,255,255,.9);margin-top:2px">'+E(from)+'</div><div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+E(preview||'Tienes actualizaciones')+'</div></div></div>';
    document.body.appendChild(d);
    setTimeout(function(){d.style.top='12px';},50);
    setTimeout(function(){d.style.top='-100px';setTimeout(function(){d.remove();},500);},5000);
  }
  _pc=total;_pc_msgs=unreadMsgs;
}

setInterval(function(){aLoad();setTimeout(chkN,2000);},8000);
aInit();
</script>
