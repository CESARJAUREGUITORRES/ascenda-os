function sbPatch(path, body) {
  return fetch(SUPABASE_URL + path, {
    method: 'PATCH',

<script>
// Ascenda OS — simulation: movement, state, chain events.

function pickRandom(a) { return a[Math.floor(Math.random() * a.length)]; }

function deskCenter(desk) {
  const t = window.TILE;
  return { x: desk.x * t + t / 2, y: desk.y * t + t * 0.6 };
}
function spotCenter(s) {
  const t = window.TILE;
  return { x: s.x * t + t / 2, y: s.y * t + t / 2 };
}

function initAgents() {
  return window.SEED_AGENTS.map(a => {
    const desk = window.DESKS.find(d => d.id === a.home);
    const p = desk ? deskCenter(desk) : { x: 200, y: 200 };
    const pool = window.ACTIVITY[a.id] || [{ label: 'Procesando', thought: '...' }];
    const act = pool[0];
    return {
      ...a,
      px: p.x, py: p.y, tx: p.x, ty: p.y, walking: false,
      estado: a.estado || 'working',
      bubble_text: act.thought,
      bubble_type: 'thought',
      bubbleUntil: Date.now() + 5000,
      activity: act,
      nextDecision: 1500 + Math.random() * 4000,
      total_ejecuciones: Math.floor(Math.random() * 40 + 5),
      tasks_queue: Math.floor(Math.random() * 5),
      log: seedLog(a.id),
    };
  });
}

function seedLog(agentId) {
  const pool = window.ACTIVITY[agentId] || [];
  const now = Date.now();
  return Array.from({ length: 6 }, (_, i) => {
    const act = pool[i % pool.length] || { label: 'Tick', thought: '-' };
    return {
      t: now - (i + 1) * (1 + Math.random() * 6) * 60000,
      label: act.label, detail: act.thought,
      status: Math.random() > 0.12 ? 'done' : 'skipped',
    };
  });
}

function stepAgent(a, dt) {
  const dx = a.tx - a.px, dy = a.ty - a.py;
  const d = Math.hypot(dx, dy);
  if (d < 0.5) { a.walking = false; return true; }
  a.walking = true;
  const speed = 38 * dt / 1000;
  if (d <= speed) { a.px = a.tx; a.py = a.ty; a.walking = false; return true; }
  a.px += dx / d * speed; a.py += dy / d * speed;
  return false;
}

let cafeAssignIdx = 0;
function cafeSpotFor(id) {
  // deterministic-ish assignment
  const idx = Math.abs(hash(id)) % window.CAFE_SPOTS.length;
  return window.CAFE_SPOTS[idx];
}
function hash(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return h; }

function simTick(agents, dt, now, activeChains, setChains) {
  agents.forEach(a => {
    // Paused → must be at cafe
    if (a.estado === 'paused') {
      const spot = spotCenter(cafeSpotFor(a.id));
      if (Math.abs(a.tx - spot.x) > 2 || Math.abs(a.ty - spot.y) > 2) {
        a.tx = spot.x; a.ty = spot.y;
      }
    }
    stepAgent(a, dt);
    if (a.bubbleUntil && now > a.bubbleUntil) a.bubble_text = null;

    a.nextDecision -= dt;
    if (a.nextDecision > 0) return;
    a.nextDecision = 5000 + Math.random() * 9000;

    if (a.estado === 'paused') return;

    const roll = Math.random();
    if (roll < 0.12) {
      // Chain event — pick a chain starting at this agent
      const chain = window.CHAINS.find(c => c[0] === a.id);
      if (chain) {
        const partner = agents.find(x => x.id === chain[1]);
        if (partner) {
          const key = chain[0] + '|' + chain[1];
          const existing = activeChains.find(c => c.key === key);
          if (!existing) {
            activeChains.push({ key, pair: [chain[0], chain[1]], label: chain[2], until: now + 6000 });
            setChains([...activeChains]);
          }
          a.bubble_text = '→ ' + partner.nombre;
          a.bubble_type = 'speech';
          a.bubbleUntil = now + 3500;
        }
      }
    } else if (roll < 0.26) {
      // think a thought
      const pool = window.ACTIVITY[a.id] || [];
      if (pool.length) {
        const act = pickRandom(pool);
        a.activity = act;
        a.bubble_text = act.thought;
        a.bubble_type = 'thought';
        a.bubbleUntil = now + 5000;
      }
    } else if (roll < 0.31 && a.id !== 'recepcion') {
      // temporary blocked
      a.estado = 'blocked';
      a.bubble_text = '⚠ bloqueado';
      a.bubble_type = 'speech';
      a.bubbleUntil = now + 3500;
      setTimeout(() => { if (a.estado === 'blocked' && a.id !== 'recepcion') a.estado = 'working'; }, 4500);
    } else if (roll < 0.40) {
      // travel to cafe for break
      const spot = spotCenter(pickRandom(window.CAFE_SPOTS));
      a.tx = spot.x; a.ty = spot.y;
      a.estado = 'traveling';
      setTimeout(() => { if (a.estado === 'traveling' && a.id !== 'recepcion') a.estado = 'working'; }, 5000);
    } else if (roll < 0.48) {
      // return to desk
      const desk = window.DESKS.find(d => d.id === a.home);
      if (desk) { const p = deskCenter(desk); a.tx = p.x; a.ty = p.y; a.estado = 'traveling'; }
      setTimeout(() => { if (a.estado === 'traveling' && a.id !== 'recepcion') a.estado = 'working'; }, 3500);
    } else {
      // log a task done
      const pool = window.ACTIVITY[a.id] || [];
      const act = pickRandom(pool);
      if (act) {
        a.log.unshift({ t: now, label: act.label, detail: act.thought, status: 'done' });
        if (a.log.length > 30) a.log.pop();
        a.total_ejecuciones++;
      }
    }
  });
  // expire chains
  const next = activeChains.filter(c => c.until > now);
  if (next.length !== activeChains.length) setChains(next);
}

window.Sim = { initAgents, simTick, deskCenter, spotCenter };

</script>
<script type="text/babel">
// Ascenda OS — Office renderer. Canvas 2D, pixel-art sprites,
// full decoration (plants, printers, fridge, whiteboards, sofas, etc).

const { useRef: useOR, useEffect: useOE, useState: useOS, useCallback: useOC } = React;

const A = () => window.ASCENDA;

// ——— tile drawers ———
function paintFloor(ctx, z, tile) {
  const { x, y, w, h } = z;
  const px = x * tile, py = y * tile;
  const pw = w * tile, ph = h * tile;
  const d = window.DEPARTMENTS[z.dept];
  const floor = d.floor;

  if (floor === 'wood') {
    for (let i = 0; i < h; i++) {
      for (let j = 0; j < w; j++) {
        ctx.fillStyle = (i + j) % 2 ? '#D4A574' : '#BE8B5C';
        ctx.fillRect(px + j * tile, py + i * tile, tile, tile);
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        ctx.fillRect(px + j * tile, py + (i + 1) * tile - 1, tile, 1);
      }
    }
  } else {
    // Carpet w/ dept accent color
    const base = mix(d.accent, '#FFFFFF', 0.45);
    const alt  = mix(d.accent, '#FFFFFF', 0.55);
    for (let i = 0; i < h; i++) {
      for (let j = 0; j < w; j++) {
        ctx.fillStyle = (i + j) % 2 ? base : alt;
        ctx.fillRect(px + j * tile, py + i * tile, tile, tile);
      }
    }
    // subtle noise speckle
    for (let i = 0; i < (pw * ph) / 500; i++) {
      ctx.fillStyle = d.accent;
      ctx.globalAlpha = 0.3;
      ctx.fillRect(px + Math.random() * pw | 0, py + Math.random() * ph | 0, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
}
function mix(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa >> 16) & 255, ag = (pa >> 8) & 255, ab = pa & 255;
  const br = (pb >> 16) & 255, bg = (pb >> 8) & 255, bb = pb & 255;
  const r = Math.round(ar * (1 - t) + br * t);
  const g = Math.round(ag * (1 - t) + bg * t);
  const bl = Math.round(ab * (1 - t) + bb * t);
  return `rgb(${r},${g},${bl})`;
}

function paintZoneWalls(ctx, z, tile) {
  const { x, y, w, h } = z;
  const d = window.DEPARTMENTS[z.dept];
  const px = x * tile, py = y * tile;
  const pw = w * tile, ph = h * tile;
  // outer wall — dept-tinted soft navy
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px - 2, py - 2, pw + 4, 2);
  ctx.fillRect(px - 2, py + ph, pw + 4, 2);
  ctx.fillRect(px - 2, py - 2, 2, ph + 4);
  ctx.fillRect(px + pw, py - 2, 2, ph + 4);
  // dept accent stripe
  ctx.fillStyle = d.color;
  ctx.fillRect(px, py - 2, pw, 1);
  // inner top edge highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(px, py, pw, 1);
}

function drawDesk(ctx, d, tile, agent) {
  const px = d.x * tile, py = d.y * tile;

  ctx.fillStyle = '#312E2A';
  ctx.fillRect(px + 1, py + 1, tile - 2, tile - 8);
  ctx.fillStyle = '#4A453E';
  ctx.fillRect(px + 1, py + 1, tile - 2, 3);
  // stand
  ctx.fillStyle = '#1A1A1F';
  ctx.fillRect(px + 10, py + 3, tile - 20, 3);
  // monitor — Ascenda navy
  ctx.fillStyle = '#071D4A';
  ctx.fillRect(px + 5, py + 5, tile - 10, 12);
  // screen
  ctx.fillStyle = '#0A4FBF';
  ctx.fillRect(px + 6, py + 6, tile - 12, 10);
  // bright content
  ctx.fillStyle = '#00E5A0';
  ctx.fillRect(px + 8, py + 8, 3, 1);
  ctx.fillRect(px + 8, py + 10, 5, 1);
  ctx.fillStyle = '#EEF2FA';
  ctx.fillRect(px + 15, py + 8, 4, 1);
  ctx.fillRect(px + 15, py + 10, 3, 1);
  ctx.fillRect(px + 8, py + 12, 8, 1);
  ctx.fillRect(px + 8, py + 14, 6, 1);

  ctx.fillStyle = '#1A1A1F';
  ctx.fillRect(px + 6, py + 19, tile - 12, 3);
  ctx.fillStyle = '#3A3A42';
  ctx.fillRect(px + 7, py + 19, tile - 14, 1);
  // mouse
  ctx.fillStyle = '#1A1A1F';
  ctx.fillRect(px + tile - 7, py + 20, 3, 2);

  ctx.fillRect(px + 9, py + tile - 3, tile - 18, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 9, py + tile - 1, tile - 18, 1);
}

function drawPlant(ctx, px, py, tile) {
  // pot
  ctx.fillStyle = '#7C2D12';
  ctx.fillRect(px + 8, py + tile - 8, tile - 16, 7);
  ctx.fillStyle = '#9A3412';

  ctx.fillRect(px + 5, py + tile - 18, tile - 10, 10);
  ctx.fillStyle = '#15803D';
  ctx.fillRect(px + 8, py + tile - 22, tile - 16, 8);
  ctx.fillStyle = '#22C55E';
  ctx.fillRect(px + 10, py + tile - 20, 3, 3);
  ctx.fillRect(px + 16, py + tile - 16, 3, 3);
}

function drawWhiteboard(ctx, px, py, tile) {
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(px + 2, py + 4, tile - 4, tile - 12);
  ctx.fillStyle = '#F8FAFC';
  ctx.fillRect(px + 3, py + 5, tile - 6, tile - 14);
  ctx.fillStyle = A().navy;
  ctx.fillRect(px + 5, py + 7, 10, 1);
  ctx.fillRect(px + 5, py + 10, 7, 1);
  ctx.fillStyle = A().cyan;
  ctx.fillRect(px + 5, py + 13, 12, 1);

}

function drawCoffee(ctx, px, py, tile) {
  // espresso machine
  ctx.fillStyle = '#18181B';
  ctx.fillRect(px + 5, py + 3, tile - 10, tile - 8);
  ctx.fillStyle = '#3F3F46';
  ctx.fillRect(px + 5, py + 3, tile - 10, 3);
  // display
  ctx.fillStyle = A().cyan;
  ctx.fillRect(px + 8, py + 8, 5, 2);
  // spout
  ctx.fillStyle = '#71717A';
  ctx.fillRect(px + tile / 2 - 1, py + 14, 2, 4);
  // cup
  ctx.fillStyle = '#FEF3C7';
  ctx.fillRect(px + tile / 2 - 3, py + 18, 6, 4);
  ctx.fillStyle = '#78350F';
  ctx.fillRect(px + tile / 2 - 2, py + 19, 4, 2);
}

function drawFridge(ctx, px, py, tile) {
  ctx.fillStyle = '#E5E7EB';
  ctx.fillRect(px + 3, py + 1, tile - 6, tile - 2);
  ctx.fillStyle = '#9CA3AF';
  ctx.fillRect(px + 3, py + tile / 2, tile - 6, 1);
  ctx.fillStyle = '#6B7280';
  ctx.fillRect(px + tile - 7, py + 4, 2, 4);
  ctx.fillRect(px + tile - 7, py + tile / 2 + 4, 2, 4);
}

function drawSofa(ctx, px, py, tile, color) {
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 7, tile - 2, tile - 9);
  ctx.fillStyle = mix(color, '#000000', 0.25);
  ctx.fillRect(px + 1, py + 5, 4, tile - 7);
  ctx.fillRect(px + tile - 5, py + 5, 4, tile - 7);
  ctx.fillRect(px + 1, py + 5, tile - 2, 3);

  ctx.fillRect(px + 5, py + 10, tile - 10, 2);
}

function drawConferenceTable(ctx, px, py, w, h, tile) {
  ctx.fillStyle = '#4A453E';

  ctx.fillStyle = '#6B6159';
  ctx.fillRect(px + 3, py + 3, w * tile - 6, 3);
  // laptops/papers
  ctx.fillStyle = '#1A1A1F';
  ctx.fillRect(px + 10, py + 8, 10, 6);
  ctx.fillStyle = A().cyan;
  ctx.fillRect(px + 11, py + 9, 8, 4);
  ctx.fillStyle = '#1A1A1F';
  ctx.fillRect(px + 30, py + 8, 10, 6);
  ctx.fillStyle = A().mint;
  ctx.fillRect(px + 31, py + 9, 8, 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 22, py + 10, 5, 7);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 23, py + 12, 3, 1);
  ctx.fillRect(px + 23, py + 14, 3, 1);
}

function drawWater(ctx, px, py, tile) {
  ctx.fillStyle = '#60A5FA';
  ctx.fillRect(px + 8, py + 2, tile - 16, 11);
  ctx.fillStyle = '#93C5FD';
  ctx.fillRect(px + 9, py + 3, tile - 18, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 10, py + 4, 3, 3);
  ctx.fillStyle = '#F1F5F9';
  ctx.fillRect(px + 6, py + 13, tile - 12, 10);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(px + 6, py + 13, tile - 12, 1);
}

function drawPrinter(ctx, px, py, tile) {
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + 3, py + 5, tile - 6, tile - 10);
  ctx.fillStyle = '#374151';
  ctx.fillRect(px + 3, py + 5, tile - 6, 3);
  ctx.fillStyle = A().mint;
  ctx.fillRect(px + tile - 7, py + 7, 2, 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px + 6, py + 12, tile - 12, 6);
  ctx.fillStyle = '#E2E8F0';
  ctx.fillRect(px + 6, py + 12, tile - 12, 1);
}

function drawBookshelf(ctx, px, py, tile) {
  ctx.fillStyle = '#7C2D12';
  ctx.fillRect(px + 2, py + 1, tile - 4, tile - 2);
  // shelves
  for (let i = 0; i < 3; i++) {
    const by = py + 3 + i * 7;
    ctx.fillStyle = '#292524';
    ctx.fillRect(px + 3, by + 5, tile - 6, 1);
    // books
    const colors = ['#1E40AF', '#DC2626', '#059669', '#7C3AED', '#F59E0B'];
    for (let j = 0; j < 6; j++) {
      ctx.fillStyle = colors[(i + j) % colors.length];
      ctx.fillRect(px + 4 + j * 3, by, 2, 5);
    }
  }
}

function drawLamp(ctx, px, py, tile) {
  // floor lamp
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + tile / 2 - 1, py + 8, 2, tile - 10);
  ctx.fillStyle = A().amber;
  ctx.fillRect(px + tile / 2 - 4, py + 3, 8, 6);
  ctx.fillStyle = mix(A().amber, '#FFFFFF', 0.5);
  ctx.fillRect(px + tile / 2 - 3, py + 4, 6, 3);
  // glow
  const g = ctx.createRadialGradient(px + tile / 2, py + 6, 1, px + tile / 2, py + 6, 16);
  g.addColorStop(0, 'rgba(251, 191, 36, 0.35)');
  g.addColorStop(1, 'rgba(251, 191, 36, 0)');

  ctx.fillRect(px - 8, py - 8, tile + 16, tile + 16);
  // base
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px + tile / 2 - 4, py + tile - 2, 8, 2);
}

// Per-zone decor
function decorateZone(ctx, z, tile) {
  const { x, y, w, h, dept } = z;
  const px = x * tile, py = y * tile;
  if (dept === 'coordinacion') {
    // Executive office
    drawPlant(ctx, px + 2,                py + 2,            tile);
    drawPlant(ctx, px + (w - 2) * tile,   py + (h - 2) * tile, tile);
    drawBookshelf(ctx, px + 1 * tile, py + (h - 2) * tile, tile);
    drawSofa(ctx, px + (w - 3) * tile, py + (h - 2) * tile, tile, '#7C3AED');
    drawLamp(ctx, px + 2 * tile, py + (h - 2) * tile, tile);
  }
  if (dept === 'marketing') {
    drawWhiteboard(ctx, px + 0, py + (h - 1.1) * tile, tile);
    drawPlant(ctx, px + (w - 1.2) * tile, py + 0, tile);
    drawPlant(ctx, px + 0, py + 0, tile);
  }
  if (dept === 'ventas') {
    drawWater(ctx, px + (w - 1.2) * tile, py + 2, tile);
    drawPlant(ctx, px + 0, py + 0, tile);
    drawWhiteboard(ctx, px + 1 * tile, py + (h - 1.1) * tile, tile);
  }
  if (dept === 'datos') {
    drawBookshelf(ctx, px + 2, py + 2, tile);
    drawBookshelf(ctx, px + 4 * tile, py + 2, tile);
    drawPlant(ctx, px + (w - 1.2) * tile, py + 2, tile);
    drawLamp(ctx, px + (w - 2) * tile, py + (h - 2) * tile, tile);
  }
  if (dept === 'chatbot') {
    drawPlant(ctx, px + 0, py + 0, tile);
    drawPlant(ctx, px + (w - 1.2) * tile, py + 0, tile);
    drawSofa(ctx, px + (w - 4) * tile, py + (h - 2) * tile, tile, '#0EA5E9');
    drawLamp(ctx, px + 1 * tile, py + (h - 2) * tile, tile);
  }
  if (dept === 'operaciones') {
    drawPrinter(ctx, px + 2, py + 2, tile);
    drawPrinter(ctx, px + 5 * tile, py + 2, tile);
    drawBookshelf(ctx, px + (w - 2) * tile, py + 2, tile);
    drawPlant(ctx, px + (w - 5) * tile, py + (h - 2) * tile, tile);
  }
  if (dept === 'cafe') {
    drawCoffee(ctx, px + 2,                py + 2, tile);
    drawCoffee(ctx, px + 2 * tile,         py + 2, tile);
    drawFridge(ctx, px + 4 * tile,         py + 2, tile);
    drawWater(ctx,  px + (w - 1.3) * tile, py + 2, tile);
    drawSofa(ctx, px + 2, py + (h - 2) * tile, tile, '#92400E');
    drawSofa(ctx, px + 4 * tile, py + (h - 2) * tile, tile, '#92400E');
    drawPlant(ctx, px + (w - 1.3) * tile, py + (h - 2) * tile, tile);
  }
  if (dept === 'reunion') {
    drawConferenceTable(ctx, px + 2 * tile, py + 2 * tile, w - 4, h - 4, tile);
    drawWhiteboard(ctx, px + 1 * tile,          py + 0, tile);
    drawWhiteboard(ctx, px + (w - 2) * tile,    py + 0, tile);
    drawPlant(ctx, px + 0, py + (h - 2) * tile, tile);
    drawPlant(ctx, px + (w - 1.3) * tile, py + (h - 2) * tile, tile);
  }
}

function paintBg(ctx, mapW, mapH, tile) {
  // Outside walls — soft background
  ctx.fillStyle = '#D8E0EF';
  ctx.fillRect(0, 0, mapW * tile, mapH * tile);
  // Hallway tiles around zones
  ctx.fillStyle = '#E8EDF5';
  // Horizontal bands
  ctx.fillRect(0, 9 * tile, mapW * tile, 2 * tile);
  ctx.fillRect(0, 18 * tile, mapW * tile, 2 * tile);
  ctx.fillRect(0, 27 * tile, mapW * tile, tile);
  // Grid lines
  ctx.strokeStyle = 'rgba(15,23,42,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= mapW; x += 2) {
    ctx.beginPath();
    ctx.moveTo(x * tile + 0.5, 0);
    ctx.lineTo(x * tile + 0.5, mapH * tile);
    ctx.stroke();
  }
  for (let y = 0; y <= mapH; y += 2) {
    ctx.beginPath();
    ctx.moveTo(0, y * tile + 0.5);
    ctx.lineTo(mapW * tile, y * tile + 0.5);
    ctx.stroke();
  }
}

function drawAgent(ctx, a, tile, now) {
  const px = a.px, py = a.py;
  const d = window.DEPARTMENTS[a.area] || {};
  const bob = a.walking ? Math.sin(now / 110 + a.id.charCodeAt(0)) * 1 : 0;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(px, py + 22, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // legs
  const leg = a.walking ? Math.sin(now / 100) * 1.5 : 0;
  ctx.fillStyle = '#1F2937';
  ctx.fillRect(px - 3, py + 16 + bob, 2, 5 - leg);
  ctx.fillRect(px + 1, py + 16 + bob, 2, 5 + leg);
  // shoes
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px - 3, py + 20 + bob - leg, 2, 1);
  ctx.fillRect(px + 1, py + 20 + bob + leg, 2, 1);

  // body
  ctx.fillStyle = a.sprite_shirt || a.shirt || d.color || '#64748B';
  ctx.fillRect(px - 4, py + 9 + bob, 8, 8);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(px - 4, py + 15 + bob, 8, 2);
  // collar
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(px - 1, py + 9 + bob, 2, 2);

  // head
  ctx.fillStyle = a.sprite_skin || a.skin || '#F1C27D';
  ctx.fillRect(px - 3, py + 3 + bob, 6, 7);
  // hair
  ctx.fillStyle = a.sprite_hair || a.hair || '#1F1F1F';
  ctx.fillRect(px - 3, py + 3 + bob, 6, 3);
  ctx.fillRect(px - 3, py + 3 + bob, 2, 5);
  ctx.fillRect(px + 1, py + 3 + bob, 2, 5);
  // eyes
  ctx.fillStyle = '#0F172A';
  ctx.fillRect(px - 2, py + 7 + bob, 1, 1);
  ctx.fillRect(px + 1, py + 7 + bob, 1, 1);

  // status orb
  const orbY = py + bob - 1;
  let orbColor = '#94A3B8';
  let pulse = false;
  if (a.estado === 'working') { orbColor = '#00E5A0'; pulse = true; }
  else if (a.estado === 'meeting') { orbColor = '#F59E0B'; pulse = true; }
  else if (a.estado === 'blocked') { orbColor = '#EF4444'; pulse = true; }
  else if (a.estado === 'traveling') { orbColor = '#0EA5E9'; }
  else if (a.estado === 'paused') { orbColor = '#94A3B8'; }
  if (pulse) {
    const p = 0.4 + 0.4 * Math.sin(now / 280);
    ctx.fillStyle = orbColor + Math.floor(p * 100).toString(16).padStart(2, '0');
    ctx.fillRect(px - 2, orbY - 1, 4, 4);
  }
  ctx.fillStyle = orbColor;
  ctx.fillRect(px - 1, orbY, 2, 2);

  // selected ring
  if (a.selected) {
    const p = 0.5 + 0.5 * Math.sin(now / 180);
    ctx.strokeStyle = `rgba(0,229,160,${p})`;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.ellipse(px, py + 22, 10, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(0,229,160,${p * 0.5})`;
    ctx.beginPath();
    ctx.ellipse(px, py + 22, 13, 5, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else if (a.hovered) {
    ctx.strokeStyle = 'rgba(10, 79, 191, 0.6)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(px, py + 22, 10, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // red alert ring (blocked)
  if (a.estado === 'blocked') {
    const p = 0.5 + 0.5 * Math.sin(now / 220);
    ctx.strokeStyle = `rgba(239, 68, 68, ${p})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py + 10 + bob, 14, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawBubble(ctx, a, now) {
  if (!a.bubble_text) return;
  const text = a.bubble_text;
  const isThought = a.bubble_type !== 'speech';
  ctx.font = '500 10px "DM Sans", system-ui';
  const metrics = ctx.measureText(text);
  const maxW = 170;
  const tw = Math.min(metrics.width, maxW);
  const bw = tw + 14;
  const bh = 20;
  const bx = a.px - bw / 2;
  const by = a.py - 22;

  // shadow
  ctx.fillStyle = 'rgba(7,29,74,0.18)';
  roundRect(ctx, bx + 1, by + 2, bw, bh, 6);
  ctx.fill();

  // bubble bg
  if (isThought) {
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.strokeStyle = 'rgba(10, 79, 191, 0.2)';
  } else {
    ctx.fillStyle = 'rgba(7, 29, 74, 0.96)';
    ctx.strokeStyle = 'rgba(0, 229, 160, 0.45)';
  }
  ctx.lineWidth = 1;
  roundRect(ctx, bx, by, bw, bh, 6);
  ctx.fill();
  ctx.stroke();

  // tail
  if (isThought) {
    ctx.beginPath();
    ctx.arc(a.px - 3, by + bh + 3, 2, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.arc(a.px, by + bh + 7, 1.3, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(a.px - 3, by + bh);
    ctx.lineTo(a.px, by + bh + 4);
    ctx.lineTo(a.px + 3, by + bh);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  // truncate
  let display = text;
  if (metrics.width > maxW) {
    while (ctx.measureText(display + '…').width > maxW - 4 && display.length > 3) display = display.slice(0, -1);
    display += '…';
  }
  ctx.fillStyle = isThought ? '#0F172A' : '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(display, bx + 7, by + bh / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawChain(ctx, a, b, now, meta) {
  ctx.strokeStyle = 'rgba(0, 229, 160, 0.6)';
  ctx.lineWidth = 1.8;
  ctx.setLineDash([4, 4]);
  ctx.lineDashOffset = -now / 50;
  ctx.beginPath();
  ctx.moveTo(a.px, a.py + 8);
  ctx.lineTo(b.px, b.py + 8);
  ctx.stroke();
  ctx.setLineDash([]);
  // packet
  const t = ((now / 1400) % 1);
  const pxp = a.px + (b.px - a.px) * t;
  const pyp = (a.py + 8) + ((b.py + 8) - (a.py + 8)) * t;
  ctx.fillStyle = '#00E5A0';
  ctx.beginPath();
  ctx.arc(pxp, pyp, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// Zone label pill
function drawZoneLabel(ctx, z, tile) {
  const d = window.DEPARTMENTS[z.dept];
  const label = d.name.toUpperCase();
  ctx.font = '600 10px "JetBrains Mono", monospace';
  const tw = ctx.measureText(label).width;
  const x = z.x * tile + 6;
  const y = z.y * tile + 8;
  const w = tw + 24;
  const h = 16;
  // pill
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.strokeStyle = d.color + '60';
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill(); ctx.stroke();
  // dept color dot
  ctx.fillStyle = d.color;
  ctx.beginPath();
  ctx.arc(x + 8, y + 8, 3, 0, Math.PI * 2);
  ctx.fill();
  // text
  ctx.fillStyle = '#0F172A';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + 15, y + 8);
}

// Heatmap
function drawHeat(ctx, agents, mapW, mapH, tile) {
  const res = 6;
  const cw = Math.ceil(mapW * tile / res);
  const ch = Math.ceil(mapH * tile / res);
  const grid = new Float32Array(cw * ch);
  agents.forEach(a => {
    if (a.estado !== 'working' && a.estado !== 'meeting' && a.estado !== 'blocked') return;
    const cx = Math.floor(a.px / res), cy = Math.floor(a.py / res);
    const r = 22;
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x < 0 || y < 0 || x >= cw || y >= ch) continue;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d > r) continue;
      grid[y*cw+x] += (1 - d/r) * (a.estado === 'blocked' ? 2 : 1);
    }
  });
  const img = ctx.createImageData(cw, ch);
  for (let i = 0; i < grid.length; i++) {
    const v = Math.min(1, grid[i] / 3);
    if (v < 0.05) continue;
    const r = v < 0.5 ? 16 + v*2*(245-16) : 245;
    const g = v < 0.5 ? 185 + v*2*(158-185) : 158 - (v-0.5)*2*90;
    const b = v < 0.5 ? 129 - v*2*(129-11) : 11;
    img.data[i*4] = r; img.data[i*4+1] = g; img.data[i*4+2] = b;
    img.data[i*4+3] = Math.floor(v*170);
  }
  const tmp = document.createElement('canvas');
  tmp.width = cw; tmp.height = ch;
  tmp.getContext('2d').putImageData(img, 0, 0);
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(tmp, 0, 0, cw*res, ch*res);
  ctx.restore();
}

// Main
function OfficeCanvas({ agents, selectedId, hoverId, onSelect, onHover, onZoneClick, viewport, setViewport, chains, mode, focusedZone }) {
  const canvasRef = useOR(null);
  const rafRef = useOR(null);
  const mouse = useOR({ down: false, x: 0, y: 0, dragged: false, sx: 0, sy: 0, vx: 0, vy: 0 });
  const hoverZoneRef = useOR(null);

  // size canvas
  useOE(() => {
    const c = canvasRef.current;
    if (!c) return;
    const resize = () => {
      const r = c.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      c.width = r.width * dpr; c.height = r.height * dpr;
      c.style.width = r.width + 'px'; c.style.height = r.height + 'px';
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(c.parentElement);
    return () => ro.disconnect();
  }, []);

  // render loop
  useOE(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    let running = true;
    const render = (now) => {
      if (!running) return;
      const dpr = window.devicePixelRatio || 1;
      ctx.setTransform(1,0,0,1,0,0);
      // background gradient (soft lilac/blue)
      const g = ctx.createLinearGradient(0, 0, 0, c.height);
      g.addColorStop(0, '#F2F5FC');
      g.addColorStop(1, '#E5EBF7');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.setTransform(dpr * viewport.zoom, 0, 0, dpr * viewport.zoom, dpr * viewport.x, dpr * viewport.y);

      paintBg(ctx, window.MAP_W, window.MAP_H, window.TILE);

      // zones — paint in order. If focusedZone, dim others.
      window.ZONES.forEach(z => {
        paintFloor(ctx, z, window.TILE);
      });
      window.ZONES.forEach(z => {
        paintZoneWalls(ctx, z, window.TILE);
        decorateZone(ctx, z, window.TILE);
      });

      // desks
      window.DESKS.forEach(d => {
        const ag = agents.find(a => a.home === d.id);
        drawDesk(ctx, d, window.TILE, ag);
      });

      // zone labels
      window.ZONES.forEach(z => drawZoneLabel(ctx, z, window.TILE));

      // highlight hovered zone
      if (hoverZoneRef.current && !focusedZone) {
        const z = hoverZoneRef.current;
        ctx.strokeStyle = window.DEPARTMENTS[z.dept].color;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(z.x * window.TILE, z.y * window.TILE, z.w * window.TILE, z.h * window.TILE);
        ctx.setLineDash([]);
      }

      // heat mode
      if (mode === 'heatmap') drawHeat(ctx, agents, window.MAP_W, window.MAP_H, window.TILE);

      // chains
      chains.forEach(([fromId, toId, label]) => {
        const a = agents.find(x => x.id === fromId);
        const b = agents.find(x => x.id === toId);
        if (a && b) drawChain(ctx, a, b, now, label);
      });

      // agents
      agents.forEach(a => drawAgent(ctx, {
        ...a,
        selected: a.id === selectedId,
        hovered: a.id === hoverId,
      }, window.TILE, now));

      // bubbles
      agents.forEach(a => drawBubble(ctx, a, now));

      // dim if focused
      if (focusedZone) {
        ctx.fillStyle = 'rgba(7, 29, 74, 0.55)';
        ctx.fillRect(0, 0, window.MAP_W * window.TILE, focusedZone.y * window.TILE);
        ctx.fillRect(0, (focusedZone.y + focusedZone.h) * window.TILE, window.MAP_W * window.TILE, (window.MAP_H - focusedZone.y - focusedZone.h) * window.TILE);
        ctx.fillRect(0, focusedZone.y * window.TILE, focusedZone.x * window.TILE, focusedZone.h * window.TILE);
        ctx.fillRect((focusedZone.x + focusedZone.w) * window.TILE, focusedZone.y * window.TILE,
          (window.MAP_W - focusedZone.x - focusedZone.w) * window.TILE, focusedZone.h * window.TILE);
        // glow around focused
        ctx.strokeStyle = window.DEPARTMENTS[focusedZone.dept].color;
        ctx.lineWidth = 3;
        ctx.strokeRect(focusedZone.x * window.TILE - 2, focusedZone.y * window.TILE - 2,
          focusedZone.w * window.TILE + 4, focusedZone.h * window.TILE + 4);
      }

      rafRef.current = requestAnimationFrame(render);
    };
    rafRef.current = requestAnimationFrame(render);
    return () => { running = false; cancelAnimationFrame(rafRef.current); };
  }, [agents, selectedId, hoverId, chains, viewport, mode, focusedZone]);

  // picking
  const pick = useOC((cx, cy) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const wx = (cx - rect.left - viewport.x) / viewport.zoom;
    const wy = (cy - rect.top - viewport.y) / viewport.zoom;
    // agents
    let best = null, bd = 14;
    for (const a of agents) {
      const d = Math.hypot(a.px - wx, a.py - wy - 8);
      if (d < bd) { bd = d; best = a; }
    }
    if (best) return { type: 'agent', agent: best };
    // zones
    const zone = window.ZONES.find(z =>
      wx >= z.x * window.TILE && wx < (z.x + z.w) * window.TILE &&
      wy >= z.y * window.TILE && wy < (z.y + z.h) * window.TILE
    );
    if (zone) return { type: 'zone', zone };
    return null;
  }, [agents, viewport]);

  const onDown = (e) => {
    mouse.current = { down: true, x: e.clientX, y: e.clientY, dragged: false, sx: e.clientX, sy: e.clientY, vx: viewport.x, vy: viewport.y };
  };
  const onMove = (e) => {
    if (mouse.current.down) {
      const dx = e.clientX - mouse.current.sx;
      const dy = e.clientY - mouse.current.sy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mouse.current.dragged = true;
      if (mouse.current.dragged) setViewport(v => ({ ...v, x: mouse.current.vx + dx, y: mouse.current.vy + dy }));
    } else {
      const p = pick(e.clientX, e.clientY);
      onHover(p?.type === 'agent' ? p.agent.id : null);
      hoverZoneRef.current = p?.type === 'zone' ? p.zone : null;
    }
  };
  const onUp = (e) => {
    if (!mouse.current.dragged) {
      const p = pick(e.clientX, e.clientY);
      if (p?.type === 'agent') onSelect(p.agent.id);
      else if (p?.type === 'zone') onZoneClick(p.zone);
      else onSelect(null);
    }
    mouse.current.down = false;
  };
  const onWheel = (e) => {
    e.preventDefault();
    const delta = -e.deltaY * 0.0012;
    setViewport(v => {
      const nz = Math.max(0.35, Math.min(2.8, v.zoom + delta * v.zoom));
      const c = canvasRef.current;
      const r = c.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const s = nz / v.zoom;
      return { zoom: nz, x: mx - (mx - v.x) * s, y: my - (my - v.y) * s };
    });
  };

  return (
    <canvas
      ref={canvasRef}
      onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={() => { mouse.current.down = false; }}
      onWheel={onWheel}
      style={{
        width: '100%', height: '100%', display: 'block',
        cursor: mouse.current?.down ? 'grabbing' : hoverId ? 'pointer' : 'grab',
        imageRendering: 'pixelated', touchAction: 'none',
      }}
    />
  );
}

window.OfficeCanvas = OfficeCanvas;

</script>
<script type="text/babel">

const { useState: useSPS, useEffect: useSPE, useMemo: useSPM, useRef: useSPR } = React;

function StatusPill({ estado }) {

}
function DeptChip({ dept }) {

}
function fmtAgo(ts) { const d = Date.now() - ts; if (d < 60000) return 'ahora'; if (d < 3600000) return Math.floor(d/60000) + 'm'; if (d < 86400000) return Math.floor(d/3600000) + 'h'; return Math.floor(d/86400000) + 'd'; }
function Metric({ label, value, tone='ink' }) {
  const colors = { ink:'#0F172A', mint:'#00C9A7', blue:'#0A4FBF', amber:'#F59E0B', red:'#EF4444', purple:'#7C3AED' };

    <div style={{ fontSize:22, fontWeight:700, color: colors[tone], marginTop:2, letterSpacing:'-0.02em', fontFamily:'Exo 2, system-ui' }}>{value}</div>
  </div>;
}
function Spark({ data, color='#00C9A7' }) {
  const w=160, h=32; const max = Math.max(...data, 1);
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h-(v/max)*(h-2)-1}`).join(' ');
  const area = `0,${h} ${pts} ${w},${h}`;
  return <svg width={w} height={h}><polygon points={area} fill={color} opacity="0.15"/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.6"/></svg>;
}
function btn(color, variant='solid') {
  return variant === 'ghost'
    ? { padding:'7px 12px', fontSize:12, fontWeight:600, background:'transparent', color, border:`1px solid ${color}50`, borderRadius:6, cursor:'pointer' }
    : { padding:'7px 12px', fontSize:12, fontWeight:600, background:color, color:'#fff', border:'none', borderRadius:6, cursor:'pointer', boxShadow:`0 2px 8px ${color}40` };
}

function LiveFeed({ agents, events, metrics, alerts, onSelectAgent, onOpenMeeting, onRunTick }) {
  return <div style={{ display:'flex', flexDirection:'column', height:'100%', minHeight: 0 }}>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>

    {/* Dept breakdown */}
    <div style={{ padding:'10px 14px', background:'rgba(255,255,255,0.4)', borderBottom:'1px solid rgba(15,23,42,0.06)' }}>
      <div style={{ fontSize:10, color:'#64748B', fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.08em', marginBottom:8 }}>DEPARTAMENTOS</div>
      {Object.keys(window.DEPARTMENTS).filter(k => k !== 'cafe' && k !== 'reunion').map(k => {
        const d = window.DEPARTMENTS[k];
        const list = agents.filter(a => a.area === k);
        if (!list.length) return null;

        return <div key={k} style={{ display:'flex', alignItems:'center', gap:8, fontSize:11, marginBottom:5 }}>

          <div style={{ width:60, height:5, background:'#E2E8F0', borderRadius:3, overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background:d.color }}/>
          </div>

          {blocked > 0 && <span style={{ fontSize:9, color:'#EF4444', fontWeight:700 }}>⚠{blocked}</span>}

    </div>

    {/* Feed */}
    <div style={{ padding:'8px 14px 4px', fontSize:10, fontFamily:'JetBrains Mono, monospace', color:'#64748B', letterSpacing:'0.08em', background:'rgba(255,255,255,0.4)' }}>FEED EN VIVO</div>
    <div style={{ flex:1, overflow:'auto', background:'rgba(255,255,255,0.5)' }}>
      {events.map(e => {
        const a = agents.find(x => x.id === e.agentId); if (!a) return null;
        const d = window.DEPARTMENTS[a.area];
        return <div key={e.id} onClick={() => onSelectAgent(a.id)} style={{ padding:'8px 14px', display:'flex', gap:8, borderBottom:'1px solid rgba(15,23,42,0.04)', cursor:'pointer' }}>
          <div style={{ width:3, background:d.color, borderRadius:2 }}/>

function DeptFocus({ zone, agents, onBack, onSelectAgent, onOpenMeeting }) {
  const d = window.DEPARTMENTS[zone.dept];
  const list = agents.filter(a => a.area === zone.dept);
  const active = list.filter(a => a.estado === 'working' || a.estado === 'meeting').length;
  const avgEff = list.length ? Math.round(list.reduce((s, a) => s + a.eficiencia, 0) / list.length) : 0;
  const [draft, setDraft] = useSPS('');
  const [chat, setChat] = useSPS([]);

  const sendToTeam = () => {
    if (!draft.trim()) return;
    const q = draft;
    setChat(c => [...c, { from: 'me', text: q, t: Date.now() }]);
    setDraft('');
    // Agents respond
    list.forEach((a, i) => {
      setTimeout(() => {
        setChat(c => [...c, { from: a.id, agent: a, text: replyFor(a, q), t: Date.now() }]);
      }, 800 + i * 900 + Math.random() * 500);
    });
  };

  return <div style={{ display:'flex', flexDirection:'column', height:'100%', minHeight:0 }}>
    <div style={{ padding:14, background:`linear-gradient(135deg, ${d.color}, ${d.color}cc)`, color:'#fff' }}>
      <button onClick={onBack} style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.3)', color:'#fff', padding:'4px 10px', borderRadius:20, fontSize:11, cursor:'pointer', fontFamily:'JetBrains Mono, monospace' }}>← Volver a oficina</button>
      <div style={{ fontSize:24, fontWeight:800, marginTop:10, fontFamily:'Exo 2, system-ui' }}>{d.icon} {d.name}</div>
      <div style={{ fontSize:11, opacity:0.9, fontFamily:'JetBrains Mono, monospace' }}>{list.length} agentes · {active} activos · eficiencia {avgEff}%</div>
    </div>

    <div style={{ padding:12, background:'rgba(255,255,255,0.5)', borderBottom:'1px solid rgba(15,23,42,0.06)' }}>
      <div style={{ fontSize:10, color:'#64748B', fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.08em', marginBottom:6 }}>EQUIPO</div>
      {list.map(a => (
        <div key={a.id} onClick={() => onSelectAgent(a.id)} style={{ padding:'8px 10px', background:'rgba(255,255,255,0.7)', borderRadius:8, marginBottom:6, display:'flex', gap:10, alignItems:'center', cursor:'pointer', border:'1px solid rgba(255,255,255,0.8)' }}>
          <span style={{ fontSize:22 }}>{a.emoji}</span>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:700, color:'#071D4A' }}>{a.nombre}</div>
            <div style={{ fontSize:10, color:'#64748B' }}>{a.cargo}</div>
          </div>
          <StatusPill estado={a.estado}/>
        </div>
      ))}
    </div>

    <div style={{ padding:'8px 14px', fontSize:10, fontFamily:'JetBrains Mono, monospace', color:'#64748B', letterSpacing:'0.08em' }}>CHAT GRUPAL · {d.name}</div>
    <div style={{ flex:1, overflow:'auto', padding:'4px 12px', background:'rgba(255,255,255,0.4)' }}>
      {chat.length === 0 && <div style={{ color:'#94A3B8', fontSize:11, textAlign:'center', padding:20 }}>Pregunta al equipo, todos responden.</div>}
      {chat.map((m,i) => {
        if (m.from === 'me') return <div key={i} style={{ display:'flex', justifyContent:'flex-end', marginBottom:8 }}>
          <div style={{ maxWidth:'78%', padding:'8px 11px', borderRadius:'12px 12px 3px 12px', background:'#071D4A', color:'#fff', fontSize:12 }}>{m.text}</div>
        </div>;
        const a = m.agent; const dd = window.DEPARTMENTS[a.area];
        return <div key={i} style={{ display:'flex', gap:8, marginBottom:10 }}>
          <div style={{ width:28, height:28, borderRadius:8, background:`linear-gradient(135deg, ${dd.color}, ${dd.color}bb)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>{a.emoji}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:11, fontWeight:700, color:'#071D4A' }}>{a.nombre}</div>
            <div style={{ fontSize:12, padding:'6px 10px', background:'rgba(255,255,255,0.9)', borderRadius:8, borderLeft:`3px solid ${dd.color}`, marginTop:2 }}>{m.text}</div>
          </div>
        </div>;
      })}
    </div>
    <div style={{ padding:10, borderTop:'1px solid rgba(15,23,42,0.06)', display:'flex', gap:6, background:'rgba(255,255,255,0.7)' }}>
      <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => { if (e.key==='Enter') sendToTeam(); }} placeholder={`Pregunta al equipo de ${d.name}...`} style={{ flex:1, border:'1px solid rgba(15,23,42,0.1)', borderRadius:6, padding:'7px 10px', fontSize:12, outline:'none', background:'#fff' }}/>
      <button style={btn('#00C9A7')} onClick={sendToTeam}>Enviar</button>
    </div>
  </div>;

function replyFor(agent, q) {
  const d = window.DEPARTMENTS[agent.area];
  const base = {
    kronia: `Como coordinadora: lo priorizo. ${q.length > 30 ? 'Requiere delegar en 2 equipos.' : 'Asigno recursos.'}`,
    centinela: 'Acabo de escanear — 14 leads nuevos en cola.',
    clasificador: 'Clasifico lead por lead — PYME y enterprise separados.',
    analista_mkt: 'Desde Marketing: CTR +18% esta semana, CPC bajó a $2.10.',
    planificador: 'Puedo calendarizar 12 posts para el mes.',
    creador: 'Escribo 3 variantes A/B para testing.',
    monitor: 'Revisé KPIs hace 10min — inventario SKU-221 crítico.',
    analista: 'Cohort análisis: retention D30 en 42%, +5pt.',
    archivista: 'Archivo indexado: 2.4k docs disponibles.',
    resumidor: 'TL;DR listo — 3 action items extraídos.',
    recepcion: '⚠ Sin conexión WhatsApp — esperando credenciales.',
    guardian: 'Inventario: 42 SKUs normales, 1 crítico.',

function MeetingModal({ agents, onClose, pingAgent }) {
  const [phase, setPhase] = useSPS('setup');
  const [selected, setSelected] = useSPS([]);
  const [topic, setTopic] = useSPS('');
  const [msgs, setMsgs] = useSPS([]);
  const [draft, setDraft] = useSPS('');
  const [thinking, setThinking] = useSPS([]);
  const scroll = useSPR();

  useSPE(() => { if (scroll.current) scroll.current.scrollTop = scroll.current.scrollHeight; }, [msgs, thinking]);

  const respond = (aid, q, opening) => {
    setThinking(t => [...t, aid]);
    pingAgent && pingAgent(aid);
    setTimeout(() => {
      setThinking(t => t.filter(x => x !== aid));
      const a = agents.find(x => x.id === aid);
      setMsgs(m => [...m, { id: Math.random()+'', from: aid, agent: a, text: replyFor(a, q || topic), t: Date.now() }]);
    }, 1200 + Math.random() * 1600);
  };

  const start = () => {
    if (!selected.length || !topic.trim()) return;
    setPhase('live');
    setMsgs([{ id:'sys-'+Date.now(), from:'system', text:`Reunión iniciada · ${selected.length} participantes · "${topic}"` }]);
    selected.forEach((id, i) => setTimeout(() => respond(id, topic, true), 500 + i * 700));
  };

  const send = () => {
    if (!draft.trim()) return;
    const q = draft;
    setMsgs(m => [...m, { id:'u-'+Date.now(), from:'me', text:q, t:Date.now() }]);
    setDraft('');
    const responders = selected.filter(() => Math.random() > 0.3);
    responders.forEach((id, i) => setTimeout(() => respond(id, q), 600 + i * 800));
  };

  const toggleAgent = id => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const toggleDept = dept => {
    const ids = agents.filter(a => a.area === dept).map(a => a.id);
    const all = ids.every(id => selected.includes(id));
    setSelected(s => all ? s.filter(id => !ids.includes(id)) : [...new Set([...s, ...ids])]);
  };

  const modalBg = { position:'fixed', inset:0, background:'rgba(7,29,74,0.55)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 };
  const panel = { background:'rgba(255,255,255,0.96)', backdropFilter:'blur(20px)', border:'1px solid rgba(255,255,255,0.8)', borderRadius:14, boxShadow:'0 24px 60px rgba(7,29,74,0.3)', display:'flex', flexDirection:'column', overflow:'hidden' };

  if (phase === 'setup') {
    const deptGroups = {};
    agents.forEach(a => (deptGroups[a.area] = deptGroups[a.area] || []).push(a));
    return <div style={modalBg}><div style={{ ...panel, width:540, maxHeight:'85vh' }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid rgba(15,23,42,0.06)', display:'flex', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:16, fontWeight:700, color:'#071D4A', fontFamily:'Exo 2, system-ui' }}>Convocar reunión</div>
          <div style={{ fontSize:12, color:'#64748B', marginTop:2 }}>Elige agentes y plantea un tema.</div>
        </div>
        <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, color:'#94A3B8', cursor:'pointer' }}>×</button>
      </div>
      <div style={{ padding:16, overflow:'auto', flex:1 }}>
        <label style={{ fontSize:10, color:'#64748B', fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.08em' }}>TEMA</label>
        <input autoFocus value={topic} onChange={e => setTopic(e.target.value)} placeholder="¿Cómo mejoramos la conversión del embudo?" style={{ width:'100%', marginTop:5, padding:'10px 12px', fontSize:13, border:'1px solid rgba(15,23,42,0.12)', borderRadius:8, outline:'none' }}/>

        <div style={{ marginTop:14 }}>
          <div style={{ fontSize:10, color:'#64748B', fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.08em' }}>PARTICIPANTES ({selected.length})</div>
          {Object.entries(deptGroups).map(([dept, list]) => {
            const d = window.DEPARTMENTS[dept]; if (!d) return null;
            const all = list.every(a => selected.includes(a.id));
            return <div key={dept} style={{ marginTop:10 }}>
              <button onClick={() => toggleDept(dept)} style={{ width:'100%', padding:'6px 10px', display:'flex', gap:8, alignItems:'center', background:'rgba(248,250,252,0.7)', border:`1px solid ${d.color}30`, borderLeft:`3px solid ${d.color}`, borderRadius:6, cursor:'pointer', fontSize:12 }}>
                <span style={{ color:d.color, fontWeight:700 }}>{d.icon}</span>
                <span style={{ flex:1, textAlign:'left', color:'#0F172A', fontWeight:600 }}>{d.name}</span>
                <span style={{ fontSize:10, color:'#64748B', fontFamily:'JetBrains Mono, monospace' }}>{list.filter(a => selected.includes(a.id)).length}/{list.length}</span>
                <span style={{ fontSize:10, color: all ? '#00C9A7' : '#94A3B8', fontWeight:700 }}>{all ? 'Todos ✓' : '+ Todos'}</span>
              </button>
              <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginTop:6 }}>
                {list.map(a => {
                  const on = selected.includes(a.id);
                  return <button key={a.id} onClick={() => toggleAgent(a.id)} style={{ display:'inline-flex', gap:4, alignItems:'center', padding:'4px 9px', borderRadius:14, fontSize:11, border:`1px solid ${on ? d.color : 'rgba(15,23,42,0.12)'}`, background: on ? d.color + '18' : '#fff', color: on ? d.color : '#475569', cursor:'pointer', fontWeight: on ? 600 : 500 }}>{a.emoji} {a.nombre}</button>;
                })}
              </div>
            </div>;
          })}
        </div>
      </div>
      <div style={{ padding:12, borderTop:'1px solid rgba(15,23,42,0.06)', display:'flex', gap:8, justifyContent:'flex-end' }}>
        <button style={btn('#64748B','ghost')} onClick={onClose}>Cancelar</button>
        <button style={{ ...btn('#00C9A7'), opacity: selected.length && topic.trim() ? 1 : 0.5 }} onClick={start} disabled={!selected.length || !topic.trim()}>Iniciar · {selected.length}</button>
      </div>
    </div></div>;
  }

  return <div style={modalBg}><div style={{ ...panel, width:720, height:'85vh' }}>
    <div style={{ padding:'12px 18px', borderBottom:'1px solid rgba(15,23,42,0.06)', display:'flex', gap:12 }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ width:8, height:8, borderRadius:4, background:'#EF4444', animation:'pulseRed 1.8s infinite' }}/>
          <div style={{ fontSize:14, fontWeight:700, color:'#071D4A', fontFamily:'Exo 2, system-ui' }}>Reunión en curso</div>
        </div>
        <div style={{ fontSize:12, color:'#64748B', marginTop:2 }}>"{topic}"</div>
      </div>
      <button style={btn('#64748B','ghost')} onClick={() => setPhase('setup')}>Finalizar</button>
      <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, color:'#94A3B8', cursor:'pointer' }}>×</button>
    </div>
    <div style={{ padding:'8px 16px', borderBottom:'1px solid rgba(15,23,42,0.06)', display:'flex', gap:5, flexWrap:'wrap' }}>
      {selected.map(id => { const a = agents.find(x => x.id === id); if (!a) return null; const d = window.DEPARTMENTS[a.area]; const t = thinking.includes(id);
        return <span key={id} style={{ padding:'3px 7px', background:'#F8FAFC', borderRadius:12, border:`1px solid ${d.color}40`, fontSize:11, display:'inline-flex', gap:5, alignItems:'center' }}>{a.emoji} {a.nombre}{t && <span style={{ color:d.color, fontSize:10, fontStyle:'italic' }}>escribiendo...</span>}</span>;

    <div ref={scroll} style={{ flex:1, overflow:'auto', padding:16, background:'rgba(248,250,252,0.6)' }}>
      {msgs.map(m => {
        if (m.from === 'system') return <div key={m.id} style={{ textAlign:'center', fontSize:11, color:'#64748B', fontFamily:'JetBrains Mono, monospace', padding:'8px 0' }}>· {m.text} ·</div>;
        if (m.from === 'me') return <div key={m.id} style={{ display:'flex', justifyContent:'flex-end', marginBottom:12 }}>

          </div>
        </div>;
      })}
    </div>
    <div style={{ padding:12, borderTop:'1px solid rgba(15,23,42,0.06)', display:'flex', gap:6, background:'rgba(255,255,255,0.8)' }}>
      <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key==='Enter' && send()} placeholder="Pregunta al equipo..." style={{ flex:1, border:'1px solid rgba(15,23,42,0.12)', borderRadius:6, padding:'9px 12px', fontSize:13, outline:'none' }}/>
      <button style={btn('#00C9A7')} onClick={send}>Enviar</button>
    </div>
  </div></div>;
}

window.Panel = { LiveFeed, Profile, DeptFocus, MeetingModal };

</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

function App(){
  const [agents, setAgents] = useState(() => window.Sim.initAgents());
  const [selectedId, setSelectedId] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const [focusedZone, setFocusedZone] = useState(null);
  const [chains, setChains] = useState([]);
  const [events, setEvents] = useState([]);
  const [messages, setMessages] = useState({});
  const [mode, setMode] = useState('normal');
  const [meetingOpen, setMeetingOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [viewport, setViewport] = useState({ x: 16, y: 16, zoom: 1 });
  const fittedRef = useRef(false);

  // fit to stage
  useEffect(() => {
    const el = document.getElementById('stage');
    if (!el) return;
    const fit = () => {
      const r = el.getBoundingClientRect();
      if (r.width < 50 || r.height < 50) return;
      const mw = window.MAP_W * window.TILE, mh = window.MAP_H * window.TILE;
      const zoom = Math.min(r.width / mw, r.height / mh) * 0.96;
      setViewport({ zoom, x: (r.width - mw * zoom) / 2, y: (r.height - mh * zoom) / 2 });
      fittedRef.current = true;
    };
    fit();
    const ro = new ResizeObserver(() => { if (!fittedRef.current) fit(); });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  // sim loop
  useEffect(() => {
    let last = performance.now(); let running = true;
    const tick = () => {
      if (!running) return;
      const now = performance.now(); const dt = now - last; last = now;
      setAgents(prev => {
        const next = prev.map(a => ({ ...a }));
        window.Sim.simTick(next, dt, now, chains, setChains);
        return next;
      });
      requestAnimationFrame(tick);
    };
    const raf = requestAnimationFrame(tick);
    return () => { running = false; cancelAnimationFrame(raf); };
  }, []);

  // Supabase refresh (best-effort). Local sim is the source of truth for `estado` —
  // Supabase only overrides for explicit, meaningful states (paused, blocked, meeting).
  // Idle/null from DB never flattens a live agent to idle.
  useEffect(() => {
    const pull = async () => {
      const live = await window.sbGet('/rest/v1/aos_agentes?select=id,estado,activo,eficiencia,total_ejecuciones');
      if (!live || !Array.isArray(live) || live.length === 0) return;
      setAgents(prev => prev.map(a => {
        const row = live.find(r => r.id === a.id);
        if (!row) return a;
        const dbState = row.estado;
        // Only honor DB state if it's an override signal (paused by user, blocked by error, or in meeting).
        const shouldOverride = dbState === 'paused' || dbState === 'blocked' || dbState === 'meeting';
        return {
          ...a,
          estado: shouldOverride ? dbState : a.estado,
          // eficiencia + total_ejecuciones are DB-authoritative if present and non-zero
          eficiencia: (typeof row.eficiencia === 'number' && row.eficiencia > 0) ? row.eficiencia : a.eficiencia,
          total_ejecuciones: (typeof row.total_ejecuciones === 'number' && row.total_ejecuciones >= a.total_ejecuciones) ? row.total_ejecuciones : a.total_ejecuciones,
        };
      }));
    };
    pull();
    const iv = setInterval(pull, 12000);
    return () => clearInterval(iv);
  }, []);

  // feed events
  const seenRef = useRef({});
  useEffect(() => {
    const iv = setInterval(() => {
      const now = Date.now();
      agents.forEach(a => {
        const key = a.id + ':' + (a.activity?.label || '');
        if (seenRef.current[a.id] !== key && a.activity) {
          seenRef.current[a.id] = key;
          setEvents(prev => [{ id: Math.random().toString(36).slice(2), agentId: a.id, text: a.activity.label, t: now }, ...prev].slice(0, 60));
        }
      });
    }, 2400);
    return () => clearInterval(iv);
  }, [agents]);

  const metrics = useMemo(() => {
    let working = 0, meeting = 0, blocked = 0, tasksDone = 0, eff = 0;
    agents.forEach(a => {
      if (a.estado === 'working' || a.estado === 'traveling') working++;
      if (a.estado === 'meeting') meeting++;
      if (a.estado === 'blocked') blocked++;
      tasksDone += a.total_ejecuciones;
      eff += a.eficiencia;
    });
    return { working, meeting, blocked, tasksDone, efficiency: Math.round(eff / agents.length) };
  }, [agents]);

  const alerts = useMemo(() => agents.filter(a => a.estado === 'blocked'), [agents]);
  const selected = agents.find(a => a.id === selectedId);

  const handleAction = (act) => {
    if (!selected) return;
    if (act === 'toggle-pause') {
      const newStatus = selected.estado === 'paused' ? 'working' : 'paused';
      setAgents(prev => prev.map(a => a.id === selected.id ? { ...a, estado: newStatus } : a));
      window.sbPatch(`/rest/v1/aos_agentes?id=eq.${selected.id}`, { estado: newStatus, activo: newStatus !== 'paused' });
      setToast(newStatus === 'paused' ? `⏸ ${selected.nombre} pausado` : `▶ ${selected.nombre} reanudado`);
      setTimeout(() => setToast(null), 1800);
    }
  };
  const handleSend = (text) => {
    if (!selected) return;
    setMessages(prev => ({ ...prev, [selected.id]: [...(prev[selected.id] || []), { from: 'me', text }] }));
    setTimeout(() => {
      const reply = window.Panel.replyFor ? window.Panel.replyFor(selected, text) : `Recibido.`;
      setMessages(prev => ({ ...prev, [selected.id]: [...(prev[selected.id] || []), { from: 'agent', text: reply }] }));
    }, 1100 + Math.random() * 900);
  };
  const runAgent = (id) => {
    window.rwPost('/api/agents/run', { agent_id: id });
    setToast(`⚡ Ejecutando ${id}...`);
    setTimeout(() => setToast(null), 2000);
  };
  const runTick = () => {
    window.rwPost('/api/agents/tick');
    setToast('⚡ Tick global disparado');
    setTimeout(() => setToast(null), 2000);
  };

  const pingAgent = (id) => {
    setAgents(prev => prev.map(a => a.id === id ? { ...a, bubble_text: '💬', bubble_type: 'speech', bubbleUntil: Date.now() + 1500 } : a));
  };

  const resetView = () => { fittedRef.current = false;
    const el = document.getElementById('stage'); if (!el) return;
    const r = el.getBoundingClientRect();
    const mw = window.MAP_W * window.TILE, mh = window.MAP_H * window.TILE;
    const zoom = Math.min(r.width/mw, r.height/mh) * 0.96;
    setViewport({ zoom, x: (r.width-mw*zoom)/2, y:(r.height-mh*zoom)/2 });
  };
  const zoomBy = f => setViewport(v => ({ ...v, zoom: Math.max(0.35, Math.min(2.8, v.zoom * f)) }));

  return <React.Fragment>
    <div className="titlebar">
      <div className="traffic"><span className="r"/><span className="y"/><span className="g"/></div>
      <div className="brand">
        <svg width="18" height="18" viewBox="0 0 32 32"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#0A4FBF"/><stop offset="1" stopColor="#00C9A7"/></linearGradient></defs><rect x="3" y="3" width="26" height="26" rx="6" fill="url(#lg)"/><path d="M10 21 L16 9 L22 21 M12.5 17 H19.5" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
        AscendaOS
        <span className="brand-pill">OFICINA VIRTUAL</span>
      </div>
      <div className="live"><span className="dot"/><span style={{color:'#00C9A7',fontWeight:700}}>LIVE</span><span>·</span><span>{metrics.working+metrics.meeting}/{agents.length} activos</span>{alerts.length>0 && <><span>·</span><span style={{color:'#EF4444',fontWeight:700}}>⚠ {alerts.length} alertas</span></>}</div>
      <div style={{flex:1}}/>
      <div style={{display:'flex',gap:3}}>
        <button className={`tb-btn ${mode==='normal'?'active':''}`} onClick={()=>setMode('normal')}>▦ Normal</button>
        <button className={`tb-btn ${mode==='heatmap'?'active':''}`} onClick={()=>setMode('heatmap')}>☀ Heatmap</button>
      </div>
      <div className="tb-sep"/>
      <button className="tb-btn" onClick={()=>setMeetingOpen(true)}>🤝 Reunión</button>
      <button className="tb-btn" onClick={runTick}>⚡ Tick</button>
    </div>

    <div style={{flex:1,display:'flex',minHeight:0,background:'#EEF2FA'}}>
      <div id="stage" style={{flex:1,position:'relative',overflow:'hidden'}}>
        <window.OfficeCanvas
          agents={agents}
          selectedId={selectedId}
          hoverId={hoverId}
          onSelect={id => { setSelectedId(id); setFocusedZone(null); }}
          onHover={setHoverId}
          onZoneClick={z => { if(z.dept!=='cafe'&&z.dept!=='reunion'){setFocusedZone(z);setSelectedId(null);} }}
          viewport={viewport}
          setViewport={setViewport}
          chains={chains.map(c => c.pair)}
          mode={mode}
          focusedZone={focusedZone}
        />

        {hoverId && !selectedId && (() => {
          const a = agents.find(x => x.id === hoverId); if (!a) return null;
          const d = window.DEPARTMENTS[a.area];
          return <div className="tooltip" style={{borderLeft:`3px solid ${d.color}`}}>
            <div style={{fontSize:13,fontWeight:700,color:'#071D4A'}}>{a.emoji} {a.nombre}</div>
            <div style={{fontSize:10,color:d.color,fontWeight:600,marginTop:2,fontFamily:'JetBrains Mono,monospace',textTransform:'uppercase',letterSpacing:'0.04em'}}>{d.name} · {a.cargo}</div>
            <div style={{fontSize:11,marginTop:6,color:'#475569'}}>{a.activity?.label}</div>
            <div style={{fontSize:10,color:'#94A3B8',marginTop:4,fontFamily:'JetBrains Mono,monospace'}}>{a.motor_ai} · {a.cron_intervalo}</div>
          </div>;
        })()}

        <div className="legend">
          {Object.entries(window.DEPARTMENTS).filter(([k])=>k!=='cafe'&&k!=='reunion').map(([k,d])=>
            <div key={k} className="legend-chip"><span className="sq" style={{background:d.color}}/>{d.icon} {d.name}</div>
          )}
        </div>

        <div className="zoom-ctrl">
          <button className="zbtn" onClick={()=>zoomBy(1.2)}>+</button>
          <button className="zbtn" onClick={()=>zoomBy(0.83)}>−</button>
          <button className="zbtn" onClick={resetView} style={{fontSize:13}}>◎</button>
        </div>
      </div>

      <div className="side">
        {focusedZone ? (
          <window.Panel.DeptFocus
            zone={focusedZone}
            agents={agents}
            onBack={()=>setFocusedZone(null)}
            onSelectAgent={id=>{setFocusedZone(null);setSelectedId(id);}}
            onOpenMeeting={()=>setMeetingOpen(true)}
          />
        ) : selected ? (
          <window.Panel.Profile
            agent={selected}
            onAction={handleAction}
            messages={messages[selected.id]||[]}
            onSend={handleSend}
            onClose={()=>setSelectedId(null)}
            onRunAgent={runAgent}
          />
        ) : (
          <window.Panel.LiveFeed
            agents={agents}
            events={events}
            metrics={metrics}
            alerts={alerts}
            onSelectAgent={setSelectedId}
            onOpenMeeting={()=>setMeetingOpen(true)}
            onRunTick={runTick}
          />
        )}
      </div>
    </div>

    {meetingOpen && <window.Panel.MeetingModal agents={agents} onClose={()=>setMeetingOpen(false)} pingAgent={pingAgent}/>}
    {toast && <div className="toast">{toast}</div>}
  </React.Fragment>;
}

// expose replyFor for DM chat
window.Panel && (window.Panel.replyFor = window.Panel.replyFor);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
