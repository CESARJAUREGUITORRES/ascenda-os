<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Agendar Cita — Zi Vital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#071D4A;--blue:#0A4FBF;--cyan:#00C9A7;--bg:#F0F4FC;--card:#fff;--text:#0D1B3E;--muted:#6B7BA8;--border:#DDE4F5;--green:#00C9A7}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hero{background:linear-gradient(135deg,var(--pri),var(--blue));padding:20px 20px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(0,201,167,.1)}
.hero::after{content:'';position:absolute;bottom:-24px;left:0;right:0;height:50px;background:var(--bg);border-radius:50% 50% 0 0}
.hero h1{font-family:'Exo 2';font-size:22px;font-weight:800;color:#fff}
.hero p{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}
.step{display:none;animation:fu .3s ease}.step.act{display:block}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-radius:16px;padding:18px;margin-top:14px;box-shadow:0 4px 20px rgba(7,29,74,.06);border:1px solid rgba(226,232,240,.6)}
.section{font-size:9px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .15s}
.tab.act{border-color:var(--cyan);background:rgba(0,201,167,.08);color:#00A88A;font-weight:800}
/* Prof cards — vertical rectangulares */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.pcard{border:2px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;background:var(--card)}
.pcard:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(10,79,191,.1)}
.pcard.sel{border-color:var(--cyan);box-shadow:0 4px 16px rgba(0,201,167,.15)}
.pcard-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;background:#EBF2FF;display:block}
.pcard-body{padding:10px}
.pcard-name{font-size:13px;font-weight:800;color:var(--text)}
.pcard-sub{font-size:9px;color:var(--muted);margin-top:2px}
.pcard-cmp{font-size:8px;color:var(--blue);font-weight:700;margin-top:3px;background:#EBF2FF;padding:2px 6px;border-radius:4px;display:inline-block}
.pcard-days{font-size:9px;color:var(--green);font-weight:700;margin-top:6px}
/* Calendar */
.cn{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cn button{width:32px;height:32px;border:none;background:#EBF2FF;border-radius:50%;font-size:14px;cursor:pointer;color:var(--blue);font-weight:700}
.cn-t{font-size:14px;font-weight:800}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.ch{font-size:8px;font-weight:700;color:var(--muted);padding:5px 0}
.cd{padding:8px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:default;transition:all .12s;border:1.5px solid transparent;color:#D1D5DB}
.cd.av{cursor:pointer;color:var(--text)}
.cd.av:hover{background:#EBF2FF;border-color:var(--blue)}
.cd.tod{border-color:var(--blue);color:var(--blue);font-weight:800}
.cd.sel{background:var(--blue);color:#fff;font-weight:800}
.cd.ht{background:rgba(0,201,167,.1);color:#00A88A;font-weight:700;border-color:rgba(0,201,167,.25);cursor:pointer}
.cd.emp{cursor:default;color:transparent}
/* Sede */
.sede-box{margin-top:10px;padding:10px;background:#EBF2FF;border-radius:10px;border:1px solid var(--border);font-size:10px;line-height:1.6}
.sede-box b{color:var(--blue)}
/* Slots */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.slot{padding:8px 0;text-align:center;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.slot:hover{border-color:var(--blue);background:#EBF2FF}
.slot.sel{background:linear-gradient(135deg,var(--cyan),#00A88A);color:#fff;border-color:var(--cyan)}
.slot.sel div{color:#fff !important}
/* Form */
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans';outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue)}
.fl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:3px}
.fr{margin-bottom:10px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'DM Sans';transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--pri),var(--blue));color:#fff;box-shadow:0 4px 16px rgba(10,79,191,.25)}
.btn-p:hover{transform:translateY(-1px)}.btn-p:disabled{opacity:.4;cursor:default;transform:none}
.btn-back{background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:8px;margin-top:6px}
/* Resumen */
.rbox{background:#EBF2FF;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.rr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(10,79,191,.08)}.rr:last-child{border:none}
.rr span:first-child{color:var(--muted)}.rr span:last-child{font-weight:700;color:var(--pri)}
.det{padding:6px 10px;background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);border-radius:6px;margin-bottom:8px;font-size:10px;color:#00A88A;font-weight:600}
/* Confirm modal */
.cov{position:fixed;inset:0;background:rgba(7,29,74,.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.cmod{background:#fff;border-radius:18px;max-width:440px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.tyc{background:#F8FAFF;border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:12px;font-size:9px;color:var(--muted);line-height:1.6}
.tyc b{color:var(--text)}
/* Success */
.sov{position:fixed;inset:0;background:rgba(7,29,74,.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.scard{background:#fff;border-radius:18px;max-width:400px;width:90%;padding:28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
/* Loading */
.ld-s{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.exp-s{position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;text-align:center;padding:20px}
.sp{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Prof horizontal card */
.phcard{display:flex;align-items:center;gap:12px;padding:10px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.phcard img{width:48px;height:64px;border-radius:8px;object-fit:cover}
</style>
</head>
<body>
<div class="ld-s" id="ld"><div class="sp"></div><span style="font-size:11px;color:var(--muted)">Cargando...</span></div>
<div class="exp-s" id="exp"><div style="font-size:48px">⏰</div><h2 style="font-family:Exo 2;font-size:20px;color:var(--pri);">Link expirado</h2><p style="font-size:12px;color:var(--muted);max-width:280px;">Solicita uno nuevo a tu asesora.</p><a href="https://api.whatsapp.com/send?phone=51922028889&text=Hola, quisiera agendar una cita" style="display:inline-block;padding:10px 20px;background:#25D366;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;margin-top:12px">💬 WhatsApp</a></div>
<div class="hero"><h1>Agenda tu cita</h1><p>Clínica Estética Zi Vital</p></div>
<div class="wrap">
  <!-- STEP 1: Profesional -->
  <div id="s1" class="step">
    <div class="card">
      <div class="section">Tipo de atención</div>
      <div class="tabs"><div class="tab act" onclick="agT('DOCTORA',this)">👩‍⚕️ Doctora</div><div class="tab" onclick="agT('ENFERMERIA',this)">💆 Enfermería</div></div>
      <div class="section">Selecciona profesional</div>
      <div class="pgrid" id="pl"></div>
    </div>
  </div>
  <!-- STEP 2: Calendario -->
  <div id="s2" class="step">
    <div id="phc" class="phcard" style="margin-top:14px;"></div>
    <div class="card">
      <div class="section">Selecciona fecha</div>
      <div class="cn"><button onclick="cN(-1)">‹</button><div class="cn-t" id="ct"></div><button onclick="cN(1)">›</button></div>
      <div class="cg" id="cg"></div>
      <div id="sbox" style="display:none"></div>
      <div id="sc" style="display:none"><div class="section" style="margin-top:12px;">Horarios · <span id="sf"></span></div><div id="sg" class="sgrid"></div></div>
    </div>
    <button class="btn btn-p" style="margin-top:14px" onclick="goStep(3)" id="b2" disabled>Continuar →</button>
    <button class="btn btn-back" onclick="goStep(1)">← Cambiar profesional</button>
  </div>
  <!-- STEP 3: Datos -->
  <div id="s3" class="step">
    <div class="card">
      <div class="section">Tus datos</div>
      <div id="dpre" class="det" style="display:none"></div>
      <div style="padding:6px 10px;background:#EBF2FF;border-radius:6px;margin-bottom:10px;font-size:10px;color:var(--blue);font-weight:600;">💡 Ingresa tu número para autocompletar</div>
      <div class="fr"><label class="fl">Nombre *</label><input class="fi" id="fn" placeholder="Tu nombre"></div>
      <div class="fr"><label class="fl">Apellido *</label><input class="fi" id="fa" placeholder="Tu apellido"></div>
      <div class="fr"><label class="fl">Teléfono *</label><input class="fi" id="ft" placeholder="987654321" type="tel" oninput="aDP(this.value)"></div>
      <div id="pdet" class="det" style="display:none"></div>
      <div class="fr"><label class="fl">N° Documento</label><input class="fi" id="fd" placeholder="12345678"></div>
      <div class="fr"><label class="fl">Email</label><input class="fi" id="fe" placeholder="tu@correo.com" type="email"></div>
      <div class="fr"><label class="fl">Tratamiento *</label><select class="fi" id="fsv" style="appearance:auto;" onchange="AG.selSvc=this.value"><option value="">-- Seleccionar --</option></select></div>
      <div class="fr"><label class="fl">Tipo de cita</label><select class="fi" id="ftc" style="appearance:auto;"><option value="CONSULTA NUEVA">Consulta nueva</option><option value="CONTROL">Control</option><option value="APLICACIÓN">Aplicación</option><option value="MANTENIMIENTO">Mantenimiento</option><option value="PROCEDIMIENTO">Procedimiento</option></select></div>
      <div class="fr"><label class="fl">Notas</label><textarea class="fi" id="fno" rows="2" placeholder="¿Alguna indicación especial?"></textarea></div>
    </div>
    <button class="btn btn-p" style="margin-top:14px" onclick="showConfirm()">✅ Agendar cita</button>
    <button class="btn btn-back" onclick="goStep(2)">← Cambiar horario</button>
  </div>
</div>

<script>
var SB='https://ituyqwstonmhnfshnaqz.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0',H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
var AG={token:'',link:null,tipo:'DOCTORA',profs:[],selProf:null,selSvc:'',selFecha:'',selHora:'',selSede:'',calYear:0,calMonth:0,paciente:null,diasTurno:[],diasCount:{}};
var SEDES={'SAN ISIDRO':{dir:'Av. Javier Prado Este 996, Ofi 501 · Edificio Capricornio',map:'https://maps.app.goo.gl/co7ch54zHCt1Nj6w5'},'PUEBLO LIBRE':{dir:'Av. Brasil 1170, Pueblo Libre',map:'https://goo.gl/maps/Cw36T6YPudyRNmVe6'}};
function E(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rpc(fn,p){return fetch(SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:H,body:JSON.stringify(p)}).then(function(r){return r.json()})}
function q(t,f){return fetch(SB+'/rest/v1/'+t+'?'+f,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json()})}

(function(){var p=new URLSearchParams(window.location.search);AG.token=p.get('t')||p.get('token')||'';var h=new Date();AG.calYear=h.getFullYear();AG.calMonth=h.getMonth();if(!AG.token){AG.link={tipo:'general'};lP();return;}q('aos_links_agenda','token=eq.'+AG.token+'&select=*').then(function(r){if(!r||!r.length||new Date(r[0].expira_at)<new Date()){document.getElementById('ld').style.display='none';document.getElementById('exp').style.display='flex';return;}AG.link=r[0];if(AG.link.paciente_numero){rpc('aos_buscar_por_numero',{p_numero:AG.link.paciente_numero}).then(function(res){if(res&&res[0]){var r=res[0];AG.paciente={numero_limpio:r.numero||AG.link.paciente_numero,Nombres:r.nombre||'',Apellidos:r.apellido||'',Email:r.email||'','N° documento':r.documento||''};}lP();}).catch(function(){lP();});}else{lP();}}).catch(function(){document.getElementById('ld').style.display='none';document.getElementById('exp').style.display='flex';});})();

function lP(){q('aos_perfiles_profesional','visible=eq.true&order=orden&select=*').then(function(p){AG.profs=p||[];document.getElementById('ld').style.display='none';goStep(1);loadDiasCounts();});rpc('aos_catalogo_tratamientos',{}).then(function(i){if(!i||!i.length)return;var s=document.getElementById('fsv');if(s)s.innerHTML='<option value="">-- Seleccionar --</option>'+i.map(function(x){return '<option value="'+x.t+'">'+x.t+'</option>';}).join('');}).catch(function(){});}

function loadDiasCounts(){var hoy=new Date(),hs=hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');AG.profs.forEach(function(p){rpc('aos_dias_con_turno',{p_profesional_id:p.id,p_anio:AG.calYear,p_mes:AG.calMonth+1}).then(function(d){var arr=d||[];var futuro=arr.filter(function(x){return x>=hs;});AG.diasCount[p.id]=futuro.length;rP();});});}

function goStep(n){document.querySelectorAll('.step').forEach(function(s){s.classList.remove('act')});document.getElementById('s'+n).classList.add('act');if(n===2&&AG.selProf){var p=AG.selProf;document.getElementById('phc').innerHTML=(p.foto_url?'<img src="'+E(p.foto_url)+'" style="width:48px;height:64px;border-radius:8px;object-fit:cover;">':'')+'<div><div style="font-size:15px;font-weight:800;">'+E(p.nombre_publico)+'</div><div style="font-size:10px;color:var(--muted);">'+E(p.especialidad)+(p.cmp&&p.cmp.length>2?' · <span style="background:#EBF2FF;padding:1px 5px;border-radius:3px;color:var(--blue);font-weight:700;font-size:9px;">CMP '+E(p.cmp)+'</span>':'')+'</div><div style="font-size:9px;color:var(--muted);margin-top:2px;">📍 '+E(p.sede==='TODAS'?'San Isidro · Pueblo Libre':p.sede)+'</div></div>';rS();lT();}if(n===3)rD();window.scrollTo({top:0,behavior:'smooth'});}

function agT(t,b){AG.tipo=t;AG.selProf=null;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act')});b.classList.add('act');rP();}

function rP(){var l=AG.profs.filter(function(p){return p.tipo===AG.tipo});document.getElementById('pl').innerHTML=l.map(function(p){
  var cmp=p.cmp&&p.cmp.length>2?'CMP '+E(p.cmp):'';
  var dc=AG.diasCount[p.id];var dcText=dc!==undefined?dc+' días disponibles':'Cargando...';
  return '<div class="pcard'+(AG.selProf&&AG.selProf.id===p.id?' sel':'')+'" onclick="sP(\''+E(p.id)+'\')">'+(p.foto_url?'<img class="pcard-img" src="'+E(p.foto_url)+'">':'<div class="pcard-img" style="display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--blue);background:#EBF2FF;">'+E((p.nombre_publico||'?')[0])+'</div>')+'<div class="pcard-body"><div class="pcard-name">'+E(p.nombre_publico)+'</div><div class="pcard-sub">'+E(p.especialidad)+'</div>'+(cmp?'<div class="pcard-cmp">'+cmp+'</div>':'')+'<div class="pcard-sub">📍 '+E(p.sede==='TODAS'?'Ambas sedes':p.sede)+'</div><div class="pcard-days">📅 '+dcText+'</div></div></div>';}).join('')||'<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px">Sin profesionales</div>';}

function sP(id){AG.selProf=AG.profs.find(function(p){return p.id===id});rP();setTimeout(function(){goStep(2);},200);}

function rS(){var s=document.getElementById('fsv');if(!s||!AG.selProf)return;if(!AG.selProf.servicios||!AG.selProf.servicios.length){rpc('aos_catalogo_tratamientos',{}).then(function(i){if(i)s.innerHTML='<option value="">-- Seleccionar --</option>'+i.map(function(x){return '<option value="'+x.t+'">'+x.t+'</option>';}).join('');});return;}var m={};AG.selProf.servicios.forEach(function(x){m[x.toUpperCase()]=1;});rpc('aos_catalogo_tratamientos',{}).then(function(i){if(!i)return;var f=i.filter(function(x){return m[x.t.toUpperCase()];});if(!f.length)f=i;s.innerHTML='<option value="">-- Seleccionar --</option>'+f.map(function(x){return '<option value="'+x.t+'">'+x.t+'</option>';}).join('');});}

function lT(){if(!AG.selProf)return;rpc('aos_dias_con_turno',{p_profesional_id:AG.selProf.id,p_anio:AG.calYear,p_mes:AG.calMonth+1}).then(function(d){AG.diasTurno=d||[];rC();});}

function rC(){var y=AG.calYear,m=AG.calMonth,ms=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];document.getElementById('ct').textContent=ms[m]+' '+y;var f=new Date(y,m,1).getDay(),ds=new Date(y,m+1,0).getDate(),h=new Date(),hs=h.getFullYear()+'-'+String(h.getMonth()+1).padStart(2,'0')+'-'+String(h.getDate()).padStart(2,'0'),tm={};(AG.diasTurno||[]).forEach(function(d){var day=typeof d==='string'?parseInt(d.split('-')[2],10):(d.dia||d);tm[day]=1;});var hasTurnos=AG.diasTurno&&AG.diasTurno.length>0;var o='';['Do','Lu','Ma','Mi','Ju','Vi','Sá'].forEach(function(d){o+='<div class="ch">'+d+'</div>';});for(var i=0;i<f;i++)o+='<div class="cd emp">.</div>';for(var d=1;d<=ds;d++){var s=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'),pt=s<hs,ht=tm[d],is=s===AG.selFecha;var canClick=!pt&&(ht||!hasTurnos);var c='cd';if(canClick)c+=' av';if(s===hs)c+=' tod';if(ht&&!pt)c+=' ht';if(is)c+=' sel';o+='<div class="'+c+'"'+(canClick?' onclick="sF('+y+','+(m+1)+','+d+')"':'')+'>'+d+'</div>';}document.getElementById('cg').innerHTML=o;}

function cN(d){AG.calMonth+=d;if(AG.calMonth>11){AG.calMonth=0;AG.calYear++}if(AG.calMonth<0){AG.calMonth=11;AG.calYear--}lT();}

function sF(y,m,d){AG.selFecha=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');AG.selHora='';AG.selSede='';rC();document.getElementById('sc').style.display='block';document.getElementById('sf').textContent=AG.selFecha;document.getElementById('sg').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:10px;"><div class="sp" style="margin:0 auto;"></div></div>';rpc('aos_slots_disponibles',{p_profesional_id:AG.selProf?AG.selProf.id:null,p_fecha:AG.selFecha,p_sede:AG.selProf&&AG.selProf.sede!=='TODAS'?AG.selProf.sede:null}).then(function(r){if(!r||!r.ok||!r.slots||!r.slots.length){document.getElementById('sg').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:12px;font-size:10px;color:var(--muted)">Sin horarios disponibles</div>';document.getElementById('sbox').style.display='none';return;}
  var sedesMap={};r.slots.forEach(function(s){sedesMap[s.sede]=1;});var sh='';Object.keys(sedesMap).forEach(function(k){var si=SEDES[k];if(si)sh+='<div class="sede-box"><b>📍 '+E(k)+'</b><br>'+E(si.dir)+'<br><a href="'+si.map+'" target="_blank" style="color:var(--blue);font-weight:700;font-size:9px;">Ver en Google Maps →</a></div>';});document.getElementById('sbox').style.display=sh?'block':'none';document.getElementById('sbox').innerHTML=sh;
  document.getElementById('sg').innerHTML=r.slots.map(function(s){return '<div class="slot" onclick="sS(this,\''+s.hora+'\',\''+s.sede+'\')"><div style="font-weight:700;">'+s.hora+'</div><div style="font-size:8px;color:var(--muted);">'+s.sede+'</div><div style="font-size:8px;color:var(--green);">'+s.libres+' libre'+(s.libres>1?'s':'')+'</div></div>';}).join('');});document.getElementById('b2').disabled=true;}

function sS(e,h,s){AG.selHora=h;AG.selSede=s;document.querySelectorAll('.slot').forEach(function(x){x.classList.remove('sel')});e.classList.add('sel');document.getElementById('b2').disabled=false;}

function rD(){if(!AG.paciente)return;var p=AG.paciente;document.getElementById('dpre').style.display='block';document.getElementById('dpre').textContent='✅ '+(p.Nombres||'')+' '+(p.Apellidos||'');document.getElementById('fn').value=p.Nombres||'';document.getElementById('fa').value=p.Apellidos||'';document.getElementById('ft').value=AG.link.paciente_numero||p.numero_limpio||'';document.getElementById('fd').value=p['N° documento']||'';document.getElementById('fe').value=p.Email||'';}

function showConfirm(){
  var n=document.getElementById('fn').value.trim(),a=document.getElementById('fa').value.trim(),t=document.getElementById('ft').value.trim();
  if(!n||!a||!t){alert('Completa nombre, apellido y teléfono');return;}
  AG.selSvc=document.getElementById('fsv').value||AG.selSvc;
  var h='<div class="cov" onclick="if(event.target===this)this.remove()"><div class="cmod">';
  h+='<div style="text-align:center;margin-bottom:14px;"><div style="font-size:32px;">📋</div><div style="font-family:Exo 2;font-size:18px;font-weight:800;color:var(--pri);margin-top:4px;">Detalle de tu cita</div></div>';
  h+='<div class="rbox">';
  h+='<div class="rr"><span>Paciente</span><span>'+E(n)+' '+E(a)+'</span></div>';
  h+='<div class="rr"><span>Profesional</span><span>'+E(AG.selProf?AG.selProf.nombre_publico:'')+'</span></div>';
  h+='<div class="rr"><span>Tratamiento</span><span>'+E(AG.selSvc||'Consulta')+'</span></div>';
  h+='<div class="rr"><span>Fecha</span><span>'+E(AG.selFecha)+'</span></div>';
  h+='<div class="rr"><span>Hora</span><span>'+E(AG.selHora)+'</span></div>';
  h+='<div class="rr"><span>Sede</span><span>'+E(AG.selSede)+'</span></div></div>';
  h+='<div class="tyc"><b>📌 Términos y condiciones</b><br><br>';
  h+='• La <b>primera consulta de evaluación es gratuita</b>.<br>';
  h+='• Tienes derecho a <b>una reprogramación adicional sin costo</b>. Posterior a ello, la cita tiene el costo regular del servicio.<br>';
  h+='• Debes traer tu <b>DNI</b> para la atención.<br>';
  h+='• La atención es a <b>puerta cerrada</b>. Al llegar, tocar el timbre para ingresar.<br>';
  h+='• Llegar <b>15 minutos antes</b> de la hora programada.<br>';
  h+='• La consulta/tratamiento es personalizado. Puede haber tiempo de espera según la afluencia.</div>';
  h+='<button class="btn btn-p" style="margin-top:14px;" onclick="agC()" id="bc">✅ Confirmar cita</button>';
  h+='<button class="btn btn-back" onclick="this.closest(\'.cov\').remove()">Cancelar</button>';
  h+='</div></div>';
  var d=document.createElement('div');d.innerHTML=h;document.body.appendChild(d.firstElementChild);
}

function agC(){var n=document.getElementById('fn').value.trim(),a=document.getElementById('fa').value.trim(),t=document.getElementById('ft').value.trim();var b=document.getElementById('bc');b.textContent='⏳ Agendando...';b.disabled=true;rpc('aos_agendar_publica',{p_token:AG.token||'__permanent__',p_nombre:n,p_apellido:a,p_telefono:t,p_dni:document.getElementById('fd').value.trim(),p_email:document.getElementById('fe').value.trim(),p_profesional_id:AG.selProf?AG.selProf.id:null,p_tratamiento:AG.selSvc||'CONSULTA',p_tipo_cita:document.getElementById('ftc').value,p_fecha:AG.selFecha,p_hora:AG.selHora,p_sede:AG.selSede,p_nota:document.getElementById('fno').value.trim()}).then(function(r){document.querySelector('.cov').remove();if(r&&r.ok)sOk(n,a);else{alert(r&&r.error||'Error al agendar');}}).catch(function(){document.querySelector('.cov').remove();alert('Error de conexión');});}

var _adt=null;function aDP(v){clearTimeout(_adt);var n=v.replace(/\D/g,'');if(n.length<7){document.getElementById('pdet').style.display='none';return;}_adt=setTimeout(function(){rpc('aos_buscar_por_numero',{p_numero:n}).then(function(r){if(r&&r[0]){var p=r[0];document.getElementById('fn').value=p.nombre||'';document.getElementById('fa').value=p.apellido||'';document.getElementById('fd').value=p.documento||'';document.getElementById('fe').value=p.email||'';document.getElementById('pdet').style.display='block';document.getElementById('pdet').textContent='✅ Paciente encontrado: '+(p.nombre||'')+' '+(p.apellido||'');}else{document.getElementById('pdet').style.display='none';}}).catch(function(){});},500);}

function sOk(n,a){var h='<div class="sov"><div class="scard"><div style="font-size:48px;margin-bottom:8px;">🎉</div><h2 style="font-family:Exo 2;font-size:20px;color:var(--green);">¡Cita agendada!</h2><p style="font-size:12px;color:var(--muted);margin-top:4px;">Recibirás un correo de confirmación.</p><div class="rbox" style="margin-top:14px;text-align:left;"><div class="rr"><span>Paciente</span><span>'+E(n)+' '+E(a)+'</span></div><div class="rr"><span>Profesional</span><span>'+E(AG.selProf?AG.selProf.nombre_publico:'')+'</span></div><div class="rr"><span>Servicio</span><span>'+E(AG.selSvc||'Consulta')+'</span></div><div class="rr"><span>Fecha</span><span>'+E(AG.selFecha)+'</span></div><div class="rr"><span>Hora</span><span>'+E(AG.selHora)+'</span></div><div class="rr"><span>Sede</span><span>'+E(AG.selSede)+'</span></div></div><a href="https://api.whatsapp.com/send?phone=51922028889&text=Hola, acabo de agendar mi cita" style="display:inline-block;padding:10px 20px;background:#25D366;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;margin-top:12px">💬 Escríbenos</a></div></div>';var d=document.createElement('div');d.innerHTML=h;document.body.appendChild(d.firstElementChild);var e=document.getElementById('fe').value.trim();if(e)fetch('https://ascenda-os-production.up.railway.app/api/send-template',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:e,template:'confirmacion_cita',nombre:n+' '+a,tratamiento:AG.selSvc||'Consulta',hora:AG.selHora,sede:AG.selSede,fecha:AG.selFecha})}).catch(function(){});}
</script>
</body>
</html>
