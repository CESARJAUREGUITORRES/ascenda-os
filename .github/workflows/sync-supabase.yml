name: Sync Supabase → GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: npm install node-fetch@2

      - name: Sync desde Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node << 'EOF'
          const fetch = require('node-fetch');
          const fs = require('fs');
          const path = require('path');
          const ADN = ['SOUL.md','AGENTS.md','SKILLS.md','ULTRAPROMPMT_MAESTRO.md'];

          function getPath(nombre, tipo) {
            if (tipo === 'gs')   return `src/backend/${nombre}`;
            if (tipo === 'html') return `src/frontend/${nombre}`;
            if (tipo === 'md')   return ADN.includes(nombre) ? `docs/adn/${nombre}` : `docs/${nombre}`;
            return `src/${nombre}`;
          }

          async function main() {
            const resp = await fetch(
              `${process.env.SUPABASE_URL}/rest/v1/aos_codigo_fuente?select=nombre,tipo,contenido&order=tipo.asc,nombre.asc`,
              { headers: { apikey: process.env.SUPABASE_KEY, Authorization: `Bearer ${process.env.SUPABASE_KEY}` } }
            );
            const archivos = await resp.json();
            console.log(`Supabase: ${archivos.length} archivos`);
            let cambios = 0;
            for (const a of archivos) {
              if (!a.contenido || a.contenido === 'PENDIENTE_CONTENIDO_COMPLETO') continue;
              const fp = getPath(a.nombre, a.tipo);
              fs.mkdirSync(path.dirname(fp), { recursive: true });
              let actual = '';
              try { actual = fs.readFileSync(fp, 'utf8'); } catch(e) {}
              if (actual !== a.contenido) {
                fs.writeFileSync(fp, a.contenido, 'utf8');
                console.log(`  ✓ ${fp}`);
                cambios++;
              }
            }
            console.log(`Cambios: ${cambios}`);
            fs.writeFileSync('sync_result.txt', String(cambios));
          }
          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit y push si hay cambios
        run: |
          CAMBIOS=$(cat sync_result.txt 2>/dev/null || echo "0")
          if [ "$CAMBIOS" -gt "0" ]; then
            git config user.email "sync@creactive.os"
            git config user.name "AscendaOS Sync"
            git add src/ docs/
            git commit -m "sync: $CAMBIOS archivos actualizados desde Supabase [$(date +'%Y-%m-%d %H:%M')]"
            git push
            echo "Push: $CAMBIOS archivos"
          else
            echo "Sin cambios — no se hace commit"
          fi
