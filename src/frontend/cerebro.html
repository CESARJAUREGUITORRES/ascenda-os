<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=10">
<title>AscendaOS · Brain · KronIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#0A4FBF;--blue2:#071D4A;--cyan:#00C9A7;--bg:#F8FAFE;--card:rgba(255,255,255,0.92);--muted:rgba(10,79,191,0.10);--t2:rgba(7,29,74,0.40);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;display:block}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none}

/* Brand */
#brand{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--muted);border-radius:10px;padding:6px 10px;backdrop-filter:blur(12px);pointer-events:all}
.bc-dot{width:8px;height:8px;border-radius:50%;background:#E53935;box-shadow:0 0 6px #E53935;flex-shrink:0;transition:all .5s}
.bc-dot.on{background:#00C9A7;box-shadow:0 0 8px #00C9A7;animation:glow 2.5s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
.bc-name{font-size:10px;font-weight:700;color:var(--blue2);letter-spacing:.04em;white-space:nowrap}
#sb-lbl{font-size:8px;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;color:#E53935;transition:color .5s}
#sb-lbl.on{color:#00C9A7}
.bc-sep{width:1px;height:20px;background:rgba(10,79,191,0.10);flex-shrink:0;margin:0 1px}
#btn-mic-cfg{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.30);border:1px solid rgba(10,79,191,0.10);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:11px;opacity:0.50;line-height:1}
#btn-mic-cfg:hover{opacity:0.9;background:rgba(0,201,167,0.10);border-color:rgba(0,201,167,0.22)}

/* Métricas */
#metrics{position:absolute;top:10px;right:10px;display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.mc{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 9px;backdrop-filter:blur(10px);display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.mv{font-size:14px;font-weight:800;color:var(--blue)}.ml{font-size:7px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase}

/* Notificaciones */
#nl{position:absolute;top:66px;left:10px;width:min(200px,36vw);display:flex;flex-direction:column;gap:4px;pointer-events:all}
#nr{position:absolute;top:66px;right:10px;width:min(185px,34vw);display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:all}
#nb{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);width:min(320px,84vw);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:all}
.notif{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:5px 8px;backdrop-filter:blur(10px);animation:nIn .22s ease;max-width:100%;transition:opacity .35s,transform .35s}
@keyframes nIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.rIn{animation:rIn .22s ease}@keyframes rIn{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.out{opacity:0!important;transform:translateY(-3px) scale(.97)!important}
.ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.ntime{font-size:7.5px;font-weight:600;min-width:32px;white-space:nowrap}
.nmsg{font-size:8.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.ndism{background:none;border:none;color:var(--t2);font-size:11px;cursor:pointer;padding:0 2px;margin-left:2px}
.na{border-color:rgba(220,50,50,0.18)!important;background:rgba(255,248,248,0.93)!important}
.ni{flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;border-color:rgba(0,201,167,0.18)!important;background:rgba(248,254,252,0.92)!important}
.ni .nh{display:flex;align-items:center;gap:5px;width:100%}
.ni .nd{font-size:8px;color:#006655;display:none;margin-top:3px;padding-top:4px;border-top:1px solid rgba(0,201,167,0.12);line-height:1.5;white-space:normal;max-width:300px}
.ni.exp .nd{display:block}

/* ── KronIA panel ── */
#kronia{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
  width:min(320px,88vw);background:var(--card);
  border:1px solid rgba(0,201,167,0.22);border-radius:14px;
  padding:10px 14px 10px;backdrop-filter:blur(14px);
  display:flex;flex-direction:column;gap:7px;
  opacity:0;translate:0 8px;transition:all .3s;
  pointer-events:none}
#kronia.vis{opacity:1;translate:0 0;pointer-events:all}

/* Header KronIA */
.kk-top{display:flex;align-items:center;gap:7px}
#kk-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:var(--t2);transition:background .4s,box-shadow .4s}
#kk-dot.listening{background:#00C9A7;box-shadow:0 0 8px #00C9A7}
#kk-dot.recording{background:#E53935;box-shadow:0 0 10px #E53935;animation:mglow .5s infinite}
#kk-dot.speaking{background:#0A4FBF;box-shadow:0 0 8px #0A4FBF;animation:mglow .7s infinite}
#kk-dot.thinking{background:#F0A020;box-shadow:0 0 8px #F0A020;animation:mglow 1s infinite}
#kk-dot.nomic{background:#E53935;box-shadow:0 0 6px #E53935}
@keyframes mglow{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.kk-name{font-size:11px;font-weight:700;color:var(--blue2);letter-spacing:.04em}
#kk-st{font-size:8px;color:var(--t2);flex:1;letter-spacing:.07em;text-transform:uppercase}

/* Waveform */
#kk-cv{width:100%;height:28px;border-radius:6px;background:rgba(0,201,167,0.04)}

/* Texto transcrito */
#kk-txt{font-size:9.5px;color:var(--blue2);line-height:1.4;
  min-height:14px;opacity:.72;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── BOTÓN PTT ── */
#ptt-area{display:flex;flex-direction:column;align-items:center;gap:5px}
#btn-ptt{
  width:62px;height:62px;border-radius:50%;
  background:linear-gradient(145deg,#00C9A7,#0A4FBF);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#fff;
  box-shadow:0 4px 18px rgba(0,201,167,0.35);
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  user-select:none;
}
#btn-ptt:active,#btn-ptt.recording{
  background:linear-gradient(145deg,#E53935,#B01010);
  box-shadow:0 4px 22px rgba(229,57,53,0.45);
  transform:scale(1.08);
}
#btn-ptt.thinking{
  background:linear-gradient(145deg,#F0A020,#D08000);
  box-shadow:0 4px 18px rgba(240,160,32,0.35);
}
#ptt-hint{font-size:8px;color:var(--t2);text-align:center;letter-spacing:.05em}

/* ── Modal mic ── */
#mic-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(7,29,74,0.22);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .22s}
#mic-modal.open{opacity:1;pointer-events:all}
#mic-card{background:#fff;border:1px solid rgba(10,79,191,0.14);border-radius:14px;
  padding:18px 20px;width:min(320px,88vw);box-shadow:0 8px 32px rgba(10,79,191,0.12);
  display:flex;flex-direction:column;gap:12px}
.mic-title{font-size:13px;font-weight:700;color:var(--blue2);display:flex;align-items:center;gap:7px}
.mic-sub{font-size:9px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-top:-6px}
#mic-list{display:flex;flex-direction:column;gap:6px}
.mic-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;
  border:1.5px solid transparent;cursor:pointer;transition:all .18s;background:var(--bg)}
.mic-opt:hover{border-color:rgba(0,201,167,0.3);background:rgba(248,254,252,0.8)}
.mic-opt.sel{border-color:#00C9A7;background:rgba(0,201,167,0.07)}
.mic-opt-dot{width:8px;height:8px;border-radius:50%;background:var(--t2);flex-shrink:0;transition:background .2s}
.mic-opt.sel .mic-opt-dot{background:#00C9A7;box-shadow:0 0 6px #00C9A7}
.mic-opt-name{font-size:10px;font-weight:600;color:var(--blue2);flex:1}
.mic-opt-type{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em}
.mic-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.mic-btn{padding:6px 14px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
#mic-cancel{background:transparent;border:1px solid var(--muted);color:var(--t2)}
#mic-accept{background:var(--cyan);color:#fff}
#mic-accept:hover{background:#00b090}

/* Controles */
#ctrls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;pointer-events:all}
.cb{background:var(--card);border:1px solid var(--muted);border-radius:8px;padding:4px 10px;font-size:8.5px;color:var(--blue2);cursor:pointer;backdrop-filter:blur(8px);font-weight:600;transition:all .2s;white-space:nowrap}
.cb:hover{background:rgba(10,79,191,0.06)}.cb.on{border-color:var(--cyan);color:#007060}
#zpill{font-size:8px;color:var(--t2);background:var(--card);border:1px solid var(--muted);border-radius:20px;padding:3px 9px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}

/* Tooltip */
#tt{position:fixed;background:#fff;border:1px solid rgba(10,79,191,0.14);border-radius:12px;padding:10px 14px;min-width:160px;max-width:210px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:30;box-shadow:0 4px 18px rgba(10,79,191,0.09)}
#tt-n{font-size:11px;font-weight:700;color:var(--blue2);margin-bottom:5px;display:block}
.tr{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.tk{font-size:9px;color:var(--t2)}.tv{font-size:9px;font-weight:700;color:var(--blue2)}
@media(max-width:480px){#nl{width:min(150px,32vw)}#nr{width:min(140px,30vw)}.nmsg{max-width:85px;font-size:8px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="brand">
    <div class="bc-dot" id="sb-dot"></div>
    <div>
      <div class="bc-name">AscendaOS · Brain</div>
      <div id="sb-lbl">Sin conexión</div>
    </div>
    <div class="bc-sep"></div>
    <button id="btn-mic-cfg" title="Configurar micrófono">⚙︎</button>
  </div>
  <div id="metrics">
    <div class="mc"><span class="mv" id="m-ev">0</span><span class="ml">eventos</span></div>
    <div class="mc"><span class="mv" id="m-tb" style="color:var(--cyan)">8</span><span class="ml">tablas</span></div>
  </div>
  <div id="nl"></div>
  <div id="nr"></div>
  <div id="nb"></div>

  <!-- KronIA panel -->
  <div id="kronia">
    <div class="kk-top">
      <div id="kk-dot"></div>
      <span class="kk-name">KronIA</span>
      <span id="kk-st">Lista</span>
    </div>
    <canvas id="kk-cv"></canvas>
    <div id="kk-txt">Presiona y habla 🎙️</div>
    <div id="ptt-area">
      <button id="btn-ptt">🎙️</button>
      <div id="ptt-hint">Mantén presionado · Habla · Suelta</div>
    </div>
  </div>

  <div id="ctrls">
    <button class="cb" id="btn-fs">⛶ Pantalla completa</button>
    <div id="zpill">zoom 1.0×</div>
    <button class="cb" id="btn-kk">🧠 KronIA</button>
  </div>
</div>

<!-- Modal micrófono -->
<div id="mic-modal">
  <div id="mic-card">
    <div>
      <div class="mic-title">🎤 Micrófono</div>
      <div class="mic-sub">Selecciona el dispositivo de entrada</div>
    </div>
    <div id="mic-list">Cargando dispositivos…</div>
    <div class="mic-actions">
      <button class="mic-btn" id="mic-cancel">Cancelar</button>
      <button class="mic-btn" id="mic-accept">Aceptar</button>
    </div>
  </div>
</div>

<div id="tt"><span id="tt-n"></span><div id="tt-b"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// ASCENDAOS BRAIN v3 + KRONIA v4.0 — PTT (Push-to-Talk)
// Sin palabras clave. Presiona → habla → suelta → KronIA responde.
// ═══════════════════════════════════════════════════════════════

const SB  = 'https://ituyqwstonmhnfshnaqz.supabase.co';
const SK  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dXlxd3N0b25taG5mc2huYXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDQyMTgsImV4cCI6MjA5MDMyMDIxOH0.w_pU4ecrrgekB7WzWrQrQd_7Deu_Cxm5ybUCZry5Mh0';
const SK2 = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbmV6bGh0cWtpdWN3bXJkaXJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDY5OTY4MjAsImV4cCI6MjAyMjU3MjgyMH0.R5-sbTxsHf-7oSsIw0ZRMqBobDUz0vI62f19hmJKmMA';
const H   = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };

// ── Canvas principal ─────────────────────────────────────────────
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H2;
function resize() { W = cv.width = innerWidth; H2 = cv.height = innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); initG(); });

// ── Tablas ───────────────────────────────────────────────────────
const TS = {
  aos_llamadas:          { idle:[185,212,252], live:[55,138,221],  label:'Llamadas',  n:12229 },
  aos_pacientes:         { idle:[158,236,220], live:[0,201,167],   label:'Pacientes', n:7010  },
  aos_base_etiquetas:    { idle:[198,216,242], live:[10,79,191],   label:'Etiquetas', n:6547  },
  aos_leads:             { idle:[192,216,255], live:[10,79,191],   label:'Leads',     n:2704  },
  aos_ventas:            { idle:[175,236,195], live:[34,200,112],  label:'Ventas',    n:608   },
  aos_agenda_citas:      { idle:[165,241,214], live:[0,229,160],   label:'Citas',     n:480   },
  aos_seguimientos:      { idle:[251,220,170], live:[240,160,32],  label:'Seguim.',   n:231   },
  aos_inversion_campanas:{ idle:[214,210,253], live:[127,119,221], label:'Inversión', n:19    },
  aos_rrhh:              { idle:[210,223,250], live:[7,29,74],     label:'RRHH',      n:6     },
  otros:                 { idle:[214,223,240], live:[100,130,180], label:'Sistema',   n:1     }
};
const CONN = [
  ['aos_leads','aos_llamadas'],['aos_leads','aos_pacientes'],['aos_leads','aos_agenda_citas'],
  ['aos_llamadas','aos_agenda_citas'],['aos_llamadas','aos_ventas'],['aos_llamadas','aos_seguimientos'],
  ['aos_llamadas','aos_pacientes'],['aos_pacientes','aos_agenda_citas'],['aos_pacientes','aos_ventas'],
  ['aos_agenda_citas','aos_ventas'],['aos_ventas','aos_seguimientos'],['aos_inversion_campanas','aos_leads'],
  ['aos_base_etiquetas','aos_pacientes'],['aos_rrhh','aos_llamadas']
];

// ── Grafo ────────────────────────────────────────────────────────
let nodes=[], edges=[], gmap={};
const eSet = new Set();
function nR(n){ return Math.max(1.2, Math.log10(n+1)*2.3); }
function lR(a,b,t){ return [~~(a[0]+(b[0]-a[0])*t),~~(a[1]+(b[1]-a[1])*t),~~(a[2]+(b[2]-a[2])*t)]; }
function d2(a,b){ return (a.x-b.x)**2+(a.y-b.y)**2; }
function addE(a,b,cr){ if(a===b)return; const k=a.id<b.id?a.id+'|'+b.id:b.id+'|'+a.id; if(!eSet.has(k)){eSet.add(k);edges.push({a,b,cross:cr});} }
function initG(){
  nodes=[];edges=[];gmap={};eSet.clear();
  const keys=Object.keys(TS),N=keys.length,R=Math.min(W,H2)*.32;
  keys.forEach((k,i)=>{
    const st=TS[k],ang=(i/N)*Math.PI*2-Math.PI/2;
    const gcx=W/2+R*.65*Math.cos(ang),gcy=H2/2+R*.65*Math.sin(ang);
    const cnt=Math.max(3,Math.floor(Math.log10(st.n+1)*5.5));
    gmap[k]=[];
    for(let j=0;j<cnt;j++){
      const a=Math.random()*Math.PI*2,r=Math.random()*R*.18*(0.4+Math.random()*.6);
      const hub=j===0,nr=hub?nR(st.n)*1.8:nR(st.n)*(.45+Math.random()*.65);
      const node={id:nodes.length,x:gcx+Math.cos(a)*r,y:gcy+Math.sin(a)*r,ox:gcx,oy:gcy,vx:0,vy:0,r:nr,group:k,idle:st.idle,live:st.live,pulse:0,phase:Math.random()*Math.PI*2,pspd:.002+Math.random()*.002,label:hub?st.label:null};
      nodes.push(node);gmap[k].push(node);
    }
  });
  Object.values(gmap).forEach(gn=>{ gn.forEach(n=>{ [...gn].filter(m=>m!==n).sort((a,b)=>d2(n,a)-d2(n,b)).slice(0,2+~~(Math.random()*2)).forEach(m=>addE(n,m,false)); }); });
  CONN.forEach(([ga,gb])=>{ const na=gmap[ga]||[],nb=gmap[gb]||[]; if(!na.length||!nb.length)return; for(let i=0;i<Math.min(2,na.length);i++)for(let j=0;j<Math.min(2,nb.length);j++)addE(na[i],nb[j],true); const x=~~(Math.min(na.length,nb.length)*.12)+1; for(let k=0;k<x;k++)addE(na[~~(Math.random()*na.length)],nb[~~(Math.random()*nb.length)],true); });
  for(let i=0;i<350;i++)phys(i<80?.82:i<200?.92:.97);
  nodes.forEach(n=>{n.ox=n.x;n.oy=n.y;});
}
function phys(d=.92){
  const k=Math.min(W,H2)*.021;
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,mD=(a.r+b.r)*3;if(dd<k*2.8){const f=k*k/dd*.38;a.vx-=dx/dd*f;a.vy-=dy/dd*f;b.vx+=dx/dd*f;b.vy+=dy/dd*f;}if(dd<mD){const p=(mD-dd)*.2;a.vx-=dx/dd*p;a.vy-=dy/dd*p;b.vx+=dx/dd*p;b.vy+=dy/dd*p;}}
  edges.forEach(e=>{const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dd=Math.sqrt(dx*dx+dy*dy)||.01,ideal=e.cross?k*2.5:k*1.1,f=(dd-ideal)/dd*.08;e.a.vx+=dx*f;e.a.vy+=dy*f;e.b.vx-=dx*f;e.b.vy-=dy*f;});
  nodes.forEach(n=>{n.vx+=(n.ox-n.x)*.018;n.vy+=(n.oy-n.y)*.018;n.vx+=(W/2-n.x)*.001;n.vy+=(H2/2-n.y)*.001;n.vx*=d;n.vy*=d;n.x+=n.vx;n.y+=n.vy;});
}

// ── Cámara ───────────────────────────────────────────────────────
let cam={x:0,y:0,z:1,tz:1},drag={on:false,lx:0,ly:0},pinch={on:false,d0:0,z0:1},hovered=null;
cv.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(drag.on){cam.x+=e.clientX-drag.lx;cam.y+=e.clientY-drag.ly;drag.lx=e.clientX;drag.ly=e.clientY;return;}if(cam.z>1.8)chkHov(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{drag.on=false;cv.style.cursor='default';});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.tz=Math.max(.12,Math.min(16,cam.tz*(e.deltaY<0?1.12:.9)));},{passive:false});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;}if(e.touches.length===2){pinch.on=true;drag.on=false;pinch.d0=ptd(e);pinch.z0=cam.z;}},{passive:true});

function getVoz(){
  const vs = synth.getVoices(); if(!vs.length)return null;
  const p = [
    v => v.name === 'Google español',
    v => v.name.toLowerCase().includes('google') && v.lang.startsWith('es'),
    v => v.lang === 'es-MX', v => v.lang === 'es-US',
    v => v.lang === 'es-419', v => v.lang.startsWith('es')
  ];
  for(const t of p){ const v = vs.find(t); if(v)return v; }
  return vs[0] || null;
}
if(synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => { kkVoice = getVoz(); };

// ── Estado visual ────────────────────────────────────────────────
function kkState(s){
  const dot = document.getElementById('kk-dot'), st = document.getElementById('kk-st');
  if(!dot || !st) return;
  const M = {
    idle:      { d:'',          t:'Lista — presiona para hablar' },

    thinking:  { d:'thinking',  t:'Consultando Supabase…'        },
    speaking:  { d:'speaking',  t:'Hablando…'                    },
    nomic:     { d:'nomic',     t:'Sin acceso al micrófono'       }

// ── Hablar ───────────────────────────────────────────────────────
function kkSpeak(text){
  synth.cancel(); isSpeaking = true;
  const u = new SpeechSynthesisUtterance(text);
  if(!kkVoice) kkVoice = getVoz();
  if(kkVoice) u.voice = kkVoice;
  u.lang = 'es-PE'; u.rate = 0.90; u.pitch = 1.12; u.volume = 1;
  document.getElementById('kk-txt').textContent = text;

    isSpeaking = false;
    if(micReady){ kkState('idle'); if(analyser)waveReal(); else waveSynth('listen'); }
    else { kkState('idle'); stopWave(); }
    setPTTIcon('🎙️');
  };
  u.onerror = () => { isSpeaking = false; kkState('idle'); setPTTIcon('🎙️'); };

}

// ── Permisos + stream ────────────────────────────────────────────
async function pedirPermiso(){
  kkState('idle');
  document.getElementById('kk-txt').textContent = 'Solicitando acceso al micrófono…';
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({audio:true});
    tmp.getTracks().forEach(t=>t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    availableDevices = devs.filter(d=>d.kind==='audioinput');
    if(availableDevices.length > 0) selectedDeviceId = availableDevices[0].deviceId;
    await startStream();
    micReady = true;
    kkState('idle');
    document.getElementById('kk-txt').textContent = 'Presiona el botón y habla 🎙️';
    setPTTIcon('🎙️');
    waveReal();
  } catch(err){
    micReady = false;
    kkState('nomic');
    const msg = err.name==='NotAllowedError' ? 'Permiso denegado.' : err.name==='NotFoundError' ? 'Sin micrófono.' : 'Error: '+err.name;
    document.getElementById('kk-txt').textContent = msg;
    pushAlert('Mic: '+err.name);
    kkSpeak('No pude acceder al micrófono. Verifica los permisos en el navegador.');
  }
}

async function startStream(){
  const c = { audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true,
    ...(selectedDeviceId ? {deviceId:{exact:selectedDeviceId}} : {}) }};
  micStream = await navigator.mediaDevices.getUserMedia(c);
  if(audioCtx){ audioCtx.close(); audioCtx = null; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64; analyser.smoothingTimeConstant = 0.7;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
}
function stopStream(){
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream = null; }
  if(audioCtx){ audioCtx.close(); audioCtx = null; }
  analyser = null; dataArr = null;
}
function stopMic(){
  micReady = false; isRecording = false;
  if(recognition){ try{recognition.abort();}catch(_){} recognition = null; }
  stopStream();
}

function pttStart(){

function pttStop(){

  document.getElementById('btn-ptt').classList.remove('recording');
  setPTTIcon('⏳');
  document.getElementById('btn-ptt').classList.add('thinking');
  if(recognition){
    try{ recognition.stop(); }catch(_){}
  }

// ── Reconocimiento ÚNICO por grabación ──────────────────────────
function startSingleReco(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ pushAlert('Usa Chrome para la voz'); return; }

  recognition = new SR();
  recognition.lang = 'es-PE';
  recognition.continuous = false;   // ← UNA sola grabación
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onresult = function(e){
    // Mostrar transcripción en tiempo real
    const last = e.results[e.results.length - 1];
    const txt = last[0].transcript.trim();
    document.getElementById('kk-txt').textContent = (last.isFinal ? '✅ ' : '👂 ') + txt;
  };

  recognition.onend = function(){
    // Al terminar, tomar el mejor resultado final
    document.getElementById('btn-ptt').classList.remove('thinking');
    setPTTIcon('🎙️');
    isRecording = false;

    // Recuperar último texto mostrado (ya filtrado de interim)
    const txt = document.getElementById('kk-txt').textContent
      .replace(/^[✅👂⏳🎤]\s*/, '').trim();

    if(!txt || txt.length < 2){
      kkState('idle');
      document.getElementById('kk-txt').textContent = 'No te escuché. Intenta de nuevo.';
      return;
    }
    processQuery(txt);
  };

  recognition.onerror = function(e){
    document.getElementById('btn-ptt').classList.remove('recording');
    document.getElementById('btn-ptt').classList.remove('thinking');
    setPTTIcon('🎙️');
    isRecording = false;
    if(e.error === 'not-allowed'){
      pushAlert('Mic: permiso denegado'); micReady = false; kkState('nomic');
    } else if(e.error === 'no-speech'){
      kkState('idle');
      document.getElementById('kk-txt').textContent = 'No te escuché. Intenta de nuevo.';
    } else {
      pushAlert('Error voz: ' + e.error);
      kkState('idle');
    }
  };

  try{ recognition.start(); } catch(e){ console.error('SR start:', e); }
}

// ── Waveforms ────────────────────────────────────────────────────
function stopWave(){
  if(waveAnim){ cancelAnimationFrame(waveAnim); waveAnim = null; }
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  kkCtx2.clearRect(0, 0, kkCv.width, kkCv.height);
}
function waveReal(){
  if(waveAnim) cancelAnimationFrame(waveAnim);
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  const cw = kkCv.width, ch = kkCv.height;
  function frame(){
    if(!analyser || isSpeaking){ waveAnim = null; return; }
    analyser.getByteFrequencyData(dataArr);
    kkCtx2.clearRect(0, 0, cw, ch);
    const bars = dataArr.length, bw = cw / bars;
    const sig = dataArr.some(v => v > 8);
    const col = isRecording ? '229,57,53' : '0,201,167';
    for(let i = 0; i < bars; i++){
      const h = sig ? Math.max(2,(dataArr[i]/255)*ch*.88) : 2;
      const al = sig ? (0.3 + dataArr[i]/255*.65) : 0.18;
      kkCtx2.fillStyle = 'rgba(' + col + ',' + al.toFixed(2) + ')';
      kkCtx2.beginPath();
      if(kkCtx2.roundRect) kkCtx2.roundRect(i*bw+1, ch/2-h/2, bw-2, h, 2);
      else kkCtx2.rect(i*bw+1, ch/2-h/2, bw-2, h);
      kkCtx2.fill();
    }
    waveAnim = requestAnimationFrame(frame);
  }
  frame();
}
function waveSynth(mode){
  if(waveAnim) cancelAnimationFrame(waveAnim);
  kkCv.width = kkCv.offsetWidth || 280; kkCv.height = kkCv.offsetHeight || 28;
  const cw = kkCv.width, ch = kkCv.height;
  const spd = mode==='speak' ? .10 : .04, amp = mode==='speak' ? .75 : .30;
  let t = 0;
  function frame(){
    t += spd; kkCtx2.clearRect(0, 0, cw, ch);
    for(let i = 0; i < 22; i++){
      const h = Math.max(2,(Math.sin(t+i*.42)*amp+amp+.05)*ch*.82);
      kkCtx2.fillStyle = 'rgba(0,201,167,' + (mode==='speak'?.65:.30) + ')';
      kkCtx2.beginPath();
      if(kkCtx2.roundRect) kkCtx2.roundRect(i*(cw/22)+1, ch/2-h/2, cw/22-2, h, 2);
      else kkCtx2.rect(i*(cw/22)+1, ch/2-h/2, cw/22-2, h);
      kkCtx2.fill();
    }
    waveAnim = requestAnimationFrame(frame);
  }
  frame();
}

const NSE = ['Eso no lo tengo aún. Puedo ayudarte con ventas, citas, leads, pacientes, llamadas o el resumen del día.','No entendí bien. ¿Ventas, citas, leads o el resumen del día?','Por ahora no tengo eso. ¿Quieres ventas, citas o el resumen?'];

function ap(c){ return (c ? APc : AP)[~~(Math.random()*(c?APc:AP).length)]; }
function opt(i){ return OPTS[i] ? ' ' + OPTS[i] : ''; }
function nse(){ return NSE[~~(Math.random()*NSE.length)]; }
function topV(arr,key){ const c={}; let mx=0,res='sin datos'; arr.forEach(o=>{ const v=o[key]||'sin datos'; c[v]=(c[v]||0)+1; if(c[v]>mx){mx=c[v];res=v;} }); return res; }
function detectInt(q){
  const qn = norm(q);
  if(qn.length < 20 && ultimaInt){ const cont=['y','por','de','en','ese','esa','eso','cual','cuales','mas','tambien','ahora']; if(cont.some(c=>qn===c||qn.startsWith(c+' ')))return{i:ultimaInt,c:true}; }
  for(const [int,cls] of Object.entries(INTS)){ if(cls.some(c=>qn.includes(c)))return{i:int,c:false}; }
  if(ultimaInt) return{i:ultimaInt,c:true};
  return{i:'resumen',c:false};
}
function getPer(q,ctx){
  const qn=norm(q), hoy=new Date().toISOString().split('T')[0];
  if(qn.includes('hoy')||qn.includes('dia'))return{label:'hoy',f:'fecha=eq.'+hoy};
  if(qn.includes('semana')){const d7=new Date(Date.now()-7*86400000).toISOString().split('T')[0];return{label:'esta semana',f:'fecha=gte.'+d7};}
  if(qn.includes('mes'))return{label:'este mes',f:'fecha=gte.'+hoy.slice(0,7)+'-01'};
  if(qn.includes('ayer')){const ay=new Date(Date.now()-86400000).toISOString().split('T')[0];return{label:'ayer',f:'fecha=eq.'+ay};}
  if(ctx&&ctx.per)return ctx.per;
  return{label:'este mes',f:'fecha=gte.'+hoy.slice(0,7)+'-01'};
}

      const d=await fetch(url,{headers:H}).then(r=>r.json()); tabs=['aos_agenda_citas'];
      if(d&&d.length){const p=d[0],nom=((p.nombre||'')+(p.apellido?' '+p.apellido:'')).trim()||'un paciente';
        resp=a+' hay '+d.length+' cita'+(d.length>1?'s':'')+' para '+lf+'. La primera es '+nom+' a las '+(p.hora_cita||'hora por confirmar')+' por '+(p.tratamiento||'tratamiento sin registrar')+'.'+opt('citas');
        ultimoCtx={fc,i:'citas'};
      } else resp='No hay citas para '+lf+(sd?' en '+sd:'')+'. ¿Quieres que revise otra fecha?';

    } else if(int==='leads'){
      const d=await fetch(SB+'/rest/v1/aos_leads?select=tratamiento,fecha&'+per.f,{headers:H}).then(r=>r.json()); tabs=['aos_leads'];
      if(d&&d.length){resp=a+' '+per.label+' ingresaron '+d.length+' leads. La campaña líder fue '+topV(d,'tratamiento')+'.'+opt('leads');ultimoCtx={per,i:'leads'};}
      else resp='No encontré leads para '+per.label+'. ¿Quieres otro período?';

    } else if(int==='cliente'){
      const num=(q.match(/\d{7,}/)||[''])[0];
      if(num){
        const d=await fetch(SB+'/rest/v1/aos_pacientes?select="Nombres","Apellidos","SCORE_ESTADO",n_ventas,"TOTAL_FACTURADO",tratamiento_principal&numero_limpio=eq.'+num+'&limit=1',{headers:H}).then(r=>r.json()); tabs=['aos_pacientes'];
        if(d&&d[0]){const p=d[0],nom=((p['Nombres']||'')+(p['Apellidos']?' '+p['Apellidos']:'')).trim();
          resp=a+' el '+num+' es '+nom+'. Tiene '+p.n_ventas+' compras por S/ '+parseFloat(p['TOTAL_FACTURADO']||0).toFixed(0)+'. Tratamiento: '+(p.tratamiento_principal||'sin registrar')+'. Estado: '+(p['SCORE_ESTADO']||'sin score')+'.'+opt('cliente');
          ultimoCtx={num,i:'cliente'};
        } else resp='No encontré paciente con el número '+num+'. ¿Puedes verificarlo?';
      } else resp='Dime el número de teléfono del paciente.';

    } else if(int==='llamadas'){
      const hoy=new Date().toISOString().split('T')[0];
      const d=await fetch(SB+'/rest/v1/aos_llamadas?select=asesor,estado&fecha=eq.'+hoy,{headers:H}).then(r=>r.json()); tabs=['aos_llamadas'];
      if(d&&d.length)resp=a+' hoy van '+d.length+' llamadas. El que más llamó fue '+topV(d,'asesor')+'.'+opt('llamadas');
      else resp='No hay llamadas registradas hoy todavía.';

    } else if(int==='seguimientos'){
      const d=await fetch(SB+'/rest/v1/aos_seguimientos?select="ESTADO","ASESOR"&"ESTADO"=eq.PENDIENTE',{headers:H}).then(r=>r.json()); tabs=['aos_seguimientos'];
      if(d&&d.length)resp=a+' hay '+d.length+' seguimientos pendientes. El que tiene más es '+topV(d,'ASESOR')+'.'+opt('seguimientos');
      else resp='No hay seguimientos pendientes. ¡Todo al día!';

    } else if(int==='resumen'){
      const hoy=new Date().toISOString().split('T')[0];
      const [rv,rl,rc,rs] = await Promise.all([
        fetch(SB+'/rest/v1/aos_ventas?select=monto&fecha=eq.'+hoy+'&estado_pago=eq.PAGO COMPLETO',{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_llamadas?select=id&fecha=eq.'+hoy,{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_agenda_citas?select=id&fecha_cita=eq.'+hoy,{headers:H}).then(r=>r.json()),
        fetch(SB+'/rest/v1/aos_seguimientos?select=id&"ESTADO"=eq.PENDIENTE',{headers:H}).then(r=>r.json())
      ]);
      tabs=['aos_ventas','aos_llamadas','aos_agenda_citas','aos_seguimientos'];
      const totalV=(rv||[]).reduce((ac,v)=>ac+(parseFloat(v.monto)||0),0);
      const hora=new Date().getHours(), sal=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
      resp=sal+' César. Hoy: '+(rl||[]).length+' llamadas, '+(rc||[]).length+' citas, S/ '+totalV.toFixed(0)+' en ventas y '+(rs||[]).length+' seguimientos pendientes. ¿Por dónde empezamos?';
      ultimoCtx={i:'resumen'};

    } else if(int==='estado'){
      const on=document.getElementById('sb-dot').classList.contains('on');
      resp=on?'Todo funciona bien César. Supabase conectado, '+evCnt+' eventos en esta sesión.':'Hay un problema de conexión con Supabase.';
    } else {
      resp = nse();
    }
  } catch(e){ resp='Tuve un problema consultando los datos. Intenta de nuevo.'; }

  document.getElementById('btn-ptt').classList.remove('thinking');
  tabs.forEach((t,i)=>setTimeout(()=>activateTable(t,'CONSULTA'),i*200));
  memoria.unshift({i:int,q,r:resp,tabs,ts:Date.now()});
  if(memoria.length>5)memoria.pop();
  ultimaInt=int;
  guardar(int,q,resp,tabs);
  aprender(int,q);
  kkSpeak(resp);
}

// ── Modal micrófono ──────────────────────────────────────────────
async function openMicModal(){
  const modal = document.getElementById('mic-modal');
  const list  = document.getElementById('mic-list');
  list.innerHTML = '<p style="font-size:10px;color:var(--t2);text-align:center;padding:8px">Cargando dispositivos…</p>';
  modal.classList.add('open');
  try{
    try{ const tmp=await navigator.mediaDevices.getUserMedia({audio:true}); tmp.getTracks().forEach(t=>t.stop()); }catch(e){}
    const devs = await navigator.mediaDevices.enumerateDevices();
    availableDevices = devs.filter(d=>d.kind==='audioinput');
    if(!availableDevices.length){ list.innerHTML='<p style="font-size:10px;color:var(--t2);text-align:center;padding:8px">No hay micrófonos detectados.</p>'; return; }
    if(!selectedDeviceId&&availableDevices.length>0) selectedDeviceId = availableDevices[0].deviceId;
    pendingDeviceId = selectedDeviceId;
    list.innerHTML = '';
    availableDevices.forEach((d,idx)=>{
      const label = d.label || ('Micrófono '+(idx+1));
      const ln = label.toLowerCase();
      const tipo = ln.includes('bluetooth')||ln.includes('airpod')||ln.includes('wireless')?'🔵 Bluetooth':ln.includes('hdmi')||ln.includes('display')?'🖥️ HDMI':d.deviceId==='default'||ln.includes('default')||ln.includes('predeterminado')?'🎤 Predeterminado':'🎙️ Interno';
      const item = document.createElement('div');
      item.className = 'mic-opt' + (d.deviceId===pendingDeviceId?' sel':'');
      item.innerHTML = '<div class="mic-opt-dot"></div><div style="flex:1;min-width:0"><div class="mic-opt-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+label+'</div><div class="mic-opt-type">'+tipo+'</div></div>';
      item.onclick = () => { pendingDeviceId=d.deviceId; list.querySelectorAll('.mic-opt').forEach(o=>o.classList.remove('sel')); item.classList.add('sel'); };
      list.appendChild(item);
    });
  }catch(e){ list.innerHTML='<p style="font-size:10px;color:#B01010;text-align:center;padding:8px">Error: '+e.name+'</p>'; }
}
function closeMicModal(){ document.getElementById('mic-modal').classList.remove('open'); }
async function applyMicSelection(){
  closeMicModal();
  if(pendingDeviceId && pendingDeviceId !== selectedDeviceId){
    selectedDeviceId = pendingDeviceId;
    if(micReady){ stopStream(); await startStream(); kkSpeak('Micrófono cambiado.'); }
  }
}

function checkSB(){
  fetch(SB+'/rest/v1/aos_log_auditoria?select=id&limit=1',{headers:H}).then(r=>{
    const on=r.ok;
    document.getElementById('sb-dot').className='bc-dot'+(on?' on':'');

  }).catch(()=>{
    document.getElementById('sb-dot').className='bc-dot';
    document.getElementById('sb-lbl').className='';
    document.getElementById('sb-lbl').textContent='Sin conexión';
  });
}
checkSB(); setInterval(checkSB, 30000);

let ws=null, wsR=0;
function connectRT(){
  ws=new WebSocket('wss://ituyqwstonmhnfshnaqz.supabase.co/realtime/v1/websocket?apikey='+SK+'&vsn=1.0.0');
  ws.onopen=()=>{ wsR=0; ws.send(JSON.stringify({topic:'realtime:public:aos_log_auditoria',event:'phx_join',payload:{config:{postgres_changes:[{event:'INSERT',schema:'public',table:'aos_log_auditoria'}]}},ref:'1'})); };
  ws.onmessage=e=>{ try{ const msg=JSON.parse(e.data),rec=msg.payload?.data?.record||msg.payload?.record; if(rec&&rec.tabla&&rec.tabla!=='sistema'){activateTable(rec.tabla,rec.accion||'INSERT');} }catch(_){} };
  ws.onclose=()=>{ wsR++; setTimeout(connectRT,Math.min(30000,2000*wsR)); };
  ws.onerror=()=>ws.close();
}

// ── Draw loop ────────────────────────────────────────────────────
let paused = false;
document.addEventListener('visibilitychange', ()=>{ paused = document.hidden; });

function draw(){
  ctx.fillStyle='rgba(248,250,254,0.13)';ctx.fillRect(0,0,W,H2);
  cam.z+=(cam.tz-cam.z)*0.07;
  document.getElementById('zpill').textContent='zoom '+cam.z.toFixed(1)+'×';
  if(!paused&&nodes.some(n=>n.pulse>0.05))phys(.985);
  ctx.save();ctx.translate(W/2+cam.x,H2/2+cam.y);ctx.scale(cam.z,cam.z);ctx.translate(-W/2,-H2/2);
  edges.forEach(e=>{const p=Math.max(e.a.pulse,e.b.pulse),ci=e.cross?lR(e.a.idle,e.b.idle,.5):e.a.idle,ca=e.cross?lR(e.a.live,e.b.live,.5):e.a.live,c=lR(ci,ca,p);ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);ctx.strokeStyle='rgba('+c+','+(e.cross?0.05+p*.6:0.16+p*.45).toFixed(2)+')';ctx.lineWidth=(e.cross?.38:.26)/cam.z;ctx.stroke();});
  nodes.forEach(n=>{n.phase+=n.pspd;if(n.pulse>0)n.pulse=Math.max(0,n.pulse-0.016);const p=n.pulse,c=lR(n.idle,n.live,p),isH=n===hovered,r=n.r+(isH?1.2:0);if(p>0.05||isH){ctx.beginPath();ctx.arc(n.x,n.y,r*(2.6+p*2.8),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.08+(isH?.05:0)).toFixed(2)+')';ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r*(1.4+p*.8),0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(p*.18+(isH?.12:0)).toFixed(2)+')';ctx.fill();}ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle='rgba('+c+','+(0.68+p*.32).toFixed(2)+')';ctx.fill();if(r>1.0){ctx.beginPath();ctx.arc(n.x,n.y,r*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(0.48+p*.45).toFixed(2)+')';ctx.fill();}if(n.label&&cam.z>.55){const sz=Math.max(6.5,9/cam.z);ctx.font='600 '+sz+'px \'SF Pro Display\',\'Segoe UI\',sans-serif';ctx.textAlign='center';const cc=lR(n.idle,n.live,Math.max(.25,p));ctx.fillStyle='rgba('+cc+','+Math.min(.7,.15+cam.z*.32)+')';ctx.fillText(n.label,n.x,n.y-r-2.5/cam.z);}});
  for(let i=travelers.length-1;i>=0;i--){const tv=travelers[i];tv.t+=tv.speed;if(tv.t>=1){travelers.splice(i,1);continue;}const x=tv.a.x+(tv.b.x-tv.a.x)*tv.t,y=tv.a.y+(tv.b.y-tv.a.y)*tv.t,xt=tv.a.x+(tv.b.x-tv.a.x)*Math.max(0,tv.t-.18),yt=tv.a.y+(tv.b.y-tv.a.y)*Math.max(0,tv.t-.18);const g2=ctx.createLinearGradient(xt,yt,x,y);g2.addColorStop(0,'rgba('+tv.color+',0)');g2.addColorStop(1,'rgba('+tv.color+',.95)');ctx.beginPath();ctx.moveTo(xt,yt);ctx.lineTo(x,y);ctx.strokeStyle=g2;ctx.lineWidth=1.8/cam.z;ctx.stroke();const hr=2.4/cam.z;ctx.beginPath();ctx.arc(x,y,hr*2.2,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.12)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr,0,Math.PI*2);ctx.fillStyle='rgba('+tv.color+',.95)';ctx.fill();ctx.beginPath();ctx.arc(x,y,hr*.32,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();}
  ctx.restore();
  requestAnimationFrame(draw);
}
